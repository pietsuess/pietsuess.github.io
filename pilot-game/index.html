<!DOCTYPE html>
<html lang="en">

<title>Victory Walk</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:#000;overflow:hidden;touch-action:none;}
  canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges;}

  /* Splash screen */
  #splash{
    position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;
    background:#000;display:flex;flex-direction:column;
    align-items:center;justify-content:center;
    font-family:'Press Start 2P',monospace;
  }
  #splash-title{
    font-size:18px;color:#ffe000;letter-spacing:4px;margin-bottom:12px;
    text-shadow:0 0 20px #ffe000, 0 4px 0 #b39800;
  }
  #splash-sub{font-size:7px;color:#888;letter-spacing:2px;margin-bottom:50px;}
  .splash-btn{
    background:none;border:2px solid #44ddff;color:#44ddff;
    font-family:'Press Start 2P',monospace;font-size:9px;
    padding:18px 36px;cursor:pointer;letter-spacing:2px;
    margin:8px;min-width:280px;text-align:center;
    transition:all 0.15s;
  }
  .splash-btn:hover{background:rgba(68,221,255,0.12);transform:scale(1.03);}
  .splash-btn.pixel{border-color:#00ff88;color:#00ff88;}
  .splash-btn.pixel:hover{background:rgba(0,255,136,0.12);}
  .splash-hint{font-size:6px;color:#555;margin-top:6px;letter-spacing:1px;}
  #splash canvas{
    image-rendering:pixelated;image-rendering:crisp-edges;
    margin-bottom:30px;
  }
  #popup{
    position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);

    background:rgba(0,0,20,0.95);

  }
  #popup.open{display:block;}
  #popup-title{font-size:13px;color:#44ddff;letter-spacing:3px;margin-bottom:24px;}
  #popup-close{

<script>
// Reload → back to NAVIGATOR title screen
if(performance.getEntriesByType('navigation')[0]?.type === 'reload'){
  window.location.replace('navigator.html');
}
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const offscreen = document.createElement('canvas');
offscreen.style.imageRendering = 'pixelated';
const octx = offscreen.getContext('2d', {willReadFrequently: false});
octx.imageSmoothingEnabled = false;
const RENDER_SCALE = 1;

const WORLD_W = 5198.39;
const WORLD_H = 1695.6;

const PILOT_H = 120;
const PILOT_W = PILOT_H * (300/360);
const FRAME_W = 300;
const FRAME_H = 360;
const TOTAL_FRAMES = 10;
const ANIM_FPS = 16;

// Pixel art mode sprite (caveman) — 10 cols × 4 rows grid
const PX_FRAME_W = 61;
const PX_FRAME_H = 108;
const PX_PILOT_H = 90;
const PX_PILOT_W = PX_PILOT_H * (PX_FRAME_W / PX_FRAME_H);

// Caveman animation definitions: { row, start, count, fps, loop }
const PX_ANIMS = {
  idle:    { row:0, start:0, count:4, fps:4,  loop:true },
  walk:    { row:0, start:5, count:5, fps:10, loop:true },
  run:     { row:1, start:0, count:10,fps:16, loop:true },
  jump:    { row:2, start:0, count:3, fps:10, loop:false },
  roll:    { row:2, start:3, count:5, fps:12, loop:true },
  recover: { row:2, start:8, count:2, fps:8,  loop:false },
  crouch:  { row:3, start:0, count:2, fps:6,  loop:false },
};
let pxAnim = 'idle';
let pxFrame = 0;
let pxAnimTimer = 0;
let pxRolling = false;

function setPxAnim(name){
  if(pxAnim === name) return;
  pxAnim = name;
  pxFrame = 0;
  pxAnimTimer = 0;
}

function tickPxAnim(dt){
  const a = PX_ANIMS[pxAnim];
  if(!a) return;
  pxAnimTimer += dt;
  if(pxAnimTimer >= 1/a.fps){
    pxAnimTimer = 0;
    pxFrame++;
    if(pxFrame >= a.count){
      if(a.loop){ pxFrame = 0; }
      else { pxFrame = a.count - 1; } // hold last frame
    }
  }
}

const WALK_SPEED = 6;
const TARMAC_TOP = 1405;
const TARMAC_BOTTOM = 1650;
const TARMAC_LEFT = 0;
const TARMAC_RIGHT = 5198;
const VISIBLE_H = 300;

let camX = 0, camY = 0;

// Hitzone format: box = {x, y, w, h, rot?}, circle = {cx, cy, r}
// rot = rotation in radians around box center, default 0
function isCircle(b){ return b.r !== undefined; }
function boxRot(b){ return b.rot || 0; }
function cloneZone(b){ return isCircle(b) ? {cx:b.cx, cy:b.cy, r:b.r} : {x:b.x, y:b.y, w:b.w, h:b.h, rot:b.rot||0}; }

// Get box center
function boxCenter(b){ return {x: b.x + b.w/2, y: b.y + b.h/2}; }

// Rotate point (px,py) around (ox,oy) by angle
function rotPt(px, py, ox, oy, a){
  const c = Math.cos(a), s = Math.sin(a);
  const dx = px - ox, dy = py - oy;
  return {x: ox + dx*c - dy*s, y: oy + dx*s + dy*c};
}

// Get 4 corners of a rotated box in world space
function boxCorners(b){
  const cx = b.x + b.w/2, cy = b.y + b.h/2, a = boxRot(b);
  return [
    rotPt(b.x, b.y, cx, cy, a),
    rotPt(b.x+b.w, b.y, cx, cy, a),
    rotPt(b.x+b.w, b.y+b.h, cx, cy, a),
    rotPt(b.x, b.y+b.h, cx, cy, a),
  ];
}

// SAT axes for a rotated box
function boxAxes(a){
  const c = Math.cos(a), s = Math.sin(a);
  return [{x:c, y:s}, {x:-s, y:c}];
}

// Project corners onto axis, return [min, max]
function projectCorners(corners, axis){
  let mn = Infinity, mx = -Infinity;
  for(const p of corners){
    const d = p.x*axis.x + p.y*axis.y;
    if(d < mn) mn = d;
    if(d > mx) mx = d;
  }
  return [mn, mx];
}

// AABB corners helper
function aabbCorners(l, t, w, h){
  return [{x:l,y:t},{x:l+w,y:t},{x:l+w,y:t+h},{x:l,y:t+h}];
}

// SAT collision: rotated box vs AABB pilot. Returns push vector or null.
function rotBoxCollide(b, pL, pT, pW, pH){
  const a = boxRot(b);
  if(a === 0){
    // Fast AABB path
    const oL = b.x, oR = b.x+b.w, oT = b.y, oB = b.y+b.h;
    const pR = pL+pW, pB = pT+pH;
    if(pR<=oL || pL>=oR || pB<=oT || pT>=oB) return null;
    const ol = pR-oL, or2 = oR-pL, ot = pB-oT, ob = oB-pT;
    const m = Math.min(ol, or2, ot, ob);
    if(m===ol) return {px:-ol, py:0};
    if(m===or2) return {px:or2, py:0};
    if(m===ot) return {px:0, py:-ot};
    return {px:0, py:ob};
  }
  const cornersA = boxCorners(b);
  const cornersB = aabbCorners(pL, pT, pW, pH);
  // 4 axes: 2 from rotated box, 2 from AABB (always x,y)
  const axes = [...boxAxes(a), {x:1,y:0}, {x:0,y:1}];
  let minOverlap = Infinity, minAxis = null;
  for(const ax of axes){
    const [minA, maxA] = projectCorners(cornersA, ax);
    const [minB, maxB] = projectCorners(cornersB, ax);
    if(maxA <= minB || maxB <= minA) return null; // gap
    const overlap = Math.min(maxA - minB, maxB - minA);
    if(overlap < minOverlap){
      minOverlap = overlap;
      // Direction: push pilot (B) away from box (A)
      const cA = (minA+maxA)/2, cB = (minB+maxB)/2;
      const sign = cB > cA ? 1 : -1;
      minAxis = {x: ax.x*sign, y: ax.y*sign};
    }
  }
  return {px: minAxis.x * minOverlap, py: minAxis.y * minOverlap};
}

// Objects
const objects = [
  {name:'DELTA WING', key:'deltawing', zone:null, zoneColor:null, wx:853.75, wy:1305.21, ww:568.2, wh:199.95, depthY:1505, collide:true, interact:true,

    hitboxes:[
      {x:2676, y:1537, w:165, h:49},

      {x:2652, y:1554, w:42, h:20, rot:0.979},

  {name:'HEXAGRAM', key:'hexagram', zone:'DIRECT', zoneColor:'#ff69b4', wx:3246.6, wy:1345.9, ww:178.67, wh:92.12, depthY:1415, collide:true, interact:true,
    hitboxes:[
      {x:3288, y:1361, w:95, h:76},
      {x:3248, y:1379, w:177, h:25},
      {x:3269, y:1361, w:130, h:20},
      {x:3249, y:1402, w:49, h:20, rot:0.703},

  {name:'TRIANGLE', key:'triangle', zone:'DESIGN', zoneColor:'#ff8c00', wx:3565.8, wy:1493.1, ww:168.31, wh:163.04, depthY:1627, collide:true, interact:true,
    hitboxes:[
      {x:3569, y:1630, w:57, h:20},
      {x:3637, y:1607, w:92, h:20},

  {name:'PENTAGRAM', key:'pentagram', zone:'PHOTO', zoneColor:'#ffcc00', wx:3899, wy:1332.8, ww:193.01, wh:118.31, depthY:1432, collide:true, interact:true,
    hitboxes:[
      {x:3924, y:1362, w:120, h:74},
      {x:3901, y:1414, w:157, h:19},
      {x:3985, y:1396, w:35, h:50},
      {x:3913, y:1361, w:157, h:67},

// \u2500\u2500 Dynamic content manifest loader (PHOTO + DESIGN from GitHub repos) \u2500\u2500
(function loadContentManifests(){
  const PHOTO_MANIFEST = 'https://raw.githubusercontent.com/pietsuess/piet-photos/master/manifest.json';
  const DESIGN_MANIFEST = 'https://raw.githubusercontent.com/pietsuess/design-portfolio/main/manifest.json';
  const PHOTO_BASE = 'https://raw.githubusercontent.com/pietsuess/piet-photos/master/photos/';
  const DESIGN_BASE = 'https://raw.githubusercontent.com/pietsuess/design-portfolio/main/';

  function mapPhoto(item, base){
    const o = {title:item.title, text:item.text||''};
    if(item.subtitle) o.subtitle = item.subtitle;
    if(item.displayTitle) o.displayTitle = item.displayTitle;
    if(item.type === 'single'){
      o.isSinglePhoto = true;
      o.singleUrl = base + item.file;
    } else {
      o.gallery = (item.files||[]).map(f => {
        const g = {url:base+f.file, caption:f.caption||''};
        if(f.wide) g.wide = true;
        return g;
      });
    }
    return o;
  }

  function mapDesign(item, base){
    const allFiles = item.rows
      ? item.rows.flat().map(f=>({url:base+f.file, caption:f.caption||''}))
      : (item.files||[]).map(f=>({url:base+f.file, caption:f.caption||''}));
    const o = {title:item.title, subtitle:item.subtitle||'', text:item.text||'', gallery:allFiles};
    if(item.rows){
      o._rows = item.rows.map(row=>row.map(f=>({url:base+f.file, caption:f.caption||''})));
    }
    if(item.heroWidth) o._heroWidth = item.heroWidth;
    return o;
  }

  function load(url, zone, fallback, mapper, baseFallback){
    return fetch(url+'?_t='+Date.now(), {cache:'no-cache'})
      .then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); })
      .then(data=>{
        if(!data.items||!data.items.length) throw new Error('empty');
        const base = data.baseUrl || baseFallback;
        CONTENT_DATA[zone] = data.items.map(it=>mapper(it, base));
        console.log('[MANIFEST] '+zone+': loaded '+CONTENT_DATA[zone].length+' items');
      })
      .catch(err=>{
        console.warn('[MANIFEST] '+zone+' fetch failed, using fallback:', err);
        CONTENT_DATA[zone] = fallback;
      });
  }

  const _pf = [...CONTENT_DATA.PHOTO];
  const _df = [...CONTENT_DATA.DESIGN];
  Promise.all([
    load(PHOTO_MANIFEST, 'PHOTO', _pf, mapPhoto, PHOTO_BASE),
    load(DESIGN_MANIFEST, 'DESIGN', _df, mapDesign, DESIGN_BASE)
  ]).then(()=>console.log('[MANIFEST] All resolved. PHOTO='+CONTENT_DATA.PHOTO.length+', DESIGN='+CONTENT_DATA.DESIGN.length));
})();

// ===================== PIXEL ART CONSTANTS =====================
const TILE = 24;
const PX_SCALE = 1;
const TS = TILE * PX_SCALE;
const PX_SKY_SPEED = 0.08;
const PX_MTN_SPEED = 0.3;

// ===================== MULTI-LAYER TILEMAP SYSTEM =====================
let TS_COLS = 16, TS_ROWS = 16;

function gridId(gc, gr){ return gr * TS_COLS + gc + 1; }
function tileToSrc(id){
  if(id === 0) return null;
  const idx = id - 1;
  const c = idx % TS_COLS, r = Math.floor(idx / TS_COLS);
  return [c*TILE, r*TILE, TILE, TILE];
}

// Layer definitions: sky (slow parallax), mountains (medium), ground (1:1)
const LAYERS = [
  { name:'SKY', cols:50, rows:20, y0:0,    speedX:PX_SKY_SPEED, speedY:PX_SKY_SPEED, map:null },
  { name:'MTN', cols:100, rows:8, y0:1280,  speedX:PX_MTN_SPEED, speedY:1.0,          map:null },
  { name:'GND', cols:200, rows:25, y0:1080, speedX:1.0,          speedY:1.0,          map:null },
];
const LY_SKY=0, LY_MTN=1, LY_GND=2;
let activeLayer = LY_GND;

const GROUND_ROW = 14;
const GRAVITY = 1200;
const JUMP_VEL = -420;
const PLAT_HW = 10;
const PX_FEET_OFFSET = 13; // push pilot down so sprite sits on ground visually

// Collision only checks ground layer
function tileAt(wx, wy){
  const L = LAYERS[LY_GND];
  const c = Math.floor(wx / TILE);
  const r = Math.floor((wy - L.y0) / TILE);
  if(r<0||r>=L.rows||c<0||c>=L.cols) return 0;
  return L.map ? L.map[r][c] : 0;
}
function tileSolid(wx, wy){ return tileAt(wx, wy) !== 0; }

function applyLayerData(data){
  if(data.sky) LAYERS[LY_SKY].map = data.sky;
  if(data.mtn) LAYERS[LY_MTN].map = data.mtn;
  if(data.gnd) LAYERS[LY_GND].map = data.gnd;
}

function buildAllLayers(){
  // 1) Try localStorage (editor overrides)
  const saved = localStorage.getItem('pilotGame_tileMap');
  if(saved){
    try{
      const data = JSON.parse(saved);
      if(data.sky && data.mtn && data.gnd){
        applyLayerData(data);
        console.log('[LAYERS] Loaded from localStorage');
        return;
      }
    } catch(e){}
  }

  // 2) Try fetching levels.json (committed level data)
  fetch('levels.json').then(r => {
    if(!r.ok) throw new Error('no levels.json');
    return r.json();
  }).then(data => {
    if(data.sky && data.mtn && data.gnd){
      applyLayerData(data);
      console.log('[LAYERS] Loaded from levels.json');
    }
  }).catch(() => {
    // 3) Fall back to hardcoded defaults
    for(let i=0; i<LAYERS.length; i++) buildLayerDefaults(i);
    console.log('[LAYERS] Built defaults (no levels.json)');
  });

  // Init with defaults immediately (fetch will overwrite if successful)
  if(!LAYERS[LY_GND].map){
    for(let i=0; i<LAYERS.length; i++) buildLayerDefaults(i);
  }
}

function buildLayerDefaults(idx){
  const L = LAYERS[idx];
  L.map = [];
  for(let r=0; r<L.rows; r++) L.map[r] = new Array(L.cols).fill(0);

  if(idx === LY_SKY){
    // Scatter some cloud tiles from tileset row 3-4
    const rng = (seed) => { let s=seed; return()=>{s=(s*16807)%2147483647;return s/2147483647;}; };
    const rand = rng(77);
    const cloudTiles = [gridId(5,3),gridId(6,3),gridId(8,3),gridId(9,3),gridId(10,3),gridId(5,4),gridId(8,4)];
    for(let i=0; i<25; i++){
      const c = Math.floor(rand()*L.cols);
      const r = Math.floor(rand()*L.rows*0.7);
      const t = cloudTiles[Math.floor(rand()*cloudTiles.length)];
      if(c<L.cols && r<L.rows) L.map[r][c] = t;
    }
  }

  if(idx === LY_MTN){
    // Tile mountain sprites (tileset row 0) across bottom rows
    for(let c=0; c<L.cols; c++){
      for(let gc=0; gc<TS_COLS; gc++){
        if(c % TS_COLS === gc){
          L.map[L.rows-2][c] = gridId(gc, 0);
          L.map[L.rows-1][c] = gridId(gc, 0);
        }
      }
    }
  }

  if(idx === LY_GND){
    const G = gridId(0,1), D = gridId(0,2), P = gridId(1,7);
    for(let c=0; c<L.cols; c++){
      L.map[GROUND_ROW][c] = G;
      for(let r=GROUND_ROW+1; r<L.rows; r++) L.map[r][c] = D;
    }
    const gaps = [[28,32],[55,63],[90,95],[130,135],[165,172]];
    for(const [a,b] of gaps)
      for(let c=a;c<b;c++) for(let r=GROUND_ROW;r<L.rows;r++) L.map[r][c]=0;
    const plats = [
      [25,29,GROUND_ROW-3],[31,35,GROUND_ROW-5],[50,54,GROUND_ROW-4],
      [57,59,GROUND_ROW-2],[61,63,GROUND_ROW-3],[70,76,GROUND_ROW-6],
      [80,85,GROUND_ROW-4],[92,94,GROUND_ROW-2],[96,100,GROUND_ROW-5],
      [110,116,GROUND_ROW-7],[120,125,GROUND_ROW-4],[132,134,GROUND_ROW-2],
      [140,148,GROUND_ROW-6],[155,160,GROUND_ROW-3],[167,170,GROUND_ROW-2],
      [175,182,GROUND_ROW-5],
    ];
    for(const [a,b,row] of plats)
      for(let c=a;c<b;c++) L.map[row][c] = P;
    for(let c=100;c<110;c++){ L.map[GROUND_ROW][c]=D; L.map[GROUND_ROW-1][c]=D; L.map[GROUND_ROW-2][c]=G; }
    for(let c=150;c<165;c++){ L.map[GROUND_ROW][c]=D; L.map[GROUND_ROW-1][c]=G; }
  }
}

function renderLayerTiles(idx, lcx, lcy){
  const L = LAYERS[idx];
  if(!L.map) return;
  const ms = getScale();
  const vw = W / ms;
  const startCol = Math.max(0, Math.floor(lcx / TILE));
  const endCol = Math.min(L.cols, Math.ceil((lcx + vw) / TILE) + 1);
  const startRow = Math.max(0, Math.floor((lcy - L.y0) / TILE));
  const endRow = Math.min(L.rows, Math.ceil((lcy - L.y0 + VISIBLE_H) / TILE) + 1);
  const ts = tilesetImg;
  for(let r=startRow; r<endRow; r++){
    for(let c=startCol; c<endCol; c++){
      const t = L.map[r][c];
      if(t===0) continue;
      const s = tileToSrc(t);
      if(!s) continue;
      ctx.drawImage(ts, s[0],s[1],s[2],s[3], c*TILE, L.y0+r*TILE, TILE, TILE);
    }
  }
  // Grid overlay for active layer in editor
  if(tileEdMode && activeLayer === idx){
    ctx.strokeStyle = 'rgba(0,255,136,0.15)';
    ctx.lineWidth = 0.5;
    for(let c=startCol; c<=endCol; c++){
      ctx.beginPath(); ctx.moveTo(c*TILE, L.y0+startRow*TILE);
      ctx.lineTo(c*TILE, L.y0+endRow*TILE); ctx.stroke();
    }
    for(let r=startRow; r<=endRow; r++){
      ctx.beginPath(); ctx.moveTo(startCol*TILE, L.y0+r*TILE);
      ctx.lineTo(endCol*TILE, L.y0+r*TILE); ctx.stroke();
    }
  }
}

// ===================== TILE EDITOR =====================
let tileEdMode = false;
let edTileId = 0; // 0 = erase, >0 = tile from palette
const PAL_SCALE = 3; // palette display scale
let palCanvas = null, palCtx = null;

function toggleTileEditor(){
  if(gameMode !== 'pixel') return;
  tileEdMode = !tileEdMode;
  document.getElementById('tile-editor').classList.toggle('open', tileEdMode);
  document.getElementById('tile-hint').classList.toggle('show', tileEdMode);
  if(tileEdMode && !palCanvas) initPalette();
}

function initPalette(){
  palCanvas = document.getElementById('pal-canvas');
  palCtx = palCanvas.getContext('2d');
  palCtx.imageSmoothingEnabled = false;
  const tw = tilesetImg.naturalWidth, th = tilesetImg.naturalHeight;
  palCanvas.width = tw * PAL_SCALE;
  palCanvas.height = th * PAL_SCALE;
  drawPalette();

  palCanvas.addEventListener('click', e => {
    const rect = palCanvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (palCanvas.width / rect.width);
    const y = (e.clientY - rect.top) * (palCanvas.height / rect.height);
    const gc = Math.floor(x / (TILE * PAL_SCALE));
    const gr = Math.floor(y / (TILE * PAL_SCALE));
    if(gc >= 0 && gc < TS_COLS && gr >= 0 && gr < TS_ROWS){
      edTileId = gridId(gc, gr);
      drawPalette();
      document.getElementById('pal-sel').textContent = 'Tile ['+gc+','+gr+']';
    }
  });

  palCanvas.addEventListener('contextmenu', e => {
    e.preventDefault();
    edTileId = 0;
    drawPalette();
    document.getElementById('pal-sel').textContent = 'ERASE (empty)';
  });
}

function drawPalette(){
  if(!palCtx) return;
  const tw = tilesetImg.naturalWidth, th = tilesetImg.naturalHeight;
  palCtx.clearRect(0,0,palCanvas.width,palCanvas.height);
  palCtx.drawImage(tilesetImg, 0,0, tw,th, 0,0, tw*PAL_SCALE, th*PAL_SCALE);

  // Grid
  palCtx.strokeStyle = 'rgba(255,255,255,0.2)';
  palCtx.lineWidth = 1;
  for(let c=0; c<=TS_COLS; c++){
    palCtx.beginPath(); palCtx.moveTo(c*TILE*PAL_SCALE, 0);
    palCtx.lineTo(c*TILE*PAL_SCALE, th*PAL_SCALE); palCtx.stroke();
  }
  for(let r=0; r<=TS_ROWS; r++){
    palCtx.beginPath(); palCtx.moveTo(0, r*TILE*PAL_SCALE);
    palCtx.lineTo(tw*PAL_SCALE, r*TILE*PAL_SCALE); palCtx.stroke();
  }

  // Highlight selected
  if(edTileId > 0){
    const idx = edTileId - 1;
    const sc = idx % TS_COLS, sr = Math.floor(idx / TS_COLS);
    palCtx.strokeStyle = '#00ff88';
    palCtx.lineWidth = 3;
    palCtx.strokeRect(sc*TILE*PAL_SCALE+1, sr*TILE*PAL_SCALE+1, TILE*PAL_SCALE-2, TILE*PAL_SCALE-2);
  }
}

function tePaintAt(sx, sy, id){
  const s = getScale();
  const L = LAYERS[activeLayer];
  const lcx = camX * L.speedX;
  const lcy = camY * L.speedY;
  const wx = sx / s + lcx;
  const wy = sy / s + lcy;
  const c = Math.floor(wx / TILE);
  const r = Math.floor((wy - L.y0) / TILE);
  if(r<0||r>=L.rows||c<0||c>=L.cols) return;
  L.map[r][c] = id;
}

// ===================== COLLISION HELPERS =====================

// Rect (pilot feet) vs circle collision. Returns push vector or null.
function rectCircleCollide(pL, pT, pW, pH, cx, cy, r){
  // Closest point on rect to circle center
  const closestX = Math.max(pL, Math.min(cx, pL + pW));
  const closestY = Math.max(pT, Math.min(cy, pT + pH));
  const dx = cx - closestX, dy = cy - closestY;
  const dist = Math.sqrt(dx*dx + dy*dy);
  if(dist >= r) return null;
  if(dist === 0){
    // Center inside rect — push out along shortest axis
    const overlapL = cx - pL, overlapR = (pL+pW) - cx;
    const overlapT = cy - pT, overlapB = (pT+pH) - cy;
    const m = Math.min(overlapL, overlapR, overlapT, overlapB);
    if(m===overlapL) return {px: -(overlapL+r), py:0};
    if(m===overlapR) return {px: overlapR+r, py:0};
    if(m===overlapT) return {px:0, py: -(overlapT+r)};
    return {px:0, py: overlapB+r};
  }
  const overlap = r - dist;
  // Push rect AWAY from circle center (so push pilot, not circle)
  return {px: -(dx/dist)*overlap, py: -(dy/dist)*overlap};
}

// Distance from point to nearest edge of a hitzone
function distToZone(px, py, b){
  if(isCircle(b)){
    return Math.sqrt((px-b.cx)**2 + (py-b.cy)**2) - b.r;
  }
  // Box: distance to center
  return Math.sqrt((px - (b.x+b.w/2))**2 + (py - (b.y+b.h/2))**2);
}

const undoStack = [];
const MAX_UNDO = 2;

function snapshotState(){
  const snap = [];
  for(const obj of objects){
    snap.push({
      depthY: obj.depthY,
      hitboxes: obj.hitboxes ? obj.hitboxes.map(cloneZone) : null
    });
  }
  return snap;
}

function pushUndo(){
  undoStack.push(snapshotState());
  if(undoStack.length > MAX_UNDO) undoStack.shift();
}

function editorUndo(){
  if(!undoStack.length) return;
  const snap = undoStack.pop();
  for(let i=0; i<objects.length; i++){
    objects[i].depthY = snap[i].depthY;
    if(snap[i].hitboxes) objects[i].hitboxes = snap[i].hitboxes;
  }
  updateEditorPanel();
}

      html += '<span class="label">x:</span><span class="val">' + Math.round(b.x) + '</span> ';
      html += '<span class="label">y:</span><span class="val">' + Math.round(b.y) + '</span><br>';
      html += '<span class="label">w:</span><span class="val">' + Math.round(b.w) + '</span> ';
      html += '<span class="label">h:</span><span class="val">' + Math.round(b.h) + '</span><br>';
      const deg = Math.round(boxRot(b) * 180 / Math.PI);
      if(deg !== 0) html += '<span class="label">rot:</span><span class="val">' + deg + '°</span><br>';
    }
  }
  html += '<br>';
  html += '<button onclick="editorAddBox()">+ BOX</button> ';
  html += '<button onclick="editorAddCircle()">+ CIRCLE</button> ';
  if(b) html += '<button class="warn" onclick="editorDeleteZone()">- DELETE</button>';
  epContentEl.innerHTML = html;
}

function editorAddBox(){
  if(edSelObj === null) return;
  pushUndo();
  const obj = objects[edSelObj];
  if(!obj.hitboxes) obj.hitboxes = [];
  obj.hitboxes.push({x:pilot.x - 50, y:pilot.y - 10, w:100, h:20});
  obj.collide = true;
  edSelBox = obj.hitboxes.length - 1;
  updateEditorPanel();
}

function editorAddCircle(){
  if(edSelObj === null) return;
  pushUndo();
  const obj = objects[edSelObj];
  if(!obj.hitboxes) obj.hitboxes = [];
  obj.hitboxes.push({cx:pilot.x, cy:pilot.y, r:40});
  obj.collide = true;
  edSelBox = obj.hitboxes.length - 1;
  updateEditorPanel();
}

function editorDeleteZone(){
  if(edSelObj === null || edSelBox === null) return;
  pushUndo();
  const obj = objects[edSelObj];
  if(!obj.hitboxes || obj.hitboxes.length <= 1) return;
  obj.hitboxes.splice(edSelBox, 1);
  edSelBox = Math.min(edSelBox, obj.hitboxes.length - 1);
  updateEditorPanel();
}

function editorExport(){
  let out = '// Exported hitzone + depthY config\n';
  for(const obj of objects){
    if(!obj.hitboxes) continue;
    out += '// ' + obj.name + '\n';
    out += '//   depthY: ' + Math.round(obj.depthY) + '\n';
    out += '//   hitboxes: [\n';
    for(const b of obj.hitboxes){
      if(isCircle(b)){
        out += '//     {cx:' + Math.round(b.cx) + ', cy:' + Math.round(b.cy) + ', r:' + Math.round(b.r) + '},\n';
      } else {
        const rd = boxRot(b);
        const rotStr = rd ? ', rot:' + (Math.round(rd*1000)/1000) : '';
        out += '//     {x:' + Math.round(b.x) + ', y:' + Math.round(b.y) + ', w:' + Math.round(b.w) + ', h:' + Math.round(b.h) + rotStr + '},\n';
      }
    }
    out += '//   ]\n\n';
  }
  navigator.clipboard.writeText(out).then(() => {
    editorHintEl.textContent = 'COPIED TO CLIPBOARD';
    setTimeout(() => { editorHintEl.textContent = 'EDITOR MODE \u2014 click hitzones to edit'; }, 2000);
  });
  console.log(out);
}

// Point inside zone test (handles rotation)
function pointInZone(wx, wy, b){
  if(isCircle(b)){
    return Math.sqrt((wx-b.cx)**2 + (wy-b.cy)**2) <= b.r;
  }
  // Rotate point into box's local space
  const c = boxCenter(b), a = boxRot(b);
  const lp = rotPt(wx, wy, c.x, c.y, -a);
  return lp.x >= b.x && lp.x <= b.x+b.w && lp.y >= b.y && lp.y <= b.y+b.h;
}

// Distance from point to zone center (for pick priority)
function distToCenter(wx, wy, b){
  if(isCircle(b)) return Math.sqrt((wx-b.cx)**2 + (wy-b.cy)**2);
  const c = boxCenter(b);
  return Math.sqrt((wx-c.x)**2 + (wy-c.y)**2);
}

// Mouse handling for editor
canvas.addEventListener('mousedown', e => {
  if(!editorMode) return;
  const w = screenToWorld(e.clientX, e.clientY);

  // Check rotation handle on currently selected box
  if(edSelObj !== null && edSelBox !== null){
    const selB = objects[edSelObj].hitboxes[edSelBox];
    if(!isCircle(selB)){
      const bc = boxCenter(selB), ba = boxRot(selB);
      const lp = rotPt(w.x, w.y, bc.x, bc.y, -ba);
      const ds = getScale();
      const rhDist = 25/ds;
      const rhX = selB.x + selB.w/2, rhY = selB.y - rhDist;
      if(Math.sqrt((lp.x-rhX)**2 + (lp.y-rhY)**2) < 10/ds){
        pushUndo();
        edDrag = {type:'rotate', origRot:ba, cx:bc.x, cy:bc.y, startAngle:Math.atan2(w.y-bc.y, w.x-bc.x)};
        return;
      }
    }
  }

  // Check depthY line
  if(edSelObj !== null){
    const obj = objects[edSelObj];
    const lineScreenY = (obj.depthY - camY) * getScale();
    if(Math.abs(e.clientY - lineScreenY) < 8){
      pushUndo();
      edDrag = {type:'depthY', origDepthY:obj.depthY, startMY:e.clientY};
      return;
    }
  }

  // Check all hitzones
  let bestObj = null, bestBox = null, bestDist = Infinity;
  for(let oi=0; oi<objects.length; oi++){
    const obj = objects[oi];
    if(!obj.hitboxes) continue;
    for(let bi=0; bi<obj.hitboxes.length; bi++){
      const b = obj.hitboxes[bi];
      if(pointInZone(w.x, w.y, b)){
        const d = distToCenter(w.x, w.y, b);
        if(d < bestDist){ bestDist = d; bestObj = oi; bestBox = bi; }
      }
    }
  }

  if(bestObj !== null){
    edSelObj = bestObj;
    edSelBox = bestBox;
    const b = objects[edSelObj].hitboxes[edSelBox];

    let type = 'move';
    if(isCircle(b)){
      // Near edge = resize radius
      const distFromCenter = Math.sqrt((w.x-b.cx)**2 + (w.y-b.cy)**2);
      if(Math.abs(distFromCenter - b.r) < EDGE_GRAB) type = 'resizeRadius';
      pushUndo();
      edDrag = {type, startMX:e.clientX, startMY:e.clientY, origCX:b.cx, origCY:b.cy, origR:b.r};
    } else {
      const bc = boxCenter(b), ba = boxRot(b);
      const lp = rotPt(w.x, w.y, bc.x, bc.y, -ba); // local space point
      // Check rotation handle first (above top edge in local space)
      const ds = getScale();
      const rotHandleDist = 25/ds;
      const rotHandleY = b.y - rotHandleDist;
      const rotHandleX = b.x + b.w/2;
      if(Math.sqrt((lp.x-rotHandleX)**2 + (lp.y-rotHandleY)**2) < 10/ds){
        type = 'rotate';
        pushUndo();
        edDrag = {type, origRot:ba, cx:bc.x, cy:bc.y, startAngle:Math.atan2(w.y-bc.y, w.x-bc.x)};
        updateEditorPanel();
        return;
      }
      const eL = Math.abs(lp.x - b.x);
      const eR = Math.abs(lp.x - (b.x + b.w));
      const eT = Math.abs(lp.y - b.y);
      const eB = Math.abs(lp.y - (b.y + b.h));
      const minE = Math.min(eL, eR, eT, eB);
      if(minE < EDGE_GRAB){
        if(minE === eL) type = 'resizeL';
        else if(minE === eR) type = 'resizeR';
        else if(minE === eT) type = 'resizeT';
        else type = 'resizeB';
      }
      pushUndo();
      edDrag = {type, startMX:e.clientX, startMY:e.clientY, origX:b.x, origY:b.y, origW:b.w, origH:b.h, origRot:ba};
    }
    updateEditorPanel();
  } else {
    editorDeselect();
  }
});

canvas.addEventListener('mousemove', e => {
  if(!editorMode || !edDrag) return;
  const s = getScale();
  const dx = (e.clientX - edDrag.startMX) / s;
  const dy = (e.clientY - edDrag.startMY) / s;

  if(edDrag.type === 'depthY'){
    objects[edSelObj].depthY = edDrag.origDepthY + dy;
    updateEditorPanel();
    return;
  }

  const b = objects[edSelObj].hitboxes[edSelBox];

  if(isCircle(b)){
    if(edDrag.type === 'resizeRadius'){
      const distNow = Math.sqrt((e.clientX/s + camX - edDrag.origCX)**2 + (e.clientY/s + camY - edDrag.origCY)**2);
      b.r = Math.max(5, distNow);
    } else {
      b.cx = edDrag.origCX + dx;
      b.cy = edDrag.origCY + dy;
    }
  } else {
    if(edDrag.type === 'rotate'){
      const w = screenToWorld(e.clientX, e.clientY);
      const curAngle = Math.atan2(w.y - edDrag.cy, w.x - edDrag.cx);
      b.rot = edDrag.origRot + (curAngle - edDrag.startAngle);
    } else {
      // Transform mouse delta into box's local axes for move/resize
      const a = boxRot(b);
      const ca = Math.cos(-a), sa = Math.sin(-a);
      const ldx = dx*ca - dy*sa, ldy = dx*sa + dy*ca;
      switch(edDrag.type){
        case 'move':
          b.x = edDrag.origX + dx;
          b.y = edDrag.origY + dy;
          break;
        case 'resizeL':
          b.x = edDrag.origX + ldx;
          b.w = edDrag.origW - ldx;
          break;
        case 'resizeR':
          b.w = edDrag.origW + ldx;
          break;
        case 'resizeT':
          b.y = edDrag.origY + ldy;
          b.h = edDrag.origH - ldy;
          break;
        case 'resizeB':
          b.h = edDrag.origH + ldy;
          break;
      }
      if(b.w < 5) b.w = 5;
      if(b.h < 5) b.h = 5;
    }
  }
  updateEditorPanel();
});

canvas.addEventListener('mouseup', () => { edDrag = null; });

// Cursor hints
canvas.addEventListener('mousemove', e => {
  if(!editorMode){ canvas.style.cursor = 'default'; return; }
  if(edDrag) return;
  const w = screenToWorld(e.clientX, e.clientY);

  // depthY line
  if(edSelObj !== null){
    const lineScreenY = (objects[edSelObj].depthY - camY) * getScale();
    if(Math.abs(e.clientY - lineScreenY) < 8){ canvas.style.cursor = 'ns-resize'; return; }
  }

  for(const obj of objects){
    if(!obj.hitboxes) continue;
    for(const b of obj.hitboxes){
      if(isCircle(b)){
        const d = Math.sqrt((w.x-b.cx)**2 + (w.y-b.cy)**2);
        if(d <= b.r){
          canvas.style.cursor = Math.abs(d - b.r) < EDGE_GRAB ? 'nwse-resize' : 'grab';
          return;
        }
      } else {
        const bc = boxCenter(b), ba = boxRot(b);
        const lp = rotPt(w.x, w.y, bc.x, bc.y, -ba);
        // Check rotation handle
        const ds2 = getScale();
        const rhDist = 25/ds2;
        const rhX = b.x+b.w/2, rhY = b.y - rhDist;
        if(Math.sqrt((lp.x-rhX)**2 + (lp.y-rhY)**2) < 10/ds2){
          canvas.style.cursor = 'crosshair'; return;
        }
        if(lp.x >= b.x && lp.x <= b.x+b.w && lp.y >= b.y && lp.y <= b.y+b.h){
          const eL = Math.abs(lp.x - b.x), eR = Math.abs(lp.x - (b.x+b.w));
          const eT = Math.abs(lp.y - b.y), eB = Math.abs(lp.y - (b.y+b.h));
          const minE = Math.min(eL, eR, eT, eB);
          if(minE < EDGE_GRAB){
            canvas.style.cursor = (minE===eL||minE===eR) ? 'ew-resize' : 'ns-resize';
          } else {
            canvas.style.cursor = 'grab';
          }
          return;
        }
      }
    }
  }
  canvas.style.cursor = 'default';
});

// ===================== TOUCH CONTROLS =====================
const isMobile = /Mobi|Android|iPhone|iPad/.test(navigator.userAgent);
if(isMobile) document.getElementById('prompt-text').textContent = 'TAP TO INTERACT';
let touchJoy = null; // {id, startX, startY, curX, curY}
let touchJoyDx = 0, touchJoyDy = 0;
const JOY_RADIUS = 50;
const JOY_DEAD = 8;

canvas.addEventListener('touchstart', e => {
  if(editorMode) return;
  e.preventDefault();
  for(const t of e.changedTouches){
    // Left half = joystick, right half = interact tap
    if(t.clientX < W * 0.45){
      // Joystick
      if(!touchJoy){
        touchJoy = {id:t.identifier, startX:t.clientX, startY:t.clientY, curX:t.clientX, curY:t.clientY};
      }
    } else {
      // Tap right side — close overlays or interact
      if(document.getElementById('lightbox').classList.contains('open')){ closeLightbox(); }
      else if(contentViewOpen){ closeContentView(); }
      else if(popupOpen){ closePopup(); }
      else if(pilot.nearObj !== null){ openPopup(pilot.nearObj); }
    }
  }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  if(editorMode) return;
  e.preventDefault();
  for(const t of e.changedTouches){
    if(touchJoy && t.identifier === touchJoy.id){
      touchJoy.curX = t.clientX;
      touchJoy.curY = t.clientY;
      let dx = touchJoy.curX - touchJoy.startX;
      let dy = touchJoy.curY - touchJoy.startY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist > JOY_RADIUS){ dx = dx/dist*JOY_RADIUS; dy = dy/dist*JOY_RADIUS; }
      if(dist < JOY_DEAD){ touchJoyDx = 0; touchJoyDy = 0; }
      else { touchJoyDx = dx / JOY_RADIUS; touchJoyDy = dy / JOY_RADIUS; }
    }
  }
}, {passive:false});

function endJoy(e){
  for(const t of e.changedTouches){
    if(touchJoy && t.identifier === touchJoy.id){
      touchJoy = null; touchJoyDx = 0; touchJoyDy = 0;
    }
  }
}
canvas.addEventListener('touchend', endJoy);
canvas.addEventListener('touchcancel', endJoy);

// ===================== GAME LOOP =====================
let lastTime = 0;
function loop(time){
  requestAnimationFrame(loop);
  const dt = (time - lastTime) / 1000;
  lastTime = time;
  if(dt > 0.1 || dt <= 0) return;

  if(!popupOpen && !edDrag && !contentViewOpen){
    if(gameMode === 'pixel' && LAYERS[LY_GND].map){
      // ===== PIXEL ART: Side-scroller physics =====
      // Horizontal movement
      let moveX = 0;
      if(keys['ArrowRight']){ moveX = WALK_SPEED; pilot.facing = 1; }
      if(keys['ArrowLeft']){ moveX = -WALK_SPEED; pilot.facing = -1; }
      if(touchJoyDx !== 0){
        moveX = touchJoyDx * WALK_SPEED;
        if(Math.abs(touchJoyDx) > 0.1) pilot.facing = touchJoyDx > 0 ? 1 : -1;
      }

      // Horizontal tile collision
      if(moveX !== 0){
        const newX = pilot.x + moveX;
        const side = moveX > 0 ? newX + PLAT_HW : newX - PLAT_HW;
        // Check at feet-1, mid-body, head+1
        const blocked = tileSolid(side, pilot.y - 2) ||
                        tileSolid(side, pilot.y - PX_PILOT_H/2) ||
                        tileSolid(side, pilot.y - PX_PILOT_H + 2);
        if(!blocked) pilot.x = newX;
      }

      // Jump
      if((keys['ArrowUp'] || keys[' ']) && pilot.grounded){
        pilot.vy = JUMP_VEL;
        pilot.grounded = false;
      }

      // Gravity
      pilot.vy += GRAVITY * dt;
      pilot.y += pilot.vy * dt;

      // Vertical tile collision — landing
      if(pilot.vy >= 0){
        const footL = pilot.x - PLAT_HW, footR = pilot.x + PLAT_HW;
        if(tileSolid(footL, pilot.y) || tileSolid(footR, pilot.y)){
          const row = Math.floor((pilot.y - LAYERS[LY_GND].y0) / TILE);
          pilot.y = LAYERS[LY_GND].y0 + row * TILE + PX_FEET_OFFSET;
          pilot.vy = 0;
          pilot.grounded = true;
        } else {
          pilot.grounded = false;
        }
      }

      // Head bonk
      if(pilot.vy < 0){
        const headY = pilot.y - PX_PILOT_H;
        if(tileSolid(pilot.x - PLAT_HW, headY) || tileSolid(pilot.x + PLAT_HW, headY)){
          const row = Math.floor((headY - LAYERS[LY_GND].y0) / TILE);
          pilot.y = LAYERS[LY_GND].y0 + (row + 1) * TILE + PX_PILOT_H;
          pilot.vy = 0;
        }
      }

      // Fall off bottom — respawn
      if(pilot.y > LAYERS[LY_GND].y0 + LAYERS[LY_GND].rows * TILE + 200){
        pilot.x = 100;
        pilot.y = LAYERS[LY_GND].y0 + GROUND_ROW * TILE + PX_FEET_OFFSET;
        pilot.vy = 0;
        pilot.grounded = true;
      }

      // World bounds
      if(pilot.x < PLAT_HW) pilot.x = PLAT_HW;
      if(pilot.x > LAYERS[LY_GND].cols * TILE - PLAT_HW) pilot.x = LAYERS[LY_GND].cols * TILE - PLAT_HW;

      // Animation state machine
      pilot.walking = (moveX !== 0 && pilot.grounded);
      const isDown = keys['ArrowDown'] || (touchJoyDy > 0.5);
      if(pxRolling){
        // Roll continues until animation finishes or we hit ground idle
        if(pilot.grounded && pxAnim === 'roll' && pxFrame >= PX_ANIMS.roll.count - 1){
          setPxAnim('recover');
          pxRolling = false;
        } else if(pxAnim === 'recover' && pxFrame >= PX_ANIMS.recover.count - 1){
          pxRolling = false;
        }
      } else if(isDown && pilot.grounded){
        setPxAnim('crouch');
      } else if(!pilot.grounded){
        if(pilot.vy < 0) setPxAnim('jump');
        else if(pxAnim !== 'jump') setPxAnim('jump'); // falling
      } else if(pilot.walking){
        setPxAnim('run');
      } else {
        setPxAnim('idle');
      }
      // Trigger roll: press down while in air
      if(isDown && !pilot.grounded && !pxRolling){
        setPxAnim('roll');
        pxRolling = true;
      }
      tickPxAnim(dt);

    } else {
      // ===== ORIGINAL: Free roam =====
      pilot.walking = false;
      if(keys['ArrowRight']){ pilot.x += WALK_SPEED; pilot.facing = 1; pilot.walking = true; }
      if(keys['ArrowLeft']){ pilot.x -= WALK_SPEED; pilot.facing = -1; pilot.walking = true; }
      if(keys['ArrowUp']){ pilot.y -= WALK_SPEED; pilot.walking = true; }
      if(keys['ArrowDown']){ pilot.y += WALK_SPEED; pilot.walking = true; }
      if(touchJoyDx !== 0 || touchJoyDy !== 0){
        pilot.x += touchJoyDx * WALK_SPEED;
        pilot.y += touchJoyDy * WALK_SPEED;
        pilot.walking = true;
        if(Math.abs(touchJoyDx) > 0.1) pilot.facing = touchJoyDx > 0 ? 1 : -1;
      }

      if(pilot.x < TARMAC_LEFT) pilot.x = TARMAC_LEFT;
      if(pilot.x > TARMAC_RIGHT) pilot.x = TARMAC_RIGHT;
      if(pilot.y < TARMAC_TOP) pilot.y = TARMAC_TOP;
      if(pilot.y > TARMAC_BOTTOM) pilot.y = TARMAC_BOTTOM;

      // Collision (skip in editor mode)
      if(!editorMode){
        for(const obj of objects){
          if(!obj.collide || !obj.hitboxes) continue;
          for(const b of obj.hitboxes){
            const pL = pilot.x - PILOT_W*0.15, pR = pilot.x + PILOT_W*0.15;
            const pT = pilot.y - 15, pB = pilot.y - 5;
            const pW = pR - pL, pH = pB - pT;

            let push;
            if(isCircle(b)){
              push = rectCircleCollide(pL, pT, pW, pH, b.cx, b.cy, b.r);
            } else {
              push = rotBoxCollide(b, pL, pT, pW, pH);
            }
            if(push){ pilot.x += push.px; pilot.y += push.py; }
          }
        }
      }

      if(pilot.walking){
        pilot.animTimer += dt;
        if(pilot.animTimer > 1/ANIM_FPS){ pilot.animTimer=0; pilot.frame++; if(pilot.frame>=TOTAL_FRAMES) pilot.frame=1; }
      } else { pilot.frame=0; pilot.animTimer=0; }
    }
  }

  // Nearest interactable
  pilot.nearObj = null;
  if(!editorMode){
    let nd = Infinity;
    for(let i=0; i<objects.length; i++){
      const obj = objects[i];
      if(!obj.interact || !obj.hitboxes) continue;
      let d = Infinity;
      for(const b of obj.hitboxes){
        let dd;
        if(isCircle(b)){
          dd = Math.sqrt((pilot.x-b.cx)**2 + (pilot.y-b.cy)**2) - b.r;
        } else {
          const bc2 = boxCenter(b);
          dd = Math.sqrt((pilot.x-bc2.x)**2 + (pilot.y-bc2.y)**2);
        }
        if(dd < d) d = dd;
      }
      if(d<INTERACT_R && d<nd){ nd=d; pilot.nearObj=i; }
    }
  }
  promptEl.classList.toggle('show', pilot.nearObj!==null && !popupOpen);

  // Camera
  const mainScale = getScale();
  const visH = VISIBLE_H;
  const vww = W / mainScale;
  camX = pilot.x - vww/2;
  const camPH = gameMode === 'pixel' ? PX_PILOT_H : PILOT_H;
  camY = (pilot.y - camPH/2) - visH/2;
  if(camX<0) camX=0; if(camX>WORLD_W-vww) camX=WORLD_W-vww;
  if(camY<0) camY=0; if(camY>WORLD_H-visH) camY=WORLD_H-visH;

  // === RENDER ===
  ctx.clearRect(0,0,W,H);

  drawList.length = 0;
  if(gameMode !== 'pixel'){
    for(const obj of objects){
      if(objBitmaps[obj.key]) drawList.push(obj);
    }
    drawList.sort(sortCompare);
  }

  behindCount = 0;
  for(let i=0; i<drawList.length; i++){
    if(drawList[i].depthY <= pilot.y) behindCount = i+1;
  }

  // All rendering direct on main canvas
  // mainScale already computed above with camera

  if(gameMode === 'pixel' && LAYERS[LY_GND].map){
    // ===== PIXEL ART MODE WITH PARALLAX LAYERS =====
    const skyCamX = camX * PX_SKY_SPEED;
    const skyCamY = camY * PX_SKY_SPEED;
    const mtnCamX = camX * PX_MTN_SPEED;

    // Layer 1: Sky gradient + sky tiles
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.scale(mainScale, mainScale);
    ctx.translate(-skyCamX, -skyCamY);
    // Sky gradient behind tiles
    const grad = ctx.createLinearGradient(0, 0, 0, LAYERS[LY_SKY].rows * TILE);
    grad.addColorStop(0, '#5BA3D9');
    grad.addColorStop(0.5, '#87CEEB');
    grad.addColorStop(1, '#C8E6F0');
    ctx.fillStyle = grad;
    ctx.fillRect(skyCamX - 10, skyCamY - 10, vww + 20, VISIBLE_H + 20);
    renderLayerTiles(LY_SKY, skyCamX, skyCamY);
    ctx.restore();

    // Layer 2: Mountain tiles
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.scale(mainScale, mainScale);
    ctx.translate(-mtnCamX, -camY);
    renderLayerTiles(LY_MTN, mtnCamX, camY);
    ctx.restore();

    // Layer 3: Ground tiles
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.scale(mainScale, mainScale);
    ctx.translate(-camX, -camY);
    renderLayerTiles(LY_GND, camX, camY);
    ctx.restore();
  } else {
    // ===== ORIGINAL SVG MODE =====
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.scale(mainScale, mainScale);
    ctx.translate(-camX, -camY);

    // 1) Background
    if(bgBitmap){
      const sx = Math.max(0, Math.floor(camX));
      const sy = Math.max(0, Math.floor(camY));
      const sw = Math.min(WORLD_W - sx, Math.ceil(vww) + 2);
      const sh = Math.min(WORLD_H - sy, Math.ceil(visH) + 2);
      ctx.drawImage(bgBitmap, sx, sy, sw, sh, sx, sy, sw, sh);
    }

    // 2) Behind-pilot objects
    renderObjects(drawList, 0, behindCount, mainScale);
    ctx.restore();
  }

  // 3) Pilot — anchored at feet
  const isPx = gameMode === 'pixel';
  const pilotScreenX = (pilot.x - camX) * mainScale;
  const pilotFeetScreenY = (pilot.y - camY) * mainScale;
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  if(isPx){
    // Grid-based spritesheet: row × col
    const a = PX_ANIMS[pxAnim];
    const srcX = (a.start + pxFrame) * PX_FRAME_W;
    const srcY = a.row * PX_FRAME_H;
    const pilotDrawW = PX_PILOT_W * mainScale;
    const pilotDrawH = PX_PILOT_H * mainScale;
    ctx.translate(pilotScreenX, pilotFeetScreenY - pilotDrawH);
    if(pilot.facing<0) ctx.scale(-1,1);
    ctx.drawImage(pxSprite, srcX, srcY, PX_FRAME_W, PX_FRAME_H, -pilotDrawW/2, 0, pilotDrawW, pilotDrawH);
  } else {
    const pilotDrawW = PILOT_W * mainScale;
    const pilotDrawH = PILOT_H * mainScale;
    ctx.translate(pilotScreenX, pilotFeetScreenY - pilotDrawH);
    if(pilot.facing<0) ctx.scale(-1,1);
    ctx.drawImage(sprite, pilot.frame*FRAME_W, 0, FRAME_W, FRAME_H, -pilotDrawW/2, 0, pilotDrawW, pilotDrawH);
  }
  ctx.restore();

  // 4) In-front-of-pilot objects
  if(behindCount < drawList.length){
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    ctx.scale(mainScale, mainScale);
    ctx.translate(-camX, -camY);
    renderObjects(drawList, behindCount, drawList.length, mainScale);
    ctx.restore();
  }

  // Hanger hint arrow + return-to-game trigger
  if(gameMode !== 'pixel'){
    const hangerObj = objects.find(o => o.key === 'hanger');
    const hangerCX = hangerObj.wx + hangerObj.ww / 2; // ~301
    const hangerCY = hangerObj.wy + hangerObj.wh * 0.45; // vertically centered-ish
    const dx = pilot.x - hangerCX, dy = pilot.y - hangerCY;
    const distToHanger = Math.sqrt(dx*dx + dy*dy);
    const HANGER_HINT_R = 500; // start showing arrow
    const HANGER_ENTER_R = 180; // halfway into hanger triggers return

    if(distToHanger < HANGER_ENTER_R && pilot.x < 350){
      // Return to NAVIGATOR
      window.location.href = 'navigator.html';
    } else if(distToHanger < HANGER_HINT_R && !popupOpen && !contentViewOpen){
      // Draw "RETURN TO GAME" text + bouncing arrow pointing toward hanger
      const ang = Math.atan2(hangerCY - pilot.y, hangerCX - pilot.x);
      const bounce = Math.sin(Date.now() / 300) * 6;

      ctx.save();
      ctx.scale(mainScale, mainScale);
      ctx.translate(-camX, -camY);

      // Text
      const textDist = 120;
      const tx = pilot.x + Math.cos(ang) * textDist;
      const ty = pilot.y - PILOT_H * 0.6 + Math.sin(ang) * textDist * 0.3;
      const fs = Math.round(10);
      ctx.font = fs + 'px "Press Start 2P", monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#00ffcc';
      ctx.shadowColor = '#00ffcc';
      ctx.shadowBlur = 10;
      ctx.fillText('RETURN TO GAME', tx, ty);

      // Arrow — triangle pointing toward hanger, between text and hanger
      const arrowDist = 180 + bounce;
      const ax = pilot.x + Math.cos(ang) * arrowDist;
      const ay = pilot.y - PILOT_H * 0.3 + Math.sin(ang) * arrowDist * 0.3;
      ctx.translate(ax, ay);
      ctx.rotate(ang);
      ctx.fillStyle = '#00ffcc';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      ctx.moveTo(18, 0);
      ctx.lineTo(-14, -14);
      ctx.lineTo(-14, 14);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // Debug / Editor overlay
  if(debugHitboxes || editorMode){
    const ds = mainScale;
    ctx.save();
    ctx.scale(ds,ds);
    ctx.translate(-camX,-camY);
    ctx.lineWidth = 2/ds;

    for(let oi=0; oi<objects.length; oi++){
      const obj = objects[oi];
      if(!obj.hitboxes) continue;
      for(let bi=0; bi<obj.hitboxes.length; bi++){
        const b = obj.hitboxes[bi];
        const selected = editorMode && oi === edSelObj && bi === edSelBox;

        if(selected){
          ctx.strokeStyle = '#ffe000';
          ctx.fillStyle = 'rgba(255,224,0,0.25)';
          ctx.lineWidth = 3/ds;
        } else {
          ctx.strokeStyle = 'rgba(255,0,0,0.8)';
          ctx.fillStyle = 'rgba(255,0,0,0.15)';
          ctx.lineWidth = 2/ds;
        }

        if(isCircle(b)){
          ctx.beginPath();
          ctx.arc(b.cx, b.cy, b.r, 0, Math.PI*2);
          ctx.fill();
          ctx.stroke();
          // Crosshair at center
          if(selected){
            ctx.strokeStyle = 'rgba(255,224,0,0.5)';
            ctx.lineWidth = 1/ds;
            const ch = 6/ds;
            ctx.beginPath();
            ctx.moveTo(b.cx - ch, b.cy); ctx.lineTo(b.cx + ch, b.cy);
            ctx.moveTo(b.cx, b.cy - ch); ctx.lineTo(b.cx, b.cy + ch);
            ctx.stroke();
            // Radius handle
            ctx.fillStyle = '#ffe000';
            const hs = 4/ds;
            ctx.fillRect(b.cx + b.r - hs/2, b.cy - hs/2, hs, hs);
          }
        } else {
          const bc = boxCenter(b), ba = boxRot(b);
          ctx.save();
          ctx.translate(bc.x, bc.y);
          ctx.rotate(ba);
          ctx.fillRect(-b.w/2, -b.h/2, b.w, b.h);
          ctx.strokeRect(-b.w/2, -b.h/2, b.w, b.h);
          if(selected){
            ctx.fillStyle = '#ffe000';
            const hs = 4/ds;
            // Edge handles
            ctx.fillRect(-b.w/2 - hs/2, -hs/2, hs, hs);
            ctx.fillRect(b.w/2 - hs/2, -hs/2, hs, hs);
            ctx.fillRect(-hs/2, -b.h/2 - hs/2, hs, hs);
            ctx.fillRect(-hs/2, b.h/2 - hs/2, hs, hs);
            // Rotation handle — line + circle above top edge
            const rotHandleDist = 25/ds;
            ctx.strokeStyle = '#ff88ff';
            ctx.lineWidth = 2/ds;
            ctx.beginPath();
            ctx.moveTo(0, -b.h/2);
            ctx.lineTo(0, -b.h/2 - rotHandleDist);
            ctx.stroke();
            ctx.beginPath();
            ctx.arc(0, -b.h/2 - rotHandleDist, 5/ds, 0, Math.PI*2);
            ctx.fillStyle = '#ff88ff';
            ctx.fill();
            ctx.stroke();
          }
          ctx.restore();
        }
      }

      // depthY line for selected object
      if(editorMode && oi === edSelObj){
        ctx.strokeStyle = 'rgba(0,255,255,0.7)';
        ctx.lineWidth = 2/ds;
        ctx.setLineDash([8/ds, 4/ds]);
        ctx.beginPath();
        ctx.moveTo(obj.wx - 50, obj.depthY);
        ctx.lineTo(obj.wx + obj.ww + 50, obj.depthY);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillStyle = 'rgba(0,255,255,0.9)';
        ctx.font = (10/ds) + 'px monospace';
        ctx.fillText('depthY: ' + Math.round(obj.depthY), obj.wx + obj.ww + 55, obj.depthY + 4/ds);
      }
    }

    // Pilot feet box
    const pL2 = pilot.x - PILOT_W*0.15, pT2 = pilot.y - 15;
    ctx.strokeStyle = 'rgba(0,255,0,0.8)';
    ctx.fillStyle = 'rgba(0,255,0,0.15)';
    ctx.lineWidth = 2/ds;
    ctx.fillRect(pL2, pT2, PILOT_W*0.3, 10);
    ctx.strokeRect(pL2, pT2, PILOT_W*0.3, 10);

    // Pilot Y reference line in editor
    if(editorMode){
      ctx.strokeStyle = 'rgba(0,255,0,0.4)';
      ctx.lineWidth = 1/ds;
      ctx.setLineDash([6/ds, 3/ds]);
      ctx.beginPath();
      ctx.moveTo(camX, pilot.y);
      ctx.lineTo(camX + vww, pilot.y);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(0,255,0,0.7)';
      ctx.font = (10/ds) + 'px monospace';
      ctx.fillText('pilot.y: ' + Math.round(pilot.y), camX + 10/ds, pilot.y - 6/ds);
    }

    ctx.restore();
  }

  // Virtual joystick overlay (mobile)
  if(isMobile && !popupOpen){
    ctx.save();
    if(touchJoy){
      // Base circle
      ctx.beginPath();
      ctx.arc(touchJoy.startX, touchJoy.startY, JOY_RADIUS, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.2)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Thumb
      const thumbX = touchJoy.startX + touchJoyDx * JOY_RADIUS;
      const thumbY = touchJoy.startY + touchJoyDy * JOY_RADIUS;
      ctx.beginPath();
      ctx.arc(thumbX, thumbY, 18, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,255,255,0.25)';
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.stroke();
    } else {
      // Hint: faint circle in bottom-left
      ctx.beginPath();
      ctx.arc(80, H - 80, JOY_RADIUS, 0, Math.PI*2);
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,0.08)';
      ctx.fill();
    }
    ctx.restore();
  }
}

// ===================== PROCEDURAL MUSIC — HOME VORTEX =====================
// Relaxed, post-mission D major. Gentle pulse, warm pads, unhurried melody.
let audioCtx = null;
let musicPlaying = false;
let musicBar = 0;
let musicTimer = null;

function fr(s){ return Math.pow(2, s/12); }
const SCALE_DMAJ = [0,2,4,5,7,9,11];

function _voice(hz, t, att, dur, rel, vol, type, detune){
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine';
  o.frequency.value = hz;
  if(detune) o.detune.value = detune;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + att);
  g.gain.setValueAtTime(vol, t + dur);
  g.gain.linearRampToValueAtTime(0, t + dur + rel);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t); o.stop(t + dur + rel + 0.1);
}
function _pad(hz,t,dur,vol){ _voice(hz,t,0.8,dur,1.5,vol*0.4,'sine',0); _voice(hz*1.002,t,0.9,dur,1.5,vol*0.3,'sine',8); }
function _mel(hz,t,dur,vol){ _voice(hz,t,0.05,dur,0.4,vol,'triangle',0); }
function _bass(hz,t,dur,vol){ _voice(hz,t,0.02,dur,0.15,vol*0.7,'sine',0); }
function _str(hz,t,dur,vol){ _voice(hz,t,0.3,dur,0.6,vol*0.5,'sawtooth',0); const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=800; }
function _plk(hz,t,vol){ _voice(hz,t,0.005,0.08,0.3,vol,'triangle',0); }

function genBar(t0, bar){
  const B = bar;
  const root = 146.83; // D3
  const sc = SCALE_DMAJ;
  const bl = 60/80; // 80 BPM — relaxed tempo
  const barLen = 8 * bl;
  // Gentle 3-phase cycle
  const phase = B <= 6 ? 'drift' : B <= 18 ? 'warmth' : B <= 30 ? 'glow' : 'drift';
  const vol = phase === 'drift' ? 0.35 : phase === 'warmth' ? 0.55 : 0.7;

  // Soft kick — every other beat, gentle
  [0, 4].forEach(i => { _bass(55, t0 + i*bl, bl*0.2, 0.06*vol); });

  // Bass — slow, warm, root-fifth movement
  const bassP = [[0,7],[7,5],[5,0],[4,7]];
  const bp = bassP[Math.floor(B/2) % 4];
  _bass(root/2 * fr(bp[0]), t0, barLen*0.5, 0.06*vol);
  _bass(root/2 * fr(bp[1]), t0 + 4*bl, barLen*0.4, 0.05*vol);

  // Warm pads — D major: D-Bm-G-A (I-vi-IV-V)
  if(phase !== 'drift' || B % 2 === 0){
    const prog = [[0,4,7],[9,0,4],[5,9,0],[7,11,2]];
    const ch = prog[Math.floor(B/2) % 4];
    ch.forEach((s, i) => {
      _pad(root * fr(s), t0 + i*0.3, barLen + 2.0, 0.04*vol * (1 - i*0.1));
    });
  }

  // Gentle strings in warmth/glow
  if(phase === 'warmth' || phase === 'glow'){
    const prog = [[0,4,7],[9,0,4],[5,9,0],[7,11,2]];
    const ch = prog[Math.floor(B/2) % 4];
    ch.slice(0,2).forEach((s,i) => {
      _str(root * fr(s), t0 + i*0.15, barLen*0.7, 0.025*vol);
    });
  }

  // Melody — unhurried, gentle, wide intervals
  const melNotes = [0,4,7,12,9,7,4,7,5,4,2,0,4,7,9,12];
  const mi = B % melNotes.length;
  if(phase !== 'drift'){
    [0, 3, 5].forEach((beat, i) => {
      const step = melNotes[(mi + i) % melNotes.length];
      const noteHz = root * 2 * fr(step <= 12 ? step : step - 12) * (step > 12 ? 2 : 1);
      _mel(noteHz, t0 + beat*bl, bl*2.5, 0.035*vol);
    });
  } else {
    // Drift: single sparse note
    if(B % 2 === 0){
      _mel(root * 2 * fr(melNotes[mi]), t0 + 2*bl, barLen*0.5, 0.025*vol);
    }
  }

  // Glow: gentle plucked arpeggios
  if(phase === 'glow'){
    const arp = [0, 4, 7, 12, 7, 4];
    arp.forEach((s, i) => {
      if(i % 2 === B % 2) _plk(root * 2 * fr(s), t0 + i*bl*1.2, 0.025*vol);
    });
  }
}

function startMusic(){
  if(musicPlaying) return;
  if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if(audioCtx.state === 'suspended') audioCtx.resume();
  musicPlaying = true;
  musicBar = 0;
  scheduleBar();
}

function scheduleBar(){
  if(!musicPlaying) return;
  const bl = 60/80;
  const barLen = 8 * bl;
  const t0 = audioCtx.currentTime + 0.1;
  genBar(t0, musicBar);
  musicBar++;
  if(musicBar > 36) musicBar = 0; // loop cycle
  musicTimer = setTimeout(scheduleBar, barLen * 1000 * 0.95);
}

function stopMusic(){
  musicPlaying = false;
  if(musicTimer){ clearTimeout(musicTimer); musicTimer = null; }
}

// Start music on first user interaction
let _musicStarted = false;
function tryStartMusic(){
  if(_musicStarted) return;
  _musicStarted = true;
  startMusic();
}
window.addEventListener('click', tryStartMusic, {once:false});
window.addEventListener('keydown', tryStartMusic, {once:false});
window.addEventListener('touchstart', tryStartMusic, {once:false});

let loaded = 0;
const totalImgs = 2 + Object.keys(imgs).length;
let bgBitmap;
const objBitmaps = {};
function checkStart(){
  loaded++;
  if(loaded >= totalImgs){
    bgBitmap = document.createElement('canvas');
    bgBitmap.width = WORLD_W; bgBitmap.height = WORLD_H;
    const bgc = bgBitmap.getContext('2d');
    bgc.drawImage(bgImg, 0, 0, WORLD_W, WORLD_H);
    for(const obj of objects){
      const img = imgs[obj.key];
      if(!img) continue;
      const c = document.createElement('canvas');
      c.width = Math.ceil(obj.ww); c.height = Math.ceil(obj.wh);
      const cx2 = c.getContext('2d');
      cx2.drawImage(img, 0, 0, obj.ww, obj.wh);
      objBitmaps[obj.key] = c;
    }
    // Don't auto-start — wait for splash screen choice
    if(gameStarted && !_loopStarted){
      _loopStarted = true;
      requestAnimationFrame(loop);
    }
  }
}
bgImg.onload = checkStart; bgImg.onerror = checkStart;
sprite.onload = checkStart; sprite.onerror = checkStart;
for(const k in imgs){ imgs[k].onload = checkStart; imgs[k].onerror = checkStart; }
</script>

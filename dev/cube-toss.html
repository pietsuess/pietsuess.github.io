const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ─── VIRTUAL RESOLUTION ───
// Game logic works in this coordinate space. Scales to fit any screen.
const DESIGN_W = 1440;
const DESIGN_H = 900;
let W = DESIGN_W, H = DESIGN_H; // game logic always uses these
let realW, realH, gameScale = 1, gameOffX = 0, gameOffY = 0;

function resize() {
  realW = canvas.width = window.innerWidth;
  realH = canvas.height = window.innerHeight;
  // Uniform scale to fit, letterbox if needed
  gameScale = Math.min(realW / DESIGN_W, realH / DESIGN_H);
  // Center the game area
  gameOffX = (realW - DESIGN_W * gameScale) / 2;
  gameOffY = (realH - DESIGN_H * gameScale) / 2;
  // W and H stay as virtual resolution for all game logic
  W = DESIGN_W;
  H = DESIGN_H;
}
resize();
window.addEventListener('resize', resize);
canvas.addEventListener('wheel', (e) => {
  if (levelMenuOpen) {
    levelMenuScroll = Math.max(0, Math.min(levelMenuScroll + e.deltaY, Math.max(0, LEVELS.length * 30 - H * 0.5)));
    e.preventDefault();
  }
}, { passive: false });

  rose: '#d4547a',

  cream: '#fef9f0',

  glassBorder: 'rgba(255,255,255,0.12)',

// ─── CONSTANTS ───
const GRAVITY = 900;
const BOUNCE = 0.85;
const FRICTION = 0.985;
const ANG_FRICTION = 0.96;
const CUBE_SIZE = 36;

const DEFAULT_RELEASE_LINE = 190;
const WALK_LINE_X = 60;
const WALK_LINE_Y_START = 170;
const WALK_LINE_LEN = 360;

let camY = 0; // vertical pan (editor only)

// ─── SOUND EFFECTS (Web Audio API) ───
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Airborne soaring sound — pitch follows cube's vertical velocity
let airborneOsc = null;
let airborneGain = null;
let airborneFilter = null;
function startAirborne() {
  if (airborneOsc) return;
  // Tonal soaring: sine oscillator whose pitch tracks vy
  airborneOsc = audioCtx.createOscillator();
  airborneOsc.type = 'sine';
  airborneOsc.frequency.value = 300;
  // Add a second detuned oscillator for shimmer
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = 303; // slight detune = chorus
  // Soft noise layer for air texture
  const noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
  const nd = noiseBuf.getChannelData(0);
  for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1);
  const noiseSrc = audioCtx.createBufferSource();
  noiseSrc.buffer = noiseBuf; noiseSrc.loop = true;
  airborneFilter = audioCtx.createBiquadFilter();
  airborneFilter.type = 'bandpass'; airborneFilter.frequency.value = 600; airborneFilter.Q.value = 1;
  const noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0.008;
  noiseSrc.connect(airborneFilter); airborneFilter.connect(noiseGain);

  airborneGain = audioCtx.createGain();
  airborneGain.gain.value = 0;
  const oscGain = audioCtx.createGain(); oscGain.gain.value = 0.5;
  const osc2Gain = audioCtx.createGain(); osc2Gain.gain.value = 0.3;

  airborneOsc.connect(oscGain); osc2.connect(osc2Gain);
  oscGain.connect(airborneGain); osc2Gain.connect(airborneGain);
  noiseGain.connect(airborneGain);
  airborneGain.connect(audioCtx.destination);

  airborneOsc.start(); osc2.start(); noiseSrc.start();
  airborneOsc._osc2 = osc2; airborneOsc._noise = noiseSrc;
}
let airborneHitCount = 0;
function updateAirborne(speed, vy) {
  if (!airborneGain || !airborneOsc) return;
  const fade = Math.max(0, 1 - airborneHitCount * 0.7);
  const vol = Math.min(0.02, speed / 20000) * fade;
  airborneGain.gain.value = vol;
  // Pitch follows vertical direction: up = higher, down = lower
  // vy is negative when going up, positive when falling
  // Clamp vy to reasonable range first, then map to pitch
  const clampedVy = Math.max(-600, Math.min(600, vy));
  const pitch = 350 - clampedVy * 0.25; // vy=-600 → 500Hz (high), vy=+600 → 200Hz (low)
  const clampedPitch = Math.max(150, Math.min(550, pitch));
  airborneOsc.frequency.value = clampedPitch;
  if (airborneOsc._osc2) airborneOsc._osc2.frequency.value = clampedPitch + 3;
  // Filter follows pitch
  if (airborneFilter) airborneFilter.frequency.value = clampedPitch * 2;
}
function airborneHit() { airborneHitCount++; }
function stopAirborne() {
  try {
    if (airborneOsc) { airborneOsc.stop(); }
    if (airborneOsc && airborneOsc._osc2) { airborneOsc._osc2.stop(); }
    if (airborneOsc && airborneOsc._noise) { airborneOsc._noise.stop(); }
  } catch(e) {}
  airborneOsc = null; airborneGain = null; airborneFilter = null;
}

function playSound(type) {
  try {
    const now = audioCtx.currentTime;
    const g = audioCtx.createGain();
    g.connect(audioCtx.destination);

    if (type === 'throw') {
      // Quick whoosh on release
      const dur = 0.2;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'highpass'; filt.frequency.setValueAtTime(3000, now);
      filt.frequency.exponentialRampToValueAtTime(600, now + dur);
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(filt); filt.connect(g); src.start(now);
      // Start airborne sound
      airborneHitCount = 0;
    }
    else if (type === 'bounce') {
      airborneHit();
      // Bouncy — quick pitch-up boing with a rubbery quality
      const osc1 = audioCtx.createOscillator();
      const osc2 = audioCtx.createOscillator();
      osc1.type = 'sine'; osc2.type = 'triangle';
      // Rising pitch = bouncy feel
      osc1.frequency.setValueAtTime(150, now);
      osc1.frequency.exponentialRampToValueAtTime(400, now + 0.04);
      osc1.frequency.exponentialRampToValueAtTime(200, now + 0.12);
      osc2.frequency.setValueAtTime(300, now);
      osc2.frequency.exponentialRampToValueAtTime(600, now + 0.03);
      osc2.frequency.exponentialRampToValueAtTime(150, now + 0.1);
      const g2 = audioCtx.createGain();
      g2.connect(audioCtx.destination);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
      g2.gain.setValueAtTime(0.06, now);
      g2.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
      osc1.connect(g); osc2.connect(g2);
      osc1.start(now); osc1.stop(now + 0.12);
      osc2.start(now); osc2.stop(now + 0.1);
    }
    else if (type === 'bumper') {
      airborneHit();
      // Springy ping — bright and punchy
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(1200, now);
      osc.frequency.exponentialRampToValueAtTime(600, now + 0.06);
      osc.frequency.exponentialRampToValueAtTime(400, now + 0.15);
      g.gain.setValueAtTime(0.18, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(g); osc.start(now); osc.stop(now + 0.15);
      // Add a quick noise pop
      const dur = 0.03;
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const gn = audioCtx.createGain(); gn.gain.setValueAtTime(0.1, now);
      gn.gain.exponentialRampToValueAtTime(0.001, now + dur);
      src.connect(gn); gn.connect(audioCtx.destination); src.start(now);
    }
    else if (type === 'goal') {
      stopAirborne();
      // Celebration — warm ascending arpeggio
      [392, 523, 659, 784, 1047].forEach((freq, i) => {
        const osc = audioCtx.createOscillator();
        const gn = audioCtx.createGain();
        osc.type = 'sine'; osc.frequency.value = freq;
        gn.gain.setValueAtTime(0, now + i * 0.06);
        gn.gain.linearRampToValueAtTime(0.06, now + i * 0.06 + 0.03);
        gn.gain.exponentialRampToValueAtTime(0.001, now + 0.6);
        osc.connect(gn); gn.connect(audioCtx.destination);
        osc.start(now + i * 0.06); osc.stop(now + 0.6);
      });
    }
    else if (type === 'death') {
      stopAirborne();
      // Descending warble
      const osc = audioCtx.createOscillator();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(80, now + 0.4);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(g); osc.start(now); osc.stop(now + 0.4);
    }
    else if (type === 'click') {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.value = 700;
      g.gain.setValueAtTime(0.06, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.03);
      osc.connect(g); osc.start(now); osc.stop(now + 0.03);
    }
    else if (type === 'grab') {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.setValueAtTime(400, now);
      osc.frequency.exponentialRampToValueAtTime(500, now + 0.06);
      g.gain.setValueAtTime(0.1, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
      osc.connect(g); osc.start(now); osc.stop(now + 0.06);
    }
    else if (type === 'cancel') {
      const osc = audioCtx.createOscillator();
      osc.type = 'sine'; osc.frequency.setValueAtTime(500, now);
      osc.frequency.exponentialRampToValueAtTime(300, now + 0.08);
      g.gain.setValueAtTime(0.08, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
      osc.connect(g); osc.start(now); osc.stop(now + 0.08);
    }
  } catch(e) {}
}

  // ═══════════════════════════════════════════════════════

function getCurrentLevel() { return LEVELS[level % LEVELS.length]; }
function getThrowLine() { return getCurrentLevel().throwLineX || DEFAULT_THROW_LINE; }
function getReleaseLine() { return getCurrentLevel().releaseLineX || DEFAULT_RELEASE_LINE; }
function getDeathY() { return getCurrentLevel().deathY || H; }
function getCeilingY() { return getCurrentLevel().ceilingY != null ? getCurrentLevel().ceilingY : 0; }
function getCamFlags() {
  const lv = getCurrentLevel();
  return { panUp: !!lv.panUp, panDown: !!lv.panDown, panRight: lv.panRight !== false };
}

function resetCube() { cube = null; state = 'ready'; camTargetX = 0; hintCache = {}; stopAirborne(); }

// ─── TRAJECTORY SIMULATOR — finds a real path using actual physics ───
let hintCache = {}; // level index → {path:[], vx, vy, startY}

function simulateTrajectory(lv, startX, startY, vx, vy, cubeSize, bounceMult, gravMult) {
  const path = [{x: startX, y: startY}];
  let cx = startX, cy = startY, cvx = vx, cvy = vy;
  const half = cubeSize / 2;
  const B = BOUNCE * bounceMult;
  const G = GRAVITY * gravMult;
  const dt = 1/60;
  const g = lv.goal;

  for (let step = 0; step < 600; step++) {
    cvy += G * dt;
    cx += cvx * dt;
    cy += cvy * dt;
    cvx *= 0.998;

    // Walls
    if (cy - half > (lv.deathY || H)) break; // fell into death zone
    const simCeil = lv.ceilingY != null ? lv.ceilingY : 0;
    if (cy - half < simCeil) { cy = simCeil + half; cvy = Math.abs(cvy) * B; }
    if (cx - half < getThrowLine()) { cx = getThrowLine() + half; cvx = Math.abs(cvx) * B; }

    if (lv.backWall) {
      const bw = lv.backWall;
      if (cx + half > bw.x && cx - half < bw.x + bw.w) {
        if (cvx > 0) { cx = bw.x - half; cvx *= -B; }
        else { cx = bw.x + bw.w + half; cvx *= -B; }
      }
    }

    for (const w of lv.walls) {
      const simC = {x:cx,y:cy,vx:cvx,vy:cvy,angVel:0};
      collideRotatedRect(simC, half, B, w.x, w.y, w.w, w.h, w.rot||0);
      cx=simC.x;cy=simC.y;cvx=simC.vx;cvy=simC.vy;
    }

    for (const p of lv.platforms) {
      if (cx+half>p.x && cx-half<p.x+p.w) {
        if (cy+half>p.y && cy+half<p.y+10 && cvy>0) { cy=p.y-half; cvy=-Math.abs(cvy)*B; }
        if (cy-half<p.y+6 && cy-half>p.y-4 && cvy<0) { cy=p.y+6+half; cvy=Math.abs(cvy)*B; }
      }
    }

    for (const b of lv.bumpers) {
      const dx=cx-b.x, dy=cy-b.y, dist=Math.sqrt(dx*dx+dy*dy);
      if (dist<half+b.r && dist>0) {
        const nx=dx/dist, ny=dy/dist;
        cx=b.x+nx*(half+b.r); cy=b.y+ny*(half+b.r);
        const dot=cvx*nx+cvy*ny;
        cvx-=2*dot*nx*0.75; cvy-=2*dot*ny*0.75;
      }
    }

    // Sample path every N steps
    if (step % 3 === 0) path.push({x: cx, y: cy});

    // Check goal
    if (cx+half>g.x && cx-half<g.x+g.w && cy+half>g.y && cy-half<g.y+g.h) {
      path.push({x: cx, y: cy});
      return path; // found a winning trajectory
    }

    // Stopped
    if (Math.sqrt(cvx*cvx+cvy*cvy) < 5) break;
  }
  return null; // no solution found with these params
}

// Async hint finder — runs in chunks so it doesn't freeze gameplay
let hintSearching = false;

function findHintPath(lvIdx) {
  if (hintCache[lvIdx]) return hintCache[lvIdx];
  if (hintSearching) return null; // already searching
  hintSearching = true;

  const lv = LEVELS[lvIdx % LEVELS.length];
  const cubeSize = 24;
  const bounceMult = 1.0;  // matches putter
  const gravMult = 0.8;

  const speeds = [300, 400, 500, 600, 700, 800, 900, 1000, 1100, 1200];
  const startYs = [];
  for (let y = H * 0.05; y < H * 0.95; y += H * 0.05) startYs.push(y);
  const angles = [];
  for (let a = -0.8; a <= 0.8; a += 0.04) angles.push(a);

  // Build work queue
  const queue = [];
  for (const spd of speeds)
    for (const sy of startYs)
      for (const angle of angles)
        queue.push({spd, sy, angle});

  let bestPath = null;
  let idx = 0;
  const chunkSize = 200;

  function processChunk() {
    const end = Math.min(idx + chunkSize, queue.length);
    for (; idx < end; idx++) {
      const {spd, sy, angle} = queue[idx];
      const vx = spd * Math.cos(angle);
      const vy = spd * Math.sin(angle);
      const path = simulateTrajectory(lv, getThrowLine(), sy, vx, vy, cubeSize, bounceMult, gravMult);
      if (path && (!bestPath || path.length < bestPath.length)) {
        bestPath = path;
        if (path.length < 30) { // very direct — done
          hintCache[lvIdx] = bestPath;
          hintSearching = false;
          return;
        }
      }
    }
    if (idx < queue.length && !bestPath) {
      requestAnimationFrame(processChunk); // keep searching next frame
    } else {
      if (bestPath) hintCache[lvIdx] = bestPath;
      hintSearching = false;
    }
  }

  processChunk();
  return null; // will be available next frame
}

function spawnCube(x, y, wk) {
  return { x, y, size: wk.size, color: wk.color, bounce: wk.bounce, gravMult: wk.gravMult,

}

// ─── DRAW HELPERS ───
function roundRectPath(x, y, w, h, radius) {
  const r = Math.min(radius, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ─── DRAW METALLIC CUBE ───
function drawCubeAt(x, y, size, angle, color) {
  const s = size, r = s * 0.15;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  function cubePath() {
    ctx.beginPath();
    ctx.moveTo(-s/2+r, -s/2); ctx.lineTo(s/2-r, -s/2);
    ctx.quadraticCurveTo(s/2, -s/2, s/2, -s/2+r);
    ctx.lineTo(s/2, s/2-r); ctx.quadraticCurveTo(s/2, s/2, s/2-r, s/2);
    ctx.lineTo(-s/2+r, s/2); ctx.quadraticCurveTo(-s/2, s/2, -s/2, s/2-r);
    ctx.lineTo(-s/2, -s/2+r); ctx.quadraticCurveTo(-s/2, -s/2, -s/2+r, -s/2);
    ctx.closePath();
  }

  cubePath(); ctx.fillStyle = color; ctx.fill();

  // Metallic shimmer band
  const shimmer = (elapsed * 1.5 + x * 0.01 + y * 0.01) % (Math.PI * 2);
  const off = Math.sin(shimmer) * s * 0.3;
  const mg = ctx.createLinearGradient(-s/2+off, -s/2, s/2+off, s/2);
  mg.addColorStop(0, 'rgba(255,255,255,0)');
  mg.addColorStop(0.35, 'rgba(255,255,255,0.06)');
  mg.addColorStop(0.45, 'rgba(255,255,255,0.28)');
  mg.addColorStop(0.55, 'rgba(255,255,255,0.28)');
  mg.addColorStop(0.65, 'rgba(255,255,255,0.06)');
  mg.addColorStop(1, 'rgba(255,255,255,0)');
  cubePath(); ctx.fillStyle = mg; ctx.fill();

  // Highlight + shadow
  cubePath(); ctx.clip();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(-s/2, -s/2, s, s * 0.35);
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.fillRect(-s/2, s * 0.1, s, s * 0.4);

  // Glass border
  ctx.restore();
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  cubePath();
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();
}

// ─── PHYSICS ───
function collideCubeWalls(c, lv) {
  const half = c.size / 2;
  const B = BOUNCE * (c.bounce || 1); // per-cube bounce
  // Death zone — cube crosses the death bar
  if (c.y - half > getDeathY() && !c._fellOff) { c._fellOff = true; }
  const ceil = getCeilingY();
  if (c.y - half < ceil) { c.y = ceil + half; c.vy = Math.abs(c.vy) * B; }
  if (c.x - half < getThrowLine()) { c.x = getThrowLine() + half; c.vx = Math.abs(c.vx) * B; }
  if (c.x + half > lv.width + 200) { c.x = lv.width + 200 - half; c.vx *= -B; }

  // Back wall — full height seal behind goal
  if (lv.backWall) {
    const bw = lv.backWall;
    if (rectOverlap(c.x - half, c.y - half, c.size, c.size, bw.x, bw.y, bw.w, bw.h)) {
      if (c.vx > 0) { c.x = bw.x - half; c.vx *= -B; c.angVel -= c.vy * 0.005; }
      else { c.x = bw.x + bw.w + half; c.vx *= -B; c.angVel += c.vy * 0.005; }
    }
  }

  for (const w of lv.walls) {
    collideRotatedRect(c, half, B, w.x, w.y, w.w, w.h, w.rot || 0);
  }

  // Platforms as thin solid walls (6px thick, full collision both sides)
  for (const p of lv.platforms) {
    collideRotatedRect(c, half, B, p.x, p.y, p.w, 6, p.rot || 0);
  }

  // Bumpers — pinball style, always kick the cube away with energy
  for (const b of lv.bumpers) {
    const dx=c.x-b.x, dy=c.y-b.y, dist=Math.sqrt(dx*dx+dy*dy), md=half+b.r;
    if (dist<md && dist>0) {
      const nx=dx/dist, ny=dy/dist;
      c.x=b.x+nx*md; c.y=b.y+ny*md;
      // Full reflection (no energy loss)
      const dot=c.vx*nx+c.vy*ny;
      c.vx-=2*dot*nx; c.vy-=2*dot*ny;
      // Minimum kick speed — bumpers always punch you away
      const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
      const minKick = 350;
      if(spd<minKick){
        c.vx=nx*minKick; c.vy=ny*minKick;
      }
      c.angVel+=(nx*c.vy-ny*c.vx)*0.03;
    }
  }
}

function rectOverlap(ax,ay,aw,ah,bx,by,bw,bh) {
  return ax<bx+bw && ax+aw>bx && ay<by+bh && ay+ah>by;
}

// Rotated rectangle collision: transforms cube into wall's local space
function collideRotatedRect(c, half, B, rx, ry, rw, rh, rot) {
  if (!rot) {
    // No rotation — use fast AABB
    if (!rectOverlap(c.x-half, c.y-half, half*2, half*2, rx, ry, rw, rh)) return;
    const spd=Math.sqrt(c.vx*c.vx+c.vy*c.vy);
    const ol=(c.x+half)-rx, or2=(rx+rw)-(c.x-half);
    const ot=(c.y+half)-ry, ob=(ry+rh)-(c.y-half);
    const m=Math.min(ol,or2,ot,ob);
    if(m===ol&&c.vx>0){c.x=rx-half;c.vx*=-B;c.angVel-=c.vy*0.005;}
    else if(m===or2&&c.vx<0){c.x=rx+rw+half;c.vx*=-B;c.angVel+=c.vy*0.005;}
    else if(m===ot&&c.vy>0){c.y=ry-half;c.vy*=-B;c.angVel+=c.vx*0.008;}
    else if(m===ob&&c.vy<0){c.y=ry+rh+half;c.vy*=-B;}
    return;
  }

  // Rotated: transform cube into rect's local coordinate space
  const cx = rx + rw/2, cy = ry + rh/2; // rect center
  const cos = Math.cos(-rot), sin = Math.sin(-rot);
  // Cube position in local space
  const dx = c.x - cx, dy = c.y - cy;
  const lx = dx * cos - dy * sin;
  const ly = dx * sin + dy * cos;

  // AABB check in local space (rect is centered at origin, half-extents rw/2, rh/2)
  const hw = rw/2 + half, hh = rh/2 + half;
  if (Math.abs(lx) > hw || Math.abs(ly) > hh) return; // no overlap

  // Find penetration axis in local space
  const penL = hw + lx, penR = hw - lx;
  const penT = hh + ly, penB = hh - ly;
  const minPen = Math.min(penL, penR, penT, penB);

  let pushLX = 0, pushLY = 0;
  if (minPen === penL) pushLX = -(penL);
  else if (minPen === penR) pushLX = penR;
  else if (minPen === penT) pushLY = -(penT);
  else pushLY = penB;

  // Transform push vector back to world space
  const cosR = Math.cos(rot), sinR = Math.sin(rot);
  const pushWX = pushLX * cosR - pushLY * sinR;
  const pushWY = pushLX * sinR + pushLY * cosR;

  c.x += pushWX;
  c.y += pushWY;

  // Reflect velocity along the push direction
  const pushLen = Math.sqrt(pushWX*pushWX + pushWY*pushWY);
  if (pushLen > 0) {
    const nx = pushWX/pushLen, ny = pushWY/pushLen;
    const dot = c.vx*nx + c.vy*ny;
    if (dot < 0) { // only if moving into the wall
      c.vx -= 2 * dot * nx;
      c.vy -= 2 * dot * ny;
      c.vx *= B; c.vy *= B;
      c.angVel += (c.vx * ny - c.vy * nx) * 0.005;
    }
  }
}

function updateCube(c, dt) {
  // Substep physics — max 4px movement per step so nothing tunnels through
  const speed = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
  const maxStep = 4;
  const steps = Math.max(1, Math.ceil(speed * dt / maxStep));
  const subDt = dt / steps;

  for (let i = 0; i < steps; i++) {
    if (i === 0) c.vy += GRAVITY * (c.gravMult || 1) * dt; // per-cube gravity
    c.x += c.vx * subDt;
    c.y += c.vy * subDt;
    collideCubeWalls(c, getCurrentLevel());

    // Death zone — break out immediately
    if (c._fellOff) break;

    // Check goal — cube center must be inside (supports rotation)
    const lv = getCurrentLevel(), g = lv.goal;
    let inGoal = false;
    if (g.rot) {
      // Transform cube pos into goal's local space
      const gcx = g.x + g.w/2, gcy = g.y + g.h/2;
      const cos = Math.cos(-g.rot), sin = Math.sin(-g.rot);
      const dx = c.x - gcx, dy = c.y - gcy;
      const lx = dx*cos - dy*sin, ly = dx*sin + dy*cos;
      inGoal = Math.abs(lx) < g.w/2 && Math.abs(ly) < g.h/2 - 4;
    } else {
      inGoal = c.x > g.x && c.x < g.x + g.w && c.y > g.y + 4 && c.y < g.y + g.h - 4;
    }
    if (inGoal) {
      state = 'won'; showMsg('LEVEL CLEAR!', 2.5);
            scorecard[level] = { throws: attempts, par: lv.par, name: lv.name };
      totalThrows += attempts;
      break;
    }
  }

  c.angle += c.angVel * dt;
  c.vx *= FRICTION; c.angVel *= ANG_FRICTION;

  // Trail
  if (c.trail.length===0 || Math.abs(c.x-c.trail[c.trail.length-1].x)>8 || Math.abs(c.y-c.trail[c.trail.length-1].y)>8) {
    c.trail.push({x:c.x,y:c.y,t:1});
    if(c.trail.length>60)c.trail.shift();
  }
  for(const t of c.trail) t.t*=0.97;

  // Fell off bottom — instant reset
  if (c._fellOff) {
    try { resetCube(); } catch(e) { cube=null; state='ready'; camTargetX=0; }
    return;
  }

  // Settle check
  const finalSpeed = Math.sqrt(c.vx*c.vx+c.vy*c.vy);
  if(finalSpeed<12&&Math.abs(c.angVel)<0.3&&state==='thrown'){
    c._settleTime=(c._settleTime||0)+dt;
    if(c._settleTime>0.5){state='lost';showMsg('MISSED! TAP TO RETRY',99);stopAirborne();}
  }else{c._settleTime=0;}
}

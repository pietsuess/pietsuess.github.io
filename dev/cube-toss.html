function onDown(e){
  const p=getPos(e); mouseX=prevMX=p.x; mouseY=prevMY=p.y;

  // Level jumper menu
  const ljx = 15, ljyBtn = 60;
  if (levelMenuOpen) {
    const mw = 240, rowH = 30, mx = ljx, my = ljyBtn + 30;
    const mh = Math.min((LEVELS.length + 1) * rowH + 8, H * 0.6);
    // Click inside menu
    if (p.x >= mx && p.x <= mx + mw && p.y >= my && p.y <= my + mh) {
      const idx = Math.floor((p.y - my - 4 + levelMenuScroll) / rowH);
      // ADD LEVEL button
      if (idx === LEVELS.length) {
        const newLv = {
          name: 'NEW LEVEL', par: 3, width: 1000,
          walls: [], platforms: [], bumpers: [], hintMarkers: [],
          goal: { x: 700, y: H*0.4, w: 80, h: H*0.2, rot: 0 },
          backWall: { x: 780, y: 0, w: 25, h: H, rot: 0 },
        };
        LEVELS.push(newLv);
        level = LEVELS.length - 1; attempts = 0; resetCube();
        levelMenuOpen = false; edSaveLocal();        return;
      }
      // Reorder arrows (editor mode, right side of row)
      if (editorMode && idx >= 0 && idx < LEVELS.length && p.x > mx + mw - 35) {
        const iy = my + 4 + idx * rowH - levelMenuScroll;
        const clickY = p.y - iy;
        if (clickY < 15 && idx > 0) {
          // Move up
          [LEVELS[idx], LEVELS[idx-1]] = [LEVELS[idx-1], LEVELS[idx]];
          if (level === idx) level--; else if (level === idx-1) level++;
          edSaveLocal();  return;
        }
        if (clickY >= 15 && idx < LEVELS.length-1) {
          // Move down
          [LEVELS[idx], LEVELS[idx+1]] = [LEVELS[idx+1], LEVELS[idx]];
          if (level === idx) level++; else if (level === idx+1) level--;
          edSaveLocal();  return;
        }
      }
      // Select level
      if (idx >= 0 && idx < LEVELS.length) {
        level = idx; attempts = 0; resetCube(); levelMenuOpen = false;      }
      return;
    }
    // Click toggle button = close
    if (p.x >= ljx && p.x <= ljx + 80 && p.y >= ljyBtn && p.y <= ljyBtn + 26) {
      levelMenuOpen = false; return;
    }
    // Click outside = close
    levelMenuOpen = false; return;
  }
  // Toggle button
  if (p.x >= ljx && p.x <= ljx + 80 && p.y >= ljyBtn && p.y <= ljyBtn + 26) {
    levelMenuOpen = true; levelMenuScroll = 0; return;
  }

  // Side button hit tests
  function hitSideBtn(index) {
    const b = sideBtnBounds(index);
    return p.x>=b.x&&p.x<=b.x+b.w&&p.y>=b.y&&p.y<=b.y+b.h;
  }
  // Side buttons — check all positions, determine which button by label
  {
    const gV = getCurrentLevel().goal;
    const goalVis2 = !goalPreview && (gV.x + gV.w - camX > 0 && gV.x - camX < W && gV.y + (gV.h||0) - camY > 0 && gV.y - camY < H);
    let bi = 0;
    // RESET at 0
    if (hitSideBtn(bi) && (state==='thrown'||state==='lost'||state==='won'||state==='aiming')) { resetCube(); return; }
    bi++;
    // GOAL HINT
    if (!goalVis2 || goalPreview) {
      if (hitSideBtn(bi)) { goalPreview = !goalPreview; return; }
      bi++;
    }
    // HINTS
    if (hitSideBtn(bi)) { showHints = !showHints; return; }
    bi++;
    // EDIT
    if (hitSideBtn(bi)) {
      editorMode = !editorMode;
      if (editorMode) { state='ready'; cube=null; camX=0; camY=0; camTargetX=0; edSel=null; edAddMode=null; }
      else { edSel=null; edAddMode=null; camY=0; }
      return;
    }
  }

  // Editor mode input
  if (editorMode) {
    const wx = p.x + camX, wy = p.y + camY;

    // Camera pan checkboxes (below side buttons)
    const lastBtn = sideBtnBounds(3);
    const cbx2 = lastBtn.x, cby2 = lastBtn.y + lastBtn.h + 15 + 12;
    const cbKeys = ['panRight','panUp','panDown'];
    for (let ci = 0; ci < 3; ci++) {
      const cy3 = cby2 + ci * 20;
      if (p.x >= cbx2 && p.x <= cbx2 + SIDE_BTN_W && p.y >= cy3 && p.y <= cy3 + 12) {
        edPushUndo();
        const lv = getCurrentLevel();
        if (cbKeys[ci] === 'panRight') lv.panRight = lv.panRight === false ? true : false;
        else lv[cbKeys[ci]] = !lv[cbKeys[ci]];
        edSaveLocal(); return;
      }
    }

    // Toolbar hit
    const tbAction = edToolbarHit(p.x, p.y);
    if (tbAction) {
      if (tbAction === 'drag') {
        const { tx, ty } = edToolbarRect();
        edToolbarDragging = true;
        edToolbarDragOff = { dx: p.x - tx, dy: p.y - ty };
        canvas.style.cursor = 'move';
        return;
      }
      if (tbAction === 'dupe' && edSel) {
        const lv = getCurrentLevel();
        edPushUndo();
        const clone = JSON.parse(JSON.stringify(edSel.obj));
        clone.x += 30; clone.y += 30; // offset so it's visible
        if (edSel.type==='wall') { lv.walls.push(clone); edSel={type:'wall',index:lv.walls.length-1,obj:clone}; }
        else if (edSel.type==='platform') { lv.platforms.push(clone); edSel={type:'platform',index:lv.platforms.length-1,obj:clone}; }
        else if (edSel.type==='bumper') { lv.bumpers.push(clone); edSel={type:'bumper',index:lv.bumpers.length-1,obj:clone}; }
        else if (edSel.type==='hint') { if(!lv.hintMarkers)lv.hintMarkers=[]; lv.hintMarkers.push(clone); edSel={type:'hint',index:lv.hintMarkers.length-1,obj:clone}; }
      } else if (tbAction === 'delete' && edSel) {
        const lv = getCurrentLevel();
        edPushUndo();
        if (edSel.type==='wall') lv.walls.splice(edSel.index,1);
        else if (edSel.type==='platform') lv.platforms.splice(edSel.index,1);
        else if (edSel.type==='bumper') lv.bumpers.splice(edSel.index,1);
        else if (edSel.type==='hint') { if(lv.hintMarkers) lv.hintMarkers.splice(edSel.index,1); }
        edSel = null;
      } else if (tbAction === 'export') { edExport(); }
      else if (tbAction === 'undo') { edPopUndo(); }
      else if (tbAction === 'import') { edImport(); }
      else if (tbAction === 'snap') { edSnap = !edSnap; }
      else if (tbAction === 'wall' || tbAction === 'platform' || tbAction === 'bumper' || tbAction === 'hint') {
        edAddMode = edAddMode === tbAction ? null : tbAction;
      }
      return;
    }

    // Add mode — place new object
    if (edAddMode) {
      const lv = getCurrentLevel();
      edPushUndo();
      if (edAddMode === 'wall') {
        const nw = { x: wx, y: wy - 50, w: 25, h: 100 };
        lv.walls.push(nw);
        edSel = { type: 'wall', index: lv.walls.length-1, obj: nw };
      } else if (edAddMode === 'platform') {
        const np = { x: wx - 60, y: wy, w: 120 };
        lv.platforms.push(np);
        edSel = { type: 'platform', index: lv.platforms.length-1, obj: np };
      } else if (edAddMode === 'bumper') {
        const nb = { x: wx, y: wy, r: 25 };
        lv.bumpers.push(nb);
        edSel = { type: 'bumper', index: lv.bumpers.length-1, obj: nb };
      } else if (edAddMode === 'hint') {
        if (!lv.hintMarkers) lv.hintMarkers = [];
        const nh = { x: wx, y: wy, r: 18, rot: 0 };
        lv.hintMarkers.push(nh);
        edSel = { type: 'hint', index: lv.hintMarkers.length-1, obj: nh };
      }
      edAddMode = null;
      return;
    }

    // Check death/throw/release/width line drag (in editor)
    const lv = getCurrentLevel();
    if (Math.abs(wy - getCeilingY()) < 12) {
      edPushUndo();
      edDragging = true; edHandle = 'ceilingLine';
      edDragStart = { mx: wx, my: wy };
      canvas.style.cursor = 'ns-resize'; return;
    }
    if (Math.abs(wy - getDeathY()) < 12) {
      edPushUndo();
      edDragging = true; edHandle = 'deathLine';
      edDragStart = { mx: wx, my: wy };
      canvas.style.cursor = 'ns-resize'; return;
    }
    if (Math.abs(wx - lv.width) < 12) {
      edPushUndo();
      edDragging = true; edHandle = 'widthLine';
      edDragStart = { mx: wx, val: lv.width };
      canvas.style.cursor = 'ew-resize'; return;
    }
    if (Math.abs(wx - getThrowLine()) < 12) {
      edPushUndo();
      edDragging = true; edHandle = 'throwLine';
      edDragStart = { mx: wx, val: getThrowLine() };
      canvas.style.cursor = 'ew-resize'; return;
    }
    if (Math.abs(wx - getReleaseLine()) < 12) {
      edPushUndo();
      edDragging = true; edHandle = 'releaseLine';
      edDragStart = { mx: wx, val: getReleaseLine() };
      canvas.style.cursor = 'ew-resize'; return;
    }

    // Check resize handles on selected object first
    if (edSel) {
      const handle = edGetHandle(wx, wy);
      if (handle) {
        edPushUndo();
        edHandle = handle;
        edDragging = true;
        const o = edSel.obj;
        edDragStart = { mx: wx, my: wy, ox: o.x, oy: o.y, ow: o.w || 0, oh: o.h || 0, or: o.r || 0 };
        canvas.style.cursor = handle === 'move' ? 'grabbing' : 'nwse-resize';
        return;
      }
    }

    // Hit test for selection
    const hit = edHitTest(wx, wy);
    if (hit) {
      edSel = hit;
      edPushUndo();
      edHandle = 'move';
      edDragging = true;
      const o = hit.obj;
      edDragStart = { mx: wx, my: wy, ox: o.x, oy: o.y, ow: o.w || 0, oh: o.h || 0, or: o.r || 0 };
      canvas.style.cursor = 'grabbing';
    } else {
      // Deselect, start panning
      edSel = null;
      edPanning = true;
      edPanStart = { mx: p.x, my: p.y, camX: camX, camY: camY };
      canvas.style.cursor = 'move';
    }
    return;
  }


  if(state==='won'){
    const nb=nextBtnBounds();
    if(p.x>=nb.x&&p.x<=nb.x+nb.w&&p.y>=nb.y&&p.y<=nb.y+nb.h){level++;attempts=0;resetCube();return;}
    const rpb=replayBtnBounds();
    if(p.x>=rpb.x&&p.x<=rpb.x+rpb.w&&p.y>=rpb.y&&p.y<=rpb.y+rpb.h){attempts=0;resetCube();return;}
    return; // only next/replay buttons work in won state
  }
  if(state==='lost'){resetCube();return;}
  if(state!=='ready')return;
  const wx=worldX(p.x);
  if(wx<getThrowLine()+100){
    // Find the nearest walking cube to click position
    let bestWk=walkCubes[0], bestDist=Infinity;
    for(const wk of walkCubes){
      const dist=wk.speed*elapsed+wk.offset;
      const rawDist=((dist%WALK_LINE_LEN)+WALK_LINE_LEN)%WALK_LINE_LEN;
      const steps=rawDist/wk.size, stepIdx=Math.floor(steps), frac=steps-stepIdx;
      const eased=frac<0.5?0.5*Math.pow(frac*2,0.7):1-0.5*Math.pow((1-frac)*2,0.7);
      const tipAngle=eased*(Math.PI/2);
      const pivotLocalX=((stepIdx+1)*wk.size)%WALK_LINE_LEN;
      const cosT=Math.cos(tipAngle),sinT=Math.sin(tipAngle);
      const lcx=-wk.size/2,lcy=-wk.size/2;
      // After PI/2 rotation: screenX = WALK_LINE_X - (lcx*sinT+lcy*cosT), screenY = WALK_LINE_Y_START + pivotLocalX + lcx*cosT - lcy*sinT
      const cubeScreenY = WALK_LINE_Y_START + pivotLocalX + lcx*cosT - lcy*sinT;
      const cubeScreenX = WALK_LINE_X;
      const d = Math.abs(p.y - cubeScreenY) + Math.abs(p.x - (cubeScreenX - camX));
      if(d<bestDist){bestDist=d;bestWk=wk;}
    }
    // Only grab if click is close to an actual walking cube
    if (bestDist > 80) return;
    grabbing=true;velSamples=[];lastMoveTime=performance.now();
    cube=spawnCube(wx,p.y,bestWk);
    state='aiming';canvas.style.cursor='grabbing';
  }
}

let lastMoveTime=0;
function onMove(e){
  const p=getPos(e),now=performance.now(),moveDt=(now-(lastMoveTime||now))/1000;
  lastMoveTime=now; prevMX=mouseX;prevMY=mouseY; mouseX=p.x;mouseY=p.y;

  if (editorMode) {
    const wx = p.x + camX, wy = p.y + camY;
    if (edToolbarDragging && edToolbarDragOff) {
      edToolbarPos = { x: p.x - edToolbarDragOff.dx, y: p.y - edToolbarDragOff.dy };
      return;
    }
    if (edDragging && edSel) {
      edApplyDrag(wx, wy);
    } else if (edPanning && edPanStart) {
      camX = Math.max(0, edPanStart.camX - (p.x - edPanStart.mx));
      camY = edPanStart.camY - (p.y - edPanStart.my);
    } else {
      // Cursor feedback
      if (edSel) {
        const h = edGetHandle(wx, wy);
        if (h === 'move') canvas.style.cursor = 'grab';
        else if (h) canvas.style.cursor = 'nwse-resize';
        else canvas.style.cursor = 'default';
      } else {
        const hit = edHitTest(wx, wy);
        canvas.style.cursor = hit ? 'grab' : 'default';
      }
    }
    return;
  }

  if(state==='aiming'&&cube&&grabbing){
    cube.x=worldX(mouseX);cube.y=mouseY;
    if(moveDt>0&&moveDt<0.2){
      velSamples.push({vx:(mouseX-prevMX)/moveDt,vy:(mouseY-prevMY)/moveDt});
      if(velSamples.length>5)velSamples.shift();
    }
    if(cube.x>getThrowLine())doThrow();
  }
  if(state==='ready'&&!grabbing){
    canvas.style.cursor=worldX(p.x)<getThrowLine()+100?'grab':'default';
  }
}

function onUp(e){
  if (editorMode) { edDragging=false; edPanning=false; edToolbarDragging=false; edToolbarDragOff=null; edDragStart=null; edPanStart=null; canvas.style.cursor='default'; return; }
  if(state==='aiming'&&cube&&grabbing){
    // Throw if in the right half of throw zone or past it. Cancel only if near the walk line.
    if(cube.x >= getReleaseLine()){
      doThrow();
    } else {
      // Cancel -- put cube back
      cube=null; state='ready'; canvas.style.cursor='default';
    }
  }
  grabbing=false;
}

let velSamples=[];
function doThrow(){
  if(state!=='aiming')return;
  grabbing=false;state='thrown';attempts++;
  let ax=0,ay=0;
  if(velSamples.length>0){for(const s of velSamples){ax+=s.vx;ay+=s.vy;}ax/=velSamples.length;ay/=velSamples.length;}
  else{ax=(mouseX-prevMX)*60;ay=(mouseY-prevMY)*60;}
  cube.vx=ax;cube.vy=ay;cube.angVel=cube.vx*0.02;velSamples=[];canvas.style.cursor='default';
  }

// ═══════════════════════════════════════════════════════
// ─── LEVEL EDITOR (Dev Pane) ───
// Toggle: backtick key (`) or EDIT button
// ═══════════════════════════════════════════════════════
let editorMode = false;
let edSel = null;       // {type:'wall'|'platform'|'bumper'|'goal'|'backWall', index:number, obj:ref}
let edDragging = false;
let edDragStart = null;  // {mx, my, ox, oy, ow, oh, or}
let edHandle = null;     // 'move'|'n'|'s'|'e'|'w'|'ne'|'nw'|'se'|'sw'|'radius'
let edPanning = false;
let edPanStart = null;
let edAddMode = null;    // null|'wall'|'platform'|'bumper'
let edToolbarPos = null; // {x, y} or null for default position
let edToolbarDragging = false;
let edToolbarDragOff = null;
let edSnap = true;
const ED_SNAP_SIZE = 10;
function snap(v) { return edSnap ? Math.round(v / ED_SNAP_SIZE) * ED_SNAP_SIZE : v; }
let edUndo = [];
const ED_HANDLE_SIZE = 8;
const ED_GRAB_MARGIN = 15;

function edPushUndo() {
  const lv = getCurrentLevel();
  edUndo.push(JSON.parse(JSON.stringify({
    walls: lv.walls, platforms: lv.platforms, bumpers: lv.bumpers,
    goal: lv.goal, backWall: lv.backWall, width: lv.width
  })));
  if (edUndo.length > 5) edUndo.shift();
}

function edPopUndo() {
  if (!edUndo.length) return;
  const prev = edUndo.pop();
  const lv = getCurrentLevel();
  lv.walls = prev.walls; lv.platforms = prev.platforms; lv.bumpers = prev.bumpers;
  lv.goal = prev.goal; lv.backWall = prev.backWall; lv.width = prev.width;
  edSel = null;
}

function edHitTest(wx, wy) {
  const lv = getCurrentLevel();
  const m = ED_GRAB_MARGIN;
  // Goal
  const g = lv.goal;
  if (wx > g.x - m && wx < g.x + g.w + m && wy > g.y - m && wy < g.y + g.h + m)
    return { type: 'goal', index: 0, obj: g };
  // BackWall
  if (lv.backWall) {
    const bw = lv.backWall;
    if (wx > bw.x - m && wx < bw.x + bw.w + m && wy > bw.y - m && wy < bw.y + bw.h + m)
      return { type: 'backWall', index: 0, obj: bw };
  }
  // Hint markers
  const hms = lv.hintMarkers || [];
  for (let i = hms.length - 1; i >= 0; i--) {
    const hm = hms[i];
    const dx = wx - hm.x, dy = wy - hm.y;
    if (Math.sqrt(dx*dx + dy*dy) < (hm.r || 18) + m) return { type: 'hint', index: i, obj: hm };
  }
  // Bumpers
  for (let i = lv.bumpers.length - 1; i >= 0; i--) {
    const b = lv.bumpers[i];
    const dx = wx - b.x, dy = wy - b.y;
    if (Math.sqrt(dx*dx + dy*dy) < b.r + m) return { type: 'bumper', index: i, obj: b };
  }
  // Platforms
  for (let i = lv.platforms.length - 1; i >= 0; i--) {
    const p = lv.platforms[i];
    if (wx > p.x - m && wx < p.x + p.w + m && wy > p.y - m && wy < p.y + 6 + m)
      return { type: 'platform', index: i, obj: p };
  }
  // Walls
  for (let i = lv.walls.length - 1; i >= 0; i--) {
    const w = lv.walls[i];
    if (wx > w.x - m && wx < w.x + w.w + m && wy > w.y - m && wy < w.y + w.h + m)
      return { type: 'wall', index: i, obj: w };
  }
  return null;
}

// Transform world point into object's local space (centered, rotated)
function edToLocal(wx, wy, o) {
  const cx = o.x + (o.w||0)/2, cy = o.y + (o.h||6)/2;
  const rot = o.rot || 0;
  const cos = Math.cos(-rot), sin = Math.sin(-rot);
  const dx = wx - cx, dy = wy - cy;
  return { lx: dx*cos - dy*sin, ly: dx*sin + dy*cos };
}

function edGetHandle(wx, wy) {
  if (!edSel) return null;
  const o = edSel.obj;
  const hs = ED_HANDLE_SIZE + 4;

  if (edSel.type === 'bumper') {
    const hx = o.x + o.r, hy = o.y;
    if (Math.abs(wx - hx) < hs && Math.abs(wy - hy) < hs) return 'radius';
    if (Math.sqrt((wx-o.x)**2 + (wy-o.y)**2) < o.r + ED_GRAB_MARGIN) return 'move';
    return null;
  }

  if (edSel.type === 'hint') {
    const hr = o.r || 18;
    const rot = o.rot || 0;
    const cos = Math.cos(rot), sin = Math.sin(rot);
    // Arrow tip handle — drag to set both angle AND length
    const tipWx = o.x + (-hr) * cos, tipWy = o.y + (-hr) * sin;
    if (Math.sqrt((wx-tipWx)**2 + (wy-tipWy)**2) < hs + 6) return 'aimTip';
    // Dot = move
    if (Math.sqrt((wx-o.x)**2 + (wy-o.y)**2) < 12) return 'move';
    return null;
  }

  // Work in object's local (rotated) space
  const { lx, ly } = edToLocal(wx, wy, o);
  const hw = (o.w||0)/2, hh = (o.h||6)/2;

  // Rotation handle — above object in local space
  const rotDist = Math.max(40, hh + 25);
  if (Math.abs(lx) < 10 && Math.abs(ly + rotDist) < 10) return 'rotate';

  // Corner handles
  if (Math.abs(lx + hw) < hs && Math.abs(ly + hh) < hs) return 'nw';
  if (Math.abs(lx - hw) < hs && Math.abs(ly + hh) < hs) return 'ne';
  if (Math.abs(lx + hw) < hs && Math.abs(ly - hh) < hs) return 'sw';
  if (Math.abs(lx - hw) < hs && Math.abs(ly - hh) < hs) return 'se';
  // Edge handles
  if (Math.abs(lx + hw) < hs && Math.abs(ly) < hh) return 'w';
  if (Math.abs(lx - hw) < hs && Math.abs(ly) < hh) return 'e';
  if (Math.abs(ly + hh) < hs && Math.abs(lx) < hw) return 'n';
  if (Math.abs(ly - hh) < hs && Math.abs(lx) < hw) return 's';
  // Body
  if (Math.abs(lx) < hw + ED_GRAB_MARGIN && Math.abs(ly) < hh + ED_GRAB_MARGIN) return 'move';
  return null;
}

function edApplyDrag(wx, wy) {
  if (!edSel || !edDragStart) return;
  const o = edSel.obj;
  const ds = edDragStart;
  const dx = wx - ds.mx, dy = wy - ds.my;

  if (edHandle === 'ceilingLine') {
    getCurrentLevel().ceilingY = snap(Math.min(getDeathY() - 100, wy));
    return;
  }
  if (edHandle === 'deathLine') {
    getCurrentLevel().deathY = snap(Math.max(getCeilingY() + 100, wy));
    return;
  }
  if (edHandle === 'widthLine') {
    getCurrentLevel().width = snap(Math.max(getThrowLine() + 200, wx));
    return;
  }
  if (edHandle === 'throwLine') {
    getCurrentLevel().throwLineX = snap(Math.max(100, wx));
    return;
  }
  if (edHandle === 'releaseLine') {
    getCurrentLevel().releaseLineX = snap(Math.max(50, Math.min(wx, getThrowLine() - 20)));
    return;
  }
  if (edHandle === 'aimTip' && edSel.type === 'hint') {
    // Drag the arrow tip: sets both angle and length from dot
    const dx = wx - o.x, dy = wy - o.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    o.r = snap(Math.max(15, dist));
    // Angle points FROM the dot TO the tip, but tip is at -r in local space
    // So rotation = angle to mouse + PI
    let angle = Math.atan2(dy, dx) + Math.PI;
    if (edSnap) angle = Math.round(angle / (Math.PI/12)) * (Math.PI/12);
    o.rot = angle;
    return;
  }
  if (edHandle === 'rotate') {
    const cx = o.x + (o.w||0)/2, cy = o.y + (o.h||6)/2;
    let angle = Math.atan2(wx - cx, -(wy - cy));
    if (edSnap) angle = Math.round(angle / (Math.PI/12)) * (Math.PI/12); // 15 degree snap
    o.rot = angle;
  } else if (edHandle === 'move') {
    o.x = snap(ds.ox + dx); o.y = snap(ds.oy + dy);
  } else if (edHandle === 'radius') {
    o.r = snap(Math.max(10, Math.abs(wx - o.x)));
  } else {
    if (edHandle.includes('w')) { o.x = snap(ds.ox + dx); o.w = Math.max(10, snap(ds.ow - dx)); }
    if (edHandle.includes('e')) { o.w = Math.max(10, snap(ds.ow + dx)); }
    if (edHandle.includes('n')) { o.y = snap(ds.oy + dy); o.h = Math.max(10, snap(ds.oh - dy)); }
    if (edHandle.includes('s')) { o.h = Math.max(10, snap(ds.oh + dy)); }
  }
}

function edDrawHandles() {
  if (!edSel) return;
  const o = edSel.obj;
  const hs = ED_HANDLE_SIZE;

  if (edSel.type === 'hint') {
    const hr = o.r || 18;
    const rot = o.rot || 0;
    const cos = Math.cos(rot), sin = Math.sin(rot);
    const ox = o.x - camX, oy = o.y;
    // Dot highlight
    ctx.strokeStyle = 'rgba(244,197,66,0.5)'; ctx.lineWidth = 1.5; ctx.setLineDash([3,3]);
    ctx.beginPath(); ctx.arc(ox, oy, 10, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    // Arrow tip handle (drag to change line length)
    const tipX = ox + (-hr) * cos, tipY = oy + (-hr) * sin;
    ctx.fillStyle = 'rgba(244,197,66,0.8)';
    ctx.beginPath(); ctx.arc(tipX, tipY, 6, 0, Math.PI*2); ctx.fill();
    // Label
    ctx.fillStyle = 'rgba(244,197,66,0.5)'; ctx.font = '500 9px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('DRAG', tipX, tipY + 14);
    if (o.rot) {
      ctx.fillText(Math.round(rot * 180/Math.PI) + '°', ox, oy - 14);
    }
    return;
  }

  if (edSel.type === 'bumper') {
    ctx.strokeStyle = 'rgba(0,255,255,0.6)'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.arc(o.x - camX, o.y, o.r + 4, 0, Math.PI*2); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(0,255,255,0.8)';
    ctx.fillRect(o.x + o.r - camX - 4, o.y - 4, 8, 8);
    return;
  }

  // Rectangle types (wall, platform, goal, backWall) — draw rotated
  const w = o.w || 0, h = o.h || 6;
  const cx = o.x + w/2 - camX, cy = o.y + h/2;
  const rot = o.rot || 0;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rot);

  // Dashed border
  ctx.strokeStyle = 'rgba(0,255,255,0.6)'; ctx.lineWidth = 2; ctx.setLineDash([4,4]);
  ctx.strokeRect(-w/2 - 2, -h/2 - 2, w + 4, h + 4);
  ctx.setLineDash([]);

  // Corner + edge handles
  ctx.fillStyle = 'rgba(0,255,255,0.8)';
  const pts = [
    [-w/2,-h/2],[0,-h/2],[w/2,-h/2],
    [-w/2,0],[w/2,0],
    [-w/2,h/2],[0,h/2],[w/2,h/2],
  ];
  for (const [px,py] of pts) ctx.fillRect(px-hs/2, py-hs/2, hs, hs);

  // Rotation handle — above in local space
  const rotDist = Math.max(40, h/2 + 25);
  ctx.strokeStyle = 'rgba(0,255,255,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, -rotDist); ctx.stroke();
  ctx.fillStyle = 'rgba(0,255,255,0.8)';
  ctx.beginPath(); ctx.arc(0, -rotDist, 7, 0, Math.PI*2); ctx.fill();

  // Angle label
  if (rot) {
    ctx.fillStyle = 'rgba(0,255,255,0.6)'; ctx.font = '500 10px Urbanist'; ctx.textAlign = 'center';
    ctx.rotate(-rot); // unrotate for readable text
    ctx.fillText(Math.round(rot * 180/Math.PI) + '°', 0, -rotDist - 12);
  }

  ctx.restore();

  // Type label (screen space)
  ctx.fillStyle = 'rgba(0,255,255,0.7)'; ctx.font = '600 11px Urbanist'; ctx.textAlign = 'left';
  ctx.fillText(edSel.type.toUpperCase() + (rot ? ' ' + Math.round(rot*180/Math.PI) + '°' : ''), cx - w/2, cy - h/2 - 10);
}

function edToolbarRect() {
  const tw = 920, th = 44;
  const tx = edToolbarPos ? edToolbarPos.x : (W - tw) / 2;
  const ty = edToolbarPos ? edToolbarPos.y : H - th - 10;
  return { tx, ty, tw, th };
}

function edDrawToolbar() {
  const { tx, ty, tw, th } = edToolbarRect();

  // Background
  roundRectPath(tx, ty, tw, th, 12);
  ctx.fillStyle = 'rgba(26,14,46,0.85)'; ctx.fill();
  ctx.strokeStyle = 'rgba(254,249,240,0.15)'; ctx.lineWidth = 1; ctx.stroke();

  // Drag grip (left side - 3 dots)
  ctx.fillStyle = 'rgba(254,249,240,0.25)';
  for (let di = 0; di < 3; di++) {
    ctx.beginPath(); ctx.arc(tx + 12, ty + th/2 - 8 + di * 8, 2, 0, Math.PI*2); ctx.fill();
  }

  ctx.font = '600 12px Urbanist'; ctx.textAlign = 'center';

  // Buttons
  const btns = [
    { label: '+ WALL', x: tx + 50, action: 'wall' },
    { label: '+ PLATFORM', x: tx + 155, action: 'platform' },
    { label: '+ BUMPER', x: tx + 265, action: 'bumper' },
    { label: '+ HINT', x: tx + 360, action: 'hint' },
    { label: 'DUPE', x: tx + 445, action: 'dupe' },
    { label: 'DELETE', x: tx + 530, action: 'delete' },
    { label: 'SAVE', x: tx + 615, action: 'export' },
    { label: 'LOAD', x: tx + 695, action: 'import' },
    { label: 'UNDO', x: tx + 775, action: 'undo' },
    { label: edSnap ? 'SNAP:ON' : 'SNAP', x: tx + 860, action: 'snap' },
  ];

  for (const btn of btns) {
    const bw = 80, bh = 28, bx = btn.x - bw/2, by = ty + 8;
    const active = edAddMode === btn.action;
    roundRectPath(bx, by, bw, bh, 6);
    ctx.fillStyle = active ? 'rgba(244,197,66,0.25)' : 'rgba(255,255,255,0.06)';
    ctx.fill();
    ctx.strokeStyle = active ? 'rgba(244,197,66,0.5)' : 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = active ? COL.gold : 'rgba(254,249,240,0.6)';
    ctx.fillText(btn.label, btn.x, by + bh/2 + 4);
  }
}

function edToolbarHit(px, py) {
  const { tx, ty, tw, th } = edToolbarRect();
  if (py < ty || py > ty + th || px < tx || px > tx + tw) return null;

  // Drag grip area (left 25px)
  if (px < tx + 25) return 'drag';

  const btns = [
    { label: '+ WALL', x: tx + 50, action: 'wall' },
    { label: '+ PLATFORM', x: tx + 155, action: 'platform' },
    { label: '+ BUMPER', x: tx + 265, action: 'bumper' },
    { label: '+ HINT', x: tx + 360, action: 'hint' },
    { label: 'DUPE', x: tx + 445, action: 'dupe' },
    { label: 'DELETE', x: tx + 530, action: 'delete' },
    { label: 'SAVE', x: tx + 615, action: 'export' },
    { label: 'LOAD', x: tx + 695, action: 'import' },
    { label: 'UNDO', x: tx + 775, action: 'undo' },
    { label: edSnap ? 'SNAP:ON' : 'SNAP', x: tx + 860, action: 'snap' },
  ];

  for (const btn of btns) {
    if (Math.abs(px - btn.x) < 45) return btn.action;
  }
  return null;
}

// Serialize a level to a plain object (no H references, store ratios)
function serializeLevel(lv) {
  return {
    name: lv.name, par: lv.par, width: lv.width,
    throwLineX: lv.throwLineX || null,
    releaseLineX: lv.releaseLineX || null,
    deathYR: lv.deathY ? lv.deathY / H : null,
    ceilingYR: lv.ceilingY != null ? lv.ceilingY / H : null,
    panUp: !!lv.panUp, panDown: !!lv.panDown, panRight: lv.panRight !== false,
    walls: lv.walls.map(w => ({ x: w.x, yR: w.y/H, w: w.w, hR: w.h/H, rot: w.rot||0 })),
    platforms: lv.platforms.map(p => ({ x: p.x, yR: p.y/H, w: p.w, rot: p.rot||0 })),
    bumpers: lv.bumpers.map(b => ({ x: b.x, yR: b.y/H, r: b.r })),
    hintMarkers: (lv.hintMarkers||[]).map(h => ({ x: h.x, yR: h.y/H, r: h.r||18, rot: h.rot||0 })),
    goal: { x: lv.goal.x, yR: lv.goal.y/H, w: lv.goal.w, hR: lv.goal.h/H, rot: lv.goal.rot||0 },
    backWall: lv.backWall ? { x: lv.backWall.x, w: lv.backWall.w, rot: lv.backWall.rot||0 } : null,
  };
}

// Deserialize back (apply current H)
function deserializeLevel(d) {
  return {
    name: d.name, par: d.par, width: d.width,
    throwLineX: d.throwLineX || null,
    releaseLineX: d.releaseLineX || null,
    deathY: d.deathYR ? d.deathYR * H : null,
    ceilingY: d.ceilingYR != null ? d.ceilingYR * H : null,
    panUp: !!d.panUp, panDown: !!d.panDown, panRight: d.panRight !== false,
    walls: d.walls.map(w => ({ x: w.x, y: w.yR * H, w: w.w, h: w.hR * H, rot: w.rot||0 })),
    platforms: d.platforms.map(p => ({ x: p.x, y: p.yR * H, w: p.w, rot: p.rot||0 })),
    bumpers: d.bumpers.map(b => ({ x: b.x, y: b.yR * H, r: b.r })),
    hintMarkers: (d.hintMarkers||[]).map(h => ({ x: h.x, y: h.yR * H, r: h.r||18, rot: h.rot||0 })),
    goal: { x: d.goal.x, y: d.goal.yR * H, w: d.goal.w, h: d.goal.hR * H, rot: d.goal.rot||0 },
    backWall: d.backWall ? { x: d.backWall.x, y: 0, w: d.backWall.w, h: H, rot: d.backWall.rot||0 } : null,
  };
}

// Save all levels to localStorage
function edSaveLocal() {
  const data = LEVELS.map(serializeLevel);
  localStorage.setItem('cubeTossLevels', JSON.stringify(data));
}

// Load levels from localStorage
function edLoadLocal() {
  const raw = localStorage.getItem('cubeTossLevels');
  if (!raw) return false;
  try {
    const data = JSON.parse(raw);
    if (!Array.isArray(data) || data.length === 0) return false;
    for (let i = 0; i < data.length && i < LEVELS.length; i++) {
      Object.assign(LEVELS[i], deserializeLevel(data[i]));
    }
    // Add any extra levels beyond the defaults
    for (let i = LEVELS.length; i < data.length; i++) {
      LEVELS.push(deserializeLevel(data[i]));
    }
    return true;
  } catch(e) { return false; }
}

// Export all levels as JSON file download
function edExport() {
  const data = LEVELS.map(serializeLevel);
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'cube-toss-levels.json';
  a.click();
  URL.revokeObjectURL(url);
  edSaveLocal();
  showMsg('LEVELS SAVED', 1.5);
}

// Import levels from JSON file
function edImport() {
  const input = document.createElement('input');
  input.type = 'file'; input.accept = '.json';
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw 'not array';
        LEVELS.length = 0;
        for (const d of data) LEVELS.push(deserializeLevel(d));
        level = 0; resetCube(); edSaveLocal();
        showMsg(`LOADED ${LEVELS.length} LEVELS`, 1.5);
      } catch(err) { showMsg('IMPORT FAILED', 1.5); }
    };
    reader.readAsText(file);
  };
  input.click();
}

// Auto-save on every edit action
const _origPushUndo = edPushUndo;
edPushUndo = function() { _origPushUndo(); edSaveLocal(); };

// Load levels: JSON is the base, localStorage adds/overrides on top
(async function loadLevels() {
  let jsonLevels = null;
  try {
    const resp = await fetch('cube-toss-levels.json');
    if (resp.ok) {
      const data = await resp.json();
      if (Array.isArray(data) && data.length > 0) jsonLevels = data;
    }
  } catch(e) {}

  // Check localStorage for extra levels or edits
  const localRaw = localStorage.getItem('cubeTossLevels');
  let localLevels = null;
  try {
    if (localRaw) {
      const parsed = JSON.parse(localRaw);
      if (Array.isArray(parsed) && parsed.length > 0) localLevels = parsed;
    }
  } catch(e) {}

  if (localLevels && localLevels.length >= (jsonLevels ? jsonLevels.length : 0)) {
    // localStorage has same or more levels (user added some) — use it
    LEVELS.length = 0;
    for (const d of localLevels) LEVELS.push(deserializeLevel(d));
    console.log(`Loaded ${LEVELS.length} levels from localStorage`);
  } else if (jsonLevels) {
    // JSON is the base
    LEVELS.length = 0;
    for (const d of jsonLevels) LEVELS.push(deserializeLevel(d));
    // Append any extra levels from localStorage beyond the JSON count
    if (localLevels && localLevels.length > jsonLevels.length) {
      for (let i = jsonLevels.length; i < localLevels.length; i++) {
        LEVELS.push(deserializeLevel(localLevels[i]));
      }
    }
    console.log(`Loaded ${LEVELS.length} levels from JSON + localStorage`);
  }
})();

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === '`' || e.key === '~') {
    editorMode = !editorMode;
    if (editorMode) { state = 'ready'; cube = null; camX = 0; camY = 0; camTargetX = 0; edSel = null; edAddMode = null; }
    else { edSel = null; edAddMode = null; camY = 0; }
    e.preventDefault();
  }
  if (editorMode && (e.key === 'Delete' || e.key === 'Backspace') && edSel) {
    const lv = getCurrentLevel();
    edPushUndo();
    if (edSel.type === 'wall') lv.walls.splice(edSel.index, 1);
    else if (edSel.type === 'platform') lv.platforms.splice(edSel.index, 1);
    else if (edSel.type === 'bumper') lv.bumpers.splice(edSel.index, 1);
    else if (edSel.type === 'hint') { if(lv.hintMarkers) lv.hintMarkers.splice(edSel.index, 1); }
    edSel = null;
    e.preventDefault();
  }
  if (editorMode && e.key === 'g') { edSnap = !edSnap; e.preventDefault(); }
  if (editorMode && e.key === 'z' && (e.metaKey || e.ctrlKey)) {
    edPopUndo(); e.preventDefault();
  }
});

// ─── ANIMATED GRADIENT BG (matches PietSuess site) ───
let gradPhase = 0;

// ─── RENDER ───
let lastTime=0, elapsed=0;

function animate(time){
  const dt=Math.min(1/20,(time-(lastTime||time))/1000);
  lastTime=time; elapsed+=dt; gradPhase+=dt*0.05;

  if (!editorMode) {
    if (goalPreview) {
      // Pan to center goal on screen
      const g = getCurrentLevel().goal;
      const goalCamX = Math.max(0, g.x + g.w/2 - W * 0.5);
      const goalCamY = g.y + g.h/2 - H * 0.5;
      camX += (goalCamX - camX) * 0.12;
      camY += (goalCamY - camY) * 0.12;
    } else if(state==='thrown'&&cube){
      const cf = getCamFlags();
      if (cf.panRight) {
        const maxCam = Math.max(0, getCurrentLevel().width - W + 50);
        camTargetX=Math.min(maxCam, Math.max(0,cube.x-W*0.35));
      }
      // Vertical follow only if flags enabled
      const targetY = cube.y - H * 0.4;
      if (cf.panDown && cube.y > H * 0.75 + camY) {
        camY += (targetY - camY) * 0.08;
      } else if (cf.panUp && cube.y < camY + H * 0.25) {
        camY += (targetY - camY) * 0.08;
      } else if (camY !== 0 && !cf.panDown && !cf.panUp) {
        camY += (0 - camY) * 0.05;
      }
    } else if(state!=='won'&&state!=='lost'){camTargetX=0; camY+=(0-camY)*0.08;}
    if (!goalPreview) camX+=(camTargetX-camX)*0.08;
  }

  if(state==='thrown'&&cube){
    updateCube(cube,dt);
  }
  if(messageTimer>0)messageTimer-=dt;

  // Clear real canvas and apply virtual resolution scaling
  ctx.clearRect(0,0,realW,realH);
  // Letterbox fill
  ctx.fillStyle='#0d0719';ctx.fillRect(0,0,realW,realH);
  ctx.save();
  ctx.translate(gameOffX,gameOffY);
  ctx.scale(gameScale,gameScale);

  // ─── ANIMATED GRADIENT BACKGROUND (PietSuess dark gradient) ───
  const shift = (Math.sin(gradPhase) + 1) * 0.5; // 0-1 oscillation
  const bg = ctx.createLinearGradient(
    W * shift * 0.3, 0,
    W * (0.7 + shift * 0.3), H
  );
  bg.addColorStop(0, '#1a0e2e');
  bg.addColorStop(0.2, '#2d1640');
  bg.addColorStop(0.35, '#4a1942');
  bg.addColorStop(0.5, '#7a2848');
  bg.addColorStop(0.65, '#b8475a');
  bg.addColorStop(0.78, '#d4766a');
  bg.addColorStop(0.9, '#e8a555');
  bg.addColorStop(1, '#f4c542');
  ctx.globalAlpha = 1;
  ctx.fillStyle = bg;
  ctx.fillRect(-200,-200,W+400,H+2000);

  // Darken overlay for playability
  ctx.fillStyle = 'rgba(26,14,46,0.65)';
  ctx.fillRect(-200,-200,W+400,H+2000);

  // Noise texture (subtle grain)
  ctx.fillStyle = 'rgba(255,255,255,0.015)';
  for(let i=0;i<80;i++){
    const nx=Math.random()*W, ny=Math.random()*H;
    ctx.fillRect(nx,ny,1,1);
  }

  const lv=getCurrentLevel();

  // Apply vertical camera offset for world rendering
  if (camY !== 0) ctx.translate(0, -camY);

  // Grid — subtle crosshair
  const gridSpace=60, offG=-(camX*0.3)%gridSpace;
  ctx.fillStyle='rgba(254,249,240,0.03)';
  for(let gx=offG;gx<W+gridSpace;gx+=gridSpace){
    for(let gy=0;gy<H;gy+=gridSpace){
      ctx.fillRect(gx-3,gy,7,1);ctx.fillRect(gx,gy-3,1,7);
    }
  }

  // ─── CEILING BAR ───
  const ceilY = getCeilingY();
  if (ceilY > -100) {
    const cgG = ctx.createLinearGradient(0, ceilY - 10, 0, ceilY + 30);
    cgG.addColorStop(0, 'rgba(100,180,255,0.15)');
    cgG.addColorStop(1, 'rgba(100,180,255,0)');
    ctx.fillStyle = cgG;
    ctx.fillRect(0, ceilY - 10, W + 2000, 40);
    ctx.strokeStyle = 'rgba(100,180,255,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath(); ctx.moveTo(0, ceilY); ctx.lineTo(W + 2000, ceilY); ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(100,180,255,0.05)';
    ctx.fillRect(0, ceilY - 2000, W + 2000, 2000);
  }

  // ─── DEATH BAR ───
  const deathY = getDeathY();
  if (deathY < H + 200) {
    // Danger glow
    const dgG = ctx.createLinearGradient(0, deathY - 30, 0, deathY + 10);
    dgG.addColorStop(0, 'rgba(232,50,50,0)');
    dgG.addColorStop(1, 'rgba(232,50,50,0.15)');
    ctx.fillStyle = dgG;
    ctx.fillRect(0, deathY - 30, W, 40);
    // Line
    ctx.strokeStyle = 'rgba(232,50,50,0.4)';
    ctx.lineWidth = 2;
    ctx.setLineDash([8, 6]);
    ctx.beginPath(); ctx.moveTo(0, deathY); ctx.lineTo(W, deathY); ctx.stroke();
    ctx.setLineDash([]);
    // Fill below
    ctx.fillStyle = 'rgba(232,50,50,0.05)';
    ctx.fillRect(0, deathY, W, H - deathY + 2000);
  }

  // ─── WALK ZONE ───
  if(camX<W){
    ctx.strokeStyle='rgba(254,249,240,0.12)';ctx.lineWidth=1;
    const wlX=WALK_LINE_X-camX;
    ctx.beginPath();ctx.moveTo(wlX,WALK_LINE_Y_START);ctx.lineTo(wlX,WALK_LINE_Y_START+WALK_LINE_LEN);ctx.stroke();

    if(state==='ready'){
      for(const wk of walkCubes){
        const dist=wk.speed*elapsed+wk.offset;
        const rawDist=((dist%WALK_LINE_LEN)+WALK_LINE_LEN)%WALK_LINE_LEN;
        const steps=rawDist/wk.size, stepIdx=Math.floor(steps), frac=steps-stepIdx;
        const eased=frac<0.5?0.5*Math.pow(frac*2,0.7):1-0.5*Math.pow((1-frac)*2,0.7);
        const tipAngle=eased*(Math.PI/2);
        const pivotLocalX=((stepIdx+1)*wk.size)%WALK_LINE_LEN;
        ctx.save();
        ctx.translate(WALK_LINE_X-camX,WALK_LINE_Y_START);
        ctx.rotate(Math.PI/2);ctx.translate(pivotLocalX,0);ctx.rotate(tipAngle);
        // Draw metallic walking cube
        const s=wk.size,r=s*0.15;
        function wp(){ctx.beginPath();const bx=-s,by=-s;ctx.moveTo(bx+r,by);ctx.lineTo(bx+s-r,by);ctx.quadraticCurveTo(bx+s,by,bx+s,by+r);ctx.lineTo(bx+s,by+s-r);ctx.quadraticCurveTo(bx+s,by+s,bx+s-r,by+s);ctx.lineTo(bx+r,by+s);ctx.quadraticCurveTo(bx,by+s,bx,by+s-r);ctx.lineTo(bx,by+r);ctx.quadraticCurveTo(bx,by,bx+r,by);ctx.closePath();}
        wp();ctx.fillStyle=wk.color;ctx.fill();
        const ws=(elapsed*1.5+pivotLocalX*0.02)%(Math.PI*2),wo=Math.sin(ws)*s*0.3;
        const wm=ctx.createLinearGradient(-s+wo,-s,wo,0);
        wm.addColorStop(0,'rgba(255,255,255,0)');wm.addColorStop(0.4,'rgba(255,255,255,0.22)');
        wm.addColorStop(0.6,'rgba(255,255,255,0.22)');wm.addColorStop(1,'rgba(255,255,255,0)');
        wp();ctx.fillStyle=wm;ctx.fill();
        wp();ctx.clip();
        ctx.fillStyle='rgba(255,255,255,0.12)';ctx.fillRect(-s,-s,s,s*0.35);
        ctx.fillStyle='rgba(0,0,0,0.12)';ctx.fillRect(-s,-s*0.3,s,s*0.35);
        ctx.restore();
      }
    }

    // Release line — subtle
    const rlX=getReleaseLine()-camX;
    ctx.strokeStyle='rgba(254,249,240,0.12)';ctx.lineWidth=1;ctx.setLineDash([6,8]);
    ctx.beginPath();ctx.moveTo(rlX,-2000);ctx.lineTo(rlX,H+2000);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(254,249,240,0.15)';ctx.font='500 10px Urbanist';ctx.textAlign='center';
    ctx.fillText('RELEASE',rlX,20);

    // Throw line — gold glow
    const tlX=getThrowLine()-camX;
    const tlG=ctx.createLinearGradient(tlX-30,0,tlX+30,0);
    tlG.addColorStop(0,'rgba(244,197,66,0)');tlG.addColorStop(0.5,'rgba(244,197,66,0.06)');tlG.addColorStop(1,'rgba(244,197,66,0)');
    ctx.fillStyle=tlG;ctx.fillRect(tlX-30,-2000,60,H+4000);
    ctx.strokeStyle='rgba(244,197,66,0.35)';ctx.lineWidth=2;ctx.setLineDash([10,10]);
    ctx.beginPath();ctx.moveTo(tlX,-2000);ctx.lineTo(tlX,H+2000);ctx.stroke();ctx.setLineDash([]);
    ctx.fillStyle='rgba(244,197,66,0.4)';ctx.font='600 11px Urbanist';ctx.textAlign='center';
    ctx.fillText('THROW',tlX,20);

    if(state==='ready'){
      ctx.fillStyle='rgba(254,249,240,0.3)';ctx.font='500 14px Urbanist';ctx.textAlign='center';
      ctx.fillText('GRAB A CUBE',WALK_LINE_X-camX,WALK_LINE_Y_START-20);
      ctx.fillText('DRAG & THROW',WALK_LINE_X-camX,WALK_LINE_Y_START-4);
    }
  }

  // ─── BACK WALL ───
  if(lv.backWall){
    const bw=lv.backWall,bwx=bw.x-camX;
    const bwG=ctx.createLinearGradient(bwx,0,bwx+bw.w,0);
    bwG.addColorStop(0,'rgba(184,71,90,0.15)');bwG.addColorStop(1,'rgba(122,40,72,0.1)');
    roundRectPath(bwx,bw.y,bw.w,bw.h,4);ctx.fillStyle=bwG;ctx.fill();
    ctx.strokeStyle='rgba(254,249,240,0.08)';ctx.lineWidth=1;ctx.stroke();
  }

  // ─── WALLS — glassmorphism (supports rotation) ───
  for(const w of lv.walls){
    ctx.save();
    const wcx=w.x+w.w/2-camX, wcy=w.y+w.h/2;
    ctx.translate(wcx,wcy);
    if(w.rot)ctx.rotate(w.rot);
    const wG=ctx.createLinearGradient(-w.w/2,0,w.w/2,0);
    wG.addColorStop(0,'rgba(254,249,240,0.1)');wG.addColorStop(0.5,'rgba(254,249,240,0.06)');wG.addColorStop(1,'rgba(254,249,240,0.1)');
    roundRectPath(-w.w/2,-w.h/2,w.w,w.h,6);ctx.fillStyle=wG;ctx.fill();
    ctx.strokeStyle=COL.glassBorder;ctx.lineWidth=1;ctx.stroke();
    if(w.h>30){ctx.fillStyle='rgba(254,249,240,0.04)';ctx.fillRect(-w.w/2+2,-w.h/2+2,w.w-4,Math.min(w.h*0.3,40));}
    ctx.restore();
  }

  // ─── PLATFORMS — cyan/blue glow ledge (supports rotation) ───
  for(const p of lv.platforms){
    ctx.save();
    const pcx=p.x+p.w/2-camX, pcy=p.y+3;
    ctx.translate(pcx,pcy);
    if(p.rot)ctx.rotate(p.rot);
    const pG=ctx.createLinearGradient(0,0,0,18);
    pG.addColorStop(0,'rgba(100,200,240,0.2)');pG.addColorStop(1,'rgba(100,200,240,0)');
    ctx.fillStyle=pG;ctx.fillRect(-p.w/2,-3,p.w,18);
    ctx.fillStyle='rgba(100,200,240,0.45)';ctx.fillRect(-p.w/2,-3,p.w,3);
    ctx.fillStyle='rgba(180,230,255,0.5)';ctx.fillRect(-p.w/2,-3,p.w,1);
    ctx.fillStyle='rgba(100,200,240,0.5)';
    ctx.beginPath();ctx.arc(-p.w/2,-1.5,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(p.w/2,-1.5,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // ─── BUMPERS — coral neon ───
  for(const b of lv.bumpers){
    const bx=b.x-camX, bp=0.7+0.3*Math.sin(elapsed*4+b.x*0.01);
    const bG=ctx.createRadialGradient(bx,b.y,b.r*0.3,bx,b.y,b.r*1.8);
    bG.addColorStop(0,`rgba(232,115,90,${0.15*bp})`);bG.addColorStop(1,'rgba(232,115,90,0)');
    ctx.fillStyle=bG;ctx.fillRect(bx-b.r*2,b.y-b.r*2,b.r*4,b.r*4);
    const bG2=ctx.createRadialGradient(bx-b.r*0.3,b.y-b.r*0.3,0,bx,b.y,b.r);
    bG2.addColorStop(0,`rgba(232,115,90,${0.35*bp})`);bG2.addColorStop(1,`rgba(184,61,142,${0.2*bp})`);
    ctx.beginPath();ctx.arc(bx,b.y,b.r,0,Math.PI*2);ctx.fillStyle=bG2;ctx.fill();
    ctx.strokeStyle=`rgba(232,115,90,${0.6*bp})`;ctx.lineWidth=2.5;ctx.stroke();
  }

  // ─── GOAL — open-left basket, gold (supports rotation) ───
  const g=lv.goal,gp=0.5+0.5*Math.sin(elapsed*3);

  ctx.save();
  const gcx=g.x+g.w/2-camX, gcy=g.y+g.h/2;
  ctx.translate(gcx,gcy);
  if(g.rot)ctx.rotate(g.rot);

  // Ambient glow
  const gg=ctx.createRadialGradient(g.w*-0.1,0,0,0,0,g.h*0.9);
  gg.addColorStop(0,`rgba(244,197,66,${0.1+gp*0.05})`);gg.addColorStop(1,'rgba(244,197,66,0)');
  ctx.fillStyle=gg;ctx.fillRect(-g.w*0.8,-g.h*0.8,g.w*1.6,g.h*1.6);

  // Interior
  ctx.fillStyle=`rgba(244,197,66,${0.04+gp*0.02})`;ctx.fillRect(-g.w/2,-g.h/2,g.w,g.h);

  // Net
  ctx.save();ctx.beginPath();ctx.rect(-g.w/2,-g.h/2,g.w,g.h);ctx.clip();
  ctx.strokeStyle=`rgba(244,197,66,${0.07+gp*0.03})`;ctx.lineWidth=1;
  for(let ny=-g.h/2+16;ny<g.h/2;ny+=16){ctx.beginPath();ctx.moveTo(-g.w/2,ny);ctx.lineTo(g.w/2,ny);ctx.stroke();}
  for(let nx=-g.w/2+16;nx<g.w/2;nx+=16){const sw=Math.sin(elapsed*2+nx*0.05)*3;ctx.beginPath();ctx.moveTo(nx,-g.h/2);ctx.lineTo(nx+sw,g.h/2);ctx.stroke();}
  ctx.restore();

  // Right rim
  ctx.fillStyle=`rgba(244,197,66,${0.4+gp*0.25})`;ctx.fillRect(g.w/2-3,-g.h/2,6,g.h);
  // Top rim
  ctx.fillStyle=`rgba(244,197,66,${0.5+gp*0.3})`;ctx.fillRect(-g.w/2,-g.h/2-2,g.w+3,4);
  // Bottom rim
  ctx.fillRect(-g.w/2,g.h/2-2,g.w+3,4);
  // Lip dots
  ctx.fillStyle=`rgba(244,197,66,${0.6+gp*0.3})`;
  ctx.beginPath();ctx.arc(-g.w/2,-g.h/2,4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(-g.w/2,g.h/2,4,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // ─── HINTS — placeable half-circles ───
  const hintMarkers = lv.hintMarkers || [];
  if (showHints || editorMode) {
    for (const hm of hintMarkers) {
      const hx = hm.x - camX, hy = hm.y;
      const hr = hm.r || 18;
      const alpha = (showHints || editorMode) ? 0.35 : 0;
      ctx.save();
      ctx.translate(hx, hy);
      ctx.rotate(hm.rot || 0);
      // Small dot at the hint point
      const dotR = 4;
      ctx.beginPath();
      ctx.arc(0, 0, dotR, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(244,197,66,${alpha * 0.8})`;
      ctx.fill();
      // Aim line — length = hr (draggable via radius handle)
      const lineLen = hr;
      ctx.beginPath();
      ctx.moveTo(dotR + 2, 0);
      ctx.lineTo(-lineLen, 0);
      ctx.strokeStyle = `rgba(244,197,66,${alpha * 0.7})`;
      ctx.lineWidth = 1.5;
      ctx.setLineDash([4, 4]);
      ctx.stroke();
      ctx.setLineDash([]);
      // Arrow tip
      ctx.fillStyle = `rgba(244,197,66,${alpha * 0.7})`;
      ctx.beginPath();
      ctx.moveTo(-lineLen, 0);
      ctx.lineTo(-lineLen + 6, -5);
      ctx.lineTo(-lineLen + 6, 5);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
    }
  }

  // ─── TRAIL ───
  if(cube&&cube.trail.length>1){
    for(let i=1;i<cube.trail.length;i++){
      const t=cube.trail[i],a=t.t*0.3;
      ctx.fillStyle=`rgba(244,197,66,${a*0.3})`;ctx.beginPath();ctx.arc(t.x-camX,t.y,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle=`rgba(254,249,240,${a})`;ctx.beginPath();ctx.arc(t.x-camX,t.y,2,0,Math.PI*2);ctx.fill();
    }
  }

  // ─── CUBE ───
  if(cube&&(state==='aiming'||state==='thrown'||state==='won'||state==='lost')){
    drawCubeAt(cube.x-camX,cube.y,cube.size,cube.angle,cube.color);
    if(state==='won'){
      const wp=0.5+0.5*Math.sin(elapsed*8);
      const wg=ctx.createRadialGradient(cube.x-camX,cube.y,0,cube.x-camX,cube.y,cube.size*3);
      wg.addColorStop(0,`rgba(244,197,66,${0.3*wp})`);wg.addColorStop(0.5,`rgba(232,115,90,${0.1*wp})`);wg.addColorStop(1,'rgba(244,197,66,0)');
      ctx.fillStyle=wg;ctx.fillRect(cube.x-camX-cube.size*3,cube.y-cube.size*3,cube.size*6,cube.size*6);
    }
  }

  // Reset vertical camera for HUD (fixed on screen)
  if (camY !== 0) ctx.translate(0, camY);

  // ─── HUD ───
  ctx.fillStyle='rgba(254,249,240,0.6)';ctx.font='700 16px Urbanist';ctx.textAlign='left';
  ctx.fillText(`LEVEL ${level+1}: ${lv.name}`,15,30);
  ctx.font='400 13px Poppins';ctx.fillStyle='rgba(254,249,240,0.35)';
  ctx.fillText(`THROWS: ${attempts}   PAR: ${lv.par}`,15,50);

  // ─── LEVEL JUMPER — clickable dropdown ───
  const ljx = 15, ljy = 60;
  // Toggle button
  roundRectPath(ljx, ljy, 80, 26, 8);
  ctx.fillStyle = levelMenuOpen ? 'rgba(244,197,66,0.2)' : 'rgba(255,255,255,0.06)';
  ctx.fill();
  ctx.strokeStyle = levelMenuOpen ? 'rgba(244,197,66,0.4)' : 'rgba(255,255,255,0.12)';
  ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = 'rgba(254,249,240,0.6)'; ctx.font = '600 11px Urbanist'; ctx.textAlign = 'center';
  ctx.fillText(`${level+1}/${LEVELS.length} ▾`, ljx + 40, ljy + 17);

  // Dropdown menu
  if (levelMenuOpen) {
    const mw = 240, rowH = 30;
    const mh = Math.min((LEVELS.length + 1) * rowH + 8, H * 0.6);
    const mx = ljx, my = ljy + 30;
    // Background
    roundRectPath(mx, my, mw, mh, 10);
    ctx.fillStyle = 'rgba(26,14,46,0.92)'; ctx.fill();
    ctx.strokeStyle = 'rgba(254,249,240,0.15)'; ctx.lineWidth = 1; ctx.stroke();
    // Scrollable items
    ctx.save();
    ctx.beginPath(); ctx.rect(mx, my, mw, mh); ctx.clip();
    for (let i = 0; i < LEVELS.length; i++) {
      const iy = my + 4 + i * rowH - levelMenuScroll;
      if (iy < my - rowH || iy > my + mh) continue;
      const isActive = i === level;
      if (isActive) {
        ctx.fillStyle = 'rgba(244,197,66,0.15)';
        ctx.fillRect(mx + 4, iy, mw - 8, rowH - 2);
      }
      // Level name
      ctx.fillStyle = isActive ? COL.gold : 'rgba(254,249,240,0.6)';
      ctx.font = '500 12px Urbanist'; ctx.textAlign = 'left';
      ctx.fillText(`${i+1}. ${LEVELS[i].name}`, mx + 12, iy + 18);
      // Score if completed
      if (scorecard[i]) {
        ctx.fillStyle = scorecard[i].throws <= scorecard[i].par ? 'rgba(100,255,140,0.5)' : 'rgba(254,249,240,0.3)';
        ctx.font = '400 10px Poppins'; ctx.textAlign = 'right';
        ctx.fillText(`${scorecard[i].throws}/${scorecard[i].par}`, mx + mw - 50, iy + 18);
      }
      // Reorder arrows (editor mode only)
      if (editorMode) {
        ctx.fillStyle = 'rgba(254,249,240,0.3)';
        // Up arrow
        if (i > 0) {
          ctx.beginPath(); ctx.moveTo(mx+mw-30, iy+12); ctx.lineTo(mx+mw-24, iy+6); ctx.lineTo(mx+mw-18, iy+12); ctx.closePath(); ctx.fill();
        }
        // Down arrow
        if (i < LEVELS.length-1) {
          ctx.beginPath(); ctx.moveTo(mx+mw-30, iy+18); ctx.lineTo(mx+mw-24, iy+24); ctx.lineTo(mx+mw-18, iy+18); ctx.closePath(); ctx.fill();
        }
      }
    }
    // ADD LEVEL button at bottom
    const addY = my + 4 + LEVELS.length * rowH - levelMenuScroll;
    if (addY > my && addY < my + mh) {
      ctx.fillStyle = 'rgba(244,197,66,0.15)';
      ctx.fillRect(mx + 4, addY, mw - 8, rowH - 2);
      ctx.fillStyle = COL.gold; ctx.font = '600 12px Urbanist'; ctx.textAlign = 'center';
      ctx.fillText('+ ADD LEVEL', mx + mw/2, addY + 18);
    }
    ctx.restore();
  }

  // ─── EDITOR OVERLAY ───
  if (editorMode) {
    // Editor dim overlay
    ctx.fillStyle = 'rgba(0,255,255,0.15)'; ctx.fillRect(0, 0, W, H);

    // Snap grid overlay
    if (edSnap) {
      ctx.strokeStyle = 'rgba(0,255,255,0.06)'; ctx.lineWidth = 0.5;
      const gs = ED_SNAP_SIZE, goff = -(camX % gs);
      for (let gx = goff; gx < W; gx += gs) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
      for (let gy = 0; gy < H; gy += gs) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    }

    // World-space editor elements (need camY offset)
    if (camY !== 0) ctx.translate(0, -camY);

    // Camera pan checkboxes — below the side buttons
    const cf = getCamFlags();
    const lastBtnB = sideBtnBounds(3); // EDIT is index 3
    const cbx = lastBtnB.x, cby = lastBtnB.y + lastBtnB.h + 15;
    ctx.font = '500 10px Urbanist'; ctx.textAlign = 'left';
    // Edit mode label
    ctx.fillStyle = 'rgba(0,255,255,0.7)'; ctx.font = '600 11px Urbanist';
    ctx.fillText('EDIT MODE', cbx, cby);
    const cbLabels = [
      { key: 'panRight', label: 'PAN RIGHT', val: cf.panRight },
      { key: 'panUp', label: 'PAN UP', val: cf.panUp },
      { key: 'panDown', label: 'PAN DOWN', val: cf.panDown },
    ];
    ctx.font = '500 10px Urbanist';
    for (let ci = 0; ci < cbLabels.length; ci++) {
      const cy2 = cby + 12 + ci * 20;
      ctx.strokeStyle = 'rgba(0,255,255,0.5)'; ctx.lineWidth = 1.5;
      ctx.strokeRect(cbx, cy2, 12, 12);
      if (cbLabels[ci].val) {
        ctx.fillStyle = 'rgba(0,255,255,0.7)';
        ctx.fillRect(cbx + 3, cy2 + 3, 6, 6);
      }
      ctx.fillStyle = 'rgba(0,255,255,0.6)';
      ctx.fillText(cbLabels[ci].label, cbx + 18, cy2 + 10);
    }

    // Ceiling bar handle
    const edCY = getCeilingY();
    ctx.fillStyle = 'rgba(100,180,255,0.7)';
    ctx.fillRect(W/2 - 15, edCY - 3, 30, 6);
    ctx.fillStyle = 'rgba(100,180,255,0.5)'; ctx.font = '500 9px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('CEILING', W/2, edCY + 14);

    // Death bar handle
    const edDY = getDeathY();
    ctx.fillStyle = 'rgba(232,50,50,0.7)';
    ctx.fillRect(W/2 - 15, edDY - 3, 30, 6);
    ctx.fillStyle = 'rgba(232,50,50,0.5)'; ctx.font = '500 9px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('DEATH', W/2, edDY - 8);

    // Throw/release line handles
    const edTlX = getThrowLine() - camX;
    ctx.fillStyle = 'rgba(244,197,66,0.7)';
    ctx.fillRect(edTlX - 3, H/2 - 15, 6, 30);
    ctx.fillStyle = 'rgba(244,197,66,0.5)'; ctx.font = '500 9px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('DRAG', edTlX, H/2 + 28);

    const edRlX = getReleaseLine() - camX;
    ctx.fillStyle = 'rgba(254,249,240,0.5)';
    ctx.fillRect(edRlX - 3, H/2 - 15, 6, 30);
    ctx.fillStyle = 'rgba(254,249,240,0.35)'; ctx.font = '500 9px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('DRAG', edRlX, H/2 + 28);

    // Level width marker (draggable)
    const lwx = getCurrentLevel().width - camX;
    ctx.strokeStyle = 'rgba(244,197,66,0.3)'; ctx.lineWidth = 1; ctx.setLineDash([6,6]);
    ctx.beginPath(); ctx.moveTo(lwx, -2000); ctx.lineTo(lwx, H+2000); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle = 'rgba(244,197,66,0.5)'; ctx.font = '500 10px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText('LEVEL END', lwx, H - 5);
    // Drag handle
    ctx.fillStyle = 'rgba(244,197,66,0.7)';
    ctx.fillRect(lwx - 3, H/2 - 15, 6, 30);
    ctx.fillStyle = 'rgba(244,197,66,0.4)'; ctx.font = '500 9px Urbanist';
    ctx.fillText('DRAG', lwx, H/2 + 28);

    // Selection handles
    edDrawHandles();

    // Back to screen space for toolbar
    if (camY !== 0) ctx.translate(0, camY);

    // Toolbar
    edDrawToolbar();
  }

  // ─── STACKED SIDE BUTTONS — just right of throw line ───
  function drawSideBtn(index, label, active) {
    const b = sideBtnBounds(index);
    const rbG = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    rbG.addColorStop(0, active ? 'rgba(244,197,66,0.25)' : 'rgba(232,115,90,0.2)');
    rbG.addColorStop(1, active ? 'rgba(244,197,66,0.12)' : 'rgba(184,61,142,0.12)');
    roundRectPath(b.x, b.y, b.w, b.h, 10);
    ctx.fillStyle = rbG; ctx.fill();
    ctx.strokeStyle = active ? 'rgba(244,197,66,0.4)' : 'rgba(254,249,240,0.15)';
    ctx.lineWidth = 1; ctx.stroke();
    ctx.fillStyle = active ? 'rgba(244,197,66,0.9)' : 'rgba(254,249,240,0.75)';
    ctx.font = '600 12px Urbanist'; ctx.textAlign = 'center';
    ctx.fillText(label, b.x + b.w/2, b.y + b.h/2 + 4);
  }

  // Check if goal is visible on screen (ignore when goalPreview is active)
  const gVis = lv.goal;
  const goalOnScreen = !goalPreview && (gVis.x + gVis.w - camX > 0 && gVis.x - camX < W &&
    gVis.y + (gVis.h||0) - camY > 0 && gVis.y - camY < H);

  let btnIdx = 0;
  // RESET (only when active)
  if (state==='thrown'||state==='lost'||state==='won'||state==='aiming') {
    drawSideBtn(btnIdx, 'RESET', false);
  }
  btnIdx++;
  // GOAL HINT (show when goal not visible OR when preview is active)
  if (!goalOnScreen || goalPreview) {
    drawSideBtn(btnIdx, 'GOAL HINT', goalPreview);
    btnIdx++;
  }
  // HINTS
  drawSideBtn(btnIdx, 'HINTS', showHints);
  btnIdx++;
  // EDIT
  drawSideBtn(btnIdx, 'EDIT', editorMode);

  // ─── WIN SCREEN (always visible while state==='won') ───
  if (state==='won') {
    // Darken overlay
    ctx.fillStyle='rgba(26,14,46,0.4)';ctx.fillRect(0,0,W,H);

    // LEVEL CLEAR text
    ctx.save();
    ctx.font='800 38px Urbanist';ctx.textAlign='center';
    ctx.fillStyle=COL.gold;
    ctx.fillText('LEVEL CLEAR!',W/2,H*0.38);

    // Par text
    const pt=attempts<=lv.par?'UNDER PAR!':attempts===lv.par+1?'ONE OVER':`${attempts-lv.par} OVER PAR`;
    ctx.font='500 16px Poppins';ctx.fillStyle=COL.cream;
    ctx.globalAlpha=0.7;
    ctx.fillText(pt,W/2,H*0.38+35);

    // Scorecard summary
    ctx.font='400 13px Poppins';ctx.fillStyle=COL.cream;ctx.globalAlpha=0.45;
    ctx.fillText(`Throws: ${attempts}  |  Par: ${lv.par}  |  Total: ${totalThrows}`,W/2,H*0.38+55);
    ctx.restore();

    // NEXT LEVEL button
    const nb=nextBtnBounds();
    const nbr=16;
    const nbGlow=ctx.createRadialGradient(nb.x+nb.w/2,nb.y+nb.h/2,0,nb.x+nb.w/2,nb.y+nb.h/2,nb.w*0.8);
    nbGlow.addColorStop(0,'rgba(244,197,66,0.12)');nbGlow.addColorStop(1,'rgba(244,197,66,0)');
    ctx.fillStyle=nbGlow;ctx.fillRect(nb.x-nb.w*0.3,nb.y-nb.h,nb.w*1.6,nb.h*3);
    const nbG=ctx.createLinearGradient(nb.x,nb.y,nb.x+nb.w,nb.y+nb.h);
    nbG.addColorStop(0,COL.gold);nbG.addColorStop(0.5,'#f0d060');nbG.addColorStop(1,COL.coral);
    roundRectPath(nb.x,nb.y,nb.w,nb.h,nbr);
    ctx.fillStyle=nbG;ctx.fill();
    ctx.save();roundRectPath(nb.x,nb.y,nb.w,nb.h,nbr);ctx.clip();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.fillRect(nb.x,nb.y,nb.w,nb.h*0.45);
    ctx.restore();
    roundRectPath(nb.x,nb.y,nb.w,nb.h,nbr);
    ctx.strokeStyle='rgba(255,255,255,0.25)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=COL.ink;ctx.font='700 18px Urbanist';ctx.textAlign='center';
    ctx.fillText('NEXT LEVEL',nb.x+nb.w/2,nb.y+nb.h/2+6);

    // Replay button
    const rpb=replayBtnBounds();
    const rpr=12;
    roundRectPath(rpb.x,rpb.y,rpb.w,rpb.h,rpr);
    ctx.fillStyle='rgba(255,255,255,0.08)';ctx.fill();
    ctx.strokeStyle='rgba(254,249,240,0.2)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(254,249,240,0.6)';ctx.font='600 14px Urbanist';ctx.textAlign='center';
    ctx.fillText('REPLAY LEVEL',rpb.x+rpb.w/2,rpb.y+rpb.h/2+5);
  }

  // ─── LOST/OTHER MESSAGES (timed) ───
  if (messageTimer>0 && showMessage && state!=='won') {
    ctx.fillStyle=COL.cream;ctx.globalAlpha=Math.min(1,messageTimer);
    ctx.font='800 30px Urbanist';ctx.textAlign='center';
    ctx.fillText(showMessage,W/2,H/2);
    ctx.globalAlpha=1;
  }

  ctx.restore(); // undo virtual resolution scaling
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>

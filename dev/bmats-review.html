, wait, wait.\nLemme, I have a red, so."}, {"s": 737.654, "e": 742.534, "t": "That's where I met Tope.\nHe was the operations manager."}, {"s": 742.534, "e": 745.286, "t": "Whatever, splint board, need to clean."}, {"s": 745.286, "e": 748.665, "t": "Okay this is Tope. Hello."}, {"s": 748.665, "e": 749.833, "t": "I'm also working. No problem."}, {"s": 751.167, "e": 753.419, "t": "She’s working with me two years."}, {"s": 754.921, "e": 756.923, "t": "taking care of orphan kids."}, {"s": 758.508, "e": 760.51, "t": "Who has the shampoo?"}, {"s": 763.012, "e": 764.597, "t": "I am also orphan."}, {"s": 769.185, "e": 770.77, "t": "I know that life."}, {"s": 772.063, "e": 773.147, "t": "What is a hungry life,\nwhat is the freezing life,"}, {"s": 774.858, "e": 776.86, "t": "What is the freezing life."}, {"s": 778.528, "e": 780.822, "t": "and what is the hard time."}, {"s": 782.49, "e": 785.994, "t": "These kids, how love they get from Maggie."}, {"s": 787.287, "e": 789.581, "t": "After that, I totally trust her."}, {"s": 789.581, "e": 791.583, "t": "Okay just label it on the top."}, {"s": 791.583, "e": 793.793, "t": "Now it's clean and I cannot\nbelieve it looks like."}, {"s": 793.793, "e": 795.003, "t": "- Yeah?\n- It looks like"}, {"s": 795.003, "e": 797.088, "t": "it's gonna spread out. For example,"}, {"s": 797.088, "e": 798.423, "t": "after two, three year are coming,"}, {"s": 798.423, "e": 802.26, "t": "they are gonna adding\nthis much more around here."}, {"s": 804.554, "e": 806.639, "t": "Nepal was among the poorest countries"}, {"s": 806.639, "e": 807.64, "t": "in the world"}, {"s": 808.6, "e": 812.061, "t": "and was just recovering from\na decade long civil war"}, {"s": 812.061, "e": 816.232, "t": "that left a million orphaned\nchildren in its wake."}, {"s": 824.449, "e": 828.828, "t": "We realised that what some\nkids needed was the chance to go"}, {"s": 828.828, "e": 830.622, "t": "to school in a good environment."}, {"s": 830.622, "e": 831.873, "t": "[Namaste.]"}, {"s": 831.873, "e": 834.083, "t": "Namaste."}, {"s": 836.252, "e": 840.006, "t": "Other kids actually needed\nmore of an intervention,"}, {"s": 840.006, "e": 844.594, "t": "which was a home and a family\nand a safe place to live."}, {"s": 854.187, "e": 857.523, "t": "dining room that we just built."}, {"s": 878.67, "e": 879.504, "t": "Okay."}, {"s": 880.755, "e": 882.507, "t": "[What is your name?]"}, {"s": 887.762, "e": 890.181, "t": "Maggie?"}, {"s": 890.765, "e": 893.893, "t": "At that time, I was only like seven."}, {"s": 897.313, "e": 899.065, "t": "My mom died first."}, {"s": 900.024, "e": 902.151, "t": "She had ovarian cancer."}, {"s": 905.071, "e": 907.031, "t": "Right around six, seven months,"}, {"s": 907.949, "e": 909.617, "t": "my father also died."}, {"s": 918.835, "e": 920.878, "t": "- Hi Nisha.\n- Hi."}, {"s": 920.878, "e": 921.921, "t": "How are you?"}, {"s": 921.921, "e": 924.048, "t": "♪ Rainbow Nisha ♪"}, {"s": 924.048, "e": 926.968, "t": "♪ Rainbow Nisha ♪"}, {"s": 926.968, "e": 929.512, "t": "♪ Go where you want to go ♪"}, {"s": 929.512, "e": 932.473, "t": "♪ And do what you want to do ♪"}, {"s": 932.473, "e": 935.601, "t": "♪ The sky is ♪"}, {"s": 935.601, "e": 936.686, "t": "Say hi."}, {"s": 936.686, "e": 937.52, "t": "Hi."}, {"s": 937.52, "e": 939.355, "t": "Today is the first day of school."}, {"s": 939.355, "e": 941.107, "t": "- Hi.\n- Today is the"}, {"s": 941.107, "e": 943.568, "t": "first day of school."}, {"s": 943.568, "e": 944.527, "t": "When I was first here,"}, {"s": 944.527, "e": 947.321, "t": "there was only first floors, small family."}, {"s": 948.781, "e": 952.869, "t": "I had no idea what was\ngoing on or like where I was."}, {"s": 952.869, "e": 955.913, "t": "The only thing I knew was I'm safe here."}, {"s": 955.913, "e": 957.457, "t": "I felt the love."}, {"s": 961.377, "e": 963.421, "t": "And because more kids were coming,"}, {"s": 963.421, "e": 966.174, "t": "our house also started expanding."}, {"s": 967.467, "e": 970.636, "t": "We made second floor and then third floor"}, {"s": 970.636, "e": 972.18, "t": "and then fourth floor."}, {"s": 976.1, "e": 978.394, "t": "Everything happened so fast."}, {"s": 980.063, "e": 981.314, "t": "I came back from school"}, {"s": 981.314, "e": 984.108, "t": "and then Maggie's like,\n\"This is your new brother.\""}, {"s": 984.484, "e": 986.861, "t": "Hi Krishna."}, {"s": 986.861, "e": 987.695, "t": "After Nisha,"}, {"s": 987.695, "e": 990.406, "t": "I was the next kid\nthat moved into the house."}, {"s": 990.406, "e": 991.824, "t": "[You’re going to school today?]"}, {"s": 996.496, "e": 998.539, "t": "Krishna, Krishna?"}, {"s": 998.873, "e": 999.916, "t": "Hi Maggie."}, {"s": 1001.292, "e": 1003.878, "t": "- Bye bye, bye, bye.\n- Krishna."}, {"s": 1004.921, "e": 1006.38, "t": "I was three or four years old"}, {"s": 1006.38, "e": 1008.257, "t": "when I lost my dad."}, {"s": 1008.257, "e": 1010.927, "t": "My mother, an uneducated mother,"}, {"s": 1012.261, "e": 1016.349, "t": "living in a society\nwhere people judge you,"}, {"s": 1016.349, "e": 1018.226, "t": "it was hard for her to like take care"}, {"s": 1018.267, "e": 1021.062, "t": "of my little sister and me so,"}, {"s": 1021.687, "e": 1023.314, "t": "she left us."}, {"s": 1025.525, "e": 1029.195, "t": "Krishna had gone through so much."}, {"s": 1031.322, "e": 1035.243, "t": "He and his sister,\nSabitha, had been separated."}, {"s": 1037.745, "e": 1042.583, "t": "It took him a while to really\nfind his place in the family"}, {"s": 1043.584, "e": 1048.589, "t": "and I don't think he even felt\nit until we found his sister."}, {"s": 1073.489, "e": 1077.827, "t": "♪ Happy birthday to you ♪"}, {"s": 1077.827, "e": 1080.58, "t": "♪ Happy birthday to you ♪"}, {"s": 1080.58, "e": 1083.583, "t": "When I thought about my childhood."}, {"s": 1083.791, "e": 1085.459, "t": "Let me put my eye in it."}, {"s": 1085.459, "e": 1087.336, "t": "I knew that all of the joy"}, {"s": 1087.336, "e": 1090.548, "t": "and all of the memories\nhad made me who I was."}, {"s": 1090.548, "e": 1093.801, "t": "Yeah, Santa Claus called and he said,"}, {"s": 1094.635, "e": 1096.47, "t": "\"Get to bed early.\""}, {"s": 1096.47, "e": 1100.433, "t": "Because we've got lots\nof presents to wrap."}, {"s": 1100.641, "e": 1102.643, "t": "I knew what it was like to feel safe"}, {"s": 1102.643, "e": 1105.438, "t": "and be tucked in at night."}, {"s": 1105.438, "e": 1106.856, "t": "When you come from that,"}, {"s": 1106.856, "e": 1110.276, "t": "you don't realise what a privilege it is."}, {"s": 1111.736, "e": 1114.238, "t": "My parents, they were\na bit off the beaten track"}, {"s": 1114.238, "e": 1116.157, "t": "in some of the things that they did."}, {"s": 1116.157, "e": 1119.243, "t": "We didn't have a television.\nThey wanted us to be outside."}, {"s": 1119.243, "e": 1121.913, "t": "We were running around barefoot."}, {"s": 1125.041, "e": 1126.584, "t": "I think what they didn't have"}, {"s": 1126.584, "e": 1130.213, "t": "in like money,\nthey made up for with a sense"}, {"s": 1130.213, "e": 1132.256, "t": "of togetherness"}, {"s": 1132.882, "e": 1134.175, "t": "and play."}, {"s": 1136.636, "e": 1140.097, "t": "Show is over."}, {"s": 1143.768, "e": 1147.563, "t": "So the only thing I knew\nto do was recreate some"}, {"s": 1147.563, "e": 1152.401, "t": "of those common threads of\nthe childhood that I was given."}, {"s": 1161.16, "e": 1162.703, "t": "Maggie?"}, {"s": 1163.621, "e": 1165.081, "t": "[Put your jacket on]"}, {"s": 1165.081, "e": 1166.499, "t": "Maggie?"}, {"s": 1175.007, "e": 1176.717, "t": "Initially I thought,\n\"Oh I'm gonna set this up"}, {"s": 1176.717, "e": 1180.68, "t": "and I'm gonna go back to college\nand run it on the side.\""}, {"s": 1183.307, "e": 1187.353, "t": "I wasn't trying to be\na mom and adopt kids."}, {"s": 1187.353, "e": 1190.273, "t": "I was trying to create a safe home."}, {"s": 1195.736, "e": 1198.197, "t": "But I completely fell in love with them."}, {"s": 1202.451, "e": 1206.08, "t": "And I realised I wanted\nto live there full time."}, {"s": 1206.08, "e": 1210.584, "t": "Hi everybody, it's my last\nnight in Mendham at home"}, {"s": 1210.584, "e": 1215.548, "t": "in the US and it will be\nfor probably a really long time."}, {"s": 1215.84, "e": 1219.093, "t": "I'm anxious to get back and see the kids."}, {"s": 1219.093, "e": 1223.639, "t": "[Namaste. Namaste.]"}, {"s": 1223.639, "e": 1227.226, "t": "Take care. I'm off for my little flight."}, {"s": 1227.226, "e": 1229.353, "t": "My little very,\nvery long flight."}, {"s": 1240.364, "e": 1241.198, "t": "Hey."}, {"s": 1243.117, "e": 1244.535, "t": "Hi everybody."}, {"s": 1244.535, "e": 1245.87, "t": "Hi."}, {"s": 1245.87, "e": 1247.246, "t": "Happy Saturday."}, {"s": 1247.246, "e": 1249.957, "t": "Navin Tiwari is here."}, {"s": 1250.374, "e": 1253.044, "t": "One day the kids came downstairs"}, {"s": 1254.17, "e": 1257.465, "t": "and they said, \"We've all talked about it"}, {"s": 1257.465, "e": 1260.634, "t": "and we've decided that\nwe wanna call you Mom.\""}, {"s": 1260.634, "e": 1264.722, "t": "- M-O-T-H-E-R, mother.\n- M-O-T-H-E-R, mother."}, {"s": 1264.722, "e": 1266.182, "t": "M-O-T-H-E-R, mother."}, {"s": 1266.182, "e": 1268.768, "t": "[Mother means “Mammu”]"}, {"s": 1269.602, "e": 1274.398, "t": "- B-R-O-T-H-E-R, brother.\n- B-R-O-T-H-E-R, brother."}, {"s": 1275.691, "e": 1279.236, "t": "- S-I-S-T-E-R, sister.\n- S-I-S-T-E-R, sister."}, {"s": 1279.236, "e": 1281.53, "t": "[Sister?]"}, {"s": 1291.832, "e": 1295.127, "t": "All right, ready again. Wow, Krishna."}, {"s": 1297.213, "e": 1299.382, "t": "In the early stage when\nthere were no caregivers"}, {"s": 1299.382, "e": 1302.301, "t": "and Maggie was the one that\nwas taking care of everything."}, {"s": 1303.761, "e": 1305.221, "t": "She did everything and more"}, {"s": 1305.221, "e": 1308.599, "t": "that a mother would do for a child."}, {"s": 1318.442, "e": 1319.819, "t": "Knowing what I know now,"}, {"s": 1319.819, "e": 1322.446, "t": "it should've been a lot more complicated."}, {"s": 1323.906, "e": 1326.2, "t": "It is a lot more complicated."}, {"s": 1362.194, "e": 1364.989, "t": "Because I was an outsider,"}, {"s": 1364.989, "e": 1367.658, "t": "I was really conscientious about"}, {"s": 1369.994, "e": 1374.415, "t": "how can I do justice to\nthe life that they won't have"}, {"s": 1375.416, "e": 1379.753, "t": "and what they've lost\nin terms of biological family?"}, {"s": 1386.552, "e": 1389.138, "t": "How do I keep their sense of identity"}, {"s": 1389.138, "e": 1391.849, "t": "and keep that connection alive?"}, {"s": 1399.815, "e": 1404.403, "t": "I can't erase any of their\ntrauma or what they've lost."}, {"s": 1406.697, "e": 1408.782, "t": "I also can't be 100%"}, {"s": 1409.658, "e": 1412.578, "t": "of what they're gonna miss out on."}, {"s": 1413.579, "e": 1416.582, "t": "But this is what we can do."}, {"s": 1416.582, "e": 1418.417, "t": "We can make holidays special."}, {"s": 1419.668, "e": 1421.587, "t": "We can remember their birthdays"}, {"s": 1421.587, "e": 1423.964, "t": "and make sure they have\na really good party."}, {"s": 1426.091, "e": 1427.635, "t": "Ha!"}, {"s": 1430.721, "e": 1432.097, "t": "We can make sure they could return"}, {"s": 1432.097, "e": 1435.559, "t": "to their villages whenever possible."}, {"s": 1435.559, "e": 1437.728, "t": "Bringing in the traditions into our home"}, {"s": 1437.728, "e": 1439.772, "t": "that they would've had."}, {"s": 1446.32, "e": 1449.156, "t": "And then creating our own family memories."}, {"s": 1487.152, "e": 1488.862, "t": "Hi my name is Krishna.\nI live in Kopila Valley Home."}, {"s": 1488.946, "e": 1490.948, "t": "Hi my name is Krishna.\nI live in Kopila Valley Home."}, {"s": 1504.003, "e": 1506.589, "t": "And over time, this little idea"}, {"s": 1506.589, "e": 1508.924, "t": "that was birthed out of love"}, {"s": 1510.884, "e": 1512.052, "t": "grew to a home"}, {"s": 1514.305, "e": 1515.848, "t": "with six caregivers"}, {"s": 1517.099, "e": 1518.225, "t": "and 50 kids."}, {"s": 1523.606, "e": 1525.024, "t": "Two, three."}, {"s": 1525.024, "e": 1526.859, "t": "Team Kopila!"}, {"s": 1568.692, "e": 1572.78, "t": "I got called out to the front gate"}, {"s": 1572.78, "e": 1575.616, "t": "and I saw a woman holding"}, {"s": 1575.616, "e": 1577.034, "t": "a sort of bundle."}, {"s": 1585.542, "e": 1589.046, "t": "I had never seen a baby that small."}, {"s": 1589.046, "e": 1592.591, "t": "Only two and a half, three pounds."}, {"s": 1600.683, "e": 1604.019, "t": "And I just rushed into like\nemergency mode, \"Is he alive?"}, {"s": 1604.019, "e": 1605.562, "t": "Is he dead? Where does he go?"}, {"s": 1605.562, "e": 1607.356, "t": "Where do I take him?\""}, {"s": 1613.612, "e": 1615.781, "t": "The recovery from\nmalnutrition isn't like, oh,"}, {"s": 1615.781, "e": 1616.99, "t": "just give them food and they're fine."}, {"s": 1616.99, "e": 1619.326, "t": "It's very complicated."}, {"s": 1620.786, "e": 1623.831, "t": "The first three weeks was\njust around-the-clock care."}, {"s": 1623.831, "e": 1626.208, "t": "We transferred him from\none hospital to another"}, {"s": 1626.208, "e": 1627.751, "t": "because they didn't have an incubator."}, {"s": 1627.751, "e": 1629.503, "t": "They didn't have oxygen."}, {"s": 1645.144, "e": 1647.521, "t": "I remember in those\nmoments of transferring,"}, {"s": 1647.521, "e": 1651.233, "t": "I was like, \"He's not gonna make it.\""}, {"s": 1655.946, "e": 1658.198, "t": "I didn't know anyone in Kathmandu."}, {"s": 1658.198, "e": 1659.7, "t": "I was completely alone."}, {"s": 1661.201, "e": 1663.871, "t": "And that's when he got serious again."}, {"s": 1669.293, "e": 1670.711, "t": "He was in and out of consciousness."}, {"s": 1670.711, "e": 1674.006, "t": "He had to be resuscitated,\nhe had to get put on oxygen,"}, {"s": 1674.006, "e": 1677.009, "t": "and I couldn't even go\nin there to see him."}, {"s": 1683.098, "e": 1684.516, "t": "Babies weren't living."}, {"s": 1684.516, "e": 1688.854, "t": "Like, they were carrying\nbodies out of the ICU."}, {"s": 1690.439, "e": 1692.691, "t": "So I was terrified of just letting him out"}, {"s": 1692.691, "e": 1695.36, "t": "of my sight for a single second."}, {"s": 1702.367, "e": 1705.412, "t": "Say hi to everybody."}, {"s": 1706.497, "e": 1708.415, "t": "- Yes.\n- Got good eyes. Big eyes."}, {"s": 1708.415, "e": 1710.167, "t": "He's doing so good."}, {"s": 1715.631, "e": 1717.841, "t": "So you guys are going home today?"}, {"s": 1717.841, "e": 1719.802, "t": "No we have to stay here."}, {"s": 1719.802, "e": 1723.68, "t": "Okay. For how many days?"}, {"s": 1723.68, "e": 1725.974, "t": "I don't know, we're out of the ICU,"}, {"s": 1725.974, "e": 1729.061, "t": "so I haven't held him in a long time."}, {"s": 1730.354, "e": 1732.105, "t": "Thank you. So mention her name, please."}, {"s": 1732.105, "e": 1734.817, "t": "- His name's Ravi.\n- Ravi."}, {"s": 1734.817, "e": 1738.946, "t": "Ravi is actually, it means,\nit is related to the sun."}, {"s": 1738.946, "e": 1741.49, "t": "- Yeah, sun.\n- It's like light."}, {"s": 1750.749, "e": 1752.835, "t": "baby."}, {"s": 1754.711, "e": 1757.464, "t": "Yeah."}, {"s": 1785.117, "e": 1789.162, "t": "♪ Twinkle twinkle little star ♪"}, {"s": 1789.162, "e": 1793.709, "t": "♪ How I wonder what you are ♪"}, {"s": 1793.709, "e": 1797.087, "t": "The whole house just\nmelted into him. Okay."}, {"s": 1797.462, "e": 1799.882, "t": "[Nothing will happen to, don’t worry.]"}, {"s": 1801.133, "e": 1805.721, "t": "Like angsty teens just like\ngiggling and peek-a-booing."}, {"s": 1807.472, "e": 1810.309, "t": "Never thought I could\nlove another human being"}, {"s": 1810.309, "e": 1812.394, "t": "so much until I met Ravi."}, {"s": 1816.899, "e": 1819.985, "t": "He used to come to my room\nand then jump into my bed"}, {"s": 1819.985, "e": 1821.987, "t": "and I would wake up."}, {"s": 1821.987, "e": 1823.488, "t": "- Hi Ravi.\n- Ravi?"}, {"s": 1824.865, "e": 1829.745, "t": "He would just bring\nthe entire family together."}, {"s": 1829.745, "e": 1831.788, "t": "Come on, Ravi. You can do it."}, {"s": 1831.788, "e": 1834.958, "t": "Believe in yourself."}, {"s": 1834.958, "e": 1836.585, "t": "Everything became such a big deal"}, {"s": 1836.585, "e": 1839.671, "t": "because we knew where he'd come from."}, {"s": 1840.631, "e": 1842.049, "t": "Ravi, a-ma-ma-ma."}, {"s": 1843.884, "e": 1846.678, "t": "Yeah. Can you say mama?"}, {"s": 1846.97, "e": 1848.347, "t": "- Mama.\n- Aw."}, {"s": 1849.431, "e": 1850.974, "t": "Mama."}, {"s": 1850.974, "e": 1852.517, "t": "Potato."}, {"s": 1852.517, "e": 1854.394, "t": "A-tato."}, {"s": 1855.479, "e": 1856.939, "t": "Potato."}, {"s": 1856.939, "e": 1857.981, "t": "A-tato."}, {"s": 1866.323, "e": 1868.158, "t": "- Yay!\n- Yay, Ravi."}, {"s": 1868.158, "e": 1871.745, "t": "♪ Happy birthday to you ♪"}, {"s": 1871.745, "e": 1875.457, "t": "♪ Happy birthday dear Ravi ♪"}, {"s": 1876.917, "e": 1879.503, "t": "This year's Humanitarian of the Year."}, {"s": 1879.503, "e": 1881.004, "t": "I am shocked."}, {"s": 1881.004, "e": 1883.382, "t": "I just got in from Nepal,\nas you can imagine."}, {"s": 1883.382, "e": 1884.383, "t": "It's the exact opposite."}, {"s": 1884.383, "e": 1886.218, "t": "It's the exact opposite."}, {"s": 1886.218, "e": 1891.223, "t": "I want to give the $100,000\nprize to Maggie Doyne."}, {"s": 1893.433, "e": 1895.936, "t": "Every penny of this $100,000"}, {"s": 1897.27, "e": 1899.648, "t": "to the life of children in Nepal."}, {"s": 1902.401, "e": 1904.569, "t": "As a mother, as a CEO,"}, {"s": 1904.569, "e": 1907.28, "t": "and as a leader, I was just coming into"}, {"s": 1907.28, "e": 1909.449, "t": "the woman I wanted to be.\nHonoured to present"}, {"s": 1909.449, "e": 1913.704, "t": "the Forbes Excellence Award\nin Education to Maggie Doyne."}, {"s": 1914.538, "e": 1917.708, "t": "I really do believe in\nthe need in our world"}, {"s": 1917.708, "e": 1921.67, "t": "to expand our definition\nof what family is."}, {"s": 1921.67, "e": 1923.13, "t": "There were only two standing ovations"}, {"s": 1923.13, "e": 1926.967, "t": "the whole day, there was\nWarren Buffet and Maggie Doyne."}, {"s": 1927.843, "e": 1929.594, "t": "374\n00:32:09,594 --> 00:32:11,805\nand I was just like,\n\"What am I doing here?\""}, {"s": 1931.805, "e": 1933.682, "t": "Hi. Hello."}, {"s": 1933.682, "e": 1935.767, "t": "How wonderful that he's doing so well now."}, {"s": 1935.767, "e": 1938.687, "t": "He's totally fine and recovered."}, {"s": 1938.687, "e": 1940.689, "t": "But you're 28."}, {"s": 1940.689, "e": 1942.941, "t": "You have the responsibility\nof over 50 children"}, {"s": 1942.941, "e": 1944.651, "t": "and one baby."}, {"s": 1944.651, "e": 1946.653, "t": "Don't you ever compare yourself sometimes"}, {"s": 1946.653, "e": 1948.655, "t": "with other 28 year olds?"}, {"s": 1949.698, "e": 1950.699, "t": "All the time."}, {"s": 1950.699, "e": 1953.869, "t": "You look at your friends\nstarting to get married"}, {"s": 1953.869, "e": 1956.788, "t": "and have, you know, that lifestyle."}, {"s": 1958.373, "e": 1960.25, "t": "I mean, imagine what\nmy online dating profile"}, {"s": 1960.25, "e": 1962.878, "t": "would look like, my Tinder."}, {"s": 1962.878, "e": 1966.798, "t": "51 children, who wants to date me?"}, {"s": 1966.798, "e": 1971.386, "t": "♪ We love each other like\na sister or a brother ♪"}, {"s": 1971.386, "e": 1974.389, "t": "♪ Because we are one family ♪"}, {"s": 1974.389, "e": 1975.474, "t": "Ladies and gentlemen,"}, {"s": 1975.474, "e": 1977.893, "t": "the 2015 CNN Hero of the Year"}, {"s": 1979.728, "e": 1981.521, "t": "is Maggie Doyne."}, {"s": 1996.578, "e": 2000.832, "t": "I am so incredibly honoured\nto accept this award"}, {"s": 2000.832, "e": 2005.003, "t": "on behalf of all of my little\nheroes in Nepal at Kopila."}, {"s": 2005.003, "e": 2008.715, "t": "I draw all of my inspiration from them."}, {"s": 2008.715, "e": 2011.343, "t": "I'm also so grateful\nto my co-founder, Tope,"}, {"s": 2011.343, "e": 2013.678, "t": "who's with me here tonight."}, {"s": 2013.678, "e": 2017.724, "t": "We cannot lose sight of the task at hand."}, {"s": 2019.518, "e": 2022.229, "t": "[If one Maggie can help all these kids]"}, {"s": 2022.229, "e": 2025.607, "t": "[Imagine how many kids you will help.]"}, {"s": 2026.733, "e": 2028.151, "t": "One day these all kids will be educated"}, {"s": 2028.819, "e": 2031.279, "t": "My co-founder on the\nstage means I'm there."}, {"s": 2033.24, "e": 2035.325, "t": "That was very painful for our family."}, {"s": 2035.325, "e": 2037.577, "t": "this area will be changed."}, {"s": 2088.545, "e": 2091.631, "t": "Ravi woke up from his nap."}, {"s": 2093.55, "e": 2096.72, "t": "I handed him off to one of the aunties"}, {"s": 2098.68, "e": 2103.143, "t": "and then she put him in\nthe playpen with all the kids."}, {"s": 2104.019, "e": 2108.648, "t": "One of the kids took him and\nput him outside the play area."}, {"s": 2111.276, "e": 2116.281, "t": "10 minutes later, I just\nheard screams and Padam ran up."}, {"s": 2116.74, "e": 2120.368, "t": "I knew by the look\nof horror on Padam face,"}, {"s": 2120.368, "e": 2122.537, "t": "someone was dead or dying."}, {"s": 2128.21, "e": 2129.836, "t": "He was just all wet."}, {"s": 2130.754, "e": 2134.841, "t": "I got him and I immediately started CPR."}, {"s": 2141.932, "e": 2142.849, "t": "He was limp"}, {"s": 2144.017, "e": 2145.685, "t": "and not coming back."}, {"s": 2152.484, "e": 2155.278, "t": "It's a horrible way for a person to die,"}, {"s": 2155.278, "e": 2157.364, "t": "drowning in a septic pit."}, {"s": 2178.969, "e": 2183.974, "t": "The next thing I remember\nis they were carrying me home"}, {"s": 2184.224, "e": 2188.27, "t": "and the kids all being at\nthe gate screaming and crying."}, {"s": 2192.983, "e": 2197.988, "t": "I kept saying, \"We're still\na family. We're still a family.\""}, {"s": 2199.99, "e": 2201.992, "t": "I just started to lose my mind."}, {"s": 2208.79, "e": 2211.668, "t": "Why do you wake up from\nthe nap at that exact second?"}, {"s": 2211.668, "e": 2214.796, "t": "He was fussy. Why didn't\nI just keep him on my chest?"}, {"s": 2214.796, "e": 2217.048, "t": "Why did she leave him\nto go heat up the mill?"}, {"s": 2217.048, "e": 2218.967, "t": "Why was nobody else\nlooking around to see him?"}, {"s": 2218.967, "e": 2220.844, "t": "Where were all the\nother aunties and uncles?"}, {"s": 2220.844, "e": 2222.429, "t": "Why was the gate left open?"}, {"s": 2222.429, "e": 2224.014, "t": "Why did the kids take\nhim out of the plane?"}, {"s": 2224.014, "e": 2227.517, "t": "Why did I feel. Why did she go there?"}, {"s": 2234.065, "e": 2235.817, "t": "Over and over and over again"}, {"s": 2235.817, "e": 2237.944, "t": "and I will every day until I die."}, {"s": 2248.496, "e": 2250.749, "t": "The was very painful for our family."}, {"s": 2254.461, "e": 2256.463, "t": "I dunno what punishment\nGod giving. I dunno."}, {"s": 2259.799, "e": 2260.633, "t": "So bad."}, {"s": 2264.095, "e": 2265.43, "t": "All family is sad."}, {"s": 2266.89, "e": 2268.141, "t": "All kids are crying."}, {"s": 2269.142, "e": 2270.477, "t": "Our happiness, all gone."}, {"s": 2288.328, "e": 2291.414, "t": "Maggie's mother and sister came here."}, {"s": 2294.084, "e": 2297.17, "t": "They are very worried about her life."}, {"s": 2301.883, "e": 2304.886, "t": "and we all say, \"Maggie,\ngo with your mother.\""}, {"s": 2354.477, "e": 2355.77, "t": "In that time,"}, {"s": 2356.229, "e": 2358.523, "t": "the whole family was devastated."}, {"s": 2362.235, "e": 2363.653, "t": "So it didn’t hurt."}, {"s": 2364.279, "e": 2366.281, "t": "I didn't remember so much from them"}, {"s": 2366.573, "e": 2368.158, "t": "So it didn't hurt."}, {"s": 2368.283, "e": 2370.201, "t": "But then when I lost Ravi"}, {"s": 2370.201, "e": 2371.202, "t": "Ravi, smile."}, {"s": 2371.202, "e": 2374.914, "t": "I'd seen him from what\nhe was when he first came."}, {"s": 2375.123, "e": 2376.708, "t": "- Such a player.\n- We raised him"}, {"s": 2376.708, "e": 2378.126, "t": "I never thought I would ever ever\nbe able to love someone like that."}, {"s": 2378.126, "e": 2380.044, "t": "I had such a hard time."}, {"s": 2381.254, "e": 2382.755, "t": "I never thought I would ever,"}, {"s": 2382.755, "e": 2386.009, "t": "ever be able to love someone like that."}, {"s": 2405.653, "e": 2407.739, "t": "When somebody passes away"}, {"s": 2407.739, "e": 2410.2, "t": "and you're in the same place,"}, {"s": 2411.826, "e": 2415.497, "t": "it's gonna come back\nto you again and again."}, {"s": 2423.004, "e": 2425.882, "t": "It was really hard for us"}, {"s": 2425.882, "e": 2429.385, "t": "because every time we'd\nsit where Ravi drowned and,"}, {"s": 2429.385, "e": 2430.845, "t": "you know, the memories would flash back"}, {"s": 2431.971, "e": 2433.598, "t": "you know, the memories\nwould come flooding back"}, {"s": 2433.598, "e": 2435.642, "t": "of us holding him and..."}, {"s": 2452.534, "e": 2453.576, "t": "Hey I just woke up."}, {"s": 2456.162, "e": 2457.664, "t": "I just woke up."}, {"s": 2459.207, "e": 2461.125, "t": "Just scared of everything."}, {"s": 2463.169, "e": 2466.005, "t": "I'm scared something's\ngonna happen to the kids."}, {"s": 2474.138, "e": 2477.058, "t": "I know when I left, I saw the fear"}, {"s": 2478.685, "e": 2480.228, "t": "in my children's eyes."}, {"s": 2482.73, "e": 2484.023, "t": "Hi Mom."}, {"s": 2484.023, "e": 2486.359, "t": "- Hi Mom.\n- I miss you all."}, {"s": 2489.32, "e": 2490.238, "t": "I love you."}, {"s": 2494.242, "e": 2498.037, "t": "I've seen people who\nhave suffered tragedies"}, {"s": 2498.037, "e": 2500.164, "t": "and just never recovered."}, {"s": 2501.874, "e": 2504.127, "t": "I keep saying I don't\nwanna be that person."}, {"s": 2504.127, "e": 2506.421, "t": "I don't wanna be that person."}, {"s": 2510.425, "e": 2513.386, "t": "A lot of children saying that"}, {"s": 2514.429, "e": 2517.14, "t": "the worst part of losing their sibling"}, {"s": 2518.641, "e": 2521.06, "t": "wasn't only losing their sibling."}, {"s": 2524.063, "e": 2526.983, "t": "It was losing their parent."}, {"s": 2531.738, "e": 2533.865, "t": "I told them I would come back."}, {"s": 2535.575, "e": 2538.453, "t": "I wanna show them\nthat we're still a family."}, {"s": 2548.504, "e": 2551.799, "t": "My work right now is just to stay alive."}, {"s": 2556.763, "e": 2557.597, "t": "One minute."}, {"s": 2560.183, "e": 2561.559, "t": "One moment."}, {"s": 2563.895, "e": 2565.48, "t": "one step at a time."}, {"s": 2576.866, "e": 2578.743, "t": "I would start by getting up"}, {"s": 2578.743, "e": 2581.329, "t": "and going down, making tea."}, {"s": 2581.329, "e": 2582.497, "t": "That was like my brave thing,"}, {"s": 2582.497, "e": 2585.625, "t": "'cause I couldn't get outta bed."}, {"s": 2585.625, "e": 2588.67, "t": "And then it was like I'm gonna\ngo back to the grocery store"}, {"s": 2588.878, "e": 2590.672, "t": "or I'm gonna do this thing that Ravi"}, {"s": 2590.672, "e": 2592.256, "t": "and I used to do together."}, {"s": 2594.717, "e": 2597.762, "t": "And then that ultimately led me to LA."}, {"s": 2600.181, "e": 2602.517, "t": "After we won CNN Heroes,"}, {"s": 2602.517, "e": 2606.02, "t": "they do this non-profit\ndevelopment training."}, {"s": 2606.896, "e": 2608.981, "t": "Ravi had been travelling with me,"}, {"s": 2609.774, "e": 2613.486, "t": "so I had everything booked\nfor me and the baby."}, {"s": 2619.701, "e": 2620.868, "t": "I love you, Mom."}, {"s": 2620.868, "e": 2622.328, "t": "I'll talk to you tomorrow. I love you too."}, {"s": 2623.621, "e": 2624.163, "t": "bye."}, {"s": 2624.706, "e": 2625.873, "t": "Bye."}, {"s": 2629.877, "e": 2633.089, "t": "And that was when I met Jeremy."}, {"s": 2645.101, "e": 2645.935, "t": "So good."}, {"s": 2650.398, "e": 2651.691, "t": "I was not in a place,"}, {"s": 2651.691, "e": 2654.527, "t": "especially given what I was going through,"}, {"s": 2654.527, "e": 2657.655, "t": "it just, we weren't\nthinking about it like that."}, {"s": 2660.074, "e": 2663.327, "t": "We made this plan\nto go out into the desert"}, {"s": 2664.37, "e": 2666.372, "t": "and that night I couldn't sleep."}, {"s": 2666.372, "e": 2669.083, "t": "I was still having PTSD"}, {"s": 2669.959, "e": 2672.42, "t": "and he just came and held me"}, {"s": 2672.42, "e": 2673.796, "t": "and he's like, do you want me to hold you"}, {"s": 2673.796, "e": 2675.214, "t": "until you fall asleep?"}, {"s": 2705.453, "e": 2706.621, "t": "I felt like"}, {"s": 2707.497, "e": 2709.373, "t": "an ounce of myself coming back."}, {"s": 2710.166, "e": 2711.667, "t": "little by little by little."}, {"s": 2717.006, "e": 2718.633, "t": "What day is today, Golang?"}, {"s": 2718.633, "e": 2719.467, "t": "Friday!"}, {"s": 2720.802, "e": 2721.928, "t": "Yeah I do make progress."}, {"s": 2721.928, "e": 2726.307, "t": "I wake up happy and then all of this shit."}, {"s": 2726.307, "e": 2730.019, "t": "and then right back,\nlike right back to where you started."}, {"s": 2730.019, "e": 2732.313, "t": "You're taking a video\nof me taking a video?"}, {"s": 2732.313, "e": 2734.607, "t": "- Next level.\n- I'm interviewing you."}, {"s": 2734.607, "e": 2735.566, "t": "I'm interviewing you."}, {"s": 2735.566, "e": 2737.235, "t": "I can handle it all with Ravi."}, {"s": 2737.235, "e": 2739.195, "t": "I just can't handle it without him, like."}, {"s": 2744.283, "e": 2746.786, "t": "- Hi Mom.\n- Nisha!"}, {"s": 2746.786, "e": 2748.704, "t": "- Hi Mom.\n- Hi Maya."}, {"s": 2750.665, "e": 2752.667, "t": "I know. Congratulations."}, {"s": 2752.667, "e": 2754.961, "t": "I can't wait to see all your report cards."}, {"s": 2763.678, "e": 2765.429, "t": "- Hi Mom.\n- Miss you."}, {"s": 2765.429, "e": 2766.931, "t": "Be healthy and strong, Maggie."}, {"s": 2766.931, "e": 2769.1, "t": "I need you to be strong now."}, {"s": 2769.1, "e": 2771.769, "t": "I promise I'm doing so much better."}, {"s": 2772.854, "e": 2773.521, "t": "I promise."}, {"s": 2774.355, "e": 2776.357, "t": "I get that everything is coming"}, {"s": 2776.357, "e": 2778.276, "t": "on your shoulders,\nbut I'm gonna be back soon"}, {"s": 2778.276, "e": 2780.403, "t": "and we'll be in it together again."}, {"s": 2780.403, "e": 2784.031, "t": "We're gonna be side by side\ndoing all this together. Okay?"}, {"s": 2785.283, "e": 2787.243, "t": "This is the worst time in my life."}, {"s": 2787.952, "e": 2789.161, "t": "I know it's been stressful."}, {"s": 2789.161, "e": 2792.123, "t": "I know it's been hard.\nI'm gonna be back on Sunday."}, {"s": 2792.29, "e": 2793.666, "t": "That's in three days."}, {"s": 2793.958, "e": 2795.668, "t": "Well even Nepali, like, husband and wives"}, {"s": 2795.668, "e": 2797.67, "t": "don't show affection in public."}, {"s": 2797.67, "e": 2799.297, "t": "You won't even be able\nto tell who's married."}, {"s": 2799.297, "e": 2800.673, "t": "It's very different."}, {"s": 2802.884, "e": 2803.843, "t": "How long has it been"}, {"s": 2804.802, "e": 2806.095, "t": "since you've seen them in person?"}, {"s": 2807.179, "e": 2808.097, "t": "Two months?"}, {"s": 2809.974, "e": 2811.267, "t": "Yeah."}, {"s": 2818.733, "e": 2821.777, "t": "The truth is that I\nwould be a mess if I lost"}, {"s": 2822.486, "e": 2824.447, "t": "any of my kids."}, {"s": 2825.406, "e": 2827.366, "t": "There's a huge part of me"}, {"s": 2827.366, "e": 2830.244, "t": "that feels like I've abandoned them"}, {"s": 2830.244, "e": 2833.039, "t": "and I just want them\nto know that I'm grateful"}, {"s": 2833.039, "e": 2835.374, "t": "for every little piece and part of them."}, {"s": 2845.927, "e": 2848.846, "t": "Dear Namraj, we have\nbeen attached at the hip"}, {"s": 2848.846, "e": 2850.264, "t": "since the day you came."}, {"s": 2850.264, "e": 2852.35, "t": "You were born on my birthday"}, {"s": 2852.35, "e": 2853.392, "t": "and you were the best birthday gift."}, {"s": 2853.392, "e": 2855.311, "t": "I met you when you were\nin your mama's tummy"}, {"s": 2855.311, "e": 2856.145, "t": "and your parents moved back."}, {"s": 2856.145, "e": 2858.814, "t": "Dear little Bishal,\nyou're always so brave."}, {"s": 2858.814, "e": 2863.361, "t": "Dear Pabitra, I love watching\nyour kind and sensitive."}, {"s": 2863.361, "e": 2865.446, "t": "Asmita, your sweetness is too much."}, {"s": 2865.446, "e": 2866.53, "t": "I love your smile."}, {"s": 2866.53, "e": 2868.908, "t": "Dear Kojari, from the\nmoment I saw you- thank you."}, {"s": 2868.908, "e": 2870.284, "t": "Thank you. Thank you."}, {"s": 2870.284, "e": 2873.204, "t": "Maya means love in Nepali and you-"}, {"s": 2873.204, "e": 2874.83, "t": "are one of the biggest loves of my life."}, {"s": 2874.83, "e": 2878.96, "t": "Dear Shanti, you have\nthe most beautiful eyes-"}, {"s": 2878.96, "e": 2882.129, "t": "dear Kalpana, I can't wait\nto see you again soon -"}, {"s": 2882.129, "e": 2884.715, "t": "Can you please sing more.\nYou have the most beautiful voice."}, {"s": 2884.715, "e": 2887.134, "t": "Dear Ganga. Dear Hari."}, {"s": 2887.343, "e": 2889.679, "t": "I told them I would come\nback and I wanna come back"}, {"s": 2889.679, "e": 2893.057, "t": "and I wanna be able to be there for them."}, {"s": 2893.057, "e": 2894.141, "t": "I don't know what it is-"}, {"s": 2894.141, "e": 2897.061, "t": "I know they're struggling\njust as much as I am."}, {"s": 2897.061, "e": 2898.813, "t": "You're elegant, you're intelligent."}, {"s": 2898.813, "e": 2900.189, "t": "Do you have any idea\nhow proud I am of you-"}, {"s": 2900.189, "e": 2903.192, "t": "You came to me when you were."}, {"s": 2903.192, "e": 2906.07, "t": "Try as I might- and prove\nto them that I'm gonna be okay,"}, {"s": 2906.07, "e": 2907.113, "t": "that we're gonna be okay,"}, {"s": 2907.113, "e": 2908.739, "t": "that we're all gonna get through this."}, {"s": 2908.739, "e": 2912.159, "t": "Dear- daughter- you came\nto me with those big bright eyes."}, {"s": 2912.159, "e": 2915.997, "t": "Goma, this is a- dear-\nI think I'm just scared."}, {"s": 2915.997, "e": 2917.039, "t": "Dear Krishna,"}, {"s": 2917.039, "e": 2919.125, "t": "your bond with your little sister"}, {"s": 2919.125, "e": 2920.251, "t": "and the way you always look out"}, {"s": 2920.251, "e": 2922.211, "t": "for her is the sweetest thing ever."}, {"s": 2922.211, "e": 2924.964, "t": "Dear Nisha, my love, my laughter,"}, {"s": 2924.964, "e": 2927.675, "t": "my heart, my joy."}, {"s": 2932.013, "e": 2934.39, "t": "I wanna show them\nthat we're still a family."}, {"s": 2995.785, "e": 2997.369, "t": "- Hi.\n- Jeremy."}, {"s": 2997.369, "e": 2999.08, "t": "- Namaste.\n- Did you drive here alone?"}, {"s": 2999.08, "e": 2999.663, "t": "Yeah. I did."}, {"s": 2999.663, "e": 3000.748, "t": "You did?"}, {"s": 3000.748, "e": 3001.916, "t": "How are you doing?"}, {"s": 3022.52, "e": 3025.106, "t": "We missed you so much."}, {"s": 3032.905, "e": 3035.116, "t": "Hi hi, guys."}, {"s": 3035.116, "e": 3036.867, "t": "I missed you so much."}, {"s": 3048.587, "e": 3050.422, "t": "- This is Jeremy.\n- Hi."}, {"s": 3055.845, "e": 3057.346, "t": "Thank you."}, {"s": 3058.722, "e": 3062.685, "t": "♪ Welcome, la la la la la la ♪"}, {"s": 3062.685, "e": 3067.69, "t": "♪ Very warm welcome, la la la la la ♪"}, {"s": 3067.69, "e": 3073.404, "t": "♪ We welcome you to Kopila, la la la ♪"}, {"s": 3074.155, "e": 3077.366, "t": "I'm so, so, so happy to be home."}, {"s": 3077.366, "e": 3079.66, "t": "I missed you all so much. It's crazy."}, {"s": 3079.66, "e": 3083.497, "t": "I thought about you every single day."}, {"s": 3083.497, "e": 3086.542, "t": "And I'm sorry for for not\nbeing here for a little bit,"}, {"s": 3086.542, "e": 3088.878, "t": "but I'm just so happy to be back."}, {"s": 3088.878, "e": 3092.423, "t": "We can talk more in smaller\ngroups when I stop crying."}, {"s": 3095.926, "e": 3097.261, "t": "I missed you."}, {"s": 3099.346, "e": 3101.765, "t": "- I missed you too.\n- Pictures."}, {"s": 3101.765, "e": 3103.058, "t": "Is this your room?"}, {"s": 3103.058, "e": 3105.519, "t": "Yeah. Who's in here?"}, {"s": 3105.519, "e": 3108.939, "t": "Me, Maya, Anjali and Kajori."}, {"s": 3108.939, "e": 3110.9, "t": "- Four.\n- Look, Mom."}, {"s": 3110.9, "e": 3115.446, "t": "I know, there's me\nand Nisha and Ravi. Yeah."}, {"s": 3116.488, "e": 3119.325, "t": "Where's your, are you still in blue?"}, {"s": 3119.325, "e": 3121.41, "t": "It's still so fresh."}, {"s": 3123.829, "e": 3126.707, "t": "I still think in my head\nthat he's still here."}, {"s": 3128.459, "e": 3130.127, "t": "It's only been three months."}, {"s": 3130.127, "e": 3132.004, "t": "Welcome to Maggie's Pad."}, {"s": 3134.798, "e": 3136.717, "t": "He's still their little brother."}, {"s": 3136.717, "e": 3139.303, "t": "Welcome back. Oh I love this."}, {"s": 3139.303, "e": 3141.639, "t": "This is so nice. Oh."}, {"s": 3143.224, "e": 3146.81, "t": "It's beautiful, welcome home."}, {"s": 3146.81, "e": 3149.063, "t": "Look at the stars you made."}, {"s": 3149.939, "e": 3151.607, "t": "Oh my gosh. We miss you so much."}, {"s": 3151.607, "e": 3153.776, "t": "Welcome home, Mom."}, {"s": 3153.776, "e": 3156.57, "t": "And we changed your blankets."}, {"s": 3156.57, "e": 3157.571, "t": "Oh I love it."}, {"s": 3157.571, "e": 3159.615, "t": "Oh should we all do a sleep-over tonight?"}, {"s": 3159.615, "e": 3162.076, "t": "Yes we can all go outside."}, {"s": 3162.076, "e": 3164.453, "t": "Thank you for getting my room ready."}, {"s": 3164.453, "e": 3167.164, "t": "Oh my gosh. I wanna read all the letters."}, {"s": 3172.294, "e": 3173.212, "t": "Mom?"}, {"s": 3173.212, "e": 3174.296, "t": "Yeah babe?"}, {"s": 3175.547, "e": 3177.508, "t": "All right, goodnight. Good night."}, {"s": 3177.508, "e": 3178.801, "t": "Love you."}, {"s": 3178.801, "e": 3181.595, "t": "- Love you.\n- Okay I'll be back."}, {"s": 3183.847, "e": 3186.35, "t": "They're all so cute."}, {"s": 3224.972, "e": 3225.889, "t": "Morning, how did you sleep?"}, {"s": 3227.224, "e": 3228.892, "t": "Morning, how did you sleep?"}, {"s": 3241.488, "e": 3244.158, "t": "♪ She's been my queen since we were 16 ♪"}, {"s": 3244.158, "e": 3247.286, "t": "♪ We want the same things,\nwe dream the same dreams ♪"}, {"s": 3247.286, "e": 3250.289, "t": "♪ All right ♪"}, {"s": 3250.289, "e": 3253.584, "t": "♪ All right ♪"}, {"s": 3253.584, "e": 3256.92, "t": "♪ I know, I know ♪"}, {"s": 3256.92, "e": 3260.549, "t": "♪ I know for sure ♪"}, {"s": 3260.549, "e": 3263.719, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3263.719, "e": 3266.68, "t": "♪ Everybody wanna take her heart away ♪"}, {"s": 3266.68, "e": 3269.683, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3269.683, "e": 3272.686, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3272.686, "e": 3275.898, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3275.898, "e": 3279.109, "t": "♪ Everybody wanna take her heart away ♪"}, {"s": 3279.109, "e": 3282.154, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3282.154, "e": 3285.908, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3285.908, "e": 3289.161, "t": "♪ I know, I know ♪"}, {"s": 3289.161, "e": 3292.164, "t": "♪ I know for sure ♪"}, {"s": 3292.164, "e": 3294.291, "t": "♪ Everybody wanna ♪ ♪ Everybody wanna ♪"}, {"s": 3294.291, "e": 3296.001, "t": "♪ steal my girl ♪"}, {"s": 3296.001, "e": 3299.129, "t": "♪ Everybody wanna take her heart away ♪"}, {"s": 3299.129, "e": 3301.84, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3312.684, "e": 3315.687, "t": "I still have triggers every day."}, {"s": 3316.855, "e": 3318.774, "t": "I'm horrified about something happening"}, {"s": 3318.774, "e": 3319.983, "t": "to one of those kids."}, {"s": 3322.277, "e": 3324.53, "t": "I think it's the nature of being a parent."}, {"s": 3326.615, "e": 3327.783, "t": "You have a physical heart"}, {"s": 3327.783, "e": 3329.952, "t": "that's living outside of your body."}, {"s": 3335.791, "e": 3337.751, "t": "And then you do it again\nand again and again."}, {"s": 3339.878, "e": 3341.672, "t": "Now I have all of them."}, {"s": 3344.633, "e": 3347.094, "t": "Anything can happen at any moment."}, {"s": 3350.931, "e": 3353.142, "t": "Do you choose to live your life thinking"}, {"s": 3353.142, "e": 3355.269, "t": "that your kids are gonna die?"}, {"s": 3356.27, "e": 3358.856, "t": "You can't. You can't live in fear."}, {"s": 3362.317, "e": 3366.738, "t": "The kids deserve a mom that's\nfun and can dance with them."}, {"s": 3370.659, "e": 3373.162, "t": "I wanna be the best\nmom I can be for the kids."}, {"s": 3376.457, "e": 3377.875, "t": "Are you worried about him?"}, {"s": 3378.375, "e": 3381.753, "t": "About him Like 40 feet\nup in the tree? Yeah."}, {"s": 3385.174, "e": 3387.092, "t": "We still have ways to go."}, {"s": 3390.179, "e": 3392.181, "t": "The big test will be,"}, {"s": 3392.181, "e": 3395.184, "t": "can you guys get off\nand on your own two feet?"}, {"s": 3404.693, "e": 3406.069, "t": "I got a scholarship"}, {"s": 3406.069, "e": 3410.741, "t": "to study at a high school\nin the Netherlands."}, {"s": 3412.117, "e": 3414.953, "t": "I remembered it being\nso difficult for me because"}, {"s": 3415.954, "e": 3417.206, "t": "Ravi passing in Nepal"}, {"s": 3417.206, "e": 3420.334, "t": "and then I had to go to\nthe Netherlands right after."}, {"s": 3424.88, "e": 3428.634, "t": "Nisha got added to a...\nWhat was it, like Facebook Chat?"}, {"s": 3428.634, "e": 3430.052, "t": "Yeah."}, {"s": 3430.052, "e": 3432.679, "t": "And where were all the kids from?"}, {"s": 3432.679, "e": 3434.89, "t": "Greece, Syria, Pakistan,"}, {"s": 3434.89, "e": 3437.851, "t": "Afghanistan, India, Belarus,"}, {"s": 3438.393, "e": 3441.522, "t": "and Ukraine, America."}, {"s": 3443.148, "e": 3444.608, "t": "Anything else that you're worried about?"}, {"s": 3444.608, "e": 3448.654, "t": "No I just don't know how I'm gonna do."}, {"s": 3449.112, "e": 3451.24, "t": "You've already gotten through so much, so"}, {"s": 3452.074, "e": 3453.116, "t": "change is hard."}, {"s": 3453.617, "e": 3455.244, "t": "It's going to be hard.\nYou can expect that."}, {"s": 3455.244, "e": 3457.829, "t": "But you'll also be able\nto get through anything."}, {"s": 3459.164, "e": 3460.499, "t": "Think about how cool it is that you get"}, {"s": 3460.499, "e": 3462.042, "t": "to live in Europe for a while."}, {"s": 3465.629, "e": 3467.172, "t": "- You nervous?\n- Yeah."}, {"s": 3475.305, "e": 3477.099, "t": "Forty-five minutes"}, {"s": 3477.099, "e": 3478.308, "t": "- What?\n- Half an hour left."}, {"s": 3478.308, "e": 3482.187, "t": "until I meet"}, {"s": 3482.187, "e": 3484.731, "t": "I don't know, 15 kids."}, {"s": 3486.817, "e": 3488.61, "t": "How do you feel?"}, {"s": 3488.61, "e": 3491.154, "t": "I told you, I'm gonna throw up."}, {"s": 3493.407, "e": 3494.533, "t": "This is so nice."}, {"s": 3494.533, "e": 3496.243, "t": "- Yeah.\n- It's exciting."}, {"s": 3496.243, "e": 3499.496, "t": "Yeah right? It's\na little emotional for me."}, {"s": 3499.496, "e": 3501.582, "t": "But I'll be okay."}, {"s": 3504.96, "e": 3506.92, "t": "I'll just tuck this in here."}, {"s": 3519.433, "e": 3520.684, "t": "Okay."}, {"s": 3521.768, "e": 3522.728, "t": "You gonna go over?"}, {"s": 3524.146, "e": 3524.98, "t": "Yeah."}, {"s": 3526.815, "e": 3528.15, "t": "Buh-bye."}, {"s": 3528.15, "e": 3529.484, "t": "I'll miss you."}, {"s": 3532.738, "e": 3533.989, "t": "I'm so proud of you."}, {"s": 3533.989, "e": 3536.533, "t": "Aw. Thank you, Mom."}, {"s": 3540.579, "e": 3542.205, "t": "I'm so proud of you."}, {"s": 3542.205, "e": 3543.457, "t": "I got so lucky."}, {"s": 3544.291, "e": 3545.125, "t": "Yeah."}, {"s": 3548.086, "e": 3549.463, "t": "You're being so brave. No, I'm fine."}, {"s": 3549.463, "e": 3550.547, "t": "I'm just so happy."}, {"s": 3550.547, "e": 3552.299, "t": "I'm so happy for you."}, {"s": 3553.133, "e": 3554.551, "t": "You're gonna be so good. Okay?"}, {"s": 3555.344, "e": 3555.969, "t": "You're gonna do great. Okay?"}, {"s": 3557.763, "e": 3559.264, "t": "I'm so proud of you."}, {"s": 3562.1, "e": 3563.977, "t": "I love you, I love you, love you."}, {"s": 3563.977, "e": 3565.854, "t": "I love you, I love you,\nI love you, I love you."}, {"s": 3565.854, "e": 3567.23, "t": "Work hard. Okay? Yeah."}, {"s": 3567.23, "e": 3568.982, "t": "If you need anything, just message me."}, {"s": 3568.982, "e": 3570.984, "t": "- Yeah.\n- Anything. Okay?"}, {"s": 3570.984, "e": 3572.527, "t": "- Mm.\n- Mm."}, {"s": 3595.342, "e": 3596.176, "t": "Okay."}, {"s": 3604.184, "e": 3605.727, "t": "What's going on? Are you okay?"}, {"s": 3605.727, "e": 3607.354, "t": "I miss Nisha today and"}, {"s": 3608.397, "e": 3611.316, "t": "doesn't feel right not having him."}, {"s": 3611.733, "e": 3613.902, "t": "I just miss like having\nhim in the backseat"}, {"s": 3613.902, "e": 3615.612, "t": "and I miss having him around."}, {"s": 3615.612, "e": 3618.281, "t": "I miss him in the stroller\nand I miss like having"}, {"s": 3618.281, "e": 3619.95, "t": "the diaper bag and"}, {"s": 3622.244, "e": 3623.537, "t": "will you me to sleep?"}, {"s": 3623.537, "e": 3625.747, "t": "I'm having bad thoughts today."}, {"s": 3628.583, "e": 3630.085, "t": "Can you hear?"}, {"s": 3630.085, "e": 3631.002, "t": "Mm-hmm."}, {"s": 3633.922, "e": 3636.174, "t": "The new moon. The one closer is Mars"}, {"s": 3636.174, "e": 3638.552, "t": "'cause it's quite a bit of a,"}, {"s": 3638.552, "e": 3640.262, "t": "is it a bit redder?"}, {"s": 3640.262, "e": 3642.597, "t": "You know, for me to be able to-"}, {"s": 3645.851, "e": 3647.728, "t": "- Good morning.\n- Good morning."}, {"s": 3652.733, "e": 3654.317, "t": "Did you miss your brothers?"}, {"s": 3660.031, "e": 3661.366, "t": "It's true. Okay."}, {"s": 3662.325, "e": 3663.16, "t": "You got a long way to go."}, {"s": 3663.16, "e": 3664.411, "t": "You got to take your time."}, {"s": 3666.246, "e": 3668.54, "t": "Jeremy, when are you going to marry?"}, {"s": 3668.54, "e": 3671.042, "t": "- Maggie.\n- When should I?"}, {"s": 3671.042, "e": 3672.419, "t": "Tonight."}, {"s": 3672.419, "e": 3674.129, "t": "Yeah today. Today, yeah."}, {"s": 3674.129, "e": 3674.963, "t": "I don't have any,"}, {"s": 3674.963, "e": 3676.047, "t": "I don't have a ring on me or anything."}, {"s": 3676.047, "e": 3677.674, "t": "Just buy a ring in the market."}, {"s": 3677.674, "e": 3679.134, "t": "- No, no.\n- Just bring a"}, {"s": 3679.134, "e": 3682.22, "t": "plastic rose and see like, \"Yes\""}, {"s": 3682.22, "e": 3683.764, "t": "and they'll dance."}, {"s": 3685.098, "e": 3686.808, "t": "Do you think everyone\nwould be okay with that?"}, {"s": 3686.808, "e": 3687.726, "t": "- Yeah.\n- Yeah, yeah-"}, {"s": 3687.726, "e": 3690.687, "t": "Everyone would be happy."}, {"s": 3720.842, "e": 3722.469, "t": "Hi everybody."}, {"s": 3722.469, "e": 3724.095, "t": "Hi."}, {"s": 3726.264, "e": 3727.557, "t": "Hi."}, {"s": 3727.557, "e": 3729.476, "t": "- Hi.\n- Can you hear us okay?"}, {"s": 3729.476, "e": 3730.852, "t": "- Yes.\n- Yeah."}, {"s": 3731.478, "e": 3733.73, "t": "So we have news."}, {"s": 3733.73, "e": 3735.857, "t": "Jeremy asked me to marry him,"}, {"s": 3735.857, "e": 3738.527, "t": "so we're gonna get married in Nepal."}, {"s": 3753.542, "e": 3756.086, "t": "Let's have breakfast first\nand go to our room."}, {"s": 3774.521, "e": 3777.232, "t": "I've been here with you for 10 years,"}, {"s": 3777.232, "e": 3779.818, "t": "like more years than I have spent time"}, {"s": 3779.818, "e": 3782.863, "t": "with my like biological family."}, {"s": 3782.863, "e": 3786.491, "t": "Does it feel like it's\nsort of a new chapter?"}, {"s": 3787.367, "e": 3789.077, "t": "It's a new chapter for me."}, {"s": 3790.37, "e": 3792.873, "t": "I've grown from a kid to a young adult"}, {"s": 3795.083, "e": 3798.92, "t": "and now it's time for\nme to be more of myself"}, {"s": 3799.754, "e": 3801.882, "t": "and less dependent on others."}, {"s": 3810.557, "e": 3811.474, "t": "Good job."}, {"s": 3812.475, "e": 3814.436, "t": "Like I felt very sad"}, {"s": 3815.437, "e": 3818.023, "t": "and I realised like\nhow important family is."}, {"s": 3829.91, "e": 3836.333, "t": "Krishna, Krishna!"}, {"s": 3836.333, "e": 3838.293, "t": "Krishna,"}, {"s": 3838.293, "e": 3839.586, "t": "every single memory"}, {"s": 3839.586, "e": 3842.422, "t": "that I have here has you in it."}, {"s": 3842.422, "e": 3844.132, "t": "From the early, early days"}, {"s": 3844.132, "e": 3847.552, "t": "when you are really, really small."}, {"s": 3847.552, "e": 3849.387, "t": "It's not gonna be the same without you."}, {"s": 3849.387, "e": 3852.432, "t": "I'm gonna hate it when I\nwake up and you're not here."}, {"s": 3853.141, "e": 3855.56, "t": "We all built this home together."}, {"s": 3855.936, "e": 3858.772, "t": "We carried every brick up\nand made all the rules"}, {"s": 3858.772, "e": 3861.232, "t": "and decided how we wanted\nto be as a family."}, {"s": 3861.232, "e": 3862.776, "t": "So I just thank you."}, {"s": 3863.401, "e": 3866.112, "t": "I'm gonna miss every single moment."}, {"s": 3867.238, "e": 3868.156, "t": "I love you."}, {"s": 3880.752, "e": 3883.922, "t": "For me it's the people\nthat makes the family."}, {"s": 3890.637, "e": 3893.682, "t": "You don't have to be related with blood"}, {"s": 3894.933, "e": 3896.601, "t": "to build up a connection."}, {"s": 3898.269, "e": 3901.523, "t": "Like as strong as we,\nKopila kids have built up together."}, {"s": 3905.944, "e": 3907.737, "t": "[I'm moving out.]"}, {"s": 3907.737, "e": 3909.364, "t": "[Moving up.]"}, {"s": 3943.481, "e": 3944.441, "t": "Aw."}, {"s": 3947.694, "e": 3949.404, "t": "Look, if you count\nthe spots on their back,"}, {"s": 3949.404, "e": 3951.573, "t": "you know how old they are."}, {"s": 3953.908, "e": 3956.411, "t": "We'd waited such a long time."}, {"s": 3956.411, "e": 3959.998, "t": "We hadn't taken in any new kids\nduring that grieving period of"}, {"s": 3960.665, "e": 3961.875, "t": "about a year."}, {"s": 3966.963, "e": 3968.965, "t": "But I was thinking\na lot about the other kids"}, {"s": 3968.965, "e": 3971.885, "t": "and how they would do\nwith having another baby,"}, {"s": 3971.885, "e": 3975.972, "t": "making sure that she didn't feel like"}, {"s": 3989.069, "e": 3993.239, "t": "Tope got a call about an emergency case"}, {"s": 3993.239, "e": 3995.033, "t": "from the local government."}, {"s": 4003.083, "e": 4006.669, "t": "The best place that a child can be"}, {"s": 4006.669, "e": 4009.464, "t": "is in their community with their family."}, {"s": 4011.091, "e": 4014.094, "t": "But in the event that a child is not safe,"}, {"s": 4014.094, "e": 4016.179, "t": "that a child has no place, nowhere to go,"}, {"s": 4016.179, "e": 4019.516, "t": "no one to care for them,\nwe do need an option,"}, {"s": 4019.516, "e": 4021.726, "t": "and we have to make\nthose really tough calls,"}, {"s": 4021.726, "e": 4023.853, "t": "and we do that with the\nsupport of social workers,"}, {"s": 4023.853, "e": 4026.981, "t": "with counsellors, with community leaders."}, {"s": 4026.981, "e": 4030.068, "t": "And it is not a decision\nthat we take lightly."}, {"s": 4035.031, "e": 4036.866, "t": "We'd done a thousand other things"}, {"s": 4036.866, "e": 4039.953, "t": "before that child has come into the home"}, {"s": 4039.953, "e": 4043.665, "t": "and yet 2% of the time we have\nto make that intervention."}, {"s": 4043.665, "e": 4045.792, "t": "And this is the absolute last resort."}, {"s": 4045.792, "e": 4047.794, "t": "Not close to the city, no access to water."}, {"s": 4047.794, "e": 4049.504, "t": "There's not even a hospital to walk to"}, {"s": 4049.504, "e": 4051.506, "t": "or a school, like anything."}, {"s": 4057.011, "e": 4057.971, "t": "This is the house"}, {"s": 4059.722, "e": 4061.307, "t": "out in the middle of nowhere."}, {"s": 4062.976, "e": 4064.269, "t": "[There's the house, sir.]"}, {"s": 4064.269, "e": 4065.562, "t": "[That one?]"}, {"s": 4071.901, "e": 4073.361, "t": "[Do the kids know what happened to their mother?]"}, {"s": 4074.696, "e": 4077.24, "t": "[No. The kids don't know. They were sleeping.]"}, {"s": 4079.367, "e": 4081.286, "t": "[Nobody else was here at night.]"}, {"s": 4081.286, "e": 4083.413, "t": "[Just the mother and the two girls.]"}, {"s": 4093.339, "e": 4096.926, "t": "[Peek-a-boo! Peek-a-boo.]"}, {"s": 4096.926, "e": 4098.511, "t": "Mommy."}, {"s": 4100.221, "e": 4102.14, "t": "Peek-a-boo."}, {"s": 4109.981, "e": 4112.65, "t": "[We'll go in the car, okay?]"}, {"s": 4142.18, "e": 4146.893, "t": "Say hi. It's a baby girl."}, {"s": 4148.102, "e": 4149.562, "t": "Guess what her name is?"}, {"s": 4149.896, "e": 4151.522, "t": "Khusi. [Happy]"}, {"s": 4151.856, "e": 4153.524, "t": "Happy"}, {"s": 4154.734, "e": 4156.611, "t": "That's Khusbu [Smells Good]."}, {"s": 4156.611, "e": 4158.696, "t": "- Khusbu.\n- Khusbu"}, {"s": 4159.197, "e": 4160.698, "t": "It's really important that we take all"}, {"s": 4160.698, "e": 4164.244, "t": "the small things out of the house again,"}, {"s": 4164.244, "e": 4165.787, "t": "all the things that could go,"}, {"s": 4165.787, "e": 4166.996, "t": "she could put in her mouth"}, {"s": 4166.996, "e": 4171.376, "t": "and the next couple days,\nwe need everybody's help, okay?"}, {"s": 4180.593, "e": 4182.262, "t": "Khusi's name is happy."}, {"s": 4182.971, "e": 4185.265, "t": "She literally brought that\ninto our home again at a time"}, {"s": 4185.265, "e": 4187.85, "t": "when we thought we'll\nnever be able to love"}, {"s": 4187.85, "e": 4190.853, "t": "a baby the way that we loved him."}, {"s": 4194.19, "e": 4196.609, "t": "I remember telling the kids,\n\"We're still a family,"}, {"s": 4196.609, "e": 4198.027, "t": "we're still a family,\nwe're still a family.\""}, {"s": 4198.027, "e": 4200.738, "t": "And I think bringing Khusi and Khusbu in"}, {"s": 4200.738, "e": 4204.2, "t": "and showing them\nthat we could continue on,"}, {"s": 4205.618, "e": 4209.122, "t": "that made us believe\nthat we can do it again."}, {"s": 4210.999, "e": 4213.459, "t": "We're gonna get a whole\nnew women's centre wardrobe."}, {"s": 4269.974, "e": 4271.642, "t": "What's finished?"}, {"s": 4271.642, "e": 4274.228, "t": "- Experiment.\n- Your experiment's finished?"}, {"s": 4274.562, "e": 4276.439, "t": "Do you need some matches or..."}, {"s": 4278.066, "e": 4280.735, "t": "Santosh, seriously,\ndon't light anything on fire."}, {"s": 4281.444, "e": 4284.155, "t": "Everyone hug everyone."}, {"s": 4285.573, "e": 4289.66, "t": "I was going through my\nown inner grief and shame"}, {"s": 4289.66, "e": 4291.537, "t": "and feeling like a failure."}, {"s": 4292.038, "e": 4293.414, "t": "I love you guys."}, {"s": 4293.414, "e": 4295.5, "t": "- We love you.\n- Love you too."}, {"s": 4295.5, "e": 4297.585, "t": "I'll be back really soon."}, {"s": 4297.585, "e": 4300.63, "t": "While also being like,\n\"Okay let's somehow get back"}, {"s": 4300.63, "e": 4302.048, "t": "to this old you"}, {"s": 4303.216, "e": 4304.509, "t": "who's still the CEO"}, {"s": 4304.509, "e": 4306.511, "t": "of a major organisation."}, {"s": 4308.888, "e": 4313.101, "t": "We're running a huge community\nschool, a women's centre,"}, {"s": 4313.101, "e": 4315.061, "t": "a safe home for girls."}, {"s": 4315.061, "e": 4318.189, "t": "We were a team of 125 people."}, {"s": 4318.189, "e": 4321.859, "t": "All entirely reliant on me"}, {"s": 4321.859, "e": 4323.027, "t": "and my ability to get out"}, {"s": 4323.027, "e": 4326.322, "t": "and fundraise and keep our family going."}, {"s": 4331.369, "e": 4335.373, "t": "I didn't know if I could\never get up and talk again."}, {"s": 4344.632, "e": 4347.385, "t": "Good morning, everybody.\nThis is a really remarkable room."}, {"s": 4347.385, "e": 4349.178, "t": "MLK actually gave a speech here,"}, {"s": 4349.178, "e": 4352.723, "t": "so did Hillary Clinton\nand today Maggie Doyne."}, {"s": 4359.981, "e": 4362.9, "t": "This is the first talk\nthat I've given in a while."}, {"s": 4365.153, "e": 4368.322, "t": "Love is, love is a beautiful thing"}, {"s": 4369.073, "e": 4371.909, "t": "and it's the thing\nthat we have to hold onto"}, {"s": 4371.909, "e": 4373.786, "t": "and the only thing that will ever,"}, {"s": 4373.786, "e": 4376.247, "t": "in a million years, heal\nthe world with the state"}, {"s": 4376.247, "e": 4377.582, "t": "that we're in."}, {"s": 4380.918, "e": 4382.336, "t": "So?"}, {"s": 4393.014, "e": 4394.056, "t": "You wanna see it?"}, {"s": 4394.432, "e": 4395.975, "t": "What does it say?"}, {"s": 4398.186, "e": 4399.645, "t": "I'm pregnant."}, {"s": 4400.438, "e": 4401.981, "t": "It says..."}, {"s": 4404.484, "e": 4405.443, "t": "Oh my God."}, {"s": 4411.115, "e": 4412.825, "t": "Honestly, you lie to me.\nI know you lie to me."}, {"s": 4412.825, "e": 4414.118, "t": "Maggie, excuse me."}, {"s": 4414.285, "e": 4415.912, "t": "- I'm not lying.\n- Should I pinch you?"}, {"s": 4415.912, "e": 4417.872, "t": "Are you lying me? You lying me."}, {"s": 4417.872, "e": 4419.207, "t": "You don't lie me, Maggie."}, {"s": 4419.207, "e": 4420.5, "t": "What do you want me to swear on?"}, {"s": 4420.5, "e": 4421.542, "t": "I'm four months."}, {"s": 4426.589, "e": 4428.925, "t": "Do you think I could\nhave the baby in Surkhet"}, {"s": 4428.925, "e": 4430.593, "t": "or that I should go back to America?"}, {"s": 4430.593, "e": 4432.428, "t": "If you have that baby in the Us,"}, {"s": 4432.428, "e": 4434.305, "t": "then you have more safe."}, {"s": 4434.555, "e": 4436.724, "t": "Here, a lot of people dying like this."}, {"s": 4442.897, "e": 4446.984, "t": "But for the NGO, your role\nwill be same or different?"}, {"s": 4451.239, "e": 4452.99, "t": "Hey!"}, {"s": 4453.407, "e": 4455.952, "t": "Hi Ganga, hey, Nav."}, {"s": 4456.994, "e": 4459.121, "t": "Oh look at that tooth?"}, {"s": 4459.121, "e": 4461.374, "t": "Did you get a new tooth? Lemme see."}, {"s": 4462.833, "e": 4465.044, "t": "Can I see?"}, {"s": 4465.044, "e": 4465.878, "t": "Hi!"}, {"s": 4467.338, "e": 4468.422, "t": "I want."}, {"s": 4468.422, "e": 4469.84, "t": "What are you doing?"}, {"s": 4469.84, "e": 4472.301, "t": "My biological children of the future"}, {"s": 4472.301, "e": 4473.761, "t": "to grow up with you all."}, {"s": 4474.971, "e": 4477.598, "t": "They're gonna be the luckiest kids ever."}, {"s": 4477.598, "e": 4480.434, "t": "How many kids get to come\ninto a family like ours"}, {"s": 4480.434, "e": 4484.105, "t": "that have all of these\nbrothers and sisters?"}, {"s": 4485.481, "e": 4486.899, "t": "All of that love?"}, {"s": 4505.209, "e": 4505.751, "t": "One day"}, {"s": 4505.751, "e": 4507.086, "t": "our mom brought a kind"}, {"s": 4507.086, "e": 4507.962, "t": "She didn’t even have to tell us"}, {"s": 4507.962, "e": 4509.922, "t": "She didn’t even have to tell us"}, {"s": 4510.298, "e": 4512.466, "t": "Introduced him as a friend."}, {"s": 4512.466, "e": 4513.843, "t": "Turned out to be a lover."}, {"s": 4515.761, "e": 4517.346, "t": "She didn't even have to tell us"}, {"s": 4517.346, "e": 4520.099, "t": "'cause her feelings were so outspoken."}, {"s": 4520.099, "e": 4521.809, "t": "She doesn't know how to hide them."}, {"s": 4521.809, "e": 4523.769, "t": "That's what I adore the most about her."}, {"s": 4524.729, "e": 4526.23, "t": "Family hug."}, {"s": 4543.623, "e": 4545.458, "t": "Okay ready? Try it."}, {"s": 4555.968, "e": 4558.888, "t": "[Come on, Khusi.]"}, {"s": 4558.888, "e": 4562.725, "t": "Khusi, Khusi, Khusi, Khus,\nyou can do it. Come on."}, {"s": 4562.725, "e": 4564.185, "t": "You can do it. Look."}, {"s": 4591.837, "e": 4595.007, "t": "I knew motherhood in this dimension,"}, {"s": 4602.014, "e": 4604.642, "t": "but I had never experienced birth."}, {"s": 4609.98, "e": 4611.732, "t": "I was just so scared."}, {"s": 4613.984, "e": 4617.321, "t": "Scared that it was just\ngonna be one more thing"}, {"s": 4617.321, "e": 4620.449, "t": "that I would love that\nwould just get taken away."}, {"s": 4626.747, "e": 4629.542, "t": "But also that's the risk\nthat we take by loving."}, {"s": 4633.212, "e": 4636.173, "t": "Who are you? Who are you?"}, {"s": 4637.258, "e": 4640.344, "t": "I feel like it's a good thing\nwe're leaving at eight months."}, {"s": 4641.053, "e": 4644.64, "t": "It just stinks that the kids\ncan't meet the baby right away."}, {"s": 4644.64, "e": 4647.226, "t": "That's the only hard part."}, {"s": 4648.519, "e": 4650.271, "t": "Everybody's here?"}, {"s": 4651.147, "e": 4653.399, "t": "Group hug."}, {"s": 4653.399, "e": 4655.276, "t": "- Group group.\n- Group hug."}, {"s": 4657.611, "e": 4658.904, "t": "[Come over!]"}, {"s": 4660.156, "e": 4661.407, "t": "I love you."}, {"s": 4662.616, "e": 4663.617, "t": "Bye."}, {"s": 4663.617, "e": 4664.452, "t": "Bye."}, {"s": 4667.913, "e": 4669.081, "t": "Okay. I think it's a good decision."}, {"s": 4669.081, "e": 4670.082, "t": "I feel good."}, {"s": 4671.125, "e": 4672.042, "t": "But I'm not dilating."}, {"s": 4672.042, "e": 4673.753, "t": "I'm not gonna do this for eight days."}, {"s": 4673.753, "e": 4674.92, "t": "No totally."}, {"s": 4676.756, "e": 4678.591, "t": "You gave it everything."}, {"s": 4678.591, "e": 4680.217, "t": "I just want the baby okay."}, {"s": 4680.217, "e": 4681.051, "t": "Totally."}, {"s": 4681.969, "e": 4683.471, "t": "Okay. Thank you."}, {"s": 4685.055, "e": 4686.223, "t": "Okay. Buh-bye."}, {"s": 4687.683, "e": 4689.81, "t": "He wants to do a C-section."}, {"s": 4689.81, "e": 4691.02, "t": "Get the baby out, baby's struggling."}, {"s": 4692.229, "e": 4694.315, "t": "Get the baby out, baby's struggling."}, {"s": 4727.264, "e": 4728.516, "t": "- Gosh.\n- 22."}, {"s": 4728.516, "e": 4731.06, "t": "- It's baby girl.\n- Oh!"}, {"s": 4737.691, "e": 4739.36, "t": "- Is she crying?\n- What was that?"}, {"s": 4739.36, "e": 4740.528, "t": "Little baby."}, {"s": 4741.529, "e": 4742.404, "t": "But she's good."}, {"s": 4748.285, "e": 4751.831, "t": "Have the tests back and it seems like"}, {"s": 4751.831, "e": 4754.416, "t": "the infection is spreading."}, {"s": 4754.416, "e": 4755.96, "t": "They don't know what's causing it."}, {"s": 4758.337, "e": 4760.005, "t": "I just wanna get outta this hospital"}, {"s": 4761.924, "e": 4765.928, "t": "and I want our little\nbaby girl to to be healthy"}, {"s": 4765.928, "e": 4768.764, "t": "and I wanna be able to sleep\nin the same room as her."}, {"s": 4776.146, "e": 4777.022, "t": "What's wrong?"}, {"s": 4777.481, "e": 4778.732, "t": "I wanna go home."}, {"s": 4795.875, "e": 4796.709, "t": "Okay."}, {"s": 4816.103, "e": 4818.188, "t": "We're going home."}, {"s": 4819.481, "e": 4822.234, "t": "I'm going to that side. Hey Mom."}, {"s": 4822.234, "e": 4825.321, "t": "Hi my little cuties,"}, {"s": 4825.321, "e": 4826.488, "t": "how are you?"}, {"s": 4827.781, "e": 4829.992, "t": "I see a little Khusi."}, {"s": 4829.992, "e": 4834.288, "t": "Hi Khusi. Khusi,\ndo you wanna see Ruby Sunshine?"}, {"s": 4834.705, "e": 4836.04, "t": "That's Ruby."}, {"s": 4836.916, "e": 4837.917, "t": "[Little sister.]"}, {"s": 4838.208, "e": 4839.627, "t": "[Your little sister.]"}, {"s": 4841.128, "e": 4843.881, "t": "Ruby's middle name is Sunshine."}, {"s": 4845.007, "e": 4848.469, "t": "It's just a simple way to honour Ravi,"}, {"s": 4849.219, "e": 4853.223, "t": "whose name meant sunlight, sunshine."}, {"s": 4854.266, "e": 4854.934, "t": "Look."}, {"s": 4875.371, "e": 4876.413, "t": "Hello."}, {"s": 4878.999, "e": 4881.21, "t": "Say hi, aw."}, {"s": 4887.841, "e": 4889.551, "t": "It's good to see you."}, {"s": 4889.551, "e": 4892.012, "t": "You look so grown up."}, {"s": 4902.064, "e": 4903.232, "t": "Nisha Gharti."}, {"s": 4919.498, "e": 4921.166, "t": "Did you pack up your\nphotos and everything?"}, {"s": 4921.166, "e": 4922.626, "t": "Everything."}, {"s": 4930.509, "e": 4932.678, "t": "How are you, uncle! Yeah."}, {"s": 4934.513, "e": 4935.848, "t": "Hi auntie, hi, hello."}, {"s": 4939.351, "e": 4940.477, "t": "Hi hello."}, {"s": 4951.155, "e": 4955.868, "t": "Oh my God. Oh my goodness."}, {"s": 4955.868, "e": 4958.078, "t": "[Thank you.]"}, {"s": 4958.078, "e": 4960.789, "t": "Namaste! [The youngest Daughter.]"}, {"s": 4960.789, "e": 4963.083, "t": "[There she is.]"}, {"s": 4964.418, "e": 4965.252, "t": "[Thank you.]"}, {"s": 4966.795, "e": 4968.422, "t": "Khusi!"}, {"s": 4970.049, "e": 4971.258, "t": "Say hi."}, {"s": 4974.428, "e": 4975.846, "t": "She's so big."}, {"s": 4987.191, "e": 4989.234, "t": "I remember just being so worried"}, {"s": 4989.234, "e": 4992.321, "t": "Aw. That I wouldn't love her as much."}, {"s": 4992.321, "e": 4994.156, "t": "Jeremy, where are you?"}, {"s": 4995.532, "e": 4997.076, "t": "How would I make it feel equal"}, {"s": 4997.076, "e": 5000.454, "t": "or would there be jealousy\nor would there be weird feelings?"}, {"s": 5002.831, "e": 5003.665, "t": "And then"}, {"s": 5005.459, "e": 5007.461, "t": "just like with every other child,"}, {"s": 5009.546, "e": 5011.799, "t": "she fits so perfectly into the picture."}, {"s": 5011.882, "e": 5012.674, "t": "[One...]"}, {"s": 5012.674, "e": 5013.383, "t": "[Two...]"}, {"s": 5013.383, "e": 5014.009, "t": "[Three...]"}, {"s": 5014.009, "e": 5015.052, "t": "[Four...]"}, {"s": 5015.052, "e": 5016.136, "t": "[Five older sisters!]"}, {"s": 5016.136, "e": 5017.721, "t": "[And how many brothers?]"}, {"s": 5026.647, "e": 5028.565, "t": "Both Ruby and Khusi being here"}, {"s": 5028.565, "e": 5030.901, "t": "has helped so many kids recover."}, {"s": 5032.194, "e": 5033.57, "t": "Hi Khus."}, {"s": 5034.53, "e": 5035.823, "t": "It took me some time,"}, {"s": 5035.823, "e": 5040.035, "t": "but then that's when I really\nrealised that I can move on."}, {"s": 5040.661, "e": 5042.079, "t": "I can love again."}, {"s": 5074.153, "e": 5077.322, "t": "That's the pain of being human."}, {"s": 5077.322, "e": 5079.908, "t": "You have to go through hard things"}, {"s": 5079.908, "e": 5083.162, "t": "and you have to make a choice."}, {"s": 5083.162, "e": 5087.749, "t": "You have to choose love again.\nYou have to choose joy again."}, {"s": 5089.334, "e": 5090.21, "t": "I've seen it. I've seen what love does."}, {"s": 5091.461, "e": 5093.839, "t": "I've seen it. I've seen what love does."}, {"s": 5095.257, "e": 5097.968, "t": "It's the thread that connects us all."}, {"s": 5103.515, "e": 5106.518, "t": "And I'm choosing to do everything I can"}, {"s": 5106.518, "e": 5109.062, "t": "with this one precious life"}, {"s": 5109.062, "e": 5111.064, "t": "to leave this place a little bit better"}, {"s": 5111.064, "e": 5112.983, "t": "for the next generation."}, {"s": 5116.737, "e": 5120.032, "t": "if there's anything that\nmakes me the most excited"}, {"s": 5120.032, "e": 5121.575, "t": "for the future, it's that we get"}, {"s": 5121.575, "e": 5124.077, "t": "to see our little 5-year-old Krishnas"}, {"s": 5124.077, "e": 5127.664, "t": "and Nishas go out into\nthe world and bloom."}, {"s": 5130.209, "e": 5135.255, "t": "[I’m good,\nsister. I fly out on Sunday.]"}, {"s": 5136.089, "e": 5141.929, "t": "[Make sure you work\nhard and apply to colleges like me.]"}, {"s": 5141.929, "e": 5146.892, "t": "[Will you send us\nall iPhones when you get to America?]"}, {"s": 5150.479, "e": 5153.565, "t": "Sometimes I tell myself\nthat I have surpassed"}, {"s": 5153.565, "e": 5155.567, "t": "four or five generation."}, {"s": 5156.693, "e": 5161.49, "t": "That is how long it would\ntake for me to be where I am."}, {"s": 5161.49, "e": 5163.367, "t": "Five generation to be here."}, {"s": 5165.619, "e": 5167.496, "t": "The first generation would be me going"}, {"s": 5167.496, "e": 5169.456, "t": "to a government school."}, {"s": 5169.456, "e": 5171.541, "t": "And then I get married, I have children."}, {"s": 5171.541, "e": 5173.71, "t": "The second generation\nwould be me trying my best"}, {"s": 5173.71, "e": 5176.463, "t": "to send my children to\na boarding school in Surkhet."}, {"s": 5177.547, "e": 5180.801, "t": "The third generation would\ntry to send to the capital"}, {"s": 5182.135, "e": 5182.97, "t": "and the fourth generation"}, {"s": 5182.97, "e": 5185.639, "t": "would be hopefully sending kids abroad."}, {"s": 5187.266, "e": 5188.976, "t": "But then the fifth\nwould go to a place like"}, {"s": 5188.976, "e": 5190.352, "t": "where I am, Notre Dame,"}, {"s": 5190.352, "e": 5192.688, "t": "which is like a very\nprestigious school here."}, {"s": 5194.189, "e": 5195.357, "t": "- Say hi.\n- Hi."}, {"s": 5199.361, "e": 5200.654, "t": "Being the first one,"}, {"s": 5200.654, "e": 5204.366, "t": "I've seen her decision come into reality."}, {"s": 5208.37, "e": 5210.497, "t": "And deep inside me, I always knew."}, {"s": 5212.165, "e": 5214.334, "t": "I just wanna follow Maggie footsteps."}, {"s": 5216.336, "e": 5219.923, "t": "My child tomorrow is setting off"}, {"s": 5219.923, "e": 5221.3, "t": "on her gap year."}, {"s": 5221.3, "e": 5222.926, "t": "Here she goes."}, {"s": 5225.887, "e": 5227.139, "t": "what if something like\nwith Maggie happens to me."}, {"s": 5227.139, "e": 5228.348, "t": "I'm so proud of you."}, {"s": 5228.348, "e": 5230.35, "t": "If she hadn't taken a gap year, Kopila\nValley wouldn't have never been there."}, {"s": 5230.6, "e": 5232.978, "t": "If she hadn't taken a gap year, Kopila\nValley wouldn't have never been there."}, {"s": 5233.687, "e": 5235.23, "t": "So I'm thinking, what if something like"}, {"s": 5235.23, "e": 5237.399, "t": "with Maggie happens to me?"}, {"s": 5238.608, "e": 5241.445, "t": "Only another 53 kids to go."}, {"s": 5241.445, "e": 5243.113, "t": "Stop."}, {"s": 5326.196, "e": 5328.115, "t": "Thank you!"}, {"s": 5354.599, "e": 5357.686, "t": "Today is the first day of school."}, {"s": 5385.255, "e": 5389.259, "t": "Thank you, Ruby. Oh my god, thank you."}, {"s": 5390.469, "e": 5392.971, "t": "Hey guys, take a picture for Ruby."}, {"s": 5394.806, "e": 5398.143, "t": "I'm so proud. Good job."}, {"s": 5398.143, "e": 5399.936, "t": "That's amazing."}, {"s": 5401.396, "e": 5404.816, "t": "Good job. That's the best news ever."}, {"s": 5425.921, "e": 5428.298, "t": "I would like\nto welcome every one of you"}, {"s": 5428.298, "e": 5430.217, "t": "who are here to the brand new opening"}, {"s": 5430.217, "e": 5432.385, "t": "of our brand new Kopila Valley School."}, {"s": 5454.783, "e": 5457.035, "t": "We have a new baby."}, {"s": 5463.291, "e": 5467.754, "t": "Yeah like that. Namaste."}, {"s": 5467.754, "e": 5469.422, "t": "Yeah. Good job, Everest."}, {"s": 5476.888, "e": 5478.64, "t": "Evy, Evy, Evy, woo!"}, {"s": 5481.309, "e": 5482.811, "t": "Evy, who's this?"}, {"s": 5496.575, "e": 5499.661, "t": "You're so lovely. You're so love."}, {"s": 5515.552, "e": 5518.263, "t": "You're my legacy so I feel like"}, {"s": 5518.263, "e": 5520.432, "t": "when you're all out in\nthe world doing things,"}, {"s": 5520.432, "e": 5522.767, "t": "that that will be my memory."}, {"s": 5524.311, "e": 5526.479, "t": "The things that you all go on to complete"}, {"s": 5526.479, "e": 5529.899, "t": "and do and create and change in the world."}, {"s": 5542.12, "e": 5545.957, "t": "♪ Happy birthday dear Krishna ♪"}, {"s": 5548.46, "e": 5551.129, "t": "I like mine. I already tasted it."}, {"s": 5553.34, "e": 5555.342, "t": "Evy, Evy, Evy!"}, {"s": 5561.431, "e": 5562.766, "t": "Game over. Woo!"}, {"s": 5564.225, "e": 5565.644, "t": "Bye!"}, {"s": 5583.37, "e": 5585.497, "t": "That's not funny."}, {"s": 5589.125, "e": 5593.63, "t": "♪ No more monkeys jumping on the bed ♪"}, {"s": 5599.594, "e": 5600.97, "t": "Wait, did he hit her head for real-"}, {"s": 5600.97, "e": 5602.055, "t": "No more monkeys."}, {"s": 5602.972, "e": 5604.766, "t": "Are you okay?"}, {"s": 5604.766, "e": 5606.81, "t": "We all should've listened\nto the fairy tale."}, {"s": 5611.898, "e": 5613.608, "t": "It's a true story."}, {"s": 5615.568, "e": 5616.82, "t": "Mama!"}], "french": [{"s": 0.0, "e": .207, "t": "les cueillir quand c'est prêt."}, {"s": 292.959, "e": 295.253, "t": "Allô ? Tu m'entends ?"}, {"s": 296.838, "e": 297.798, "t": "Comment vas-tu, Maggie ?"}, {"s": 298.131, "e": 300.759, "t": "Ça va."}, {"s": 300.759, "e": 302.01, "t": "Je me promène."}, {"s": 302.01, "e": 303.553, "t": "On a joué toute la journée."}, {"s": 303.553, "e": 304.721, "t": "Qu'est-ce qu'il y a là-haut ?"}, {"s": 304.721, "e": 305.847, "t": "Voici la situation."}, {"s": 306.098, "e": 308.016, "t": "Père est décédé\nil y a trois ans"}, {"s": 308.266, "e": 311.353, "t": "Nous sommes arrivés chez eux"}, {"s": 311.353, "e": 313.397, "t": "et nous sommes arrivés chez eux."}, {"s": 313.397, "e": 314.689, "t": "C'est un mètre-un mètre."}, {"s": 314.731, "e": 317.984, "t": "et un fils de trois ans."}, {"s": 317.984, "e": 319.569, "t": "et un fils de trois ans."}, {"s": 319.569, "e": 322.989, "t": "Il a une infection à la\npoitrine, il tousse très fort."}, {"s": 323.156, "e": 326.743, "t": "Tout le monde demandait\nde prendre le petit."}, {"s": 326.743, "e": 328.954, "t": "[prenons la fille et le fils.]"}, {"s": 328.954, "e": 330.288, "t": "[Gardons-les ensemble.]"}, {"s": 330.288, "e": 333.208, "t": "[La sœur aidera à s'occuper\ndu petit frère.]"}, {"s": 333.208, "e": 335.46, "t": "Bon alors j'y retourne demain."}, {"s": 335.46, "e": 337.379, "t": "Tout le détail, tu regardes."}, {"s": 337.379, "e": 341.591, "t": "Bon il faut récupérer ses\nactes de naissance et les deux"}, {"s": 341.591, "e": 344.136, "t": "des certificats de décès\ndes parents"}, {"s": 344.136, "e": 346.513, "t": "puis une recommandation du district."}, {"s": 346.513, "e": 347.931, "t": "Oui."}, {"s": 348.974, "e": 349.975, "t": "Au revoir Tope."}, {"s": 365.198, "e": 368.702, "t": "Bon. D'abord les petites\nannonces puis la grande annonce."}, {"s": 368.702, "e": 371.413, "t": "La petite annonce,\nles chambres étaient top."}, {"s": 371.413, "e": 372.747, "t": "Merci beaucoup."}, {"s": 375.375, "e": 379.463, "t": "La grande nouvelle c'est que\nTonton Tope vient aujourd'hui"}, {"s": 379.463, "e": 382.507, "t": "et il amène deux\nnouveaux enfants."}, {"s": 382.507, "e": 384.426, "t": "Leur mère vient de mourir\nil y a quelques jours"}, {"s": 384.426, "e": 386.678, "t": "et leur père aussi\nest décédé."}, {"s": 386.678, "e": 389.931, "t": "Alors ils viennent ici\nvivre avec nous."}, {"s": 394.769, "e": 395.937, "t": "Et je sais que c'est\ntrès dur pour certains"}, {"s": 395.937, "e": 398.148, "t": "de vous quand on reçoit\nde nouveaux enfants"}, {"s": 398.148, "e": 402.652, "t": "parce que vous trouvez que\nc'est beaucoup, et c'est normal."}, {"s": 404.779, "e": 407.115, "t": "On va s'en sortir."}, {"s": 409.326, "e": 412.913, "t": "Et je vais avoir besoin\nque tout le monde aide"}, {"s": 412.913, "e": 415.415, "t": "pour aider les enfants\nà s'adapter."}, {"s": 416.791, "e": 419.753, "t": "Je sais que les chambres\nsont déjà bien serrées."}, {"s": 419.753, "e": 422.964, "t": "Qui pense avoir\nde la place dans sa chambre"}, {"s": 422.964, "e": 425.383, "t": "ou un lit vide ou quoi?"}, {"s": 425.383, "e": 428.678, "t": "Quelqu'un dort seul\ndans un grand lit?"}, {"s": 428.678, "e": 430.597, "t": "Non, personne. Personne."}, {"s": 430.597, "e": 431.515, "t": "Non, personne. Personne."}, {"s": 431.515, "e": 435.185, "t": "Namraj? Alors où dort Prabian."}, {"s": 435.31, "e": 436.561, "t": "Namraj ? Alors où dort Prabian."}, {"s": 437.354, "e": 439.189, "t": "Et Namraj, tu sais,"}, {"s": 439.189, "e": 440.44, "t": "Himal vient de ton village."}, {"s": 440.44, "e": 443.735, "t": "Tu veux être son copain\nde lit? Ok super."}, {"s": 445.737, "e": 447.28, "t": "Alors faisons de ça\nle plan à long terme,"}, {"s": 447.28, "e": 448.865, "t": "que Himal commence\navec toi, d'accord?"}, {"s": 448.865, "e": 450.909, "t": "Et tu seras le grand frère?"}, {"s": 450.909, "e": 452.285, "t": "T'es un super grand frère."}, {"s": 455.83, "e": 457.999, "t": "[juste à côté de la maison\noù tu es né.]"}, {"s": 551.801, "e": 553.345, "t": "[Comment vas-tu ?]"}, {"s": 555.263, "e": 556.806, "t": "[Ça va ?]"}, {"s": 557.932, "e": 559.267, "t": "[C'était un long trajet en voiture ?]"}, {"s": 559.809, "e": 561.311, "t": "[Tu as eu le mal des transports ?]"}, {"s": 562.562, "e": 564.731, "t": "[Tu veux manger?\nTu as faim?]"}, {"s": 566.858, "e": 570.362, "t": "[Tu veux mettre\ndes vêtements propres?]"}, {"s": 571.905, "e": 573.114, "t": "[Tu es fatigué ?]"}, {"s": 577.077, "e": 578.37, "t": "[C'est notre maison maintenant.]"}, {"s": 581.456, "e": 583.458, "t": "- Bonjour.\n- Bonjour."}, {"s": 583.458, "e": 586.169, "t": "Voici Himal et voici Karma."}, {"s": 590.34, "e": 593.259, "t": "[C'est ton grand frère.]"}, {"s": 593.635, "e": 596.554, "t": "[Voici ton grand frère.]"}, {"s": 598.223, "e": 601.059, "t": "Je vais peut-être le prendre et\nlui donner un bain. D'accord ?"}, {"s": 608.817, "e": 610.318, "t": "[Petit.]"}, {"s": 610.485, "e": 611.778, "t": "[Tu as froid ?]"}, {"s": 627.419, "e": 630.213, "t": "On verra, on va y aller étape par étape."}, {"s": 631.923, "e": 635.552, "t": "On a essayé de mettre des\ntrucs dans ses cheveux aussi"}, {"s": 635.552, "e": 638.346, "t": "pour enlever ce chewing-gum."}, {"s": 640.765, "e": 641.891, "t": "[Allez, petit.]"}, {"s": 644.644, "e": 647.147, "t": "Ils ont probablement encore mal au ventre."}, {"s": 653.862, "e": 656.114, "t": "[Tu veux de l'eau ?]"}, {"s": 668.96, "e": 670.837, "t": "[ou peur]"}, {"s": 670.837, "e": 672.756, "t": "[ou besoin d'aller aux toilettes]"}, {"s": 672.756, "e": 674.34, "t": "[demandez à vos grandes sœurs.]"}, {"s": 713.171, "e": 716.925, "t": "J'avais 18 ans et je suis\npartie en année sabbatique."}, {"s": 720.303, "e": 724.849, "t": "Quand tous les autres sont\npartis, j'ai décidé de rester."}, {"s": 726.81, "e": 731.064, "t": "Et j'ai commencé à travailler sur\nun projet pour les réfugiés népalais."}, {"s": 731.064, "e": 732.023, "t": "Neuf."}, {"s": 732.023, "e": 733.274, "t": "On peut faire 10?"}, {"s": 733.274, "e": 734.526, "t": "- Oui.\n- Oui 10?"}, {"s": 734.526, "e": 737.654, "t": "Attends attends attends.\nJ'ai un rouge, alors."}, {"s": 737.654, "e": 742.534, "t": "C'est là que j'ai rencontré Tope.\nIl gérait les opérations."}, {"s": 742.534, "e": 745.286, "t": "N'importe, attelle,\nfaut nettoyer."}, {"s": 745.286, "e": 748.665, "t": "Ça c'est Tope. Bonjour."}, {"s": 748.665, "e": 749.833, "t": "Moi aussi je travaille.\nPas de problème."}, {"s": 751.167, "e": 753.419, "t": "Elle travaille avec moi\ndeux ans."}, {"s": 754.921, "e": 756.923, "t": "s'occuper des enfants\norphelins."}, {"s": 758.508, "e": 760.51, "t": "Qui a le shampooing?"}, {"s": 763.012, "e": 764.597, "t": "Moi aussi je suis orphelin."}, {"s": 769.185, "e": 770.77, "t": "Je connais cette vie."}, {"s": 772.063, "e": 773.147, "t": "C'est quoi la vie de faim,\nc'est quoi la vie de froid,"}, {"s": 774.858, "e": 776.86, "t": "Ce que c'est qu'avoir froid."}, {"s": 778.528, "e": 780.822, "t": "et c'est quoi les temps durs."}, {"s": 782.49, "e": 785.994, "t": "Ces enfants, combien d'amour\nils reçoivent de Maggie."}, {"s": 787.287, "e": 789.581, "t": "Après ça, moi totalement\nje lui fais confiance."}, {"s": 789.581, "e": 791.583, "t": "Ok mets juste l'étiquette\nen haut."}, {"s": 791.583, "e": 793.793, "t": "Maintenant c'est propre\net j'en reviens pas."}, {"s": 793.793, "e": 795.003, "t": "- Oui?\n- On dirait que"}, {"s": 795.003, "e": 797.088, "t": "ça va s'étendre.\nPar exemple,"}, {"s": 797.088, "e": 798.423, "t": "après deux, trois ans\nqui viennent,"}, {"s": 798.423, "e": 802.26, "t": "ils vont ajouter\ntout ça en plus ici."}, {"s": 804.554, "e": 806.639, "t": "Le Népal était parmi\nles pays les plus pauvres"}, {"s": 806.639, "e": 807.64, "t": "du monde"}, {"s": 808.6, "e": 812.061, "t": "et se remettait d'une\nguerre civile de dix ans"}, {"s": 812.061, "e": 816.232, "t": "qui avait laissé un million\nd'enfants orphelins."}, {"s": 824.449, "e": 828.828, "t": "On a réalisé que certains\

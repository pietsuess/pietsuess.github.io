nenfants avaient besoin d'aller"}, {"s": 828.828, "e": 830.622, "t": "à l'école dans un bon\nenvironnement."}, {"s": 830.622, "e": 831.873, "t": "Namaste."}, {"s": 831.873, "e": 834.083, "t": "à l'école dans un bon environnement."}, {"s": 836.252, "e": 840.006, "t": "D'autres enfants avaient\nbesoin de plus,"}, {"s": 840.006, "e": 844.594, "t": "c'est-à-dire un foyer, une famille\net un endroit sûr pour vivre."}, {"s": 854.187, "e": 857.523, "t": "salle à manger qu'on vient de construire."}, {"s": 878.67, "e": 879.504, "t": "D'accord."}, {"s": 880.755, "e": 882.507, "t": "[Comment tu t'appelles ?]"}, {"s": 887.762, "e": 890.181, "t": "Maggie ?"}, {"s": 890.765, "e": 893.893, "t": "À l'époque, j'avais environ sept ans."}, {"s": 897.313, "e": 899.065, "t": "Ma mère est morte la première."}, {"s": 900.024, "e": 902.151, "t": "Elle avait un cancer\ndes ovaires."}, {"s": 905.071, "e": 907.031, "t": "Vers six, sept mois,"}, {"s": 907.949, "e": 909.617, "t": "mon père aussi est mort."}, {"s": 918.835, "e": 920.878, "t": "- Salut Nisha.\n- Salut."}, {"s": 920.878, "e": 921.921, "t": "Comment vas-tu ?"}, {"s": 921.921, "e": 924.048, "t": "♪ Rainbow Nisha ♪"}, {"s": 924.048, "e": 926.968, "t": "♪ Rainbow Nisha ♪"}, {"s": 926.968, "e": 929.512, "t": "♪ Rainbow Nisha ♪"}, {"s": 929.512, "e": 932.473, "t": "♪ Rainbow Nisha ♪"}, {"s": 932.473, "e": 935.601, "t": "♪ Go where you want to go ♪"}, {"s": 935.601, "e": 936.686, "t": "Dis bonjour."}, {"s": 936.686, "e": 937.52, "t": "Salut."}, {"s": 937.52, "e": 939.355, "t": "Aujourd'hui c'est\nla rentrée."}, {"s": 939.355, "e": 941.107, "t": "- Salut.\n- Aujourd'hui c'est le"}, {"s": 941.107, "e": 943.568, "t": "premier jour d'école."}, {"s": 943.568, "e": 944.527, "t": "Quand moi j'étais ici\nau début,"}, {"s": 944.527, "e": 947.321, "t": "il y avait juste premier\nétage, petite famille."}, {"s": 948.781, "e": 952.869, "t": "J'avais aucune idée de ce qui\nse passait ni où j'étais."}, {"s": 952.869, "e": 955.913, "t": "La seule chose que je savais c'est\nque je suis en sécurité ici."}, {"s": 955.913, "e": 957.457, "t": "J'ai senti l'amour."}, {"s": 961.377, "e": 963.421, "t": "Et comme d'autres enfants arrivaient,"}, {"s": 963.421, "e": 966.174, "t": "notre maison aussi\na commencé à grandir."}, {"s": 967.467, "e": 970.636, "t": "On a fait le deuxième\npuis le troisième étage"}, {"s": 970.636, "e": 972.18, "t": "et puis le quatrième étage."}, {"s": 976.1, "e": 978.394, "t": "Tout s'est passé si vite."}, {"s": 980.063, "e": 981.314, "t": "Je suis revenu de l'école"}, {"s": 981.314, "e": 984.108, "t": "et Maggie fait :\n« Voici ton nouveau frère. »"}, {"s": 984.484, "e": 986.861, "t": "Salut Krishna."}, {"s": 986.861, "e": 987.695, "t": "Après Nisha,"}, {"s": 987.695, "e": 990.406, "t": "J'étais le prochain enfant\nà emménager dans la maison."}, {"s": 990.406, "e": 991.824, "t": "[Tu vas à l'école\naujourd'hui?]"}, {"s": 996.496, "e": 998.539, "t": "J'étais le prochain enfant\nà emménager dans la maison."}, {"s": 998.873, "e": 999.916, "t": "Salut Maggie."}, {"s": 1001.292, "e": 1003.878, "t": "- Au revoir, au revoir.\n- Krishna."}, {"s": 1004.921, "e": 1006.38, "t": "J'avais trois ou quatre ans"}, {"s": 1006.38, "e": 1008.257, "t": "quand j'ai perdu mon père."}, {"s": 1008.257, "e": 1010.927, "t": "Ma mère, une mère sans éducation,"}, {"s": 1012.261, "e": 1016.349, "t": "vivant dans une société\noù les gens vous jugent,"}, {"s": 1016.349, "e": 1018.226, "t": "c'était dur pour elle de s'occuper"}, {"s": 1018.267, "e": 1021.062, "t": "de ma petite sœur et moi alors,"}, {"s": 1021.687, "e": 1023.314, "t": "elle nous a quittés."}, {"s": 1025.525, "e": 1029.195, "t": "Krishna avait traversé\ntellement d'épreuves."}, {"s": 1031.322, "e": 1035.243, "t": "Lui et sa sœur,\nSabitha, avaient été séparés."}, {"s": 1037.745, "e": 1042.583, "t": "Il lui a fallu du temps pour\ntrouver sa place dans la famille"}, {"s": 1043.584, "e": 1048.589, "t": "et je crois qu'il l'a pas ressenti\njusqu'à ce qu'on trouve sa sœur."}, {"s": 1073.489, "e": 1077.827, "t": "♪ Joyeux anniversaire ♪"}, {"s": 1077.827, "e": 1080.58, "t": "♪ Joyeux anniversaire ♪"}, {"s": 1080.58, "e": 1083.583, "t": "Quand je pensais à mon enfance."}, {"s": 1083.791, "e": 1085.459, "t": "Laisse-moi regarder ça."}, {"s": 1085.459, "e": 1087.336, "t": "Je savais que toute la joie"}, {"s": 1087.336, "e": 1090.548, "t": "et tous ces souvenirs avaient\nfait de moi qui j'étais."}, {"s": 1090.548, "e": 1093.801, "t": "Ouais le Père Noël a appelé\net il a dit,"}, {"s": 1094.635, "e": 1096.47, "t": "« Allez vous coucher tôt. »"}, {"s": 1096.47, "e": 1100.433, "t": "Parce qu'on a plein\nde cadeaux à emballer."}, {"s": 1100.641, "e": 1102.643, "t": "Je savais ce que c'était\nde se sentir en sécurité"}, {"s": 1102.643, "e": 1105.438, "t": "et d'être bordée le soir."}, {"s": 1105.438, "e": 1106.856, "t": "Quand tu viens de là,"}, {"s": 1106.856, "e": 1110.276, "t": "tu réalises pas quel\nprivilège c'est."}, {"s": 1111.736, "e": 1114.238, "t": "Mes parents étaient un peu\nen dehors des sentiers battus"}, {"s": 1114.238, "e": 1116.157, "t": "dans certaines choses\nqu'ils faisaient."}, {"s": 1116.157, "e": 1119.243, "t": "On n'avait pas de télé.\nIls voulaient qu'on soit dehors."}, {"s": 1119.243, "e": 1121.913, "t": "On courait pieds nus."}, {"s": 1125.041, "e": 1126.584, "t": "Je crois que ce qu'ils\nn'avaient pas"}, {"s": 1126.584, "e": 1130.213, "t": "en argent,\nils compensaient avec un sens"}, {"s": 1130.213, "e": 1132.256, "t": "d'unité"}, {"s": 1132.882, "e": 1134.175, "t": "et de jeu."}, {"s": 1136.636, "e": 1140.097, "t": "Le spectacle est fini."}, {"s": 1143.768, "e": 1147.563, "t": "Alors la seule chose que je\nsavais faire c'était recréer"}, {"s": 1147.563, "e": 1152.401, "t": "ces fils communs de\nl'enfance qu'on m'avait donnée."}, {"s": 1161.16, "e": 1162.703, "t": "Maggie ?"}, {"s": 1163.621, "e": 1165.081, "t": "[Mets ta veste]"}, {"s": 1165.081, "e": 1166.499, "t": "Maggie ?"}, {"s": 1175.007, "e": 1176.717, "t": "Au début je me disais,\n« Oh je vais monter ça"}, {"s": 1176.717, "e": 1180.68, "t": "et je vais retourner à la fac\net gérer ça à côté. »"}, {"s": 1183.307, "e": 1187.353, "t": "J'essayais pas d'être\nune mère et d'adopter des enfants."}, {"s": 1187.353, "e": 1190.273, "t": "J'essayais de créer un foyer sûr."}, {"s": 1195.736, "e": 1198.197, "t": "Mais je suis tombée\nfollement amoureuse d'eux."}, {"s": 1202.451, "e": 1206.08, "t": "Et j'ai réalisé que je voulais\ny vivre à plein temps."}, {"s": 1206.08, "e": 1210.584, "t": "Salut tout le monde c'est ma\ndernière nuit à Mendham chez moi"}, {"s": 1210.584, "e": 1215.548, "t": "aux États-Unis et ce sera\npour sûrement très longtemps."}, {"s": 1215.84, "e": 1219.093, "t": "J'ai hâte de rentrer\net voir les enfants."}, {"s": 1219.093, "e": 1223.639, "t": "Namaste [parle népalais]. Namaste."}, {"s": 1223.639, "e": 1227.226, "t": "Prenez soin de vous.\nJe pars pour mon petit vol."}, {"s": 1227.226, "e": 1229.353, "t": "Mon petit très,\ntrès long vol."}, {"s": 1240.364, "e": 1241.198, "t": "Salut."}, {"s": 1243.117, "e": 1244.535, "t": "Salut tout le monde."}, {"s": 1244.535, "e": 1245.87, "t": "Salut."}, {"s": 1245.87, "e": 1247.246, "t": "Bon samedi."}, {"s": 1247.246, "e": 1249.957, "t": "Navin Tiwari est là."}, {"s": 1250.374, "e": 1253.044, "t": "Un jour les enfants sont descendus"}, {"s": 1254.17, "e": 1257.465, "t": "et ils ont dit, « On en a\ntous parlé"}, {"s": 1257.465, "e": 1260.634, "t": "et on a décidé qu'on\nveut t'appeler Maman. »"}, {"s": 1260.634, "e": 1264.722, "t": "- M-È-R-E, mère.\n- M-È-R-E, mère."}, {"s": 1264.722, "e": 1266.182, "t": "et on a décidé qu'on\nveut t'appeler Maman. »"}, {"s": 1266.182, "e": 1268.768, "t": "[Mère veut dire « Mammu »]"}, {"s": 1269.602, "e": 1274.398, "t": "- F-R-È-R-E, frère.\n- F-R-È-R-E, frère."}, {"s": 1275.691, "e": 1279.236, "t": "- S-Œ-U-R, sœur.\n- S-Œ-U-R, sœur."}, {"s": 1279.236, "e": 1281.53, "t": "Sœur [parle népalais] ?"}, {"s": 1291.832, "e": 1295.127, "t": "Bien, encore une fois. Wow, Krishna."}, {"s": 1297.213, "e": 1299.382, "t": "Au début quand il n'y avait\npas d'aides-soignantes"}, {"s": 1299.382, "e": 1302.301, "t": "et Maggie était celle\nqui s'occupait de tout."}, {"s": 1303.761, "e": 1305.221, "t": "Elle faisait tout et plus encore"}, {"s": 1305.221, "e": 1308.599, "t": "que ce qu'une mère ferait\npour un enfant."}, {"s": 1318.442, "e": 1319.819, "t": "Sachant ce que je sais\nmaintenant,"}, {"s": 1319.819, "e": 1322.446, "t": "ça aurait dû être bien\nplus compliqué."}, {"s": 1323.906, "e": 1326.2, "t": "C'est bien plus compliqué."}, {"s": 1362.194, "e": 1364.989, "t": "Parce que j'étais une étrangère,"}, {"s": 1364.989, "e": 1367.658, "t": "j'étais vraiment consciencieuse\nà propos de"}, {"s": 1369.994, "e": 1374.415, "t": "comment rendre justice à la vie\nqu'ils n'auront pas"}, {"s": 1375.416, "e": 1379.753, "t": "et ce qu'ils ont perdu\nen termes de famille biologique ?"}, {"s": 1386.552, "e": 1389.138, "t": "Comment garder leur\nsentiment d'identité"}, {"s": 1389.138, "e": 1391.849, "t": "et maintenir ce lien vivant ?"}, {"s": 1399.815, "e": 1404.403, "t": "Je peux pas effacer leur\ntrauma ou ce qu'ils ont perdu."}, {"s": 1406.697, "e": 1408.782, "t": "Je peux pas non plus être à 100%"}, {"s": 1409.658, "e": 1412.578, "t": "de ce qui va leur manquer."}, {"s": 1413.579, "e": 1416.582, "t": "Mais voilà ce qu'on peut faire."}, {"s": 1416.582, "e": 1418.417, "t": "On peut rendre les fêtes\nspéciales."}, {"s": 1419.668, "e": 1421.587, "t": "On peut se souvenir de\nleurs anniversaires"}, {"s": 1421.587, "e": 1423.964, "t": "et s'assurer qu'ils aient\nune super fête."}, {"s": 1426.091, "e": 1427.635, "t": "On peut se souvenir de\nleurs anniversaires"}, {"s": 1430.721, "e": 1432.097, "t": "On peut s'assurer qu'ils\npuissent retourner"}, {"s": 1432.097, "e": 1435.559, "t": "dans leurs villages\nquand c'est possible."}, {"s": 1435.559, "e": 1437.728, "t": "Ramener les traditions chez nous"}, {"s": 1437.728, "e": 1439.772, "t": "qu'ils auraient eues."}, {"s": 1446.32, "e": 1449.156, "t": "Et puis créer nos propres\nsouvenirs de famille."}, {"s": 1487.152, "e": 1488.862, "t": "Salut je m'appelle Krishna.\nJe vis au foyer Kopila Valley."}, {"s": 1488.946, "e": 1490.948, "t": "Salut je m'appelle Krishna.\nJe vis au foyer Kopila Valley."}, {"s": 1504.003, "e": 1506.589, "t": "Et avec le temps cette\npetite idée"}, {"s": 1506.589, "e": 1508.924, "t": "qui est née de l'amour"}, {"s": 1510.884, "e": 1512.052, "t": "est devenu un foyer"}, {"s": 1514.305, "e": 1515.848, "t": "avec six éducateurs"}, {"s": 1517.099, "e": 1518.225, "t": "et 50 enfants."}, {"s": 1523.606, "e": 1525.024, "t": "Deux, trois."}, {"s": 1525.024, "e": 1526.859, "t": "Équipe Kopila !"}, {"s": 1568.692, "e": 1572.78, "t": "On m'a appelée au portail"}, {"s": 1572.78, "e": 1575.616, "t": "et j'ai vu une femme\nqui tenait"}, {"s": 1575.616, "e": 1577.034, "t": "une sorte de paquet."}, {"s": 1585.542, "e": 1589.046, "t": "J'avais jamais vu un bébé\naussi petit."}, {"s": 1589.046, "e": 1592.591, "t": "Seulement un kilo,\nun kilo et demi."}, {"s": 1600.683, "e": 1604.019, "t": "Et j'ai foncé en mode urgence,\n« Il est vivant ?"}, {"s": 1604.019, "e": 1605.562, "t": "Il est mort ? Où il va ?"}, {"s": 1605.562, "e": 1607.356, "t": "Où je l'emmène ? »"}, {"s": 1613.612, "e": 1615.781, "t": "La guérison de la malnutrition\nc'est pas genre, oh,"}, {"s": 1615.781, "e": 1616.99, "t": "donne-leur à manger et c'est bon."}, {"s": 1616.99, "e": 1619.326, "t": "C'est très compliqué."}, {"s": 1620.786, "e": 1623.831, "t": "Les trois premières semaines\nc'était des soins jour et nuit."}, {"s": 1623.831, "e": 1626.208, "t": "On l'a transféré d'un\nhôpital à un autre"}, {"s": 1626.208, "e": 1627.751, "t": "parce qu'ils n'avaient\npas d'incubateur."}, {"s": 1627.751, "e": 1629.503, "t": "Ils n'avaient pas d'oxygène."}, {"s": 1645.144, "e": 1647.521, "t": "Je me souviens dans ces\nmoments de transfert,"}, {"s": 1647.521, "e": 1651.233, "t": "je me disais, « Il va pas\ns'en sortir. »"}, {"s": 1655.946, "e": 1658.198, "t": "Je connaissais personne\nà Katmandou."}, {"s": 1658.198, "e": 1659.7, "t": "J'étais complètement seule."}, {"s": 1661.201, "e": 1663.871, "t": "Et c'est là que son état\ns'est aggravé à nouveau."}, {"s": 1669.293, "e": 1670.711, "t": "Il perdait et reprenait\nconnaissance."}, {"s": 1670.711, "e": 1674.006, "t": "Il a dû être réanimé,\nmis sous oxygène,"}, {"s": 1674.006, "e": 1677.009, "t": "et je pouvais même pas\nentrer pour le voir."}, {"s": 1683.098, "e": 1684.516, "t": "Les bébés ne survivaient pas."}, {"s": 1684.516, "e": 1688.854, "t": "Genre ils sortaient des\ncorps de la réa."}, {"s": 1690.439, "e": 1692.691, "t": "Alors j'étais terrifiée de\njuste le laisser partir"}, {"s": 1692.691, "e": 1695.36, "t": "de ma vue une seule seconde."}, {"s": 1702.367, "e": 1705.412, "t": "Dis bonjour à tout le monde."}, {"s": 1706.497, "e": 1708.415, "t": "- Oui.\n- De bons yeux. Grands yeux."}, {"s": 1708.415, "e": 1710.167, "t": "Il s'en sort tellement bien."}, {"s": 1715.631, "e": 1717.841, "t": "Vous rentrez chez vous\naujourd'hui ?"}, {"s": 1717.841, "e": 1719.802, "t": "Non on doit rester ici."}, {"s": 1719.802, "e": 1723.68, "t": "D'accord. Pour combien de jours ?"}, {"s": 1723.68, "e": 1725.974, "t": "Je sais pas, on est sortis\ndes soins intensifs,"}, {"s": 1725.974, "e": 1729.061, "t": "donc ça fait longtemps que\nje l'ai pas tenu dans mes bras."}, {"s": 1730.354, "e": 1732.105, "t": "Merci. Alors dites son nom."}, {"s": 1732.105, "e": 1734.817, "t": "- Il s'appelle Ravi.\n- Ravi."}, {"s": 1734.817, "e": 1738.946, "t": "Ravi en fait, ça veut dire,\nc'est lié au soleil."}, {"s": 1738.946, "e": 1741.49, "t": "- Oui soleil.\n- C'est comme la lumière."}, {"s": 1750.749, "e": 1752.835, "t": "bébé."}, {"s": 1754.711, "e": 1757.464, "t": "Oui."}, {"s": 1785.117, "e": 1789.162, "t": "♪ Twinkle twinkle little star ♪"}, {"s": 1789.162, "e": 1793.709, "t": "♪ How I wonder what you are ♪"}, {"s": 1793.709, "e": 1797.087, "t": "Toute la maison a fondu pour lui. Voilà."}, {"s": 1797.462, "e": 1799.882, "t": "[Rien va arriver, t'inquiète pas.]"}, {"s": 1801.133, "e": 1805.721, "t": "Des ados anxieux qui gloussent\net jouent à coucou."}, {"s": 1807.472, "e": 1810.309, "t": "J'aurais jamais cru pouvoir\naimer un autre être humain"}, {"s": 1810.309, "e": 1812.394, "t": "autant jusqu'à ce que\nje rencontre Ravi."}, {"s": 1816.899, "e": 1819.985, "t": "Il venait dans ma chambre\net sautait dans mon lit"}, {"s": 1819.985, "e": 1821.987, "t": "et je me réveillais."}, {"s": 1821.987, "e": 1823.488, "t": "- Salut Ravi.\n- Ravi ?"}, {"s": 1824.865, "e": 1829.745, "t": "Il rassemblait simplement\ntoute la famille."}, {"s": 1829.745, "e": 1831.788, "t": "Allez Ravi. Tu peux y arriver."}, {"s": 1831.788, "e": 1834.958, "t": "Crois en toi."}, {"s": 1834.958, "e": 1836.585, "t": "Tout devenait un événement"}, {"s": 1836.585, "e": 1839.671, "t": "parce qu'on savait d'où\nil venait."}, {"s": 1840.631, "e": 1842.049, "t": "Tout devenait un si grand événement"}, {"s": 1843.884, "e": 1846.678, "t": "Oui. Tu peux dire maman ?"}, {"s": 1846.97, "e": 1848.347, "t": "- Mama.\n- Oh."}, {"s": 1849.431, "e": 1850.974, "t": "Mama."}, {"s": 1850.974, "e": 1852.517, "t": "Patate."}, {"s": 1852.517, "e": 1854.394, "t": "A-tate."}, {"s": 1855.479, "e": 1856.939, "t": "Patate."}, {"s": 1856.939, "e": 1857.981, "t": "A-tate."}, {"s": 1866.323, "e": 1868.158, "t": "- Youpi !\n- Youpi, Ravi."}, {"s": 1868.158, "e": 1871.745, "t": "♪ Joyeux anniversaire ♪"}, {"s": 1871.745, "e": 1875.457, "t": "♪ Happy birthday dear Ravi ♪"}, {"s": 1876.917, "e": 1879.503, "t": "L'Humanitaire de l'Année."}, {"s": 1879.503, "e": 1881.004, "t": "Je suis sous le choc."}, {"s": 1881.004, "e": 1883.382, "t": "Je viens d'arriver du Népal,\ncomme vous imaginez."}, {"s": 1883.382, "e": 1884.383, "t": "C'est exactement le contraire."}, {"s": 1884.383, "e": 1886.218, "t": "C'est exactement le contraire."}, {"s": 1886.218, "e": 1891.223, "t": "Je veux donner le prix de\n100 000 $ à Maggie Doyne."}, {"s": 1893.433, "e": 1895.936, "t": "Chaque centime de ces 100 000 $"}, {"s": 1897.27, "e": 1899.648, "t": "à la vie des enfants au Népal."}, {"s": 1902.401, "e": 1904.569, "t": "En tant que mère, en tant que PDG,"}, {"s": 1904.569, "e": 1907.28, "t": "et en tant que leader,\nj'étais en train de devenir"}, {"s": 1907.28, "e": 1909.449, "t": "la femme que je voulais être.\nHonorée de présenter"}, {"s": 1909.449, "e": 1913.704, "t": "le Prix Forbes d'Excellence\nen Éducation à Maggie Doyne."}, {"s": 1914.538, "e": 1917.708, "t": "Je crois vraiment au besoin\ndans notre monde"}, {"s": 1917.708, "e": 1921.67, "t": "d'élargir notre définition\nde ce qu'est la famille."}, {"s": 1921.67, "e": 1923.13, "t": "Il n'y a eu que deux ovations"}, {"s": 1923.13, "e": 1926.967, "t": "de toute la journée, il y avait\nWarren Buffet et Maggie Doyne."}, {"s": 1929.594, "e": 1931.805, "t": "et je me disais,\n« Qu'est-ce que je fais ici ? »"}, {"s": 1931.805, "e": 1933.682, "t": "Bonjour. Salut."}, {"s": 1933.682, "e": 1935.767, "t": "C'est merveilleux qu'il aille\nsi bien maintenant."}, {"s": 1935.767, "e": 1938.687, "t": "Il va très bien, il est rétabli."}, {"s": 1938.687, "e": 1940.689, "t": "Mais tu as 28 ans."}, {"s": 1940.689, "e": 1942.941, "t": "Tu as la responsabilité\nde plus de 50 enfants"}, {"s": 1942.941, "e": 1944.651, "t": "et un bébé."}, {"s": 1944.651, "e": 1946.653, "t": "Tu ne te compares jamais parfois"}, {"s": 1946.653, "e": 1948.655, "t": "aux autres jeunes de 28 ans ?"}, {"s": 1949.698, "e": 1950.699, "t": "Tout le temps."}, {"s": 1950.699, "e": 1953.869, "t": "Tu regardes tes amis\nqui commencent à se marier"}, {"s": 1953.869, "e": 1956.788, "t": "et avoir, tu sais, ce mode de vie."}, {"s": 1958.373, "e": 1960.25, "t": "Enfin, imaginez mon profil\nde rencontres en ligne"}, {"s": 1960.25, "e": 1962.878, "t": "ressemblerait, mon Tinder."}, {"s": 1962.878, "e": 1966.798, "t": "51 enfants, qui veut sortir avec moi ?"}, {"s": 1966.798, "e": 1971.386, "t": "aurait l'air, mon Tinder."}, {"s": 1971.386, "e": 1974.389, "t": "♪ Parce que nous sommes une famille ♪"}, {"s": 1974.389, "e": 1975.474, "t": "Mesdames et messieurs,"}, {"s": 1975.474, "e": 1977.893, "t": "le Héros CNN 2015 de l'Année"}, {"s": 1979.728, "e": 1981.521, "t": "est Maggie Doyne."}, {"s": 1996.578, "e": 2000.832, "t": "Je suis tellement honorée\nd'accepter ce prix"}, {"s": 2000.832, "e": 2005.003, "t": "au nom de tous mes petits\nhéros au Népal à Kopila."}, {"s": 2005.003, "e": 2008.715, "t": "Toute mon inspiration\nvient d'eux."}, {"s": 2008.715, "e": 2011.343, "t": "Je suis aussi reconnaissante\nenvers mon cofondateur Tope,"}, {"s": 2011.343, "e": 2013.678, "t": "qui est avec moi ce soir."}, {"s": 2013.678, "e": 2017.724, "t": "On ne doit pas perdre de vue\nla tâche qui nous attend."}, {"s": 2019.518, "e": 2022.229, "t": "[Si une Maggie peut\naider tous ces enfants]"}, {"s": 2022.229, "e": 2025.607, "t": "[Imagine combien d'enfants tu aideras.]"}, {"s": 2026.733, "e": 2028.151, "t": "Un jour tous ces enfants\nauront une éducation"}, {"s": 2028.819, "e": 2031.279, "t": "Ma co-fondatrice sur scène,\nc'est comme si j'y étais."}, {"s": 2033.24, "e": 2035.325, "t": "C'était très douloureux\npour notre famille."}, {"s": 2035.325, "e": 2037.577, "t": "cette région va changer."}, {"s": 2088.545, "e": 2091.631, "t": "Ravi s'est réveillé\nde sa sieste."}, {"s": 2093.55, "e": 2096.72, "t": "Je l'ai confié à une\ndes taties"}, {"s": 2098.68, "e": 2103.143, "t": "et elle l'a mis dans le parc\navec tous les enfants."}, {"s": 2104.019, "e": 2108.648, "t": "Un des enfants l'a pris et\nl'a mis hors de l'aire de jeu."}, {"s": 2111.276, "e": 2116.281, "t": "10 minutes après, j'ai entendu\ndes cris et Padam a couru."}, {"s": 2116.74, "e": 2120.368, "t": "J'ai su par le regard\nd'horreur sur le visage de Padam,"}, {"s": 2120.368, "e": 2122.537, "t": "quelqu'un était mort\nou mourant."}, {"s": 2128.21, "e": 2129.836, "t": "Il était tout mouillé."}, {"s": 2130.754, "e": 2134.841, "t": "Je l'ai pris et j'ai commencé\nle massage cardiaque."}, {"s": 2141.932, "e": 2142.849, "t": "Il était mou"}, {"s": 2144.017, "e": 2145.685, "t": "et ne revenait pas."}, {"s": 2152.484, "e": 2155.278, "t": "C'est une façon horrible\nde mourir pour quelqu'un,"}, {"s": 2155.278, "e": 2157.364, "t": "se noyer dans une fosse\nseptique."}, {"s": 2178.969, "e": 2183.974, "t": "La chose suivante dont\nje me souviens c'est qu'on"}, {"s": 2184.224, "e": 2188.27, "t": "me portait à la maison et les\nenfants criaient au portail."}, {"s": 2192.983, "e": 2197.988, "t": "Je répétais, « On est toujours\nune famille. Toujours. »"}, {"s": 2199.99, "e": 2201.992, "t": "J'ai commencé à perdre\nla tête."}, {"s": 2208.79, "e": 2211.668, "t": "Pourquoi tu te réveilles de\nla sieste à cette seconde ?"}, {"s": 2211.668, "e": 2214.796, "t": "Il était grognon. Pourquoi\nje l'ai pas gardé sur moi ?"}, {"s": 2214.796, "e": 2217.048, "t": "Pourquoi elle l'a laissé\npour chauffer le lait ?"}, {"s": 2217.048, "e": 2218.967, "t": "Pourquoi personne d'autre\nne regardait autour ?"}, {"s": 2218.967, "e": 2220.844, "t": "Où étaient toutes les\nautres taties et tonton ?"}, {"s": 2220.844, "e": 2222.429, "t": "Pourquoi le portail\nétait ouvert ?"}, {"s": 2222.429, "e": 2224.014, "t": "Pourquoi les enfants l'ont\nsorti du parc ?"}, {"s": 2224.014, "e": 2227.517, "t": "Pourquoi j'ai ressenti.\nPourquoi elle est allée là ?"}, {"s": 2234.065, "e": 2235.817, "t": "Encore et encore et encore"}, {"s": 2235.817, "e": 2237.944, "t": "et ce sera comme ça chaque\njour jusqu'à ma mort."}, {"s": 2248.496, "e": 2250.749, "t": "C'était très douloureux\npour notre famille."}, {"s": 2254.461, "e": 2256.463, "t": "Je sais pas quelle punition\nDieu donne. Je sais pas."}, {"s": 2259.799, "e": 2260.633, "t": "Terrible."}, {"s": 2264.095, "e": 2265.43, "t": "Toute la famille est triste."}, {"s": 2266.89, "e": 2268.141, "t": "Tous les enfants pleurent."}, {"s": 2269.142, "e": 2270.477, "t": "Notre bonheur, tout parti."}, {"s": 2288.328, "e": 2291.414, "t": "La mère et la sœur de\nMaggie sont venues ici."}, {"s": 2294.084, "e": 2297.17, "t": "Elles sont très inquiètes pour sa vie."}, {"s": 2301.883, "e": 2304.886, "t": "et on dit tous, « Maggie,\npars avec ta mère. »"}, {"s": 2354.477, "e": 2355.77, "t": "À cette époque,"}, {"s": 2356.229, "e": 2358.523, "t": "toute la famille était dévastée."}, {"s": 2362.235, "e": 2363.653, "t": "Donc ça faisait pas mal."}, {"s": 2364.279, "e": 2366.281, "t": "je ne me souvenais pas beaucoup d'eux"}, {"s": 2366.573, "e": 2368.158, "t": "alors ça ne m'a pas fait mal."}, {"s": 2368.283, "e": 2370.201, "t": "Mais quand j'ai perdu Ravi"}, {"s": 2370.201, "e": 2371.202, "t": "Ravi, souris."}, {"s": 2371.202, "e": 2374.914, "t": "Je l'avais vu depuis son arrivée."}, {"s": 2375.123, "e": 2376.708, "t": "- Quel charmeur.\n- On l'a élevé"}, {"s": 2376.708, "e": 2378.126, "t": "Je n'aurais jamais pensé\npouvoir aimer quelqu'un comme ça."}, {"s": 2378.126, "e": 2380.044, "t": "J'ai eu tellement de mal."}, {"s": 2381.254, "e": 2382.755, "t": "Je n'aurais jamais pensé"}, {"s": 2382.755, "e": 2386.009, "t": "pouvoir aimer quelqu'un comme ça."}, {"s": 2405.653, "e": 2407.739, "t": "Quand quelqu'un meurt"}, {"s": 2407.739, "e": 2410.2, "t": "et que tu es au même endroit,"}, {"s": 2411.826, "e": 2415.497, "t": "ça va te revenir encore et encore."}, {"s": 2423.004, "e": 2425.882, "t": "C'était très dur pour nous"}, {"s": 2425.882, "e": 2429.385, "t": "parce que chaque fois qu'on\ns'asseyait là où Ravi s'est noyé et,"}, {"s": 2429.385, "e": 2430.845, "t": "tu sais, les souvenirs revenaient"}, {"s": 2431.971, "e": 2433.598, "t": "tu sais, les souvenirs revenaient en masse"}, {"s": 2433.598, "e": 2435.642, "t": "de nous le tenant dans nos bras et..."}, {"s": 2452.534, "e": 2453.576, "t": "Hé je viens de me réveiller."}, {"s": 2456.162, "e": 2457.664, "t": "Je viens de me réveiller."}, {"s": 2459.207, "e": 2461.125, "t": "Juste effrayée par tout."}, {"s": 2463.169, "e": 2466.005, "t": "J'ai peur qu'il arrive\nquelque chose aux enfants."}, {"s": 2474.138, "e": 2477.058, "t": "Je sais quand je suis partie,\nj'ai vu la peur"}, {"s": 2478.685, "e": 2480.228, "t": "dans les yeux de mes enfants."}, {"s": 2482.73, "e": 2484.023, "t": "Salut maman."}, {"s": 2484.023, "e": 2486.359, "t": "- Salut maman.\n- Vous me manquez tous."}, {"s": 2489.32, "e": 2490.238, "t": "Je t'aime."}, {"s": 2494.242, "e": 2498.037, "t": "J'ai vu des gens qui\nont subi des tragédies"}, {"s": 2498.037, "e": 2500.164, "t": "et ne s'en est jamais remise."}, {"s": 2501.874, "e": 2504.127, "t": "Je n'arrête pas de dire que je\nne veux pas être cette personne."}, {"s": 2504.127, "e": 2506.421, "t": "Je veux pas être\ncette personne."}, {"s": 2510.425, "e": 2513.386, "t": "Beaucoup d'enfants disent que"}, {"s": 2514.429, "e": 2517.14, "t": "le pire en perdant\nleur frère ou sœur"}, {"s": 2518.641, "e": 2521.06, "t": "c'était pas seulement\nde les perdre."}, {"s": 2524.063, "e": 2526.983, "t": "C'était de perdre leur parent."}, {"s": 2531.738, "e": 2533.865, "t": "Je leur ai dit\nque je reviendrais."}, {"s": 2535.575, "e": 2538.453, "t": "Je veux leur montrer\nqu'on est encore une famille."}, {"s": 2548.504, "e": 2551.799, "t": "Mon travail maintenant\nc'est juste de rester en vie."}, {"s": 2556.763, "e": 2557.597, "t": "Une minute."}, {"s": 2560.183, "e": 2561.559, "t": "Un instant."}, {"s": 2563.895, "e": 2565.48, "t": "un pas à la fois."}, {"s": 2576.866, "e": 2578.743, "t": "Je commençais par me lever"}, {"s": 2578.743, "e": 2581.329, "t": "et descendre, faire du thé."}, {"s": 2581.329, "e": 2582.497, "t": "C'était mon acte de bravoure,"}, {"s": 2582.497, "e": 2585.625, "t": "parce que je pouvais pas\nsortir du lit."}, {"s": 2585.625, "e": 2588.67, "t": "Et puis c'était genre\nje vais retourner à l'épicerie"}, {"s": 2588.878, "e": 2590.672, "t": "ou je vais faire cette chose que Ravi"}, {"s": 2590.672, "e": 2592.256, "t": "et qu'on faisait ensemble."}, {"s": 2594.717, "e": 2597.762, "t": "Et finalement ça m'a menée à LA."}, {"s": 2600.181, "e": 2602.517, "t": "Après avoir gagné CNN Heroes,"}, {"s": 2602.517, "e": 2606.02, "t": "ils font cette formation\npour les associations."}, {"s": 2606.896, "e": 2608.981, "t": "Ravi voyageait avec moi,"}, {"s": 2609.774, "e": 2613.486, "t": "alors j'avais tout\nréservé pour moi et le bébé."}, {"s": 2619.701, "e": 2620.868, "t": "Je t'aime maman."}, {"s": 2620.868, "e": 2622.328, "t": "On se parle demain.\nMoi aussi je t'aime."}, {"s": 2623.621, "e": 2624.163, "t": "au revoir."}, {"s": 2624.706, "e": 2625.873, "t": "Salut."}, {"s": 2629.877, "e": 2633.089, "t": "Et c'est là que j'ai rencontré Jeremy."}, {"s": 2645.101, "e": 2645.935, "t": "Trop bien."}, {"s": 2650.398, "e": 2651.691, "t": "J'étais pas en état,"}, {"s": 2651.691, "e": 2654.527, "t": "surtout vu ce que\nje traversais,"}, {"s": 2654.527, "e": 2657.655, "t": "c'est juste, on pensait pas\nà ça comme ça."}, {"s": 2660.074, "e": 2663.327, "t": "On avait prévu d'aller\ndans le désert"}, {"s": 2664.37, "e": 2666.372, "t": "et cette nuit-là je\nn'arrivais pas à dormir."}, {"s": 2666.372, "e": 2669.083, "t": "J'avais encore le SSPT"}, {"s": 2669.959, "e": 2672.42, "t": "et il est venu\nme prendre dans ses bras"}, {"s": 2672.42, "e": 2673.796, "t": "et il a dit tu veux\nque je te tienne"}, {"s": 2673.796, "e": 2675.214, "t": "jusqu'à ce que tu t'endormes ?"}, {"s": 2705.453, "e": 2706.621, "t": "Je sentais comme"}, {"s": 2707.497, "e": 2709.373, "t": "une part de moi qui revenait."}, {"s": 2710.166, "e": 2711.667, "t": "petit à petit à petit."}, {"s": 2717.006, "e": 2718.633, "t": "C'est quel jour Golang?"}, {"s": 2718.633, "e": 2719.467, "t": "Vendredi!"}, {"s": 2720.802, "e": 2721.928, "t": "Oui je progresse."}, {"s": 2721.928, "e": 2726.307, "t": "Je me réveille heureuse\npuis toute cette merde."}, {"s": 2726.307, "e": 2730.019, "t": "et puis retour direct,\nau point de départ."}, {"s": 2730.019, "e": 2732.313, "t": "Tu me filmes\nen train de filmer?"}, {"s": 2732.313, "e": 2734.607, "t": "- Niveau supérieur.\n- Je t'interviewe."}, {"s": 2734.607, "e": 2735.566, "t": "Je t'interviewe."}, {"s": 2735.566, "e": 2737.235, "t": "Je gère tout avec Ravi."}, {"s": 2737.235, "e": 2739.195, "t": "Je gère juste pas\nsans lui, genre."}, {"s": 2744.283, "e": 2746.786, "t": "- Salut maman.\n- Nisha!"}, {"s": 2746.786, "e": 2748.704, "t": "- Salut maman.\n- Salut Maya."}, {"s": 2750.665, "e": 2752.667, "t": "Je sais. Félicitations."}, {"s": 2752.667, "e": 2754.961, "t": "J'ai hâte de voir\ntous vos bulletins."}, {"s": 2763.678, "e": 2765.429, "t": "- Salut maman.\n- Tu me manques."}, {"s": 2765.429, "e": 2766.931, "t": "Sois en bonne santé et forte, Maggie."}, {"s": 2766.931, "e": 2769.1, "t": "J'ai besoin que tu sois forte maintenant."}, {"s": 2769.1, "e": 2771.769, "t": "Je promets je vais\ntellement mieux."}, {"s": 2772.854, "e": 2773.521, "t": "Je te le promets."}, {"s": 2774.355, "e": 2776.357, "t": "Je comprends que tout retombe"}, {"s": 2776.357, "e": 2778.276, "t": "sur tes épaules,\nmais je vais bientôt revenir"}, {"s": 2778.276, "e": 2780.403, "t": "et on sera de nouveau\nensemble là-dedans."}, {"s": 2780.403, "e": 2784.031, "t": "On va être côte à côte et faire\ntout ça ensemble. D'accord ?"}, {"s": 2785.283, "e": 2787.243, "t": "C'est le pire moment de ma vie."}, {"s": 2787.952, "e": 2789.161, "t": "Je sais que c'est stressant."}, {"s": 2789.161, "e": 2792.123, "t": "Je sais que c'est dur.\nJe reviens dimanche."}, {"s": 2792.29, "e": 2793.666, "t": "C'est dans trois jours."}, {"s": 2793.958, "e": 2795.668, "t": "Même les Népalais\nmaris et femmes"}, {"s": 2795.668, "e": 2797.67, "t": "montrent pas d'affection\nen public."}, {"s": 2797.67, "e": 2799.297, "t": "Tu ne pourras même pas\ndeviner qui est marié."}, {"s": 2799.297, "e": 2800.673, "t": "C'est très différent."}, {"s": 2802.884, "e": 2803.843, "t": "Ça fait combien de temps"}, {"s": 2804.802, "e": 2806.095, "t": "que tu ne les as pas vus en personne ?"}, {"s": 2807.179, "e": 2808.097, "t": "Deux mois ?"}, {"s": 2809.974, "e": 2811.267, "t": "Oui."}, {"s": 2818.733, "e": 2821.777, "t": "La vérité c'est que je\nserais effondrée si je perdais"}, {"s": 2822.486, "e": 2824.447, "t": "l'un de mes enfants."}, {"s": 2825.406, "e": 2827.366, "t": "Il y a une grande part de moi"}, {"s": 2827.366, "e": 2830.244, "t": "j'ai l'impression de les avoir abandonnés"}, {"s": 2830.244, "e": 2833.039, "t": "et je veux juste qu'ils\nsachent que je suis reconnaissante"}, {"s": 2833.039, "e": 2835.374, "t": "pour chaque petit morceau\net chaque part d'eux."}, {"s": 2845.927, "e": 2848.846, "t": "Cher Namraj, nous avons été inséparables"}, {"s": 2848.846, "e": 2850.264, "t": "depuis le jour de ton arrivée."}, {"s": 2850.264, "e": 2852.35, "t": "Tu es né le jour de mon anniversaire"}, {"s": 2852.35, "e": 2853.392, "t": "et tu étais le plus beau cadeau."}, {"s": 2853.392, "e": 2855.311, "t": "Je t'ai connu quand tu étais\ndans le ventre de ta maman"}, {"s": 2855.311, "e": 2856.145, "t": "et tes parents sont repartis."}, {"s": 2856.145, "e": 2858.814, "t": "Cher petit Bishal,\ntu es toujours si courageux."}, {"s": 2858.814, "e": 2863.361, "t": "Chère Pabitra, j'adore voir ta\ngentillesse et ta sensibilité."}, {"s": 2863.361, "e": 2865.446, "t": "Asmita, ta douceur est incroyable."}, {"s": 2865.446, "e": 2866.53, "t": "J'adore ton sourire."}, {"s": 2866.53, "e": 2868.908, "t": "Chère Kojari, dès que je t'ai vue — merci."}, {"s": 2868.908, "e": 2870.284, "t": "Merci. Merci."}, {"s": 2870.284, "e": 2873.204, "t": "Maya signifie amour en népalais et toi —"}, {"s": 2873.204, "e": 2874.83, "t": "sont un des plus grands\namours de ma vie."}, {"s": 2874.83, "e": 2878.96, "t": "Chère Shanti, tu as les plus beaux yeux —"}, {"s": 2878.96, "e": 2882.129, "t": "chère Kalpana, j'ai hâte\nde te revoir bientôt -"}, {"s": 2882.129, "e": 2884.715, "t": "Peux-tu chanter encore.\nTu as la plus belle voix."}, {"s": 2884.715, "e": 2887.134, "t": "Cher Ganga. Cher Hari."}, {"s": 2887.343, "e": 2889.679, "t": "Je leur ai dit que je\nreviendrais et je veux revenir"}, {"s": 2889.679, "e": 2893.057, "t": "et je veux pouvoir\nêtre là pour eux."}, {"s": 2893.057, "e": 2894.141, "t": "Je ne sais pas ce que c'est —"}, {"s": 2894.141, "e": 2897.061, "t": "Je sais qu'ils luttent autant que moi."}, {"s": 2897.061, "e": 2898.813, "t": "Tu es élégante, tu es intelligente."}, {"s": 2898.813, "e": 2900.189, "t": "Est-ce que tu as la moindre idée\nde combien je suis fière de toi —"}, {"s": 2900.189, "e": 2903.192, "t": "Tu es venue à moi quand tu étais."}, {"s": 2903.192, "e": 2906.07, "t": "Malgré mes efforts -\net leur prouver que ça ira,"}, {"s": 2906.07, "e": 2907.113, "t": "que tout ira bien pour nous,"}, {"s": 2907.113, "e": 2908.739, "t": "qu'on va tous s'en sortir."}, {"s": 2908.739, "e": 2912.159, "t": "Chère - fille - tu es venue\navec ces grands yeux brillants."}, {"s": 2912.159, "e": 2915.997, "t": "Goma, c'est un — chère — je\ncrois que j'ai juste peur."}, {"s": 2915.997, "e": 2917.039, "t": "Cher Krishna,"}, {"s": 2917.039, "e": 2919.125, "t": "ton lien avec ta petite sœur"}, {"s": 2919.125, "e": 2920.251, "t": "et la façon dont tu veilles toujours"}, {"s": 2920.251, "e": 2922.211, "t": "sur elle est la chose la plus adorable."}, {"s": 2922.211, "e": 2924.964, "t": "Cher Nisha, mon amour, mon rire,"}, {"s": 2924.964, "e": 2927.675, "t": "mon cœur, ma joie."}, {"s": 2932.013, "e": 2934.39, "t": "Je veux leur montrer\nqu'on est encore une famille."}, {"s": 2995.785, "e": 2997.369, "t": "- Salut.\n- Jeremy."}, {"s": 2997.369, "e": 2999.08, "t": "- Namaste.\n- Tu as conduit tout seul ?"}, {"s": 2999.08, "e": 2999.663, "t": "Oui."}, {"s": 2999.663, "e": 3000.748, "t": "Vraiment ?"}, {"s": 3000.748, "e": 3001.916, "t": "Comment ça va ?"}, {"s": 3022.52, "e": 3025.106, "t": "Tu nous as tellement manqué."}, {"s": 3032.905, "e": 3035.116, "t": "Salut salut tout le monde."}, {"s": 3035.116, "e": 3036.867, "t": "Vous m'avez trop manqué."}, {"s": 3048.587, "e": 3050.422, "t": "- C'est Jeremy.\n- Salut."}, {"s": 3055.845, "e": 3057.346, "t": "Merci."}, {"s": 3058.722, "e": 3062.685, "t": "- C'est Jeremy.\n- Salut."}, {"s": 3062.685, "e": 3067.69, "t": "♪ Bienvenue chaleureuse, la la la la la ♪"}, {"s": 3067.69, "e": 3073.404, "t": "♪ Bienvenue à Kopila, la la la ♪"}, {"s": 3074.155, "e": 3077.366, "t": "Je suis tellement\ncontente d'être à la maison."}, {"s": 3077.366, "e": 3079.66, "t": "Vous m'avez tous manqué.\nC'est dingue."}, {"s": 3079.66, "e": 3083.497, "t": "J'ai pensé à vous\nchaque jour."}, {"s": 3083.497, "e": 3086.542, "t": "Et je suis désolée\nde pas avoir été là,"}, {"s": 3086.542, "e": 3088.878, "t": "mais je suis tellement\ncontente d'être de retour."}, {"s": 3088.878, "e": 3092.423, "t": "On pourra parler en petits\ngroupes quand j'arrête de pleurer."}, {"s": 3095.926, "e": 3097.261, "t": "Tu m'as manqué."}, {"s": 3099.346, "e": 3101.765, "t": "- Tu m'as manqué aussi.\n- Des photos."}, {"s": 3101.765, "e": 3103.058, "t": "C'est ta chambre?"}, {"s": 3103.058, "e": 3105.519, "t": "Oui. Qui est ici?"}, {"s": 3105.519, "e": 3108.939, "t": "Moi, Maya, Anjali et Kajori."}, {"s": 3108.939, "e": 3110.9, "t": "- Quatre.\n- Regarde maman."}, {"s": 3110.9, "e": 3115.446, "t": "Je sais, il y a moi\net Nisha et Ravi. Oui."}, {"s": 3116.488, "e": 3119.325, "t": "Où est ton, t'es encore\nen bleu?"}, {"s": 3119.325, "e": 3121.41, "t": "C'est encore si frais."}, {"s": 3123.829, "e": 3126.707, "t": "Je pense encore dans ma\ntête qu'il est toujours là."}, {"s": 3128.459, "e": 3130.127, "t": "Ça fait que trois mois."}, {"s": 3130.127, "e": 3132.004, "t": "Bienvenue chez Maggie."}, {"s": 3134.798, "e": 3136.717, "t": "Il est toujours\nleur petit frère."}, {"s": 3136.717, "e": 3139.303, "t": "Bon retour. Oh j'adore ça."}, {"s": 3139.303, "e": 3141.639, "t": "C'est trop beau. Oh."}, {"s": 3143.224, "e": 3146.81, "t": "C'est beau, bienvenue à la maison."}, {"s": 3146.81, "e": 3149.063, "t": "Regarde les étoiles\nque t'as faites."}, {"s": 3149.939, "e": 3151.607, "t": "Oh mon Dieu.\nTu nous manques trop."}, {"s": 3151.607, "e": 3153.776, "t": "Bienvenue à la maison maman."}, {"s": 3153.776, "e": 3156.57, "t": "Et on a changé tes couvertures."}, {"s": 3156.57, "e": 3157.571, "t": "Oh j'adore."}, {"s": 3157.571, "e": 3159.615, "t": "On fait une soirée pyjama\nce soir?"}, {"s": 3159.615, "e": 3162.076, "t": "Oui on peut tous aller dehors."}, {"s": 3162.076, "e": 3164.453, "t": "Merci d'avoir préparé\nma chambre."}, {"s": 3164.453, "e": 3167.164, "t": "Oh mon Dieu.\nJe veux lire toutes les lettres."}, {"s": 3172.294, "e": 3173.212, "t": "Maman ?"}, {"s": 3173.212, "e": 3174.296, "t": "Oui chérie?"}, {"s": 3175.547, "e": 3177.508, "t": "D'accord bonne nuit.\nBonne nuit."}, {"s": 3177.508, "e": 3178.801, "t": "Je t'aime."}, {"s": 3178.801, "e": 3181.595, "t": "- Je t'aime.\n- D'accord je reviens."}, {"s": 3183.847, "e": 3186.35, "t": "Ils sont tous si mignons."}, {"s": 3224.972, "e": 3225.889, "t": "Bonjour, tu as bien dormi ?"}, {"s": 3227.224, "e": 3228.892, "t": "Bonjour, tu as bien dormi ?"}, {"s": 3241.488, "e": 3244.158, "t": "♪ She's been my queen since we were 16 ♪"}, {"s": 3244.158, "e": 3247.286, "t": "♪ We want the same things,\nwe dream the same dreams ♪"}, {"s": 3247.286, "e": 3250.289, "t": "♪ She's been my queen since we were 16 ♪"}, {"s": 3250.289, "e": 3253.584, "t": "♪ We want the same things,\nwe dream the same dreams ♪"}, {"s": 3253.584, "e": 3256.92, "t": "♪ All right ♪"}, {"s": 3256.92, "e": 3260.549, "t": "♪ All right ♪"}, {"s": 3260.549, "e": 3263.719, "t": "♪ I know, I know ♪"}, {"s": 3263.719, "e": 3266.68, "t": "♪ I know for sure ♪"}, {"s": 3266.68, "e": 3269.683, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3269.683, "e": 3272.686, "t": "♪ Everybody wanna take her heart away ♪"}, {"s": 3272.686, "e": 3275.898, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3275.898, "e": 3279.109, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3279.109, "e": 3282.154, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3282.154, "e": 3285.908, "t": "♪ Everybody wanna take her heart away ♪"}, {"s": 3285.908, "e": 3289.161, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3289.161, "e": 3292.164, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3292.164, "e": 3294.291, "t": "♪ I know, I know ♪"}, {"s": 3294.291, "e": 3296.001, "t": "♪ I know for sure ♪"}, {"s": 3296.001, "e": 3299.129, "t": "♪ Everybody wanna ♪ ♪ Everybody wanna ♪"}, {"s": 3299.129, "e": 3301.84, "t": "♪ steal my girl ♪"}, {"s": 3312.684, "e": 3315.687, "t": "J'ai encore des déclencheurs\nchaque jour."}, {"s": 3316.855, "e": 3318.774, "t": "Je suis terrifiée qu'il\narrive quelque chose"}, {"s": 3318.774, "e": 3319.983, "t": "à l'un de ces enfants."}, {"s": 3322.277, "e": 3324.53, "t": "Je crois que c'est ça\nêtre parent."}, {"s": 3326.615, "e": 3327.783, "t": "T'as un cœur physique"}, {"s": 3327.783, "e": 3329.952, "t": "qui vit en dehors de ton corps."}, {"s": 3335.791, "e": 3337.751, "t": "Et puis tu le refais\nencore et encore."}, {"s": 3339.878, "e": 3341.672, "t": "Maintenant je les ai tous."}, {"s": 3344.633, "e": 3347.094, "t": "Tout peut arriver\nà tout moment."}, {"s": 3350.931, "e": 3353.142, "t": "Tu choisis de vivre en pensant"}, {"s": 3353.142, "e": 3355.269, "t": "que tes enfants vont mourir?"}, {"s": 3356.27, "e": 3358.856, "t": "Tu ne peux pas. Tu ne peux\npas vivre dans la peur."}, {"s": 3362.317, "e": 3366.738, "t": "Les enfants méritent une maman\nqui s'amuse et danse avec eux."}, {"s": 3370.659, "e": 3373.162, "t": "Je veux être\nla meilleure mère pour eux."}, {"s": 3376.457, "e": 3377.875, "t": "Tu t'inquiètes pour lui?"}, {"s": 3378.375, "e": 3381.753, "t": "À propos de lui à 12\nmètres dans l'arbre ? Oui."}, {"s": 3385.174, "e": 3387.092, "t": "On a encore du chemin."}, {"s": 3390.179, "e": 3392.181, "t": "Le grand test sera,"}, {"s": 3392.181, "e": 3395.184, "t": "est-ce que vous pouvez\nvous débrouiller seuls ?"}, {"s": 3404.693, "e": 3406.069, "t": "J'ai obtenu une bourse"}, {"s": 3406.069, "e": 3410.741, "t": "pour étudier au lycée\naux Pays-Bas."}, {"s": 3412.117, "e": 3414.953, "t": "Je me souviens que c'était\ntrès difficile pour moi parce que"}, {"s": 3415.954, "e": 3417.206, "t": "la mort de Ravi au Népal"}, {"s": 3417.206, "e": 3420.334, "t": "et puis j'ai dû aller\naux Pays-Bas juste après."}, {"s": 3424.88, "e": 3428.634, "t": "Nisha a été ajouté à un...\nC'était quoi, un chat Facebook ?"}, {"s": 3428.634, "e": 3430.052, "t": "Oui."}, {"s": 3430.052, "e": 3432.679, "t": "Et d'où venaient les enfants ?"}, {"s": 3432.679, "e": 3434.89, "t": "Grèce, Syrie, Pakistan,"}, {"s": 3434.89, "e": 3437.851, "t": "Afghanistan, Inde, Biélorussie,"}, {"s": 3438.393, "e": 3441.522, "t": "et Ukraine, Amérique."}, {"s": 3443.148, "e": 3444.608, "t": "Autre chose qui t'inquiète ?"}, {"s": 3444.608, "e": 3448.654, "t": "Non je sais juste pas\ncomment je vais m'en sortir."}, {"s": 3449.112, "e": 3451.24, "t": "Tu as déjà traversé tellement, alors"}, {"s": 3452.074, "e": 3453.116, "t": "le changement c'est dur."}, {"s": 3453.617, "e": 3455.244, "t": "Ça va être dur.\nTu peux t'y attendre."}, {"s": 3455.244, "e": 3457.829, "t": "Mais tu pourras aussi\nsurmonter n'importe quoi."}, {"s": 3459.164, "e": 3460.499, "t": "Pense à quel point c'est cool"}, {"s": 3460.499, "e": 3462.042, "t": "vivre en Europe un moment."}, {"s": 3465.629, "e": 3467.172, "t": "- T'es nerveux ?\n- Ouais."}, {"s": 3475.305, "e": 3477.099, "t": "Quarante-cinq minutes"}, {"s": 3477.099, "e": 3478.308, "t": "- Quoi ?\n- Encore une demi-heure."}, {"s": 3478.308, "e": 3482.187, "t": "jusqu'à ce que je rencontre"}, {"s": 3482.187, "e": 3484.731, "t": "je ne sais pas, 15 enfants."}, {"s": 3486.817, "e": 3488.61, "t": "Comment tu te sens ?"}, {"s": 3488.61, "e": 3491.154, "t": "Je t'ai dit, je vais vomir."}, {"s": 3493.407, "e": 3494.533, "t": "C'est tellement beau."}, {"s": 3494.533, "e": 3496.243, "t": "- Ouais.\n- C'est excitant."}, {"s": 3496.243, "e": 3499.496, "t": "N'est-ce pas ? C'est un\npeu émotionnel pour moi."}, {"s": 3499.496, "e": 3501.582, "t": "Mais ça va aller."}, {"s": 3504.96, "e": 3506.92, "t": "Je vais ranger ça ici."}, {"s": 3519.433, "e": 3520.684, "t": "D'accord."}, {"s": 3521.768, "e": 3522.728, "t": "Tu vas y aller ?"}, {"s": 3524.146, "e": 3524.98, "t": "Oui."}, {"s": 3526.815, "e": 3528.15, "t": "Au revoir."}, {"s": 3528.15, "e": 3529.484, "t": "Tu vas me manquer."}, {"s": 3532.738, "e": 3533.989, "t": "Je suis si fière de toi."}, {"s": 3533.989, "e": 3536.533, "t": "Oh. Merci Maman."}, {"s": 3540.579, "e": 3542.205, "t": "Je suis si fière de toi."}, {"s": 3542.205, "e": 3543.457, "t": "J'ai eu tellement de chance."}, {"s": 3544.291, "e": 3545.125, "t": "Oui."}, {"s": 3548.086, "e": 3549.463, "t": "T'es si courageuse.\nNon ça va."}, {"s": 3549.463, "e": 3550.547, "t": "Je suis juste si heureuse."}, {"s": 3550.547, "e": 3552.299, "t": "Je suis si heureuse pour toi."}, {"s": 3553.133, "e": 3554.551, "t": "Tu vas être géniale.\nD'accord ?"}, {"s": 3555.344, "e": 3555.969, "t": "Tu vas très bien t'en sortir. D'accord ?"}, {"s": 3557.763, "e": 3559.264, "t": "Je suis si fière de toi."}, {"s": 3562.1, "e": 3563.977, "t": "Je t'aime, je t'aime,\nje t'aime."}, {"s": 3563.977, "e": 3565.854, "t": "Je t'aime, je t'aime,\nje t'aime, je t'aime."}, {"s": 3565.854, "e": 3567.23, "t": "Travaille bien. D'accord ? Oui."}, {"s": 3567.23, "e": 3568.982, "t": "Si t'as besoin de quoi que\nce soit, écris-moi."}, {"s": 3568.982, "e": 3570.984, "t": "- Ouais.\n- N'importe quoi. D'accord ?"}, {"s": 3570.984, "e": 3572.527, "t": "Si tu as besoin de quoi que\nce soit, envoie-moi un message."}, {"s": 3595.342, "e": 3596.176, "t": "D'accord."}, {"s": 3604.184, "e": 3605.727, "t": "Qu'est-ce qui se passe ?\nTu vas bien ?"}, {"s": 3605.727, "e": 3607.354, "t": "Nisha me manque aujourd'hui et"}, {"s": 3608.397, "e": 3611.316, "t": "ça ne va pas sans lui."}, {"s": 3611.733, "e": 3613.902, "t": "Il me manque à l'arrière\nde la voiture"}, {"s": 3613.902, "e": 3615.612, "t": "et il me manque autour de moi."}, {"s": 3615.612, "e": 3618.281, "t": "Il me manque dans la poussette\net il me manque"}, {"s": 3618.281, "e": 3619.95, "t": "le sac à couches et"}, {"s": 3622.244, "e": 3623.537, "t": "tu veux m'endormir ?"}, {"s": 3623.537, "e": 3625.747, "t": "J'ai des pensées sombres\naujourd'hui."}, {"s": 3628.583, "e": 3630.085, "t": "Tu entends ?"}, {"s": 3630.085, "e": 3631.002, "t": "J'ai des pensées noires\naujourd'hui."}, {"s": 3633.922, "e": 3636.174, "t": "La nouvelle lune.\nLa plus proche c'est Mars"}, {"s": 3636.174, "e": 3638.552, "t": "parce que c'est quand même,"}, {"s": 3638.552, "e": 3640.262, "t": "c'est un peu plus rouge ?"}, {"s": 3640.262, "e": 3642.597, "t": "Tu sais, pour que je puisse-"}, {"s": 3645.851, "e": 3647.728, "t": "- Bonjour.\n- Bonjour."}, {"s": 3652.733, "e": 3654.317, "t": "Tes frères t'ont manqué ?"}, {"s": 3660.031, "e": 3661.366, "t": "C'est vrai. D'accord."}, {"s": 3662.325, "e": 3663.16, "t": "T'as un long chemin à faire."}, {"s": 3663.16, "e": 3664.411, "t": "Faut prendre ton temps."}, {"s": 3666.246, "e": 3668.54, "t": "Jeremy quand est-ce que\ntu vas te marier ?"}, {"s": 3668.54, "e": 3671.042, "t": "- Maggie.\n- Quand je devrais ?"}, {"s": 3671.042, "e": 3672.419, "t": "Ce soir."}, {"s": 3672.419, "e": 3674.129, "t": "Ouais aujourd'hui.\nAujourd'hui ouais."}, {"s": 3674.129, "e": 3674.963, "t": "J'ai pas de,"}, {"s": 3674.963, "e": 3676.047, "t": "j'ai pas de bague sur moi."}, {"s": 3676.047, "e": 3677.674, "t": "Achète une bague au marché."}, {"s": 3677.674, "e": 3679.134, "t": "- Non non.\n- Apporte juste une"}, {"s": 3679.134, "e": 3682.22, "t": "rose en plastique et dis\ngenre « Oui »"}, {"s": 3682.22, "e": 3683.764, "t": "et ils vont danser."}, {"s": 3685.098, "e": 3686.808, "t": "Tu penses que tout le monde\nserait d'accord ?"}, {"s": 3686.808, "e": 3687.726, "t": "- Ouais.\n- Ouais ouais-"}, {"s": 3687.726, "e": 3690.687, "t": "Tout le monde serait content."}, {"s": 3720.842, "e": 3722.469, "t": "Salut tout le monde."}, {"s": 3722.469, "e": 3724.095, "t": "Salut."}, {"s": 3726.264, "e": 3727.557, "t": "Salut."}, {"s": 3727.557, "e": 3729.476, "t": "- Salut.\n- Vous nous entendez bien ?"}, {"s": 3729.476, "e": 3730.852, "t": "- Oui.\n- Ouais."}, {"s": 3731.478, "e": 3733.73, "t": "Alors on a une nouvelle."}, {"s": 3733.73, "e": 3735.857, "t": "Jeremy m'a demandée en mariage,"}, {"s": 3735.857, "e": 3738.527, "t": "alors on va se marier au Népal."}, {"s": 3753.542, "e": 3756.086, "t": "Prenons le petit-déjeuner\net allons dans notre chambre."}, {"s": 3774.521, "e": 3777.232, "t": "Je suis ici avec toi depuis 10 ans,"}, {"s": 3777.232, "e": 3779.818, "t": "plus d'années que j'ai passé"}, {"s": 3779.818, "e": 3782.863, "t": "avec ma famille biologique."}, {"s": 3782.863, "e": 3786.491, "t": "Tu as l'impression que\nc'est un nouveau chapitre ?"}, {"s": 3787.367, "e": 3789.077, "t": "C'est un nouveau chapitre pour moi."}, {"s": 3790.37, "e": 3792.873, "t": "Je suis passé d'enfant à jeune adulte"}, {"s": 3795.083, "e": 3798.92, "t": "et maintenant c'est le moment\nd'être plus moi-même"}, {"s": 3799.754, "e": 3801.882, "t": "et moins dépendant des autres."}, {"s": 3810.557, "e": 3811.474, "t": "Bravo."}, {"s": 3812.475, "e": 3814.436, "t": "Genre je me sentais très triste"}, {"s": 3815.437, "e": 3818.023, "t": "et j'ai réalisé combien\nla famille est importante."}, {"s": 3829.91, "e": 3836.333, "t": "Krishna, Krishna !"}, {"s": 3836.333, "e": 3838.293, "t": "Krishna,"}, {"s": 3838.293, "e": 3839.586, "t": "chaque souvenir"}, {"s": 3839.586, "e": 3842.422, "t": "que j'ai ici t'inclut."}, {"s": 3842.422, "e": 3844.132, "t": "Depuis le tout début"}, {"s": 3844.132, "e": 3847.552, "t": "quand tu étais vraiment tout petit."}, {"s": 3847.552, "e": 3849.387, "t": "Ce sera plus pareil sans toi."}, {"s": 3849.387, "e": 3852.432, "t": "Je vais détester me réveiller\net que tu ne sois pas là."}, {"s": 3853.141, "e": 3855.56, "t": "On a construit ce foyer\nensemble."}, {"s": 3855.936, "e": 3858.772, "t": "On a porté chaque brique\net fait toutes les règles"}, {"s": 3858.772, "e": 3861.232, "t": "et décidé comment on voulait\nêtre en tant que famille."}, {"s": 3861.232, "e": 3862.776, "t": "Alors je te remercie."}, {"s": 3863.401, "e": 3866.112, "t": "Chaque moment va me manquer."}, {"s": 3867.238, "e": 3868.156, "t": "Je t'aime."}, {"s": 3880.752, "e": 3883.922, "t": "Pour moi ce sont les\ngens qui font la famille."}, {"s": 3890.637, "e": 3893.682, "t": "Pas besoin d'être lié par\nle sang"}, {"s": 3894.933, "e": 3896.601, "t": "pour créer un lien."}, {"s": 3898.269, "e": 3901.523, "t": "Aussi forts que nous, les enfants\nde Kopila ont construit ensemble."}, {"s": 3905.944, "e": 3907.737, "t": "[Je m'en vais.]"}, {"s": 3907.737, "e": 3909.364, "t": "[On avance.]"}, {"s": 3943.481, "e": 3944.441, "t": "Aw."}, {"s": 3947.694, "e": 3949.404, "t": "Regarde si tu comptes les\npoints sur leur dos,"}, {"s": 3949.404, "e": 3951.573, "t": "tu sais quel âge ils ont."}, {"s": 3953.908, "e": 3956.411, "t": "On avait attendu si longtemps."}, {"s": 3956.411, "e": 3959.998, "t": "On n'avait accueilli aucun enfant\npendant cette période de deuil d'"}, {"s": 3960.665, "e": 3961.875, "t": "environ un an."}, {"s": 3966.963, "e": 3968.965, "t": "Mais je pensais beaucoup\naux autres enfants"}, {"s": 3968.965, "e": 3971.885, "t": "et comment ils vivraient\navec un autre bébé,"}, {"s": 3971.885, "e": 3975.972, "t": "en s'assurant qu'elle ne se sentait pas"}, {"s": 3989.069, "e": 3993.239, "t": "Tope a reçu un appel pour\nun cas d'urgence"}, {"s": 3993.239, "e": 3995.033, "t": "du gouvernement local."}, {"s": 4003.083, "e": 4006.669, "t": "Le meilleur endroit pour\nun enfant"}, {"s": 4006.669, "e": 4009.464, "t": "c'est dans sa communauté\navec sa famille."}, {"s": 4011.091, "e": 4014.094, "t": "Mais si un enfant n'est pas\nen sécurité,"}, {"s": 4014.094, "e": 4016.179, "t": "qu'il n'a nulle part où aller,"}, {"s": 4016.179, "e": 4019.516, "t": "personne pour s'occuper de lui,\nil nous faut une option,"}, {"s": 4019.516, "e": 4021.726, "t": "et on doit prendre ces\ndécisions très difficiles,"}, {"s": 4021.726, "e": 4023.853, "t": "et on le fait avec le soutien\nde travailleurs sociaux,"}, {"s": 4023.853, "e": 4026.981, "t": "avec des conseillers,\ndes leaders communautaires."}, {"s": 4026.981, "e": 4030.068, "t": "Et ce n'est pas une décision\nqu'on prend à la légère."}, {"s": 4035.031, "e": 4036.866, "t": "On avait fait mille autres choses"}, {"s": 4036.866, "e": 4039.953, "t": "avant que cet enfant\narrive au foyer"}, {"s": 4039.953, "e": 4043.665, "t": "et pourtant 2% du temps\non doit intervenir."}, {"s": 4043.665, "e": 4045.792, "t": "Et c'est vraiment le dernier recours."}, {"s": 4045.792, "e": 4047.794, "t": "Loin de la ville,\npas d'accès à l'eau."}, {"s": 4047.794, "e": 4049.504, "t": "Il n'y a même pas d'hôpital"}, {"s": 4049.504, "e": 4051.506, "t": "ni d'école, rien du tout."}, {"s": 4057.011, "e": 4057.971, "t": "C'est la maison"}, {"s": 4059.722, "e": 4061.307, "t": "au milieu de nulle part."}, {"s": 4062.976, "e": 4064.269, "t": "[La maison est là, monsieur.]"}, {"s": 4064.269, "e": 4065.562, "t": "[Celle-là ?]"}, {"s": 4071.901, "e": 4073.361, "t": "[Les enfants savent ce qui\nest arrivé à leur mère?]"}, {"s": 4074.696, "e": 4077.24, "t": "[Non. Les enfants savent pas.\nIls dormaient.]"}, {"s": 4079.367, "e": 4081.286, "t": "[Personne d'autre n'était là la nuit.]"}, {"s": 4081.286, "e": 4083.413, "t": "[Juste la mère et les deux filles.]"}, {"s": 4093.339, "e": 4096.926, "t": "Coucou! [parle népalais] Coucou."}, {"s": 4096.926, "e": 4098.511, "t": "Maman."}, {"s": 4100.221, "e": 4102.14, "t": "Coucou."}, {"s": 4109.981, "e": 4112.65, "t": "[On va aller en voiture, d'accord ?]"}, {"s": 4142.18, "e": 4146.893, "t": "Dis bonjour. C'est une petite fille."}, {"s": 4148.102, "e": 4149.562, "t": "Devinez comment elle s'appelle ?"}, {"s": 4149.896, "e": 4151.522, "t": "Khusi. [Heureuse]"}, {"s": 4151.856, "e": 4153.524, "t": "Heureuse"}, {"s": 4154.734, "e": 4156.611, "t": "C'est Khusbu\n[Sent Bon]."}, {"s": 4156.611, "e": 4158.696, "t": "- Khusbu.\n- Khusbu"}, {"s": 4159.197, "e": 4160.698, "t": "C'est très important qu'on"}, {"s": 4160.698, "e": 4164.244, "t": "enlève tous les petits objets\nde la maison,"}, {"s": 4164.244, "e": 4165.787, "t": "tout ce qui pourrait,"}, {"s": 4165.787, "e": 4166.996, "t": "qu'elle pourrait mettre\ndans sa bouche"}, {"s": 4166.996, "e": 4171.376, "t": "et les prochains jours, on a besoin de\nl'aide de tout le monde, d'accord?"}, {"s": 4180.593, "e": 4182.262, "t": "Le nom de Khusi c'est joie."}, {"s": 4182.971, "e": 4185.265, "t": "Elle a littéralement apporté ça\ndans notre foyer à un moment"}, {"s": 4185.265, "e": 4187.85, "t": "où on pensait qu'on pourrait\nplus jamais aimer"}, {"s": 4187.85, "e": 4190.853, "t": "un bébé comme on l'avait aimé lui."}, {"s": 4194.19, "e": 4196.609, "t": "Je me souviens avoir dit aux enfants\n\"On est toujours une famille,"}, {"s": 4196.609, "e": 4198.027, "t": "on est toujours une famille,\non est toujours une famille.\""}, {"s": 4198.027, "e": 4200.738, "t": "Et je pense qu'amener\nKhusi et Khusbu"}, {"s": 4200.738, "e": 4204.2, "t": "et leur montrer\nqu'on pouvait continuer,"}, {"s": 4205.618, "e": 4209.122, "t": "ça nous a fait croire\nqu'on peut le refaire."}, {"s": 4210.999, "e": 4213.459, "t": "On va avoir toute une nouvelle\ngarde-robe au centre femmes."}, {"s": 4269.974, "e": 4271.642, "t": "Qu'est-ce qui est fini ?"}, {"s": 4271.642, "e": 4274.228, "t": "- Expérience.\n- Ton expérience est finie?"}, {"s": 4274.562, "e": 4276.439, "t": "T'as besoin d'allumettes ou..."}, {"s": 4278.066, "e": 4280.735, "t": "Santosh, sérieusement, ne mets pas le feu."}, {"s": 4281.444, "e": 4284.155, "t": "Tout le monde fait un câlin."}, {"s": 4285.573, "e": 4289.66, "t": "Je traversais mon propre\ndeuil intérieur et ma honte"}, {"s": 4289.66, "e": 4291.537, "t": "et je me sentais nulle."}, {"s": 4292.038, "e": 4293.414, "t": "Je vous aime."}, {"s": 4293.414, "e": 4295.5, "t": "- On t'aime.\n- Moi aussi je t'aime."}, {"s": 4295.5, "e": 4297.585, "t": "Je reviens très vite."}, {"s": 4297.585, "e": 4300.63, "t": "Tout en me disant\n\"Bon il faut retrouver"}, {"s": 4300.63, "e": 4302.048, "t": "l'ancienne toi"}, {"s": 4303.216, "e": 4304.509, "t": "qui est toujours la PDG"}, {"s": 4304.509, "e": 4306.511, "t": "d'une grande organisation."}, {"s": 4308.888, "e": 4313.101, "t": "On gère une immense école\ncommunautaire, un centre pour femmes,"}, {"s": 4313.101, "e": 4315.061, "t": "un foyer sûr pour les filles."}, {"s": 4315.061, "e": 4318.189, "t": "On était une équipe\nde 125 personnes."}, {"s": 4318.189, "e": 4321.859, "t": "Tous entièrement\ndépendants de moi"}, {"s": 4321.859, "e": 4323.027, "t": "et ma capacité à sortir"}, {"s": 4323.027, "e": 4326.322, "t": "et de lever des fonds\net faire vivre notre famille."}, {"s": 4331.369, "e": 4335.373, "t": "Je ne savais pas si je pourrais un\njour me lever et parler à nouveau."}, {"s": 4344.632, "e": 4347.385, "t": "Bonjour tout le monde.\nC'est une salle remarquable."}, {"s": 4347.385, "e": 4349.178, "t": "MLK a donné un discours ici,"}, {"s": 4349.178, "e": 4352.723, "t": "tout comme Hillary Clinton\net aujourd'hui Maggie Doyne."}, {"s": 4359.981, "e": 4362.9, "t": "C'est le premier discours\nque je donne depuis longtemps."}, {"s": 4365.153, "e": 4368.322, "t": "L'amour est une belle chose"}, {"s": 4369.073, "e": 4371.909, "t": "et c'est la chose\nà laquelle on doit s'accrocher"}, {"s": 4371.909, "e": 4373.786, "t": "et la seule chose qui pourra,"}, {"s": 4373.786, "e": 4376.247, "t": "en un million d'années,\nguérir le monde dans l'état"}, {"s": 4376.247, "e": 4377.582, "t": "dans lequel on vit."}, {"s": 4380.918, "e": 4382.336, "t": "dans un million d'années, guérir\nle monde dans l'état"}, {"s": 4393.014, "e": 4394.056, "t": "Tu veux le voir?"}, {"s": 4394.432, "e": 4395.975, "t": "Qu'est-ce que ça dit?"}, {"s": 4398.186, "e": 4399.645, "t": "Je suis enceinte."}, {"s": 4400.438, "e": 4401.981, "t": "Ça dit..."}, {"s": 4404.484, "e": 4405.443, "t": "Oh mon Dieu."}, {"s": 4411.115, "e": 4412.825, "t": "Franchement tu me mens.\nJe sais que tu me mens."}, {"s": 4412.825, "e": 4414.118, "t": "Maggie, excuse-moi."}, {"s": 4414.285, "e": 4415.912, "t": "- Je ne mens pas.\n- Je te pince ?"}, {"s": 4415.912, "e": 4417.872, "t": "Tu me mens? Tu me mens."}, {"s": 4417.872, "e": 4419.207, "t": "Ne me mens pas, Maggie."}, {"s": 4419.207, "e": 4420.5, "t": "Tu veux que je jure sur quoi?"}, {"s": 4420.5, "e": 4421.542, "t": "Je suis à quatre mois."}, {"s": 4426.589, "e": 4428.925, "t": "Tu penses que je pourrais\naccoucher à Surkhet"}, {"s": 4428.925, "e": 4430.593, "t": "ou que je devrais retourner en Amérique ?"}, {"s": 4430.593, "e": 4432.428, "t": "Si tu as ce bébé aux États-Unis,"}, {"s": 4432.428, "e": 4434.305, "t": "c'est plus sûr."}, {"s": 4434.555, "e": 4436.724, "t": "Ici, beaucoup de gens meurent comme ça."}, {"s": 4442.897, "e": 4446.984, "t": "Mais pour l'ONG, ton rôle\nce sera pareil ou différent?"}, {"s": 4451.239, "e": 4452.99, "t": "Hé!"}, {"s": 4453.407, "e": 4455.952, "t": "Salut Ganga hé Nav."}, {"s": 4456.994, "e": 4459.121, "t": "Oh regarde cette dent?"}, {"s": 4459.121, "e": 4461.374, "t": "T'as une nouvelle dent?\nFais voir."}, {"s": 4462.833, "e": 4465.044, "t": "Je peux voir?"}, {"s": 4465.044, "e": 4465.878, "t": "Salut !"}, {"s": 4467.338, "e": 4468.422, "t": "Je veux."}, {"s": 4468.422, "e": 4469.84, "t": "Qu'est-ce que tu fais?"}, {"s": 4469.84, "e": 4472.301, "t": "Mes futurs enfants biologiques"}, {"s": 4472.301, "e": 4473.761, "t": "vont grandir avec vous tous."}, {"s": 4474.971, "e": 4477.598, "t": "Ils seront les enfants\nles plus chanceux au monde."}, {"s": 4477.598, "e": 4480.434, "t": "Combien d'enfants arrivent\ndans une famille comme la nôtre"}, {"s": 4480.434, "e": 4484.105, "t": "avec tous ces\nfrères et sœurs?"}, {"s": 4485.481, "e": 4486.899, "t": "Tout cet amour?"}, {"s": 4505.209, "e": 4505.751, "t": "Un jour"}, {"s": 4505.751, "e": 4507.086, "t": "notre maman a ramené un gentil"}, {"s": 4507.086, "e": 4507.962, "t": "Elle n'avait même pas\nbesoin de nous le dire"}, {"s": 4507.962, "e": 4509.922, "t": "Elle n'avait même pas\nbesoin de nous le dire"}, {"s": 4510.298, "e": 4512.466, "t": "Elle l'a présenté comme un ami."}, {"s": 4512.466, "e": 4513.843, "t": "Il s'est avéré être un amoureux."}, {"s": 4515.761, "e": 4517.346, "t": "Elle n'a même pas eu à nous le dire"}, {"s": 4517.346, "e": 4520.099, "t": "parce que ses sentiments\nétaient si évidents."}, {"s": 4520.099, "e": 4521.809, "t": "Elle ne sait pas les cacher."}, {"s": 4521.809, "e": 4523.769, "t": "C'est ce que j'adore\nle plus chez elle."}, {"s": 4524.729, "e": 4526.23, "t": "Câlin familial."}, {"s": 4543.623, "e": 4545.458, "t": "Prête ? Essaie."}, {"s": 4555.968, "e": 4558.888, "t": "Allez [parle népalais] Khusi."}, {"s": 4558.888, "e": 4562.725, "t": "Khusi Khusi Khusi Khus,\ntu peux le faire. Allez."}, {"s": 4562.725, "e": 4564.185, "t": "Tu peux le faire. Regarde."}, {"s": 4591.837, "e": 4595.007, "t": "Je connaissais la maternité\ndans cette dimension,"}, {"s": 4602.014, "e": 4604.642, "t": "mais je n'avais jamais vécu\nun accouchement."}, {"s": 4609.98, "e": 4611.732, "t": "J'avais tellement peur."}, {"s": 4613.984, "e": 4617.321, "t": "Peur que ce soit juste\nencore une chose de plus"}, {"s": 4617.321, "e": 4620.449, "t": "que j'aimerais et qu'on\nm'enlèverait simplement."}, {"s": 4626.747, "e": 4629.542, "t": "Mais c'est aussi le risque\nqu'on prend en aimant."}, {"s": 4633.212, "e": 4636.173, "t": "Qui es-tu ? Qui es-tu ?"}, {"s": 4637.258, "e": 4640.344, "t": "Je me dis que c'est bien\nqu'on parte à huit mois."}, {"s": 4641.053, "e": 4644.64, "t": "C'est juste dommage que les enfants\npuissent pas voir le bébé tout de suite."}, {"s": 4644.64, "e": 4647.226, "t": "C'est la seule partie\ndifficile."}, {"s": 4648.519, "e": 4650.271, "t": "Tout le monde est là?"}, {"s": 4651.147, "e": 4653.399, "t": "Câlin de groupe."}, {"s": 4653.399, "e": 4655.276, "t": "- Groupe groupe.\n- Câlin de groupe."}, {"s": 4657.611, "e": 4658.904, "t": "[Viens ici !]"}, {"s": 4660.156, "e": 4661.407, "t": "Je t'aime."}, {"s": 4662.616, "e": 4663.617, "t": "Au revoir."}, {"s": 4663.617, "e": 4664.452, "t": "Au revoir."}, {"s": 4667.913, "e": 4669.081, "t": "Bon. C'est une bonne décision."}, {"s": 4669.081, "e": 4670.082, "t": "Je me sens bien."}, {"s": 4671.125, "e": 4672.042, "t": "Mais je dilate pas."}, {"s": 4672.042, "e": 4673.753, "t": "Je vais pas faire ça\npendant huit jours."}, {"s": 4673.753, "e": 4674.92, "t": "Non c'est sûr."}, {"s": 4676.756, "e": 4678.591, "t": "Tu as tout donné."}, {"s": 4678.591, "e": 4680.217, "t": "Je veux juste que\nle bébé aille bien."}, {"s": 4680.217, "e": 4681.051, "t": "Tout à fait."}, {"s": 4681.969, "e": 4683.471, "t": "D'accord. Merci."}, {"s": 4685.055, "e": 4686.223, "t": "D'accord. Au revoir."}, {"s": 4687.683, "e": 4689.81, "t": "Il veut faire\nune césarienne."}, {"s": 4689.81, "e": 4691.02, "t": "Sortez le bébé, le bébé souffre."}, {"s": 4692.229, "e": 4694.315, "t": "Sortez le bébé, le bébé souffre."}, {"s": 4727.264, "e": 4728.516, "t": "- Oh là là.\n- 22."}, {"s": 4728.516, "e": 4731.06, "t": "- C'est une petite fille.\n- Oh !"}, {"s": 4737.691, "e": 4739.36, "t": "- Elle pleure ?\n- C'était quoi ça ?"}, {"s": 4739.36, "e": 4740.528, "t": "Petit bébé."}, {"s": 4741.529, "e": 4742.404, "t": "Mais elle va bien."}, {"s": 4748.285, "e": 4751.831, "t": "Les résultats sont là\net on dirait que"}, {"s": 4751.831, "e": 4754.416, "t": "l'infection se propage."}, {"s": 4754.416, "e": 4755.96, "t": "Ils ne savent pas ce qui le cause."}, {"s": 4758.337, "e": 4760.005, "t": "Je veux juste sortir de cet hôpital"}, {"s": 4761.924, "e": 4765.928, "t": "et je veux que notre petite\nfille soit en bonne santé"}, {"s": 4765.928, "e": 4768.764, "t": "et je veux pouvoir dormir\ndans la même chambre qu'elle."}, {"s": 4776.146, "e": 4777.022, "t": "Qu'est-ce qui va pas ?"}, {"s": 4777.481, "e": 4778.732, "t": "Je veux rentrer à la maison."}, {"s": 4795.875, "e": 4796.709, "t": "D'accord."}, {"s": 4816.103, "e": 4818.188, "t": "On rentre à la maison."}, {"s": 4819.481, "e": 4822.234, "t": "Je vais de ce côté.\nHé maman."}, {"s": 4822.234, "e": 4825.321, "t": "Salut mes petits chéris,"}, {"s": 4825.321, "e": 4826.488, "t": "comment allez-vous ?"}, {"s": 4827.781, "e": 4829.992, "t": "Je vois une petite Khusi."}, {"s": 4829.992, "e": 4834.288, "t": "Salut Khusi. Khusi,\ntu veux voir Ruby Sunshine ?"}, {"s": 4834.705, "e": 4836.04, "t": "C'est Ruby."}, {"s": 4836.916, "e": 4837.917, "t": "[Petite sœur.]"}, {"s": 4838.208, "e": 4839.627, "t": "[Ta petite sœur.]"}, {"s": 4841.128, "e": 4843.881, "t": "Le deuxième prénom\nde Ruby c'est Sunshine."}, {"s": 4845.007, "e": 4848.469, "t": "C'est une façon simple\nd'honorer Ravi,"}, {"s": 4849.219, "e": 4853.223, "t": "dont le nom signifiait lumière du soleil."}, {"s": 4854.266, "e": 4854.934, "t": "Regarde."}, {"s": 4875.371, "e": 4876.413, "t": "Bonjour."}, {"s": 4878.999, "e": 4881.21, "t": "Dis bonjour, oh."}, {"s": 4887.841, "e": 4889.551, "t": "C'est bon de te voir."}, {"s": 4889.551, "e": 4892.012, "t": "T'as l'air si grande."}, {"s": 4902.064, "e": 4903.232, "t": "Nisha Gharti."}, {"s": 4919.498, "e": 4921.166, "t": "T'as emballé tes photos\net tout ?"}, {"s": 4921.166, "e": 4922.626, "t": "Tout."}, {"s": 4930.509, "e": 4932.678, "t": "Comment tu vas tonton !\nOuais."}, {"s": 4934.513, "e": 4935.848, "t": "Salut tata, salut, bonjour."}, {"s": 4939.351, "e": 4940.477, "t": "Salut bonjour."}, {"s": 4951.155, "e": 4955.868, "t": "Oh mon Dieu.\nOh c'est pas possible."}, {"s": 4955.868, "e": 4958.078, "t": "[Merci.]"}, {"s": 4958.078, "e": 4960.789, "t": "Namaste !\n[La plus jeune fille.]"}, {"s": 4960.789, "e": 4963.083, "t": "[La voilà.]"}, {"s": 4964.418, "e": 4965.252, "t": "[Merci.]"}, {"s": 4966.795, "e": 4968.422, "t": "Khusi !"}, {"s": 4970.049, "e": 4971.258, "t": "Dis bonjour."}, {"s": 4974.428, "e": 4975.846, "t": "Elle est si grande."}, {"s": 4987.191, "e": 4989.234, "t": "Je me souviens avoir eu\nsi peur"}, {"s": 4989.234, "e": 4992.321, "t": "Oh. De ne pas l'aimer\nautant."}, {"s": 4992.321, "e": 4994.156, "t": "Jeremy, t'es où ?"}, {"s": 4995.532, "e": 4997.076, "t": "Comment rendre ça égal"}, {"s": 4997.076, "e": 5000.454, "t": "ou est-ce qu'il y aurait de la\njalousie ou des sentiments bizarres ?"}, {"s": 5002.831, "e": 5003.665, "t": "Et puis"}, {"s": 5005.459, "e": 5007.461, "t": "comme avec chaque\nautre enfant,"}, {"s": 5009.546, "e": 5011.799, "t": "elle s'intègre parfaitement\ndans le tableau."}, {"s": 5011.882, "e": 5012.674, "t": "[Une...]"}, {"s": 5012.674, "e": 5013.383, "t": "[Deux...]"}, {"s": 5013.383, "e": 5014.009, "t": "[Trois...]"}, {"s": 5014.009, "e": 5015.052, "t": "[Quatre...]"}, {"s": 5015.052, "e": 5016.136, "t": "[Cinq grandes sœurs !]"}, {"s": 5016.136, "e": 5017.721, "t": "[Et combien de frères ?]"}, {"s": 5026.647, "e": 5028.565, "t": "Avoir Ruby et Khusi ici"}, {"s": 5028.565, "e": 5030.901, "t": "a aidé tant d'enfants\nà guérir."}, {"s": 5032.194, "e": 5033.57, "t": "Salut Khus."}, {"s": 5034.53, "e": 5035.823, "t": "Ça m'a pris du temps,"}, {"s": 5035.823, "e": 5040.035, "t": "mais c'est là que j'ai vraiment\ncompris que je pouvais avancer."}, {"s": 5040.661, "e": 5042.079, "t": "Je peux aimer à nouveau."}, {"s": 5074.153, "e": 5077.322, "t": "C'est la douleur d'être humain."}, {"s": 5077.322, "e": 5079.908, "t": "Il faut traverser des épreuves"}, {"s": 5079.908, "e": 5083.162, "t": "et tu dois faire un choix."}, {"s": 5083.162, "e": 5087.749, "t": "Il faut rechoisir l'amour.\nIl faut rechoisir la joie."}, {"s": 5089.334, "e": 5090.21, "t": "Je l'ai vu. J'ai vu\nce que l'amour fait."}, {"s": 5091.461, "e": 5093.839, "t": "Je l'ai vu. J'ai vu\nce que l'amour fait."}, {"s": 5095.257, "e": 5097.968, "t": "C'est le fil qui nous relie tous."}, {"s": 5103.515, "e": 5106.518, "t": "Et je choisis de faire\ntout ce que je peux"}, {"s": 5106.518, "e": 5109.062, "t": "avec cette précieuse vie"}, {"s": 5109.062, "e": 5111.064, "t": "pour laisser cet endroit\nun peu meilleur"}, {"s": 5111.064, "e": 5112.983, "t": "pour la prochaine\ngénération."}, {"s": 5116.737, "e": 5120.032, "t": "s'il y a quelque chose\nqui m'enthousiasme le plus"}, {"s": 5120.032, "e": 5121.575, "t": "pour l'avenir, c'est\nqu'on peut voir"}, {"s": 5121.575, "e": 5124.077, "t": "nos petits Krishna\nde 5 ans"}, {"s": 5124.077, "e": 5127.664, "t": "et nos Nisha partir\ndans le monde et s'épanouir."}, {"s": 5130.209, "e": 5135.255, "t": "[Ça va bien, sœur.\nJe pars dimanche.]"}, {"s": 5136.089, "e": 5141.929, "t": "[Travaille bien et postule\naux universités comme moi.]"}, {"s": 5141.929, "e": 5146.892, "t": "[Tu nous enverras des iPhones\nen arrivant en Amérique ?]"}, {"s": 5150.479, "e": 5153.565, "t": "Parfois je me dis que\nj'ai dépassé"}, {"s": 5153.565, "e": 5155.567, "t": "quatre ou cinq génération."}, {"s": 5156.693, "e": 5161.49, "t": "C'est le temps qu'il m'a\nfallu pour arriver où j'en suis."}, {"s": 5161.49, "e": 5163.367, "t": "Cinq génération\npour être ici."}, {"s": 5165.619, "e": 5167.496, "t": "La première génération\nce serait moi allant"}, {"s": 5167.496, "e": 5169.456, "t": "à une école publique."}, {"s": 5169.456, "e": 5171.541, "t": "Et puis je me marie,\nj'ai des enfants."}, {"s": 5171.541, "e": 5173.71, "t": "La deuxième génération\nce serait moi essayant"}, {"s": 5173.71, "e": 5176.463, "t": "d'envoyer mes enfants\nen internat à Surkhet."}, {"s": 5177.547, "e": 5180.801, "t": "La troisième génération\nessaierait la capitale"}, {"s": 5182.135, "e": 5182.97, "t": "et la quatrième génération"}, {"s": 5182.97, "e": 5185.639, "t": "ce serait envoyer\nles enfants à l'étranger."}, {"s": 5187.266, "e": 5188.976, "t": "Mais la cinquième irait\ndans un endroit comme"}, {"s": 5188.976, "e": 5190.352, "t": "là où je suis, Notre Dame,"}, {"s": 5190.352, "e": 5192.688, "t": "qui est comme une école\ntrès prestigieuse ici."}, {"s": 5194.189, "e": 5195.357, "t": "- Dis bonjour.\n- Bonjour."}, {"s": 5199.361, "e": 5200.654, "t": "Étant la première,"}, {"s": 5200.654, "e": 5204.366, "t": "J'ai vu sa décision\ndevenir réalité."}, {"s": 5208.37, "e": 5210.497, "t": "Et au fond de moi, je l'ai toujours su."}, {"s": 5212.165, "e": 5214.334, "t": "Je veux juste suivre\nles pas de Maggie."}, {"s": 5216.336, "e": 5219.923, "t": "Mon enfant demain s'en va"}, {"s": 5219.923, "e": 5221.3, "t": "pendant son année sabbatique."}, {"s": 5221.3, "e": 5222.926, "t": "C'est parti."}, {"s": 5225.887, "e": 5227.139, "t": "et si quelque chose comme ce\nqui est arrivé à Maggie m'arrive."}, {"s": 5227.139, "e": 5228.348, "t": "Je suis si fière de toi."}, {"s": 5228.348, "e": 5230.35, "t": "Si elle avait pas pris\ncette année, Kopila Valley"}, {"s": 5230.6, "e": 5232.978, "t": "n'aurait jamais existé."}, {"s": 5233.687, "e": 5235.23, "t": "Alors je me dis, et si\nquelque chose comme"}, {"s": 5235.23, "e": 5237.399, "t": "avec Maggie\nm'arrivait à moi ?"}, {"s": 5238.608, "e": 5241.445, "t": "Plus que 53 enfants."}, {"s": 5241.445, "e": 5243.113, "t": "Arrête."}, {"s": 5326.196, "e": 5328.115, "t": "Merci !"}, {"s": 5354.599, "e": 5357.686, "t": "Aujourd'hui c'est\nla rentrée."}, {"s": 5385.255, "e": 5389.259, "t": "Merci Ruby.\nOh mon Dieu merci."}, {"s": 5390.469, "e": 5392.971, "t": "Hé les gars, prenez\nune photo pour Ruby."}, {"s": 5394.806, "e": 5398.143, "t": "Je suis si fière.\nBravo."}, {"s": 5398.143, "e": 5399.936, "t": "C'est incroyable."}, {"s": 5401.396, "e": 5404.816, "t": "Bravo. C'est la meilleure\nnouvelle de tous les temps."}, {"s": 5425.921, "e": 5428.298, "t": "[Intervenant] Je voudrais\nvous souhaiter la bienvenue"}, {"s": 5428.298, "e": 5430.217, "t": "pour la toute nouvelle inauguration"}, {"s": 5430.217, "e": 5432.385, "t": "de notre nouvelle école Kopila Valley."}, {"s": 5454.783, "e": 5457.035, "t": "On a un nouveau bébé."}, {"s": 5463.291, "e": 5467.754, "t": "Ouais comme ça. Namaste."}, {"s": 5467.754, "e": 5469.422, "t": "Oui. Bravo, Everest."}, {"s": 5476.888, "e": 5478.64, "t": "Evy, Evy, Evy, woo !"}, {"s": 5481.309, "e": 5482.811, "t": "Evy, c'est qui ?"}, {"s": 5496.575, "e": 5499.661, "t": "T'es si adorable.\nT'es si adorable."}, {"s": 5515.552, "e": 5518.263, "t": "Tu es mon héritage alors je sens que"}, {"s": 5518.263, "e": 5520.432, "t": "quand vous serez tous\ndans le monde à agir,"}, {"s": 5520.432, "e": 5522.767, "t": "ce sera mon souvenir."}, {"s": 5524.311, "e": 5526.479, "t": "Les choses que vous allez\naccomplir"}, {"s": 5526.479, "e": 5529.899, "t": "et faire et créer et\nchanger dans le monde."}, {"s": 5542.12, "e": 5545.957, "t": "Les choses que vous allez\naccomplir"}, {"s": 5548.46, "e": 5551.129, "t": "J'aime le mien.\nJ'ai déjà goûté."}, {"s": 5553.34, "e": 5555.342, "t": "Evy, Evy, Evy !"}, {"s": 5561.431, "e": 5562.766, "t": "Fin de partie. Woo !"}, {"s": 5564.225, "e": 5565.644, "t": "Au revoir !"}, {"s": 5583.37, "e": 5585.497, "t": "C'est pas drôle."}, {"s": 5589.125, "e": 5593.63, "t": "Bye !"}, {"s": 5599.594, "e": 5600.97, "t": "Attends, il l'a vraiment\nfrappée à la tête-"}, {"s": 5600.97, "e": 5602.055, "t": "Plus de singes."}, {"s": 5602.972, "e": 5604.766, "t": "Ça va ?"}, {"s": 5604.766, "e": 5606.81, "t": "On aurait tous dû\nécouter le conte de fées."}, {"s": 5611.898, "e": 5613.608, "t": "C'est une histoire vraie."}, {"s": 5615.568, "e": 5616.82, "t": "Maman !"}], "hindi": [{"s": 0.0, "e": 0.042, "t": ""}, {"s": 113.53, "e": 116.867, "t": "पिता गुजर गए"}, {"s": 119.786, "e": 123.665, "t": "और माँ कल गुजर गईं।"}, {"s": 143.06, "e": 144.895, "t": "यह मेरा गाँव है।"}, {"s": 148.941, "e": 150.317, "t": "मुझे यह ज़मीन बहुत पसंद है।"}, {"s": 154.154, "e": 155.239, "t": "नमस्ते"}, {"s": 155.239, "e": 157.115, "t": "[मैं कल आया था।]"}, {"s": 182.224, "e": 184.142, "t": "यह घर है। वह यहाँ रहता है।"}, {"s": 187.062, "e": 189.564, "t": "[हिमाल, तुम कितने साल के हो?]"}, {"s": 190.565, "e": 191.566, "t": "[तीन साल।]"}, {"s": 194.653, "e": 195.487, "t": "तीन साल।"}, {"s": 195.487, "e": 196.905, "t": "उसका नाम हिमाल है।"}, {"s": 197.281, "e": 199.908, "t": "हिमाल का मतलब है पहाड़ों में।"}, {"s": 207.416, "e": 209.584, "t": "जब मेरे पिता गुजरे तब मैं एक साल का था।"}, {"s": 209.584, "e": 211.461, "t": "फिर मेरी माँ ने मेरी देखभाल की।"}, {"s": 211.461, "e": 216.341, "t": "और फिर 10 साल में, मेरी माँ\nगुजर गईं। मेरी माँ गुजर गईं।"}, {"s": 220.971, "e": 222.848, "t": "देखो, वह सो गया है"}, {"s": 225.475, "e": 226.184, "t": "वह थका हुआ है, देखो।"}, {"s": 228.186, "e": 228.895, "t": "देखो।"}, {"s": 241.074, "e": 243.493, "t": "जब भी मैं यहाँ आता हूँ,\nमेरा दिल पूरी तरह टूट जाता है।"}, {"s": 245.746, "e": 247.372, "t": "हाँ।"}, {"s": 265.015, "e": 267.309, "t": "यहाँ बहुत सारे पैशन फ्रूट हैं।"}, {"s": 271.063, "e": 273.231, "t": "वाह, तुम्हें लाल वाला मिला?"}, {"s": 273.899, "e": 275.4, "t": "माँ, आपको चाहिए?"}, {"s": 276.026, "e": 278.695, "t": "नहीं, कोई बात नहीं,\nआप लोग इसे ले सकते हैं।"}, {"s": 278.695, "e": 280.155, "t": "और क्या मिला?"}, {"s": 280.155, "e": 281.198, "t": "बस इतना ही।"}, {"s": 281.323, "e": 283.033, "t": "क्या वे गिरे?"}, {"s": 283.033, "e": 284.743, "t": "यह जमीन में था।"}, {"s": 284.743, "e": 285.952, "t": "उनमें से कुछ।"}, {"s": 285.952, "e": 288.246, "t": "तुम लोग, तुम्हें ऐसा नहीं करना चाहिए"}, {"s": 288.246, "e": 290.207, "t": "उन्हें तैयार होने तक नहीं तोड़ना चाहिए।"}, {"s": 291.291, "e": 292.667, "t": "ऊह। एक सेकंड रुकिए।"}, {"s": 292.959, "e": 295.253, "t": "हैलो? क्या आप मुझे सुन सकते हैं?"}, {"s": 296.838, "e": 297.798, "t": "यह है स्थिति।"}, {"s": 298.131, "e": 300.759, "t": "मैं ठीक हूँ। ।"}, {"s": 300.759, "e": 302.01, "t": "बस इधर-उधर घूम रही हूँ।"}, {"s": 302.01, "e": 303.553, "t": "हमने पूरे दिन एक उत्सव का खेल खेला।"}, {"s": 303.553, "e": 304.721, "t": "वहाँ क्या है?"}, {"s": 304.721, "e": 305.847, "t": "और माँ कल गुजर गईं"}, {"s": 306.098, "e": 308.016, "t": "पिता तीन साल पहले गुजर गए"}, {"s": 308.266, "e": 311.353, "t": "और माँ कल गुजर गईं जब हम आ रहे थे"}, {"s": 311.353, "e": 313.397, "t": "और हम घर आए।"}, {"s": 313.397, "e": 314.689, "t": "यह एक मीटर-एक मीटर है।"}, {"s": 314.731, "e": 317.984, "t": "हे भगवान, हमें एक सात साल की बेटी मिली"}, {"s": 317.984, "e": 319.569, "t": "और तीन साल का बेटा।"}, {"s": 319.569, "e": 322.989, "t": "उसे छाती में संक्रमण है,\nबहुत बुरी खाँसी है।"}, {"s": 323.156, "e": 326.743, "t": "[ठीक है, लेकिन...]\n[ठीक है, लेकिन...]"}, {"s": 326.743, "e": 328.954, "t": "[बेटी और बेटे को ले आते हैं।]"}, {"s": 328.954, "e": 330.288, "t": "[उन्हें साथ रखते हैं।]"}, {"s": 330.288, "e": 333.208, "t": "[बहन छोटे भाई की देखभाल में मदद करेगी।]"}, {"s": 333.208, "e": 335.46, "t": "ठीक है, तो मैं कल वहाँ जा रहा हूँ"}, {"s": 335.46, "e": 337.379, "t": "हम पूरी तरह से विवरण देख रहे हैं।"}, {"s": 337.379, "e": 341.591, "t": "ठीक है हमें उसका जन्म\nप्रमाणपत्र लेना होगा और"}, {"s": 341.591, "e": 344.136, "t": "दोनों माता-पिता के मृत्यु प्रमाणपत्र"}, {"s": 344.136, "e": 346.513, "t": "और फिर जिले से एक सिफारिश।"}, {"s": 346.513, "e": 347.931, "t": "हाँ।"}, {"s": 348.974, "e": 349.975, "t": "बाय, टोपे।"}, {"s": 365.198, "e": 368.702, "t": "ठीक है। पहले छोटे-छोटे\nघोषणाएँ और फिर बड़ी घोषणा।"}, {"s": 368.702, "e": 371.413, "t": "छोटी घोषणा, आज कमरे बहुत अच्छे थे।"}, {"s": 371.413, "e": 372.747, "t": "आपका बहुत-बहुत धन्यवाद।"}, {"s": 375.375, "e": 379.463, "t": "बड़ी खबर यह है कि टोपे अंकल आज आ रहे हैं"}, {"s": 379.463, "e": 382.507, "t": "और वह दो नए बच्चे ला रहे हैं।"}, {"s": 382.507, "e": 384.426, "t": "उनकी माँ कुछ दिन पहले ही गुजर गईं"}, {"s": 384.426, "e": 386.678, "t": "और उनके पिता भी गुजर गए।"}, {"s": 386.678, "e": 389.931, "t": "तो वे हमारे साथ रहने\nके लिए यहाँ आ रहे हैं।"}, {"s": 394.769, "e": 395.937, "t": "और मुझे पता है कि कुछ लोगों\nके लिए यह वास्तव में बहुत मुश्किल है"}, {"s": 395.937, "e": 398.148, "t": "आप में से कुछ के लिए जब\nहमारे यहाँ नए बच्चे आते हैं"}, {"s": 398.148, "e": 402.652, "t": "क्योंकि तुम्हें लगता है कि यह\nबहुत ज़्यादा है, और यह ठीक है।"}, {"s": 404.779, "e": 407.115, "t": "हम इसे सुलझा लेंगे।"}, {"s": 409.326, "e": 412.913, "t": "और मुझे सबके सहयोग की ज़रूरत होगी"}, {"s": 412.913, "e": 415.415, "t": "बच्चों को समायोजित करने\nमें मदद करने के लिए।"}, {"s": 416.791, "e": 419.753, "t": "मुझे पता है कि कमरे पहले\nसे ही बहुत तंग हैं।"}, {"s": 419.753, "e": 422.964, "t": "किसको लगता है कि उनके कमरे में जगह है"}, {"s": 422.964, "e": 425.383, "t": "या कोई खाली बिस्तर या कुछ भी?"}, {"s": 425.383, "e": 428.678, "t": "या क्या कोई बड़ा बिस्तर अकेले सो रहा है?"}, {"s": 428.678, "e": 430.597, "t": "नहीं, कोई नहीं। - कोई नहीं।"}, {"s": 430.597, "e": 431.515, "t": "नमराज। नमराज।"}, {"s": 431.515, "e": 435.185, "t": "नमराज? तो प्रबिन कहाँ सो रहा है?"}, {"s": 435.31, "e": 436.561, "t": "जगत।"}, {"s": 437.354, "e": 439.189, "t": "और, नमराज, आप जानते हैं,"}, {"s": 439.189, "e": 440.44, "t": "हिमाल आपके गाँव का है।"}, {"s": 440.44, "e": 443.735, "t": "क्या तुम उसके बेड बडी\nबनना चाहती हो? ठीक है, वाह।"}, {"s": 445.737, "e": 447.28, "t": "तो चलिए इसे दीर्घकालिक योजना बनाते हैं,"}, {"s": 447.28, "e": 448.865, "t": "कि हिमालय तुम्हारे साथ शुरू होगा, ठीक है?"}, {"s": 448.865, "e": 450.909, "t": "और तुम बड़े भाई होगे?"}, {"s": 450.909, "e": 452.285, "t": "तुम बहुत अच्छे बड़े भाई हो।\n[वह तुम्हारी ही जगह से है]"}, {"s": 453.078, "e": 454.913, "t": "तुम बहुत अच्छे बड़े भाई हो।\n[वह तुम्हारी ही जगह से है]"}, {"s": 455.83, "e": 457.999, "t": "[जहाँ तुम पैदा हुए थे उसके बिल्कुल बगल में।]"}, {"s": 549.507, "e": 550.759, "t": "[कैसे हो?]"}, {"s": 551.801, "e": 553.345, "t": "[कैसे हो?]"}, {"s": 555.263, "e": 556.806, "t": "[क्या तुम ठीक हो?]"}, {"s": 557.932, "e": 559.267, "t": "[क्या गाड़ी का सफर लंबा था?]"}, {"s": 559.809, "e": 561.311, "t": "[क्या गाड़ी में तबीयत खराब

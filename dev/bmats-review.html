e": 372.747, "t": "Grazie mille."}, {"s": 375.375, "e": 379.463, "t": "La grande notizia è che\nlo zio Tope viene oggi"}, {"s": 379.463, "e": 382.507, "t": "e porterà con sé due nuovi bambini."}, {"s": 382.507, "e": 384.426, "t": "La loro mamma è morta pochi giorni fa"}, {"s": 384.426, "e": 386.678, "t": "e anche il padre è venuto a mancare."}, {"s": 386.678, "e": 389.931, "t": "Quindi verranno a vivere qui con noi."}, {"s": 394.769, "e": 395.937, "t": "E so che per alcuni è davvero difficile"}, {"s": 395.937, "e": 398.148, "t": "di voi quando arrivano nuovi ragazzi"}, {"s": 398.148, "e": 402.652, "t": "perché ti sembra che sia\ndavvero troppo, e va bene così."}, {"s": 404.779, "e": 407.115, "t": "Ce la faremo."}, {"s": 409.326, "e": 412.913, "t": "E avrò bisogno dell'aiuto di tutti"}, {"s": 412.913, "e": 415.415, "t": "per aiutare i ragazzi ad ambientarsi."}, {"s": 416.791, "e": 419.753, "t": "So che le stanze sono già davvero anguste."}, {"s": 419.753, "e": 422.964, "t": "Chi pensa di avere spazio\nnella propria stanza"}, {"s": 422.964, "e": 425.383, "t": "o un letto vuoto o qualcosa del genere?"}, {"s": 425.383, "e": 428.678, "t": "O qualcuno dorme da\nsolo in un letto grande?"}, {"s": 428.678, "e": 430.597, "t": "No, nessuno. - Nessuno."}, {"s": 430.597, "e": 431.515, "t": "Namraj. Namraj."}, {"s": 431.515, "e": 435.185, "t": "Namraj? Allora dove dorme Prabin?"}, {"s": 435.31, "e": 436.561, "t": "Jagat [ bambini che ridono ]"}, {"s": 437.354, "e": 439.189, "t": "E Namraj sai"}, {"s": 439.189, "e": 440.44, "t": "Himal viene dal tuo villaggio."}, {"s": 440.44, "e": 443.735, "t": "Vuoi diventare la sua\ncompagna di letto? Ok, evviva."}, {"s": 445.737, "e": 447.28, "t": "Quindi facciamo in modo che questo\nsia il piano a lungo termine,"}, {"s": 447.28, "e": 448.865, "t": "che Himal inizierà con te, ok?"}, {"s": 448.865, "e": 450.909, "t": "E tu sarai il fratello maggiore?"}, {"s": 450.909, "e": 452.285, "t": "Sei un fratello maggiore così bravo."}, {"s": 455.83, "e": 457.999, "t": "[proprio accanto alla casa dove sei nato.]"}, {"s": 551.801, "e": 553.345, "t": "[Come stai?]"}, {"s": 555.263, "e": 556.806, "t": "[Stai bene?]"}, {"s": 557.932, "e": 559.267, "t": "[È stato un viaggio lungo in macchina?]"}, {"s": 559.809, "e": 561.311, "t": "[Ti sei sentito male in macchina?]"}, {"s": 562.562, "e": 564.731, "t": "[Vuoi qualcosa da mangiare? Hai fame?]"}, {"s": 566.858, "e": 570.362, "t": "[Vuoi cambiarti e\nmetterti vestiti puliti?]"}, {"s": 571.905, "e": 573.114, "t": "[Sei stanco?]"}, {"s": 577.077, "e": 578.37, "t": "[Questa è casa nostra adesso.]"}, {"s": 581.456, "e": 583.458, "t": "- Ciao.\n- Ciao."}, {"s": 583.458, "e": 586.169, "t": "Questo è Himal e questo è Karma."}, {"s": 590.34, "e": 593.259, "t": "[Questo è il tuo fratello maggiore.]"}, {"s": 593.635, "e": 596.554, "t": "[Here’s your big brother.]"}, {"s": 598.223, "e": 601.059, "t": "Forse lo prendo e gli faccio il bagno. Ok?"}, {"s": 608.817, "e": 610.318, "t": "[Piccolino.]"}, {"s": 610.485, "e": 611.778, "t": "[Hai freddo?]"}, {"s": 627.419, "e": 630.213, "t": "Vedremo, faremo un passo alla volta."}, {"s": 631.923, "e": 635.552, "t": "Oh, fammi provare a mettergli\nun po' di roba anche nei capelli"}, {"s": 635.552, "e": 638.346, "t": "per togliere questa gomma da masticare."}, {"s": 640.765, "e": 641.891, "t": "[Dai, piccolino.]"}, {"s": 644.644, "e": 647.147, "t": "- Probabilmente hanno ancora la nausea."}, {"s": 653.862, "e": 656.114, "t": "[Vuoi dell'acqua?]"}, {"s": 668.96, "e": 670.837, "t": "[o spaventato]"}, {"s": 670.837, "e": 672.756, "t": "[o devi andare in bagno]"}, {"s": 672.756, "e": 674.34, "t": "[chiedete alle vostre sorelle maggiori.]"}, {"s": 713.171, "e": 716.925, "t": "Avevo 18 anni e mi sono\npresa un anno sabbatico."}, {"s": 720.303, "e": 724.849, "t": "Quando tutti gli altri studenti\nse ne andarono, decisi di restare."}, {"s": 726.81, "e": 731.064, "t": "E ho iniziato a lavorare in\nun progetto per rifugiati nepalesi."}, {"s": 731.064, "e": 732.023, "t": "- Nove."}, {"s": 732.023, "e": 733.274, "t": "Possiamo averne 10?"}, {"s": 733.274, "e": 734.526, "t": "Sì. [ donna ] Sì, 10?"}, {"s": 734.526, "e": 737.654, "t": "[ donna ] Aspetta, aspetta, aspetta,\naspetta. Fammi, Posso avere un sapone rosso?"}, {"s": 737.654, "e": 742.534, "t": "È lì che ho\nconosciuto Tope. Era il responsabile delle operazioni."}, {"s": 742.534, "e": 745.286, "t": "Va bene, spiegalo al consiglio,\nè assolutamente necessario."}, {"s": 745.286, "e": 748.665, "t": "Ok, questo è Tope. Ciao."}, {"s": 748.665, "e": 749.833, "t": "Anch'io sto lavorando. Nessun problema."}, {"s": 751.167, "e": 753.419, "t": "She’s working with me two years."}, {"s": 754.921, "e": 756.923, "t": "prendendosi cura di bambini orfani."}, {"s": 758.508, "e": 760.51, "t": "Chi ha lo shampoo?"}, {"s": 763.012, "e": 764.597, "t": "Anch'io sono orfano."}, {"s": 769.185, "e": 770.77, "t": "Conosco quella vita."}, {"s": 772.063, "e": 773.147, "t": "Cos'è una vita di fame,\ncos'è una vita al gelo,"}, {"s": 774.858, "e": 776.86, "t": "Cos'è una vita al gelo."}, {"s": 778.528, "e": 780.822, "t": "e cos'è la sofferenza."}, {"s": 782.49, "e": 785.994, "t": "Questi bambini, quanto\namore ricevono da Maggie."}, {"s": 787.287, "e": 789.581, "t": "Dopo di che, mi fido completamente di lei."}, {"s": 789.581, "e": 791.583, "t": "- Ok, mettici l'etichetta sopra."}, {"s": 791.583, "e": 793.793, "t": "Ora è pazzesco, non riesco\na credere che sia così."}, {"s": 793.793, "e": 795.003, "t": "[ uomo dietro la\ntelecamera ] Davvero? Sembra"}, {"s": 795.003, "e": 797.088, "t": "che si espanderà. - Per esempio,"}, {"s": 797.088, "e": 798.423, "t": "dopo due o tre anni,"}, {"s": 798.423, "e": 802.26, "t": "aggiungeranno molto\ndi più da queste parti."}, {"s": 804.554, "e": 806.639, "t": "Il\nNepal era tra i paesi più poveri"}, {"s": 806.639, "e": 807.64, "t": "al mondo"}, {"s": 808.6, "e": 812.061, "t": "e si stava appena riprendendo da\nuna guerra civile durata un decennio"}, {"s": 812.061, "e": 816.232, "t": "che aveva lasciato un\nmilione di bambini orfani."}, {"s": 824.449, "e": 828.828, "t": "Ci siamo resi\nconto che ciò di cui alcuni bambini avevano bisogno era la possibilità di andare"}, {"s": 828.828, "e": 830.622, "t": "a scuola in un ambiente sereno."}, {"s": 830.622, "e": 831.873, "t": "Namaste."}, {"s": 831.873, "e": 834.083, "t": "Namaste."}, {"s": 836.252, "e": 840.006, "t": "Altri bambini\navevano effettivamente bisogno di un intervento più deciso,"}, {"s": 840.006, "e": 844.594, "t": "ovvero una casa, una famiglia\ne un posto sicuro in cui vivere."}, {"s": 854.187, "e": 857.523, "t": "sala da pranzo che\nabbiamo appena costruito."}, {"s": 878.67, "e": 879.504, "t": "Ok."}, {"s": 880.755, "e": 882.507, "t": "[Come ti chiami?]"}, {"s": 887.762, "e": 890.181, "t": "Maggie?"}, {"s": 890.765, "e": 893.893, "t": "A quel tempo, avevo solo circa sette anni."}, {"s": 897.313, "e": 899.065, "t": "Mia madre è morta per prima."}, {"s": 900.024, "e": 902.151, "t": "Aveva un tumore alle ovaie."}, {"s": 905.071, "e": 907.031, "t": "Circa sei, sette mesi,"}, {"s": 907.949, "e": 909.617, "t": "è morto anche mio padre."}, {"s": 918.835, "e": 920.878, "t": "- Ciao Nisha.\n- Ciao."}, {"s": 920.878, "e": 921.921, "t": "Come stai?"}, {"s": 921.921, "e": 924.048, "t": "[ bambini che cantano ] ♪ Rainbow Nisha ♪"}, {"s": 924.048, "e": 926.968, "t": "♪ Rainbow Nisha ♪"}, {"s": 926.968, "e": 929.512, "t": "♪ Vai dove vuoi andare ♪"}, {"s": 929.512, "e": 932.473, "t": "♪ E fai quello che vuoi fare ♪"}, {"s": 932.473, "e": 935.601, "t": "♪ Il cielo è ♪"}, {"s": 935.601, "e": 936.686, "t": "Saluta!"}, {"s": 936.686, "e": 937.52, "t": "[ Nisha e i bambini ] Ciao!"}, {"s": 937.52, "e": 939.355, "t": "Oggi è il primo giorno di scuola!"}, {"s": 939.355, "e": 941.107, "t": "- Ciao.\n- Oggi è il"}, {"s": 941.107, "e": 943.568, "t": "primo giorno di scuola."}, {"s": 943.568, "e": 944.527, "t": "Quando sono arrivata qui"}, {"s": 944.527, "e": 947.321, "t": "c'era solo il primo piano,\nuna piccola famiglia."}, {"s": 948.781, "e": 952.869, "t": "Non avevo idea di cosa stesse\nsuccedendo o di dove mi trovassi."}, {"s": 952.869, "e": 955.913, "t": "L'unica cosa che sapevo\nera che qui ero al sicuro."}, {"s": 955.913, "e": 957.457, "t": "Ho sentito l'amore."}, {"s": 961.377, "e": 963.421, "t": "E siccome arrivavano altri bambini,"}, {"s": 963.421, "e": 966.174, "t": "anche la nostra casa ha\niniziato ad ampliarsi."}, {"s": 967.467, "e": 970.636, "t": "Abbiamo costruito il\nsecondo piano e poi il terzo"}, {"s": 970.636, "e": 972.18, "t": "e poi al quarto piano."}, {"s": 976.1, "e": 978.394, "t": "È successo tutto così in fretta."}, {"s": 980.063, "e": 981.314, "t": "Sono tornato da scuola"}, {"s": 981.314, "e": 984.108, "t": "e Maggie fa:\n\"Questo è il tuo nuovo fratello.\""}, {"s": 984.484, "e": 986.861, "t": "- Ciao Krishna."}, {"s": 986.861, "e": 987.695, "t": "Dopo Nisha,"}, {"s": 987.695, "e": 990.406, "t": "io sono stato il ragazzo successivo\na trasferirsi in quella casa."}, {"s": 990.406, "e": 991.824, "t": "[You’re going to school today?]"}, {"s": 996.496, "e": 998.539, "t": "Krishna, Krishna?"}, {"s": 998.873, "e": 999.916, "t": "Ciao Maggie."}, {"s": 1001.292, "e": 1003.878, "t": "[ ragazzino ] Krishna."}, {"s": 1004.921, "e": 1006.38, "t": "Avevo tre o quattro anni"}, {"s": 1006.38, "e": 1008.257, "t": "quando ho perso mio padre."}, {"s": 1008.257, "e": 1010.927, "t": "Mia madre, una madre senza istruzione,"}, {"s": 1012.261, "e": 1016.349, "t": "che vive in una società in\ncui le persone ti giudicano,"}, {"s": 1016.349, "e": 1018.226, "t": "era difficile per lei prendersi cura"}, {"s": 1018.267, "e": 1021.062, "t": "di me e della mia sorellina,\ncosì ci ha lasciati."}, {"s": 1021.687, "e": 1023.314, "t": "ci ha lasciato."}, {"s": 1025.525, "e": 1029.195, "t": "Krishna aveva passato così tanto."}, {"s": 1031.322, "e": 1035.243, "t": "Lui e sua sorella, Sabitha,\nerano stati separati."}, {"s": 1037.745, "e": 1042.583, "t":  2248.496, "e": 2250.749, "t": "- È stato molto doloroso\nper la nostra famiglia."}, {"s": 2254.461, "e": 2256.463, "t": "Non so che punizione ci\nstia dando Dio. Non lo so."}, {"s": 2259.799, "e": 2260.633, "t": "Terribile."}, {"s": 2264.095, "e": 2265.43, "t": "Tutta la famiglia è triste."}, {"s": 2266.89, "e": 2268.141, "t": "Tutti i bambini piangono."}, {"s": 2269.142, "e": 2270.477, "t": "La nostra felicità, sparita."}, {"s": 2288.328, "e": 2291.414, "t": "La madre e la sorella di\nMaggie sono venute qui."}, {"s": 2294.084, "e": 2297.17, "t": "Sono molto preoccupate per la sua vita."}, {"s": 2301.883, "e": 2304.886, "t": "e tutti le abbiamo detto:\n\"Maggie, vai con tua madre.\""}, {"s": 2354.477, "e": 2355.77, "t": "- In quel periodo,"}, {"s": 2356.229, "e": 2358.523, "t": "tutta la famiglia era devastata."}, {"s": 2362.235, "e": 2363.653, "t": "So it didn’t hurt."}, {"s": 2364.279, "e": 2366.281, "t": "Non li ricordavo molto"}, {"s": 2366.573, "e": 2368.158, "t": "Quindi non mi ha fatto male."}, {"s": 2368.283, "e": 2370.201, "t": "Ma quando ho perso Ravi"}, {"s": 2370.201, "e": 2371.202, "t": "Ravi, sorridi."}, {"s": 2371.202, "e": 2374.914, "t": "L'avevo visto da quando\nera arrivato la prima volta."}, {"s": 2375.123, "e": 2376.708, "t": "- Un vero birichino.\n- Lo abbiamo cresciuto"}, {"s": 2376.708, "e": 2378.126, "t": "Non avrei mai pensato di\npoter mai amare qualcuno così."}, {"s": 2378.126, "e": 2380.044, "t": "È stato davvero difficile."}, {"s": 2381.254, "e": 2382.755, "t": "Non avrei mai pensato che,"}, {"s": 2382.755, "e": 2386.009, "t": "avrei mai potuto amare qualcuno così."}, {"s": 2405.653, "e": 2407.739, "t": "Quando qualcuno muore"}, {"s": 2407.739, "e": 2410.2, "t": "e sei nello stesso posto,"}, {"s": 2411.826, "e": 2415.497, "t": "ti tornerà in mente\ndi nuovo e di nuovo."}, {"s": 2423.004, "e": 2425.882, "t": "È stato davvero difficile per noi"}, {"s": 2425.882, "e": 2429.385, "t": "perché ogni volta che ci sedevamo\ndove Ravi è annegato e,"}, {"s": 2429.385, "e": 2430.845, "t": "sai, i ricordi tornavano"}, {"s": 2431.971, "e": 2433.598, "t": "sai, i ricordi\ntornavano a fiotti"}, {"s": 2433.598, "e": 2435.642, "t": "di noi che lo tenevamo e..."}, {"s": 2452.534, "e": 2453.576, "t": "Ehi."}, {"s": 2456.162, "e": 2457.664, "t": "Mi sono appena svegliata."}, {"s": 2459.207, "e": 2461.125, "t": "Semplicemente spaventata da tutto."}, {"s": 2463.169, "e": 2466.005, "t": "Ho paura che succeda qualcosa ai bambini."}, {"s": 2474.138, "e": 2477.058, "t": "So che quando me ne sono\nandato, ho visto la paura"}, {"s": 2478.685, "e": 2480.228, "t": "negli occhi dei miei figli."}, {"s": 2482.73, "e": 2484.023, "t": "Ciao mamma."}, {"s": 2484.023, "e": 2486.359, "t": "Ciao mamma. Mi mancate tutti."}, {"s": 2489.32, "e": 2490.238, "t": "Ti amo."}, {"s": 2494.242, "e": 2498.037, "t": "Ho visto persone che\nhanno sofferto tragedie"}, {"s": 2498.037, "e": 2500.164, "t": "e non si sono mai riprese."}, {"s": 2501.874, "e": 2504.127, "t": "Continuo a dire che non\nvoglio essere quella persona."}, {"s": 2504.127, "e": 2506.421, "t": "Non voglio essere quella persona."}, {"s": 2510.425, "e": 2513.386, "t": "[ Maggie sullo schermo\n] Molti bambini lo dicono"}, {"s": 2514.429, "e": 2517.14, "t": "la parte peggiore della\nperdita di un fratello"}, {"s": 2518.641, "e": 2521.06, "t": "non era solo la perdita del fratello."}, {"s": 2524.063, "e": 2526.983, "t": "Stavano perdendo un genitore."}, {"s": 2531.738, "e": 2533.865, "t": "Ho detto loro che sarei tornato."}, {"s": 2535.575, "e": 2538.453, "t": "Voglio dimostrare loro che\nsiamo ancora una famiglia."}, {"s": 2548.504, "e": 2551.799, "t": "Il mio compito adesso è solo\nquello di restare in vita."}, {"s": 2556.763, "e": 2557.597, "t": "Un minuto, un istante,"}, {"s": 2560.183, "e": 2561.559, "t": "Un momento."}, {"s": 2563.895, "e": 2565.48, "t": "un passo alla volta."}, {"s": 2576.866, "e": 2578.743, "t": "Iniziavo alzandomi"}, {"s": 2578.743, "e": 2581.329, "t": "e scendere a preparare il tè."}, {"s": 2581.329, "e": 2582.497, "t": "Quella era la mia cosa coraggiosa,"}, {"s": 2582.497, "e": 2585.625, "t": "perché non riuscivo ad alzarmi dal letto."}, {"s": 2585.625, "e": 2588.67, "t": "E poi è stato come se stessi\nper tornare al supermercato"}, {"s": 2588.878, "e": 2590.672, "t": "o farò questa cosa che Ravi"}, {"s": 2590.672, "e": 2592.256, "t": "e io facevamo insieme."}, {"s": 2594.717, "e": 2597.762, "t": "E poi alla fine mi ha portata a Los Angeles."}, {"s": 2600.181, "e": 2602.517, "t": "Dopo aver vinto il CNN Heroes,"}, {"s": 2602.517, "e": 2606.02, "t": "organizzano questo corso di formazione\nsullo sviluppo senza scopo di lucro."}, {"s": 2606.896, "e": 2608.981, "t": "Ravi aveva viaggiato con me,"}, {"s": 2609.774, "e": 2613.486, "t": "quindi avevo tutto prenotato\nper me e il bambino."}, {"s": 2619.701, "e": 2620.868, "t": "Ti voglio bene, mamma."}, {"s": 2620.868, "e": 2622.328, "t": "Ti parlo domani. Ti voglio bene anch'io."}, {"s": 2623.621, "e": 2624.163, "t": "ciao."}, {"s": 2624.706, "e": 2625.873, "t": "Ciao."}, {"s": 2629.877, "e": 2633.089, "t": "E fu allora che ho conosciuto Jeremy."}, {"s": 2645.101, "e": 2645.935, "t": "Che bello."}, {"s": 2650.398, "e": 2651.691, "t": "Non ero in un posto,"}, {"s": 2651.691, "e": 2654.527, "t": "soprattutto considerando\nquello che stavo passando,"}, {"s": 2654.527, "e": 2657.655, "t": "è solo che... non la\nvedevamo in quel modo."}, {"s": 2660.074, "e": 2663.327, "t": "Avevamo fatto questo\npiano di andare nel deserto"}, {"s": 2664.37, "e": 2666.372, "t": "e quella notte non riuscivo a dormire."}, {"s": 2666.372, "e": 2669.083, "t": "Avevo ancora il PTSD"}, {"s": 2669.959, "e": 2672.42, "t": "e lui è semplicemente\nvenuto e mi ha abbracciata"}, {"s": 2672.42, "e": 2673.796, "t": "e mi ha detto: \"Vuoi che ti abbracci?\""}, {"s": 2673.796, "e": 2675.214, "t": "finché non ti addormenti?"}, {"s": 2705.453, "e": 2706.621, "t": "Mi sentivo come un grammo"}, {"s": 2707.497, "e": 2709.373, "t": "una parte di me che tornava."}, {"s": 2710.166, "e": 2711.667, "t": "piano piano piano."}, {"s": 2717.006, "e": 2718.633, "t": "Che giorno è oggi, Goma?"}, {"s": 2718.633, "e": 2719.467, "t": "Venerdì!"}, {"s": 2720.802, "e": 2721.928, "t": "Sì, sto facendo progressi."}, {"s": 2721.928, "e": 2726.307, "t": "Mi sveglio felice e\npoi tutta questa merda."}, {"s": 2726.307, "e": 2730.019, "t": "e poi subito indietro,\nproprio dove avevi iniziato."}, {"s": 2730.019, "e": 2732.313, "t": "Mi stai riprendendo mentre riprendo?"}, {"s": 2732.313, "e": 2734.607, "t": "Passiamo al livello successivo.\nTi sto intervistando."}, {"s": 2734.607, "e": 2735.566, "t": "Ti sto intervistando."}, {"s": 2735.566, "e": 2737.235, "t": "Posso gestire tutto con Ravi."}, {"s": 2737.235, "e": 2739.195, "t": "Non riesco proprio a\nfarcela senza di lui, tipo."}, {"s": 2744.283, "e": 2746.786, "t": "Ciao mamma. Nisha!"}, {"s": 2746.786, "e": 2748.704, "t": "Ciao mamma. Ciao Maya."}, {"s": 2750.665, "e": 2752.667, "t": "Lo so. Congratulazioni."}, {"s": 2752.667, "e": 2754.961, "t": "Non vedo l'ora di vedere\ntutte le vostre pagelle."}, {"s": 2763.678, "e": 2765.429, "t": "Ciao mamma. Mi manchi."}, {"s": 2765.429, "e": 2766.931, "t": "- Stai bene e sii forte, Maggie."}, {"s": 2766.931, "e": 2769.1, "t": "Ho bisogno che tu sia forte adesso."}, {"s": 2769.1, "e": 2771.769, "t": "Ti prometto che sto molto\nmeglio. Te lo prometto."}, {"s": 2772.854, "e": 2773.521, "t": "Lo prometto."}, {"s": 2774.355, "e": 2776.357, "t": "Capisco che tutto sta arrivando"}, {"s": 2776.357, "e": 2778.276, "t": "sulle tue spalle,\nma tornerò presto"}, {"s": 2778.276, "e": 2780.403, "t": "e ci ritroveremo di nuovo insieme."}, {"s": 2780.403, "e": 2784.031, "t": "Saremo fianco a fianco a\nfare tutto questo insieme. Ok?"}, {"s": 2785.283, "e": 2787.243, "t": "Questo è il\nmomento peggiore della mia vita."}, {"s": 2787.952, "e": 2789.161, "t": "So che è stato stressante."}, {"s": 2789.161, "e": 2792.123, "t": "So che è stata dura. Tornerò domenica."}, {"s": 2792.29, "e": 2793.666, "t": "È fra tre giorni."}, {"s": 2793.958, "e": 2795.668, "t": "Beh, anche i nepalesi,\ntipo, mariti e mogli"}, {"s": 2795.668, "e": 2797.67, "t": "non mostrano affetto in pubblico. Sì."}, {"s": 2797.67, "e": 2799.297, "t": "Non riuscirai nemmeno a capire\nchi è sposato."}, {"s": 2799.297, "e": 2800.673, "t": "È molto diverso."}, {"s": 2802.884, "e": 2803.843, "t": "Quanto tempo è passato"}, {"s": 2804.802, "e": 2806.095, "t": "da quando li hai visti di persona?"}, {"s": 2807.179, "e": 2808.097, "t": "Due mesi?"}, {"s": 2809.974, "e": 2811.267, "t": "- Sì."}, {"s": 2818.733, "e": 2821.777, "t": "La verità è che sarei\ndistrutta se perdessi"}, {"s": 2822.486, "e": 2824.447, "t": "uno dei miei bambini."}, {"s": 2825.406, "e": 2827.366, "t": "C'è una parte enorme di me"}, {"s": 2827.366, "e": 2830.244, "t": "mi sembra di averli abbandonati"}, {"s": 2830.244, "e": 2833.039, "t": "e voglio solo che sappiano che sono grato"}, {"s": 2833.039, "e": 2835.374, "t": "per ogni loro piccola\nparte e ogni loro aspetto."}, {"s": 2845.927, "e": 2848.846, "t": "Caro\nNamraj, siamo stati inseparabili"}, {"s": 2848.846, "e": 2850.264, "t": "dal giorno in cui sei arrivato."}, {"s": 2850.264, "e": 2852.35, "t": "Sei nato il giorno del mio compleanno"}, {"s": 2852.35, "e": 2853.392, "t": "e sei stato il miglior\nregalo di compleanno."}, {"s": 2853.392, "e": 2855.311, "t": "Ti ho conosciuto quando eri\nnella pancia della tua mamma"}, {"s": 2855.311, "e": 2856.145, "t": "e i tuoi genitori sono\ntornati a vivere qui."}, {"s": 2856.145, "e": 2858.814, "t": "Caro piccolo Bishal,\nsei sempre così coraggioso."}, {"s": 2858.814, "e": 2863.361, "t": "Cara Pabitra, adoro vedere\nquanto sei gentile e sensibile."}, {"s": 2863.361, "e": 2865.446, "t": "Asmita, sei davvero troppo dolce."}, {"s": 2865.446, "e": 2866.53, "t": "Adoro il tuo sorriso."}, {"s": 2866.53, "e": 2868.908, "t": "Cara Khajuri, dal momento\nin cui ti ho vista... mpi"}, {"s": 3844.132, "e": 3847.552, "t": "quando eri davvero, davvero piccolo."}, {"s": 3847.552, "e": 3849.387, "t": "Non sarà più lo stesso senza di te."}, {"s": 3849.387, "e": 3852.432, "t": "Lo odierò quando mi\nsveglio e tu non ci sei."}, {"s": 3853.141, "e": 3855.56, "t": "Abbiamo costruito questa\ncasa tutti insieme."}, {"s": 3855.936, "e": 3858.772, "t": "Abbiamo portato su ogni mattone\ne stabilito tutte le regole"}, {"s": 3858.772, "e": 3861.232, "t": "e abbiamo deciso come volevamo\nessere come famiglia."}, {"s": 3861.232, "e": 3862.776, "t": "Quindi vi ringrazio e basta."}, {"s": 3863.401, "e": 3866.112, "t": "Mi mancherà ogni singolo momento."}, {"s": 3867.238, "e": 3868.156, "t": "Ti amo."}, {"s": 3880.752, "e": 3883.922, "t": "Per me sono le persone\nche fanno la famiglia."}, {"s": 3890.637, "e": 3893.682, "t": "Non è necessario essere\nlegati da vincoli di sangue"}, {"s": 3894.933, "e": 3896.601, "t": "per creare un legame."}, {"s": 3898.269, "e": 3901.523, "t": "Forte come quella che noi, i ragazzi\ndi Kopila, abbiamo costruito insieme."}, {"s": 3905.944, "e": 3907.737, "t": "[Me ne vado.]"}, {"s": 3907.737, "e": 3909.364, "t": "[Si va avanti.]"}, {"s": 3943.481, "e": 3944.441, "t": "Oh."}, {"s": 3947.694, "e": 3949.404, "t": "Senti, se conti le macchie sulla schiena,"}, {"s": 3949.404, "e": 3951.573, "t": "saprai quanti anni hanno."}, {"s": 3953.908, "e": 3956.411, "t": "Abbiamo\naspettato così tanto tempo."}, {"s": 3956.411, "e": 3959.998, "t": "Non avevamo accolto nessun nuovo\nbambino durante quel periodo di lutto"}, {"s": 3960.665, "e": 3961.875, "t": "circa un anno."}, {"s": 3966.963, "e": 3968.965, "t": "Ma pensavo molto agli altri ragazzi"}, {"s": 3968.965, "e": 3971.885, "t": "e a come avrebbero reagito\nall'arrivo di un altro bambino,"}, {"s": 3971.885, "e": 3975.972, "t": "assicurandosi che non si sentisse"}, {"s": 3989.069, "e": 3993.239, "t": "Tope ha ricevuto\nuna chiamata per un caso d'emergenza"}, {"s": 3993.239, "e": 3995.033, "t": "dal governo locale."}, {"s": 4003.083, "e": 4006.669, "t": "Il posto migliore in\ncui un bambino possa stare"}, {"s": 4006.669, "e": 4009.464, "t": "è nella propria comunità\ncon la propria famiglia."}, {"s": 4011.091, "e": 4014.094, "t": "Ma nel caso in cui un\nbambino non sia al sicuro,"}, {"s": 4014.094, "e": 4016.179, "t": "che un bambino non ha un posto,\nnessun posto dove andare,"}, {"s": 4016.179, "e": 4019.516, "t": "nessuno che si prenda cura di lui,\nabbiamo bisogno di un'alternativa,"}, {"s": 4019.516, "e": 4021.726, "t": "e dobbiamo prendere quelle\ndecisioni davvero difficili,"}, {"s": 4021.726, "e": 4023.853, "t": "e lo facciamo con il supporto\ndi assistenti sociali,"}, {"s": 4023.853, "e": 4026.981, "t": "con consulenti, con leader della comunità."}, {"s": 4026.981, "e": 4030.068, "t": "E non è una decisione\nche prendiamo alla leggera."}, {"s": 4035.031, "e": 4036.866, "t": "Avremmo potuto fare mille altre cose"}, {"s": 4036.866, "e": 4039.953, "t": "prima che quel bambino entri nella casa"}, {"s": 4039.953, "e": 4043.665, "t": "eppure nel 2% dei casi\ndobbiamo intervenire."}, {"s": 4043.665, "e": 4045.792, "t": "E questa è\nl'ultima risorsa in assoluto. Nessun accesso alla città, nessun accesso all'acqua"}, {"s": 4045.792, "e": 4047.794, "t": "Lontano dalla città,\nsenza accesso all'acqua."}, {"s": 4047.794, "e": 4049.504, "t": "Non c'è nemmeno un ospedale\nraggiungibile a piedi"}, {"s": 4049.504, "e": 4051.506, "t": "o una scuola, o qualsiasi altra cosa."}, {"s": 4057.011, "e": 4057.971, "t": "Questa è la casa, in mezzo al nulla."}, {"s": 4059.722, "e": 4061.307, "t": "nel mezzo del nulla."}, {"s": 4062.976, "e": 4064.269, "t": "[Ecco la casa, signore.]"}, {"s": 4064.269, "e": 4065.562, "t": "[Quella?]"}, {"s": 4071.901, "e": 4073.361, "t": "[I bambini sanno cosa è\nsuccesso alla loro madre?]"}, {"s": 4074.696, "e": 4077.24, "t": "[No. I bambini non lo\nsanno. Stavano dormendo.]"}, {"s": 4079.367, "e": 4081.286, "t": "[Non c'era nessun altro qui di notte.]"}, {"s": 4081.286, "e": 4083.413, "t": "[Solo la madre e le due ragazze.]"}, {"s": 4093.339, "e": 4096.926, "t": "Cucù! Kushi!"}, {"s": 4096.926, "e": 4098.511, "t": "[ Civile ] Kushi! Mamma!"}, {"s": 4100.221, "e": 4102.14, "t": "Cucù"}, {"s": 4109.981, "e": 4112.65, "t": "[Andiamo in macchina, va bene?]"}, {"s": 4142.18, "e": 4146.893, "t": "Saluta. È una bambina."}, {"s": 4148.102, "e": 4149.562, "t": "Indovina come si chiama?"}, {"s": 4149.896, "e": 4151.522, "t": "Khusi. Wow."}, {"s": 4151.856, "e": 4153.524, "t": "- Khusi.\n- Khusi."}, {"s": 4154.734, "e": 4156.611, "t": "That's Khusbu [Smells Good]."}, {"s": 4156.611, "e": 4158.696, "t": "- Khusbu.\n- Khusbu"}, {"s": 4159.197, "e": 4160.698, "t": "È davvero importante che prendiamo tutte"}, {"s": 4160.698, "e": 4164.244, "t": "le piccole cose fuori di casa,"}, {"s": 4164.244, "e": 4165.787, "t": "tutte le cose che potevano andarsene,"}, {"s": 4165.787, "e": 4166.996, "t": "che lei potrebbe mettere in bocca"}, {"s": 4166.996, "e": 4171.376, "t": "e nei prossimi due giorni,\nabbiamo bisogno dell'aiuto di tutti, ok?"}, {"s": 4180.593, "e": 4182.262, "t": "Il nome\ndi Khusi significa \"felice\"."}, {"s": 4182.971, "e": 4185.265, "t": "Ha letteralmente riportato quel\nsignificato nella nostra casa in un momento"}, {"s": 4185.265, "e": 4187.85, "t": "in cui pensavamo che non saremmo\nmai stati in grado di amare"}, {"s": 4187.85, "e": 4190.853, "t": "un bambino come abbiamo amato lui."}, {"s": 4194.19, "e": 4196.609, "t": "Ricordo di aver\ndetto ai bambini: \"Siamo ancora una famiglia,"}, {"s": 4196.609, "e": 4198.027, "t": "siamo ancora una famiglia,\nsiamo ancora una famiglia.\""}, {"s": 4198.027, "e": 4200.738, "t": "E penso che coinvolgere Khusi e Khusbu"}, {"s": 4200.738, "e": 4204.2, "t": "e dimostrare loro che\npossiamo andare avanti,"}, {"s": 4205.618, "e": 4209.122, "t": "questo ci ha fatto credere\nche possiamo farlo di nuovo."}, {"s": 4210.999, "e": 4213.459, "t": "Avremo un guardaroba completamente\nnuovo per il centro donne."}, {"s": 4269.974, "e": 4271.642, "t": "[- Cos'è?]"}, {"s": 4271.642, "e": 4274.228, "t": "Esperimento Il tuo esperimento è finito?"}, {"s": 4274.562, "e": 4276.439, "t": "Ti servono ancora quei fiammiferi o..."}, {"s": 4278.066, "e": 4280.735, "t": "Santosh, sul serio,\nnon dare fuoco a niente."}, {"s": 4281.444, "e": 4284.155, "t": "Un abbraccio a tutti."}, {"s": 4285.573, "e": 4289.66, "t": "Stavo affrontando\nil mio dolore interiore e la mia vergogna"}, {"s": 4289.66, "e": 4291.537, "t": "e mi sentivo un fallimento."}, {"s": 4292.038, "e": 4293.414, "t": "Vi voglio bene, ragazzi."}, {"s": 4293.414, "e": 4295.5, "t": "Ti vogliamo bene. Vi voglio bene anch'io."}, {"s": 4295.5, "e": 4297.585, "t": "Tornerò molto presto."}, {"s": 4297.585, "e": 4300.63, "t": "E allo stesso tempo penso: \"Ok,\ncerchiamo in qualche modo di tornare"}, {"s": 4300.63, "e": 4302.048, "t": "a questo vecchio te"}, {"s": 4303.216, "e": 4304.509, "t": "che è ancora l'amministratore delegato"}, {"s": 4304.509, "e": 4306.511, "t": "di un'importante organizzazione."}, {"s": 4308.888, "e": 4313.101, "t": "Gestiamo una grande scuola\ncomunitaria, un centro per donne,"}, {"s": 4313.101, "e": 4315.061, "t": "una casa sicura per le ragazze."}, {"s": 4315.061, "e": 4318.189, "t": "Eravamo una squadra di 125 persone."}, {"s": 4318.189, "e": 4321.859, "t": "Tutti dipendevano interamente da me"}, {"s": 4321.859, "e": 4323.027, "t": "e la mia capacità di uscire"}, {"s": 4323.027, "e": 4326.322, "t": "e raccogliere fondi per mandare\navanti la nostra famiglia."}, {"s": 4331.369, "e": 4335.373, "t": "Non sapevo se sarei mai riuscita\nad alzarmi e parlare di nuovo."}, {"s": 4344.632, "e": 4347.385, "t": "Buongiorno a tutti. Questa è\ndavvero una sala straordinaria."}, {"s": 4347.385, "e": 4349.178, "t": "MLK ha tenuto un discorso qui,"}, {"s": 4349.178, "e": 4352.723, "t": "così come Hillary Clinton\ne oggi Maggie Doyne."}, {"s": 4359.981, "e": 4362.9, "t": "È la prima conferenza che\ntengo da un po' di tempo."}, {"s": 4365.153, "e": 4368.322, "t": "L'amore è, l'amore è una cosa bellissima"}, {"s": 4369.073, "e": 4371.909, "t": "ed è la cosa a cui dobbiamo aggrapparci"}, {"s": 4371.909, "e": 4373.786, "t": "ed è l'unica cosa che mai,"}, {"s": 4373.786, "e": 4376.247, "t": "in un milione di anni,\nguarire il mondo con lo stato"}, {"s": 4376.247, "e": 4377.582, "t": "in cui ci troviamo."}, {"s": 4380.918, "e": 4382.336, "t": "- Allora?"}, {"s": 4393.014, "e": 4394.056, "t": "Vuoi vederlo?"}, {"s": 4394.432, "e": 4395.975, "t": "- Cosa dice?"}, {"s": 4398.186, "e": 4399.645, "t": "- Sono incinta."}, {"s": 4400.438, "e": 4401.981, "t": "- Dice..."}, {"s": 4404.484, "e": 4405.443, "t": "Oh mio Dio."}, {"s": 4411.115, "e": 4412.825, "t": "Sinceramente, mi menti. So che mi menti."}, {"s": 4412.825, "e": 4414.118, "t": "Maggie, scusa."}, {"s": 4414.285, "e": 4415.912, "t": "- Non sto mentendo.\n- Ti pizzico?"}, {"s": 4415.912, "e": 4417.872, "t": "Mi stai mentendo? Mi stai mentendo."}, {"s": 4417.872, "e": 4419.207, "t": "Non mi mentire, Maggie."}, {"s": 4419.207, "e": 4420.5, "t": "Su cosa vuoi che giuri?"}, {"s": 4420.5, "e": 4421.542, "t": "Sono al quarto mese."}, {"s": 4426.589, "e": 4428.925, "t": "Pensi che potrei partorire a Surkhet"}, {"s": 4428.925, "e": 4430.593, "t": "o che dovrei tornare in America?"}, {"s": 4430.593, "e": 4432.428, "t": "- Se avrai quel bambino negli Stati Uniti,"}, {"s": 4432.428, "e": 4434.305, "t": "allora sarai più al sicuro."}, {"s": 4434.555, "e": 4436.724, "t": "Qui, a molte persone piace così."}, {"s": 4442.897, "e": 4446.984, "t": "Ma per l'ONG, il tuo ruolo\nsarà lo stesso o diverso?"}, {"s": 4451.239, "e": 4452.99, "t": "Ehi!"}, {"s": 4453.407, "e": 4455.952, "t": "Ciao Gongo, ehi, Nev."}, {"s": 4456.994, "e": 4459.121, "t": "Oh, guarda quel dente?"}, {"s": 4459.121, "e": 4461.374, "t": "Ti è spuntato un dente\nnuovo? Fammi vedere."}, {"s": 4462.833, "e": 4465.044, "t": "Posso vedere?"}, {"s": 4465.044, "e": 4465.878, "t": "Ciao oh. Lo voglio."}, {"s": 4467.338, "e": 4468.422, "t": "Voglio."}, {"s": 4468.422, "e": 4469.84, "t": "Che stai facendo?"}, {"s": 4469.84, "e": 4472.301, "t": "I miei futuri figli biologici"}, {"s": 4472.301, "e": 4473.761, "t": "crescerà insieme a tutti voi."}, {"s": 4474.971, "e": 4477.598, "t": "Saranno i bambini più fortunati del mondo."}, {"s": 4477.598, "e": 4480.434, "t": "Quanti bambini hanno la fortuna di\nentrare in una famiglia come la nostra"}, {"s": 4480.434, "e": 4484.105, "t": "che ha tutti questi fratelli e sorelle?"}, {"s": 4485.481, "e": 4486.899, "t": "Tutto quell'amore?"}, {"s": 4505.209, "e": 4505.751, "t": "Un giorno"}, {"s": 4505.751, "e": 4507.086, "t": "Un giorno nostra madre, molto gentile,\namante del divertimento e con un buon senso"}, {"s": 4507.086, "e": 4507.962, "t": "She didn’t even have to tell us"}, {"s": 4507.962, "e": 4509.922, "t": "She didn’t even have to tell us"}, {"s": 4510.298, "e": 4512.466, "t": "L'ha presentato come un amico."}, {"s": 4512.466, "e": 4513.843, "t": "Si è rivelato essere un amante."}, {"s": 4515.761, "e": 4517.346, "t": "Non c'era nemmeno\nbisogno che ce lo dicesse"}, {"s": 4517.346, "e": 4520.099, "t": "perché i suoi sentimenti\nerano così evidenti."}, {"s": 4520.099, "e": 4521.809, "t": "Non sa come nasconderli."}, {"s": 4521.809, "e": 4523.769, "t": "È quello che adoro di più di lei."}, {"s": 4524.729, "e": 4526.23, "t": "Dammi un abbraccio. Dai!"}, {"s": 4543.623, "e": 4545.458, "t": "Pronta? Prova."}, {"s": 4555.968, "e": 4558.888, "t": "- Dai, [parla in nepalese] Khusi."}, {"s": 4558.888, "e": 4562.725, "t": "Khusi, Khusi, Khusi,\nKhus, ce la puoi fare. Dai."}, {"s": 4562.725, "e": 4564.185, "t": "Ce la puoi fare. Guarda."}, {"s": 4591.837, "e": 4595.007, "t": "Conoscevo la maternità in questa dimensione,"}, {"s": 4602.014, "e": 4604.642, "t": "ma non avevo mai vissuto il parto."}, {"s": 4609.98, "e": 4611.732, "t": "Ero così spaventata."}, {"s": 4613.984, "e": 4617.321, " , "t": "Alguns deles e alguns deles."}, {"s": 285.952, "e": 288.246, "t": "Gente, vocês não deviam"}, {"s": 288.246, "e": 290.207, "t": "colher até estarem prontos."}, {"s": 292.959, "e": 295.253, "t": "Alô? Você me ouve?"}, {"s": 296.838, "e": 297.798, "t": "Como você tá, Maggie?"}, {"s": 298.131, "e": 300.759, "t": "Tô bem."}, {"s": 300.759, "e": 302.01, "t": "Só andando por aí."}, {"s": 302.01, "e": 303.553, "t": "[Jogamos o dia todo.]"}, {"s": 303.553, "e": 304.721, "t": "O que tá acontecendo aí?"}, {"s": 304.721, "e": 305.847, "t": "A situação é a seguinte."}, {"s": 306.098, "e": 308.016, "t": "Pai faleceu três ano atrás"}, {"s": 308.266, "e": 311.353, "t": "Nós viemos pra casa"}, {"s": 311.353, "e": 313.397, "t": "e nós viemos pra casa."}, {"s": 313.397, "e": 314.689, "t": "Tem um metro, um metro."}, {"s": 314.731, "e": 317.984, "t": "e três ano, filho."}, {"s": 317.984, "e": 319.569, "t": "e filho de três anos."}, {"s": 319.569, "e": 322.989, "t": "Ele tem uma infecção no peito,\ntossindo muito."}, {"s": 323.156, "e": 326.743, "t": "Todo mundo estava pedindo\npra levar o pequeno."}, {"s": 326.743, "e": 328.954, "t": "[vamos trazer a filha e o filho.]"}, {"s": 328.954, "e": 330.288, "t": "[Vamos mantê-los juntos.]"}, {"s": 330.288, "e": 333.208, "t": "[A irmã vai ajudar a cuidar\ndo irmãozinho.]"}, {"s": 333.208, "e": 335.46, "t": "Tá, então vou lá de novo amanhã."}, {"s": 335.46, "e": 337.379, "t": "Totalmente detalhe, você tá olhando."}, {"s": 337.379, "e": 341.591, "t": "Tá, precisa pegar as certidões\nde nascimento dele e as duas"}, {"s": 341.591, "e": 344.136, "t": "certidões de óbito dos pais"}, {"s": 344.136, "e": 346.513, "t": "e depois uma recomendação\ndo distrito."}, {"s": 346.513, "e": 347.931, "t": "É."}, {"s": 348.974, "e": 349.975, "t": "Tchau Tope."}, {"s": 365.198, "e": 368.702, "t": "Tá. Avisos pequenos primeiro\ne depois o aviso grande."}, {"s": 368.702, "e": 371.413, "t": "O aviso pequeno,\nos quartos estavam ótimos hoje."}, {"s": 371.413, "e": 372.747, "t": "Muito obrigada."}, {"s": 375.375, "e": 379.463, "t": "A grande notícia é que\no Tio Tope vem hoje"}, {"s": 379.463, "e": 382.507, "t": "e ele vai trazer duas crianças novas."}, {"s": 382.507, "e": 384.426, "t": "A mãe deles morreu há poucos dias"}, {"s": 384.426, "e": 386.678, "t": "e o pai também faleceu."}, {"s": 386.678, "e": 389.931, "t": "Então eles vêm morar aqui com a gente."}, {"s": 394.769, "e": 395.937, "t": "E eu sei que é muito difícil pra alguns"}, {"s": 395.937, "e": 398.148, "t": "de vocês quando chegam crianças novas"}, {"s": 398.148, "e": 402.652, "t": "porque vocês sentem que já\né muita coisa, e tudo bem."}, {"s": 404.779, "e": 407.115, "t": "Nós vamos superar isso juntos."}, {"s": 409.326, "e": 412.913, "t": "E eu vou precisar que\ntodo mundo ajude"}, {"s": 412.913, "e": 415.415, "t": "pra as crianças se adaptarem."}, {"s": 416.791, "e": 419.753, "t": "Sei que os quartos já estão apertados."}, {"s": 419.753, "e": 422.964, "t": "Quem sente que tem\nespaço no quarto"}, {"s": 422.964, "e": 425.383, "t": "ou uma cama vazia ou algo assim?"}, {"s": 425.383, "e": 428.678, "t": "Ou alguém dormindo sozinho numa cama grande?"}, {"s": 428.678, "e": 430.597, "t": "Não, ninguém. Ninguém."}, {"s": 430.597, "e": 431.515, "t": "- Namraj.\n- Namraj."}, {"s": 431.515, "e": 435.185, "t": "Namraj? E onde o Prabian dorme?"}, {"s": 435.31, "e": 436.561, "t": "Jagat."}, {"s": 437.354, "e": 439.189, "t": "E, Namraj, sabe,"}, {"s": 439.189, "e": 440.44, "t": "Himal é do seu vilarejo."}, {"s": 440.44, "e": 443.735, "t": "Quer dividir a cama com ele? Tá, eba."}, {"s": 445.737, "e": 447.28, "t": "Então vamos deixar esse\ncomo plano a longo prazo,"}, {"s": 447.28, "e": 448.865, "t": "que Himal começa com você, tá?"}, {"s": 448.865, "e": 450.909, "t": "E você vai ser o irmão mais velho?"}, {"s": 450.909, "e": 452.285, "t": "Você é um irmão mais velho tão bom."}, {"s": 455.83, "e": 457.999, "t": "[bem ao lado da casa onde você nasceu.]"}, {"s": 551.801, "e": 553.345, "t": "[Como você tá?]"}, {"s": 555.263, "e": 556.806, "t": "[Você tá bem?]"}, {"s": 557.932, "e": 559.267, "t": "[A viagem de carro foi longa?]"}, {"s": 559.809, "e": 561.311, "t": "[Ficou enjoado no carro?]"}, {"s": 562.562, "e": 564.731, "t": "[Quer comer alguma coisa? Tá com fome?]"}, {"s": 566.858, "e": 570.362, "t": "[Quer trocar pra roupas limpas?]"}, {"s": 571.905, "e": 573.114, "t": "[Tá se sentindo cansado?]"}, {"s": 577.077, "e": 578.37, "t": "[Esse é nosso lar agora.]"}, {"s": 581.456, "e": 583.458, "t": "- Olá.\n- Olá."}, {"s": 583.458, "e": 586.169, "t": "Esse é Himal e essa é Karma."}, {"s": 590.34, "e": 593.259, "t": "[Esse é seu irmão mais velho.]"}, {"s": 593.635, "e": 596.554, "t": "[Aqui está seu irmão mais velho.]"}, {"s": 598.223, "e": 601.059, "t": "Vou levar ele e dar\num banho nele. Tá?"}, {"s": 608.817, "e": 610.318, "t": "[Pequenino.]"}, {"s": 610.485, "e": 611.778, "t": "[Você tá com frio?]"}, {"s": 627.419, "e": 630.213, "t": "Vou ver, vamos dar\num passo de cada vez."}, {"s": 631.923, "e": 635.552, "t": "Ah, tentamos colocar umas\ncoisas no cabelo dele também"}, {"s": 635.552, "e": 638.346, "t": "pra tirar esse chiclete."}, {"s": 640.765, "e": 641.891, "t": "[Vem, pequenino.]"}, {"s": 644.644, "e": 647.147, "t": "Provavelmente ainda sentem\nenjoo no estômago."}, {"s": 653.862, "e": 656.114, "t": "[Você quer água?]"}, {"s": 668.96, "e": 670.837, "t": "[ou com medo]"}, {"s": 670.837, "e": 672.756, "t": "[ou precisar ir ao banheiro]"}, {"s": 672.756, "e": 674.34, "t": "[é só pedir pras irmãs mais velhas.]"}, {"s": 713.171, "e": 716.925, "t": "Eu tinha 18 e fui num ano sabático."}, {"s": 720.303, "e": 724.849, "t": "Quando todos os outros estudantes\nforam embora, eu decidi ficar."}, {"s": 726.81, "e": 731.064, "t": "E comecei a trabalhar num\nprojeto pra refugiados nepaleses."}, {"s": 731.064, "e": 732.023, "t": "Nove."}, {"s": 732.023, "e": 733.274, "t": "Conseguimos chegar a 10?"}, {"s": 733.274, "e": 734.526, "t": "- É.\n- É, 10?"}, {"s": 734.526, "e": 737.654, "t": "Espera, espera, espera, espera.\nDeixa, eu tenho um vermelho, então."}, {"s": 737.654, "e": 742.534, "t": "Foi lá que eu conheci Tope.\nEle era o gerente de operações."}, {"s": 742.534, "e": 745.286, "t": "Sei lá, tala, precisa limpar."}, {"s": 745.286, "e": 748.665, "t": "Tá, esse é Tope. Olá."}, {"s": 748.665, "e": 749.833, "t": "Eu também trabalhando. Sem problema."}, {"s": 751.167, "e": 753.419, "t": "Ela trabalhando comigo dois anos."}, {"s": 754.921, "e": 756.923, "t": "cuidando de criança órfã."}, {"s": 758.508, "e": 760.51, "t": "Quem tá com o shampoo?"}, {"s": 763.012, "e": 764.597, "t": "Eu também sou órfão."}, {"s": 769.185, "e": 770.77, "t": "Eu conheço essa vida."}, {"s": 772.063, "e": 773.147, "t": "O que é vida com fome,\no que é vida com frio,"}, {"s": 774.858, "e": 776.86, "t": "O que é vida com frio."}, {"s": 778.528, "e": 780.822, "t": "e o que é tempo difícil."}, {"s": 782.49, "e": 785.994, "t": "Essas crianças, quanto amor\nelas recebem da Maggie."}, {"s": 787.287, "e": 789.581, "t": "Depois disso, eu totalmente confio nela."}, {"s": 789.581, "e": 791.583, "t": "Tá, só coloca a etiqueta em cima."}, {"s": 791.583, "e": 793.793, "t": "Agora tá limpo e eu não consigo\nacreditar como parece."}, {"s": 793.793, "e": 795.003, "t": "- É?\n- Parece que"}, {"s": 795.003, "e": 797.088, "t": "vai se espalhar. Por exemplo,"}, {"s": 797.088, "e": 798.423, "t": "depois dois, três ano que vêm,"}, {"s": 798.423, "e": 802.26, "t": "eles vão adicionando\nisso muito mais por aqui."}, {"s": 804.554, "e": 806.639, "t": "O Nepal estava entre os países\nmais pobres"}, {"s": 806.639, "e": 807.64, "t": "do mundo"}, {"s": 808.6, "e": 812.061, "t": "e estava se recuperando de uma\nguerra civil de uma década"}, {"s": 812.061, "e": 816.232, "t": "que deixou um milhão de crianças\nórfãs em seu rastro."}, {"s": 824.449, "e": 828.828, "t": "Percebemos que o que algumas\ncrianças precisavam era a chance de"}, {"s": 828.828, "e": 830.622, "t": "estudar num bom ambiente."}, {"s": 830.622, "e": 831.873, "t": "[Namaste.]"}, {"s": 831.873, "e": 834.083, "t": "Namaste."}, {"s": 836.252, "e": 840.006, "t": "Outras crianças precisavam\nde mais intervenção,"}, {"s": 840.006, "e": 844.594, "t": "que era um lar e uma família\ne um lugar seguro pra morar."}, {"s": 854.187, "e": 857.523, "t": "sala de jantar que acabamos\nde construir."}, {"s": 878.67, "e": 879.504, "t": "Tá."}, {"s": 880.755, "e": 882.507, "t": "[Qual é o seu nome?]"}, {"s": 887.762, "e": 890.181, "t": "Maggie?"}, {"s": 890.765, "e": 893.893, "t": "Naquela época, eu tinha tipo sete anos."}, {"s": 897.313, "e": 899.065, "t": "Minha mãe morreu primeiro."}, {"s": 900.024, "e": 902.151, "t": "Ela tinha câncer de ovário."}, {"s": 905.071, "e": 907.031, "t": "Uns seis, sete meses depois,"}, {"s": 907.949, "e": 909.617, "t": "meu pai também morreu."}, {"s": 918.835, "e": 920.878, "t": "- Oi Nisha.\n- Oi."}, {"s": 920.878, "e": 921.921, "t": "Como você está?"}, {"s": 921.921, "e": 924.048, "t": "♪ Nisha Arco-íris ♪"}, {"s": 924.048, "e": 926.968, "t": "♪ Nisha Arco-íris ♪"}, {"s": 926.968, "e": 929.512, "t": "♪ Vá aonde quiser ir ♪"}, {"s": 929.512, "e": 932.473, "t": "♪ E faça o que quiser fazer ♪"}, {"s": 932.473, "e": 935.601, "t": "♪ O céu é ♪"}, {"s": 935.601, "e": 936.686, "t": "Diz oi."}, {"s": 936.686, "e": 937.52, "t": "Oi."}, {"s": 937.52, "e": 939.355, "t": "Hoje é o primeiro dia de aula."}, {"s": 939.355, "e": 941.107, "t": "- Oi.\n- Hoje é o"}, {"s": 941.107, "e": 943.568, "t": "primeiro dia de aula."}, {"s": 943.568, "e": 944.527, "t": "Quando eu cheguei aqui,"}, {"s": 944.527, "e": 947.321, "t": "tinha só primeiro andar, família pequena."}, {"s": 948.781, "e": 952.869, "t": "Eu não tinha ideia do que estava\nacontecendo ou tipo onde eu estava."}, {"s": 952.869, "e": 955.913, "t": "A única coisa que eu sabia\né que eu estava segura ali."}, {"s": 955.913, "e": 957.457, "t": "Eu senti o amor."}, {"s": 961.377, "e": 963.421, "t": "E porque mais crianças vinham,"}, {"s": 963.421, "e": 966.174, "t": "nossa casa também começou a crescer."}, {"s": 967.467, "e": 970.636, "t": "Fizemos segundo andar, depois terceiro"}, {"s": 970.636, "e": 972.18, "t": "e depois quarto andar."}, {"s": 976.1, "e": 978.394, "t": "Tudo aconteceu tão rápido."}, {"s": 980.063, "e": 981.314, "t": "Eu voltei da escola"}, {"s": 981.314, "e": 984.108, "t": "e a Maggie tipo,\n\"Este é seu novo irmão.\""}, {"s": 984.484, "e": 986.861, "t": "Oi Krishna."}, {"s": 986.861, "e": 987.695, "t": "Depois da Nisha,"}, {"s": 987.695, "e": 990.406, "t": "eu fui a próxima criança\nque se mudou pra casa."}, {"s": 990.406, "e": 991.824, "t": "[Você vai pra escola hoje?]"}, {"s": 996.496, "e": 998.539, "t": "Krishna, Krishna?"}, {"s": 998.873, "e": 999.916, "t": "Oi Maggie."}, {"s": 1001.292, "e": 1003.878, "t": "- Tchau tchau, tchau, tchau.\n- Krishna."}, {"s": 1004.921, "e": 1006.38, "t": "Eu tinha três ou quatro anos"}, {"s": 1006.38, "e": 1008.257, "t": "quando eu perdi meu pai."}, {"s": 1008.257, "e": 1010.927, "t": "Minha mãe, uma mãe sem estudo,"}, {"s": 1012.261, "e": 1016.349, "t": "vivendo numa sociedade\nonde as pessoas te julgam,"}, {"s": 1016.349, "e": 1018.226, "t": "era difícil pra ela tipo cuidar"}, {"s": 1018.267, "e": 1021.062, "t": "da minha irmã mais nova e de mim, então,"}, {"s": 1021.687, "e": 1023.314, "t": "ela nos abandonou."}, {"s": 1025.525, "e": 1029.195, "t": "Krishna tinha passado por tanta coisa."}, {"s": 1031.322, "e": 1035.243, "t": "Ele e a irmã dele,\nSabitha, foram separados."}, {"s": 1037.745, "e": 1042.583, "t": "Levou um tempo pra ele realmente\nencontrar seu lugar na família"}, {"s": 1043.584, "e": 1048.589, "t": "e eu acho que ele nem sentiu isso\naté encontrarmos a irmã dele."}, {"s": 1073.489, "e": 1077.827, "t": "♪ Parabéns pra você ♪"}, {"s": 1077.827, "e": 1080.58, "t": "♪ Parabéns pra você ♪"}, {"s": 1080.58, "e": 1083.583, "t": "Quando eu pensava na minha infância."}, {"s": 1083.791, "e": 1085.459, "t": ças."}, {"s": 1187.353, "e": 1190.273, "t": "Eu estava tentando criar um lar seguro."}, {"s": 1195.736, "e": 1198.197, "t": "Mas eu me apaixonei por eles."}, {"s": 1202.451, "e": 1206.08, "t": "E eu percebi que queria\nmorar lá em tempo integral."}, {"s": 1206.08, "e": 1210.584, "t": "Oi pessoal, é minha última\nnoite em Mendham, em casa"}, {"s": 1210.584, "e": 1215.548, "t": "nos EUA e vai ser\npor provavelmente muito tempo."}, {"s": 1215.84, "e": 1219.093, "t": "Estou ansiosa pra voltar e ver\nas crianças."}, {"s": 1219.093, "e": 1223.639, "t": "[Namaste. Namaste.]"}, {"s": 1223.639, "e": 1227.226, "t": "Se cuidem. Estou indo pro meu voozinho."}, {"s": 1227.226, "e": 1229.353, "t": "Meu voozinho muito,\nmuito longo."}, {"s": 1240.364, "e": 1241.198, "t": "Ei."}, {"s": 1243.117, "e": 1244.535, "t": "Oi pessoal."}, {"s": 1244.535, "e": 1245.87, "t": "Oi."}, {"s": 1245.87, "e": 1247.246, "t": "Feliz sábado."}, {"s": 1247.246, "e": 1249.957, "t": "Navin Tiwari está aqui."}, {"s": 1250.374, "e": 1253.044, "t": "Um dia as crianças desceram"}, {"s": 1254.17, "e": 1257.465, "t": "e disseram, \"Nós conversamos sobre isso"}, {"s": 1257.465, "e": 1260.634, "t": "e decidimos que queremos\nte chamar de Mãe.\""}, {"s": 1260.634, "e": 1264.722, "t": "- M-O-T-H-E-R, mãe.\n- M-O-T-H-E-R, mãe."}, {"s": 1264.722, "e": 1266.182, "t": "M-O-T-H-E-R, mãe."}, {"s": 1266.182, "e": 1268.768, "t": "[Mãe significa \"Mammu\"]"}, {"s": 1269.602, "e": 1274.398, "t": "- B-R-O-T-H-E-R, irmão.\n- B-R-O-T-H-E-R, irmão."}, {"s": 1275.691, "e": 1279.236, "t": "- S-I-S-T-E-R, irmã.\n- S-I-S-T-E-R, irmã."}, {"s": 1279.236, "e": 1281.53, "t": "[Sister?]"}, {"s": 1291.832, "e": 1295.127, "t": "Tudo bem, de novo. Uau, Krishna."}, {"s": 1297.213, "e": 1299.382, "t": "No início quando não tinha\ncuidadores"}, {"s": 1299.382, "e": 1302.301, "t": "e a Maggie era quem\ncuidava de tudo."}, {"s": 1303.761, "e": 1305.221, "t": "Ela fez tudo e mais"}, {"s": 1305.221, "e": 1308.599, "t": "do que uma mãe faria por u e"}, {"s": 2855.311, "e": 2856.145, "t": "e seus pais voltaram."}, {"s": 2856.145, "e": 2858.814, "t": "Querido Bishal,\nvoce e sempre tao corajoso."}, {"s": 2858.814, "e": 2863.361, "t": "Querida Pabitra, adoro ver\nsua gentileza e sensibilidade."}, {"s": 2863.361, "e": 2865.446, "t": "Asmita, sua docura e demais."}, {"s": 2865.446, "e": 2866.53, "t": "Amo seu sorriso."}, {"s": 2866.53, "e": 2868.908, "t": "Querida Kojari, desde o\nmomento que te vi... obrigada."}, {"s": 2868.908, "e": 2870.284, "t": "Obrigada. Obrigada."}, {"s": 2870.284, "e": 2873.204, "t": "Maya significa amor em nepales\ne voce..."}, {"s": 2873.204, "e": 2874.83, "t": "e um dos maiores amores\nda minha vida."}, {"s": 2874.83, "e": 2878.96, "t": "Querida Shanti, voce tem\nos olhos mais lindos..."}, {"s": 2878.96, "e": 2882.129, "t": "querida Kalpana, mal posso\nesperar pra te ver de novo..."}, {"s": 2882.129, "e": 2884.715, "t": "Pode cantar mais, por favor.\nVoce tem a voz mais linda."}, {"s": 2884.715, "e": 2887.134, "t": "Querida Ganga. Querido Hari."}, {"s": 2887.343, "e": 2889.679, "t": "Eu disse que voltaria\ne quero voltar"}, {"s": 2889.679, "e": 2893.057, "t": "e quero poder estar la por eles."}, {"s": 2893.057, "e": 2894.141, "t": "Nao sei o que e..."}, {"s": 2894.141, "e": 2897.061, "t": "Sei que eles estao sofrendo\ntanto quanto eu."}, {"s": 2897.061, "e": 2898.813, "t": "Voce e elegante, e inteligente."}, {"s": 2898.813, "e": 2900.189, "t": "Voce tem ideia do quanto\ntenho orgulho de voce..."}, {"s": 2900.189, "e": 2903.192, "t": "Voce veio pra mim quando tinha."}, {"s": 2903.192, "e": 2906.07, "t": "Por mais que eu tente... e provar\na eles que vou ficar bem,"}, {"s": 2906.07, "e": 2907.113, "t": "que vamos ficar bem,"}, {"s": 2907.113, "e": 2908.739, "t": "que todos vamos superar isso."}, {"s": 2908.739, "e": 2912.159, "t": "Querida... filha... voce veio pra\nmim com esses olhos grandes."}, {"s": 2912.159, "e": 2915.997, "t": "Goma, isso e uma... querida...\nAcho que so estou com medo."}, {"s": 2915.997, "e": 2917.039, "t": "Querido Krishna,"}, {"s": 2917.039, "e": 2919.125, "t": "seu vinculo com sua irmanzinha"}, {"s": 2919.125, "e": 2920.251, "t": "e o jeito que voce cuida dela"}, {"s": 2920.251, "e": 2922.211, "t": "e a coisa mais doce do mundo."}, {"s": 2922.211, "e": 2924.964, "t": "Querida Nisha, meu amor,\nminha risada,"}, {"s": 2924.964, "e": 2927.675, "t": "meu coracao, minha alegria."}, {"s": 2932.013, "e": 2934.39, "t": "Quero mostrar a eles\nque ainda somos uma familia."}, {"s": 2995.785, "e": 2997.369, "t": "- Oi.\n- Jeremy."}, {"s": 2997.369, "e": 2999.08, "t": "- Namaste.\n- Voce dirigiu sozinho ate aqui?"}, {"s": 2999.08, "e": 2999.663, "t": "Sim. Dirigi."}, {"s": 2999.663, "e": 3000.748, "t": "Voce dirigiu?"}, {"s": 3000.748, "e": 3001.916, "t": "Como voce esta?"}, {"s": 3022.52, "e": 3025.106, "t": "Sentimos tanta sua falta."}, {"s": 3032.905, "e": 3035.116, "t": "Oi oi, pessoal."}, {"s": 3035.116, "e": 3036.867, "t": "Senti tanta falta de voces."}, {"s": 3048.587, "e": 3050.422, "t": "- Esse e o Jeremy.\n- Oi."}, {"s": 3055.845, "e": 3057.346, "t": "Obrigada."}, {"s": 3058.722, "e": 3062.685, "t": "♪ Bem-vindos, la la la la la la ♪"}, {"s": 3062.685, "e": 3067.69, "t": "♪ Boas-vindas, la la la la la ♪"}, {"s": 3067.69, "e": 3073.404, "t": "♪ Bem-vindos a Kopila, la la la ♪"}, {"s": 3074.155, "e": 3077.366, "t": "Estou tao feliz de estar em casa."}, {"s": 3077.366, "e": 3079.66, "t": "Senti tanta falta de voces. E louco."}, {"s": 3079.66, "e": 3083.497, "t": "Pensei em voces todos os dias."}, {"s": 3083.497, "e": 3086.542, "t": "E desculpa por nao\nestar aqui por um tempo,"}, {"s": 3086.542, "e": 3088.878, "t": "mas estou tao feliz de ter voltado."}, {"s": 3088.878, "e": 3092.423, "t": "Podemos conversar mais em grupos\nmenores quando eu parar de chorar."}, {"s": 3095.926, "e": 3097.261, "t": "Senti sua falta."}, {"s": 3099.346, "e": 3101.765, "t": "- Tambem senti sua falta.\n- Fotos."}, {"s": 3101.765, "e": 3103.058, "t": "Esse e o seu quarto?"}, {"s": 3103.058, "e": 3105.519, "t": "Sim. Quem esta aqui?"}, {"s": 3105.519, "e": 3108.939, "t": "Eu, Maya, Anjali e Kajori."}, {"s": 3108.939, "e": 3110.9, "t": "- Quatro.\n- Olha, mae."}, {"s": 3110.9, "e": 3115.446, "t": "Eu sei, tem eu\ne Nisha e Ravi. Sim."}, {"s": 3116.488, "e": 3119.325, "t": "Cade seu, voce ainda esta\nno azul?"}, {"s": 3119.325, "e": 3121.41, "t": "Ainda e tao recente."}, {"s": 3123.829, "e": 3126.707, "t": "Ainda penso na minha cabeca\nque ele ainda esta aqui."}, {"s": 3128.459, "e": 3130.127, "t": "Faz so tres meses."}, {"s": 3130.127, "e": 3132.004, "t": "Bem-vindos ao Cantinho da Maggie."}, {"s": 3134.798, "e": 3136.717, "t": "Ele ainda e o irmaozinho deles."}, {"s": 3136.717, "e": 3139.303, "t": "Bem-vinda de volta. Ai, adoro isso."}, {"s": 3139.303, "e": 3141.639, "t": "Que lindo. Ai."}, {"s": 3143.224, "e": 3146.81, "t": "E lindo, bem-vinda ao lar."}, {"s": 3146.81, "e": 3149.063, "t": "Olha as estrelas que voces fizeram."}, {"s": 3149.939, "e": 3151.607, "t": "Meu Deus. Sentimos tanta falta."}, {"s": 3151.607, "e": 3153.776, "t": "Bem-vinda ao lar, mae."}, {"s": 3153.776, "e": 3156.57, "t": "E trocamos seus cobertores."}, {"s": 3156.57, "e": 3157.571, "t": "Ai, adorei."}, {"s": 3157.571, "e": 3159.615, "t": "Vamos fazer uma festa do\npijama hoje?"}, {"s": 3159.615, "e": 3162.076, "t": "Sim, podemos ir la pra fora."}, {"s": 3162.076, "e": 3164.453, "t": "Obrigada por arrumar meu quarto."}, {"s": 3164.453, "e": 3167.164, "t": "Meu Deus. Quero ler\ntodas as cartas."}, {"s": 3172.294, "e": 3173.212, "t": "Mãe?"}, {"s": 3173.212, "e": 3174.296, "t": "Oi amor?"}, {"s": 3175.547, "e": 3177.508, "t": "Tá bom, boa noite. Boa noite."}, {"s": 3177.508, "e": 3178.801, "t": "Te amo."}, {"s": 3178.801, "e": 3181.595, "t": "- Te amo.\n- Tá, já volto."}, {"s": 3183.847, "e": 3186.35, "t": "São todos tão fofos."}, {"s": 3224.972, "e": 3225.889, "t": "Bom dia, dormiu bem?"}, {"s": 3227.224, "e": 3228.892, "t": "Bom dia, dormiu bem?"}, {"s": 3241.488, "e": 3244.158, "t": "♪ Ela é minha rainha\ndesde os 16 ♪"}, {"s": 3244.158, "e": 3247.286, "t": "♪ Queremos as mesmas coisas,\nsonhamos os mesmos sonhos ♪"}, {"s": 3247.286, "e": 3250.289, "t": "♪ Tudo bem ♪"}, {"s": 3250.289, "e": 3253.584, "t": "♪ Tudo bem ♪"}, {"s": 3253.584, "e": 3256.92, "t": "♪ Eu sei, eu sei ♪"}, {"s": 3256.92, "e": 3260.549, "t": "♪ Eu sei com certeza ♪"}, {"s": 3260.549, "e": 3263.719, "t": "♪ Todo mundo quer roubar\nminha garota ♪"}, {"s": 3263.719, "e": 3266.68, "t": "♪ Todo mundo quer levar\no coração dela ♪"}, {"s": 3266.68, "e": 3269.683, "t": "♪ Uns bilhões no mundo inteiro ♪"}, {"s": 3269.683, "e": 3272.686, "t": "♪ Acha outra,\nporque ela é minha ♪"}, {"s": 3272.686, "e": 3275.898, "t": "♪ Todo mundo quer roubar\nminha garota ♪"}, {"s": 3275.898, "e": 3279.109, "t": "♪ Todo mundo quer levar\no coração dela ♪"}, {"s": 3279.109, "e": 3282.154, "t": "♪ Uns bilhões no mundo inteiro ♪"}, {"s": 3282.154, "e": 3285.908, "t": "♪ Acha outra,\nporque ela é minha ♪"}, {"s": 3285.908, "e": 3289.161, "t": "♪ Eu sei, eu sei ♪"}, {"s": 3289.161, "e": 3292.164, "t": "♪ Eu sei com certeza ♪"}, {"s": 3292.164, "e": 3294.291, "t": "♪ Todo mundo quer ♪ ♪ Todo mundo quer ♪"}, {"s": 3294.291, "e": 3296.001, "t": "♪ roubar minha garota ♪"}, {"s": 3296.001, "e": 3299.129, "t": "♪ Todo mundo quer levar\no coração dela ♪"}, {"s": 3299.129, "e": 3301.84, "t": "♪ Uns bilhões no mundo inteiro ♪"}, {"s": 3312.684, "e": 3315.687, "t": "Eu ainda tenho gatilhos todo dia."}, {"s": 3316.855, "e": 3318.774, "t": "Fico apavorada com algo acontecendo"}, {"s": 3318.774, "e": 3319.983, "t": "com uma daquelas crianças."}, {"s": 3322.277, "e": 3324.53, "t": "Acho que é a natureza de ser mãe."}, {"s": 3326.615, "e": 3327.783, "t": "Você tem um coração físico"}, {"s": 3327.783, "e": 3329.952, "t": "vivendo fora do seu corpo."}, {"s": 3335.791, "e": 3337.751, "t": "E aí você faz de novo\ne de novo e de novo."}, {"s": 3339.878, "e": 3341.672, "t": "Agora eu tenho todos eles."}, {"s": 3344.633, "e": 3347.094, "t": "Qualquer coisa pode acontecer\na qualquer momento."}, {"s": 3350.931, "e": 3353.142, "t": "Você escolhe viver pensando"}, {"s": 3353.142, "e": 3355.269, "t": "que seus filhos vão morrer?"}, {"s": 3356.27, "e": 3358.856, "t": "Não dá. Não dá pra viver\ncom medo."}, {"s": 3362.317, "e": 3366.738, "t": "As crianças merecem uma mãe\ndivertida que dance com elas."}, {"s": 3370.659, "e": 3373.162, "t": "Quero ser a melhor mãe\nque eu puder para as crianças."}, {"s": 3376.457, "e": 3377.875, "t": "Você está preocupada com ele?"}, {"s": 3378.375, "e": 3381.753, "t": "Com ele a uns 12 metros\nem cima da árvore? Sim."}, {"s": 3385.174, "e": 3387.092, "t": "Ainda temos um caminho\npela frente."}, {"s": 3390.179, "e": 3392.181, "t": "O grande teste vai ser,"}, {"s": 3392.181, "e": 3395.184, "t": "vocês conseguem se virar\ncom as próprias pernas?"}, {"s": 3404.693, "e": 3406.069, "t": "Eu ganhei uma bolsa"}, {"s": 3406.069, "e": 3410.741, "t": "pra estudar num colégio\nna Holanda."}, {"s": 3412.117, "e": 3414.953, "t": "Eu lembro que foi muito\ndifícil pra mim porque"}, {"s": 3415.954, "e": 3417.206, "t": "o Ravi faleceu no Nepal"}, {"s": 3417.206, "e": 3420.334, "t": "e eu tive que ir pra\nHolanda logo depois."}, {"s": 3424.88, "e": 3428.634, "t": "Nisha foi adicionada num...\nO que era, tipo chat do Facebook?"}, {"s": 3428.634, "e": 3430.052, "t": "É."}, {"s": 3430.052, "e": 3432.679, "t": "E de onde eram as crianças?"}, {"s": 3432.679, "e": 3434.89, "t": "Grécia, Síria, Paquistão,"}, {"s": 3434.89, "e": 3437.851, "t": "Afeganistão, Índia, Belarus,"}, {"s": 3438.393, "e": 3441.522, "t": "e Ucrânia, América."}, {"s": 3443.148, "e": 3444.608, "t": "Mais alguma preocupação?"}, {"s": 3444.608, "e": 3448.654, "t": "Não, só não sei como vou me sair."}, {"s": 3449.112, "e": 3451.24, "t": "Você já passou por tanta coisa,\nentão"}, {"s": 3452.074, "e": 3453.116, "t": "mudança é difícil."}, {"s": 3453.617, "e": 3455.244, "t": "Vai ser difícil.\nPode esperar isso."}, {"s": 3455.244, "e": 3457.829, "t": "Mas você também vai conseguir\nsuperar qualquer coisa."}, {"s": 3459.164, "e": 3460.499, "t": "Pensa que legal que você vai"}, {"s": 3460.499, "e": 3462.042, "t": "morar na Europa por um tempo."}, {"s": 3465.629, "e": 3467.172, "t": "- Está nervosa?\n- Sim."}, {"s": 3475.305, "e": 3477.099, "t": "Quarenta e cinco minutos"}, {"s": 3477.099, "e": 3478.308, "t": "- O quê?\n- Meia hora."}, {"s": 3478.308, "e": 3482.187, "t": "até eu conhecer"}, {"s": 3482.187, "e": 3484.731, "t": "sei lá, 15 crianças."}, {"s": 3486.817, "e": 3488.61, "t": "Como você se sente?"}, {"s": 3488.61, "e": 3491.154, "t": "Eu falei, vou vomitar."}, {"s": 3493.407, "e": 3494.533, "t": "Que lindo isso."}, {"s": 3494.533, "e": 3496.243, "t": "- É.\n- É empolgante."}, {"s": 3496.243, "e": 3499.496, "t": "Né? É um pouco\nemocionante pra mim."}, {"s": 3499.496, "e": 3501.582, "t": "Mas eu vou ficar bem."}, {"s": 3504.96, "e": 3506.92, "t": "Vou só guardar isso aqui."}, {"s": 3519.433, "e": 3520.684, "t": "Tá."}, {"s": 3521.768, "e": 3522.728, "t": "Vai ir lá?"}, {"s": 3524.146, "e": 3524.98, "t": "Sim."}, {"s": 3526.815, "e": 3528.15, "t": "Tchau."}, {"s": 3528.15, "e": 3529.484, "t": "Vou sentir saudade."}, {"s": 3532.738, "e": 3533.989, "t": "Tenho tanto orgulho de você."}, {"s": 3533.989, "e": 3536.533, "t": "Ah. Obrigada, Mãe."}, {"s": 3540.579, "e": 3542.205, "t": "Tenho tanto orgulho de você."}, {"s": 3542.205, "e": 3543.457, "t": "Eu tive tanta sorte."}, {"s": 3544.291, "e": 3545.125, "t": "É."}, {"s": 3548.086, "e": 3549.463, "t": "Você está sendo tão corajosa.\nNão, estou bem."}, {"s": 3549.463, "e": 3550.547, "t": "Só estou muito feliz."}, {"s": 3550.547, "e": 3552.299, "t": "Estou tão feliz por você."}, {"s": 3553.133, "e": 3554.551, "t": "Você vai se sair muito bem. Tá?"}, {"s": 3555.344, "e": 3555.969, "t": "Vai arrasar. Tá?"}, {"s": 3557.763, "e": 3559.264, "t": "Tenho tanto orgulho de você."}, {"s": 3562.1, "e": 3563.977, "t": "Te amo, te amo, te amo."}, {"s": 3563.977, "e": 3565.854, "t": "Te amo, te amo,\nte amo, te amo."}, {"s": 3565.854, "e": 3567.23, "t": "Estuda bastante. Tá? Sim."}, {"s": 3567.23, "e": 3568.982, "t": "Se precisar de algo,\nme manda mensagem."}, {"s": 3568.982, "e": 3570.984, "t": "- Sim.\n- Qualquer coisa. Tá?"}, {"s": 3570.984, "e": 3572.527, "t": "- Mm.\n- Mm."}, {"s": 3595.342, "e": 3596.176, "t": "Tá."}, {"s": 3604.184, "e": 3605.727, "t": "O que foi? Você está bem?"}, {"s": 3605.727, "e": 3607.354, "t": "Estou com saudade\nda Nisha hoje e"}, {"s": 3608.397, "e": 3611.316, "t": "não parece certo sem ele."}, {"s": 3611.733, "e": 3613.902, "t": "Sinto falta de ter ele\nno banco de trás"}, {"s": 3613.902, "e": 3615.612, "t": "e sinto falta dele por perto."}, {"s": 3615.612, "e": 3618.281, "t": "Sinto falta dele no carrinho\ne sinto falta de ter"}, {"s": 3618.281, "e": 3619.95, "t": "a bolsa de fraldas e"}, {"s": 3622.244, "e": 3623.537, "t": "você me bota pra dormir?"}, {"s": 3623.537, "e": 3625.747, "t": "Estou com pensamentos\nruins hoje."}, {"s": 3628.583, "e": 3630.085, "t": "Consegue ouvir?"}, {"s": 3630.085, "e": 3631.002, "t": "Mm-hmm."}, {"s": 3633.922, "e": 3636.174, "t": "A lua nova. O mais perto é Marte"}, {"s": 3636.174, "e": 3638.552, "t": "porque é bem um pouco,"}, {"s": 3638.552, "e": 3640.262, "t": "é um pouco mais vermelho?"}, {"s": 3640.262, "e": 3642.597, "t": "Sabe, pra eu conseguir-"}, {"s": 3645.851, "e": 3647.728, "t": "- Bom dia.\n- Bom dia."}, {"s": 3652.733, "e": 3654.317, "t": "Sentiu falta dos seus irmãos?"}, {"s": 3660.031, "e": 3661.366, "t": "É verdade. Tá."}, {"s": 3662.325, "e": 3663.16, "t": "Você tem um longo caminho."}, {"s": 3663.16, "e": 3664.411, "t": "Tem que ir com calma."}, {"s": 3666.246, "e": 3668.54, "t": "Jeremy, quando vai casar?"}, {"s": 3668.54, "e": 3671.042, "t": "- Maggie.\n- Quando deveria?"}, {"s": 3671.042, "e": 3672.419, "t": "Hoje à noite."}, {"s": 3672.419, "e": 3674.129, "t": "É, hoje. Hoje, é."}, {"s": 3674.129, "e": 3674.963, "t": "Eu não tenho nenhum,"}, {"s": 3674.963, "e": 3676.047, "t": "não tenho um anel nem nada."}, {"s": 3676.047, "e": 3677.674, "t": "Compra um anel no mercado."}, {"s": 3677.674, "e": 3679.134, "t": "- Não, não.\n- Só traz uma"}, {"s": 3679.134, "e": 3682.22, "t": "rosa de plástico e fala tipo, \"Sim\""}, {"s": 3682.22, "e": 3683.764, "t": "e eles vão dançar."}, {"s": 3685.098, "e": 3686.808, "t": "Você acha que todo mundo\nficaria bem com isso?"}, {"s": 3686.808, "e": 3687.726, "t": "- Sim.\n- Sim, sim-"}, {"s": 3687.726, "e": 3690.687, "t": "Todo mundo ficaria feliz."}, {"s": 3720.842, "e": 3722.469, "t": "Oi pessoal."}, {"s": 3722.469, "e": 3724.095, "t": "Oi."}, {"s": 3726.264, "e": 3727.557, "t": "Oi."}, {"s": 3727.557, "e": 3729.476, "t": "- Oi.\n- Estão nos ouvindo bem?"}, {"s": 3729.476, "e": 3730.852, "t": "- Sim.\n- Sim."}, {"s": 3731.478, "e": 3733.73, "t": "Então temos novidades."}, {"s": 3733.73, "e": 3735.857, "t": "Jeremy me pediu em casamento,"}, {"s": 3735.857, "e": 3738.527, "t": "então vamos casar no Nepal."}, {"s": 3753.542, "e": 3756.086, "t": "Vamos tomar café primeiro\ne ir pro nosso quarto."}, {"s": 3774.521, "e": 3777.232, "t": "Estou aqui com vocês\nhá 10 anos,"}, {"s": 3777.232, "e": 3779.818, "t": "tipo mais anos do que passei"}, {"s": 3779.818, "e": 3782.863, "t": "com minha família biológica."}, {"s": 3782.863, "e": 3786.491, "t": "Parece que é meio que\num novo capítulo?"}, {"s": 3787.367, "e": 3789.077, "t": "É um novo capítulo pra mim."}, {"s": 3790.37, "e": 3792.873, "t": "Eu cresci de criança\npra jovem adulto"}, {"s": 3795.083, "e": 3798.92, "t": "e agora é hora de eu\nser mais eu mesmo"}, {"s": 3799.754, "e": 3801.882, "t": "e menos dependente dos outros."}, {"s": 3810.557, "e": 3811.474, "t": "Muito bem."}, {"s": 3812.475, "e": 3814.436, "t": "Tipo, eu fiquei muito triste"}, {"s": 3815.437, "e": 3818.023, "t": "e percebi como\na família é importante."}, {"s": 3829.91, "e": 3836.333, "t": "Krishna, Krishna!"}, {"s": 3836.333, "e": 3838.293, "t": "Krishna,"}, {"s": 3838.293, "e": 3839.586, "t": "cada lembrança"}, {"s": 3839.586, "e": 3842.422, "t": "que eu tenho aqui tem você nela."}, {"s": 3842.422, "e": 3844.132, "t": "Desde os primeiros dias"}, {"s": 3844.132, "e": 3847.552, "t": "quando você era bem, bem pequeno."}, {"s": 3847.552, "e": 3849.387, "t": "Não vai ser igual sem você."}, {"s": 3849.387, "e": 3852.432, "t": "Vou odiar quando eu acordar\ne você não estiver aqui."}, {"s": 3853.141, "e": 3855.56, "t": "Nós construímos esse lar juntos."}, {"s": 3855.936, "e": 3858.772, "t": "Carregamos cada tijolo\ne fizemos todas as regras"}, {"s": 3858.772, "e": 3861.232, "t": "e decidimos como queríamos\nser como família."}, {"s": 3861.232, "e": 3862.776, "t": "Então eu só agradeço."}, {"s": 3863.401, "e": 3866.112, "t": "Vou sentir falta de cada momento."}, {"s": 3867.238, "e": 3868.156, "t": "Eu amo vocês."}, {"s": 3880.752, "e": 3883.922, "t": "Pra mim são as pessoas\nque fazem a família."}, {"s": 3890.637, "e": 3893.682, "t": "Você não precisa ter laço de sangue"}, {"s": 3894.933, "e": 3896.601, "t": "pra construir uma conexão."}, {"s": 3898.269, "e": 3901.523, "t": "Tão forte como nós,\ncrianças Kopila, construímos."}, {"s": 3905.944, "e": 3907.737, "t": "[Estou me mudando.]"}, {"s": 3907.737, "e": 3909.364, "t": "[Seguindo em frente.]"}, {"s": 3943.481, "e": 3944.441, "t": "Aw."}, {"s": 3947.694, "e": 3949.404, "t": "Olha, se você contar\nas pintas nas costas,"}, {"s": 3949.404, "e": 3951.573, "t": "dá pra saber a idade delas."}, {"s": 3953.908, "e": 3956.411, "t": "Tínhamos esperado tanto tempo."}, {"s": 3956.411, "e": 3959.998, "t": "Não tínhamos acolhido\nnenhuma criança nova naquele"}, {"s": 3960.665, "e": 3961.875, "t": "período de luto de um ano."}, {"s": 3966.963, "e": 3968.965, "t": "Mas eu pensava muito\nnas outras crianças"}, {"s": 3968.965, "e": 3971.885, "t": "e em como elas lidariam\ncom ter outro bebê,"}, {"s": 3971.885, "e": 3975.972, "t": "garantindo que ela não se sentisse"}, {"s": 3989.069, "e": 3993.239, "t": "Tope recebeu uma ligação\nsobre um caso de emergência"}, {"s": 3993.239, "e": 3995.033, "t": "do governo local."}, {"s": 4003.083, "e": 4006.669, "t": "O melhor lugar pra uma criança"}, {"s": 4006.669, "e": 4009.464, "t": "é na comunidade com a família."}, {"s": 4011.091, "e": 4014.094, "t": "Mas quando uma criança\nnão está segura,"}, {"s": 4014.094, "e": 4016.179, "t": "quando não tem lugar,\nnenhum lugar pra ir,"}, {"s": 4016.179, "e": 4019.516, "t": "ninguém pra cuidar dela,\nprecisamos de uma opção,"}, {"s": 4019.516, "e": 4021.726, "t": "e temos que tomar\nessas decisões difíceis,"}, {"s": 4021.726, "e": 4023.853, "t": "e fazemos isso com o apoio\nde assistentes sociais,"}, {"s": 4023.853, "e": 4026.981, "t": "com conselheiros, com\nlíderes comunitários."}, {"s": 4026.981, "e": 4030.068, "t": "E não é uma decisão\nque tomamos de leve."}, {"s": 4035.031, "e": 4036.866, "t": "Já tínhamos feito mil outras coisas"}, {"s": 4036.866, "e": 4039.953, "t": "antes daquela criança\nvir para o lar"}, {"s": 4039.953, "e": 4043.665, "t": "e ainda assim 2% das vezes\ntemos que intervir."}, {"s": 4043.665, "e": 4045.792, "t": "E esse é o último recurso absoluto."}, {"s": 4045.792, "e": 4047.794, "t": "Longe da cidade, sem acesso a água."}, {"s": 4047.794, "e": 4049.504, "t": "Não tem nem hospital por perto"}, {"s": 4049.504, "e": 4051.506, "t": "nem escola, nada."}, {"s": 4057.011, "e": 4057.971, "t": "Essa é a casa"}, {"s": 4059.722, "e": 4061.307, "t": "no meio do nada."}, {"s": 4062.976, "e": 4064.269, "t": "[A casa é ali, senhor.]"}, {"s": 4064.269, "e": 4065.562, "t": "[Aquela?]"}, {"s": 4071.901, "e": 4073.361, "t": "[As crianças sabem o que aconteceu com a mãe?]"}, {"s": 4074.696, "e": 4077.24, "t": "[Não. Elas não sabem. Estavam dormindo.]"}, {"s": 4079.367, "e": 4081.286, "t": "[Ninguém mais estava aqui à noite.]"}, {"s": 4081.286, "e": 4083.413, "t": "[Só a mãe e as duas meninas.]"}, {"s": 4093.339, "e": 4096.926, "t": "[Cadê? Achou! Cadê? Achou!]"}, {"s": 4096.926, "e": 4098.511, "t": "Mamãe."}, {"s": 4100.221, "e": 4102.14, "t": "Cadê? Achou!"}, {"s": 4109.981, "e": 4112.65, "t": "[Vamos no carro, tá?]"}, {"s": 4142.18, "e": 4146.893, "t": "Diz oi. É uma menina."}, {"s": 4148.102, "e": 4149.562, "t": "Adivinhem o nome dela?"}, {"s": 4149.896, "e": 4151.522, "t": "Khusi. [Feliz]"}, {"s": 4151.856, "e": 4153.524, "t": "Feliz"}, {"s": 4154.734, "e": 4156.611, "t": "Essa é Khusbu [Cheira Bem]."}, {"s": 4156.611, "e": 4158.696, "t": "- Khusbu.\n- Khusbu"}, {"s": 4159.197, "e": 4160.698, "t": "É muito importante tirar todas"}, {"s": 4160.698, "e": 4164.244, "t": "as coisas pequenas da casa de novo,"}, {"s": 4164.244, "e": 4165.787, "t": "tudo que ela poderia pegar,"}, {"s": 4165.787, "e": 4166.996, "t": "que ela poderia botar na boca"}, {"s": 4166.996, "e": 4171.376, "t": "e nos próximos dias, vamos\nprecisar da ajuda de todos, tá?"}, {"s": 4180.593, "e": 4182.262, "t": "O nome da Khusi significa feliz."}, {"s": 4182.971, "e": 4185.265, "t": "Ela literalmente trouxe isso\npro nosso lar num momento"}, {"s": 4185.265, "e": 4187.85, "t": "em que achávamos que\nnunca mais conseguiríamos amar"}, {"s": 4187.85, "e": 4190.853, "t": "um bebê do jeito que amávamos ele."}, {"s": 4194.19, "e": 4196.609, "t": "Lembro de dizer pras crianças:\n\"Ainda somos uma família,"}, {"s": 4196.609, "e": 4198.027, "t": "ainda somos uma família,\nainda somos uma família.\""}, {"s": 4198.027, "e": 4200.738, "t": "E acho que trazer Khusi e Khusbu"}, {"s": 4200.738, "e": 4204.2, "t": "e mostrar pra eles\nque podíamos seguir em frente,"}, {"s": 4205.618, "e": 4209.122, "t": "isso nos fez acreditar\nque podíamos fazer de novo."}, {"s": 4210.999, "e": 4213.459, "t": "Vamos renovar todo o guarda-roupa\ndo centro feminino."}, {"s": 4269.974, "e": 4271.642, "t": "O que terminou?"}, {"s": 4271.642, "e": 4274.228, "t": "- Experimento.\n- Seu experimento terminou?"}, {"s": 4274.562, "e": 4276.439, "t": "Você precisa de fósforos ou..."}, {"s": 4278.066, "e": 4280.735, "t": "Santosh, sério,\nnão bota fogo em nada."}, {"s": 4281.444, "e": 4284.155, "t": "Abraço coletivo em todo mundo."}, {"s": 4285.573, "e": 4289.66, "t": "Eu estava passando pelo\nmeu próprio luto e vergonha"}, {"s": 4289.66, "e": 4291.537, "t": "e me sentindo um fracasso."}, {"s": 4292.038, "e": 4293.414, "t": "Eu amo vocês."}, {"s": 4293.414, "e": 4295.5, "t": "- A gente te ama.\n- Também amo vocês."}, {"s": 4295.5, "e": 4297.585, "t": "Eu volto logo."}, {"s": 4297.585, "e": 4300.63, "t": "E ao mesmo tempo pensando:\n\"Tá, vamos de algum jeito voltar"}, {"s": 4300.63, "e": 4302.048, "t": "a ser aquela você de antes"}, {"s": 4303.216, "e": 4304.509, "t": "que ainda é a CEO"}, {"s": 4304.509, "e": 4306.511, "t": "de uma grande organização."}, {"s": 4308.888, "e": 4313.101, "t": "Administramos uma grande escola\ncomunitária, um centro feminino,"}, {"s": 4313.101, "e": 4315.061, "t": "um lar seguro para meninas."}, {"s": 4315.061, "e": 4318.189, "t": "Éramos uma equipe de 125 pessoas."}, {"s": 4318.189, "e": 4321.859, "t": "Todas totalmente dependentes de mim"}, {"s": 4321.859, "e": 4323.027, "t": "e da minha capacidade de sair"}, {"s": 4323.027, "e": 4326.322, "t": "e arrecadar fundos e manter\nnossa família funcionando."}, {"s": 4331.369, "e": 4335.373, "t": "Eu não sabia se conseguiria\nsubir num palco e falar de novo."}, {"s": 4344.632, "e": 4347.385, "t": "Bom dia a todos.\nEsta é uma sala notável."}, {"s": 4347.385, "e": 4349.178, "t": "MLK fez um discurso aqui,"}, {"s": 4349.178, "e": 4352.723, "t": "assim como Hillary Clinton\ne hoje Maggie Doyne."}, {"s": 4359.981, "e": 4362.9, "t": "Esta é a primeira palestra\nque dou em um bom tempo."}, {"s": 4365.153, "e": 4368.322, "t": "O amor é, o amor é algo lindo"}, {"s": 4369.073, "e": 4371.909, "t": "e é aquilo que temos\nque nos agarrar"}, {"s": 4371.909, "e": 4373.786, "t": "e a única coisa que vai,"}, {"s": 4373.786, "e": 4376.247, "t": "em um milhão de anos,\ncurar o mundo no estado"}, {"s": 4376.247, "e": 4377.582, "t": "em que estamos."}, {"s": 4380.918, "e": 4382.336, "t": "E aí?"}, {"s": 4393.014, "e": 4394.056, "t": "Quer ver?"}, {"s": 4394.432, "e": 4395.975, "t": "O que diz?"}, {"s": 4398.186, "e": 4399.645, "t": "Estou grávida."}, {"s": 4400.438, "e": 4401.981, "t": "Diz que..."}, {"s": 4404.484, "e": 4405.443, "t": "Meu Deus."}, {"s": 4411.115, "e": 4412.825, "t": "Sério, você tá mentindo.\nEu sei que tá mentindo."}, {"s": 4412.825, "e": 4414.118, "t": "Maggie, com licença."}, {"s": 4414.285, "e": 4415.912, "t": "- Não estou mentindo.\n- Quer que eu te belisque?"}, {"s": 4415.912, "e": 4417.872, "t": "Tá mentindo pra mim?\nTá mentindo pra mim."}, {"s": 4417.872, "e": 4419.207, "t": "Não mente pra mim, Maggie."}, {"s": 4419.207, "e": 4420.5, "t": "Quer que eu jure por quê?"}, {"s": 4420.5, "e": 4421.542, "t": "Estou de quatro meses."}, {"s": 4426.589, "e": 4428.925, "t": "Você acha que eu poderia\nter o bebê em Surkhet"}, {"s": 4428.925, "e": 4430.593, "t": "ou que eu deveria voltar\npra América?"}, {"s": 4430.593, "e": 4432.428, "t": "Se você ter o bebê nos EUA,"}, {"s": 4432.428, "e": 4434.305, "t": "então você ter mais seguro."}, {"s": 4434.555, "e": 4436.724, "t": "Aqui, muita gente morrendo assim."}, {"s": 4442.897, "e": 4446.984, "t": "Mas pra a ONG, seu papel\nvai ser igual ou diferente?"}, {"s": 4451.239, "e": 4452.99, "t": "Ei!"}, {"s": 4453.407, "e": 4455.952, "t": "Oi Ganga, ei, Nav."}, {"s": 4456.994, "e": 4459.121, "t": "Olha esse dente!"}, {"s": 4459.121, "e": 4461.374, "t": "Nasceu um dente novo? Deixa eu ver."}, {"s": 4462.833, "e": 4465.044, "t": "Posso ver?"}, {"s": 4465.044, "e": 4465.878, "t": "Oi!"}, {"s": 4467.338, "e": 4468.422, "t": "Eu quero."}, {"s": 4468.422, "e": 4469.84, "t": "O que você tá fazendo?"}, {"s": 4469.84, "e": 4472.301, "t": "Meus filhos biológicos do futuro"}, {"s": 4472.301, "e": 4473.761, "t": "vão crescer com todos vocês."}, {"s": 4474.971, "e": 4477.598, "t": "Eles vão ser as crianças\nmais sortudas do mundo."}, {"s": 4477.598, "e": 4480.434, "t": "Quantas crianças podem entrar\nnuma família como a nossa"}, {"s": 4480.434, "e": 4484.105, "t": "que tem todos esses\nirmãos e irmãs?"}, {"s": 4485.481, "e": 4486.899, "t": "Todo esse amor?"}, {"s": 4505.209, "e": 4505.751, "t": "Um dia"}, {"s": 4505.751, "e": 4507.086, "t": "nossa mãe trouxe alguém"}, {"s": 4507.086, "e": 4507.962, "t": "Ela nem precisou nos contar"}, {"s": 4507.962, "e": 4509.922, "t": "Ela nem precisou nos contar"}, {"s": 4510.298, "e": 4512.466, "t": "Apresentou como amigo."}, {"s": 4512.466, "e": 4513.843, "t": "Acabou sendo namorado."}, {"s": 4515.761, "e": 4517.346, "t": "Ela nem precisou nos contar"}, {"s": 4517.346, "e": 4520.099, "t": "porque os sentimentos dela\neram tão evidentes."}, {"s": 4520.099, "e": 4521.809, "t": "Ela não sabe esconder."}, {"s": 4521.809, "e": 4523.769, "t": "Isso é o que mais admiro nela."}, {"s": 4524.729, "e": 4526.23, "t": "Abraço de família."}, {"s": 4543.623, "e": 4545.458, "t": "Tá pronta? Tenta."}, {"s": 4555.968, "e": 4558.888, "t": "[Vem, Khusi.]"}, {"s": 4558.888, "e": 4562.725, "t": "Khusi, Khusi, Khusi, Khus,\nvocê consegue. Vem."}, {"s": 4562.725, "e": 4564.185, "t": "Você consegue. Olha."}, {"s": 4591.837, "e": 4595.007, "t": "Eu conhecia a maternidade\nnessa dimensão,"}, {"s": 4602.014, "e": 4604.642, "t": "mas nunca tinha vivido um parto."}, {"s": 4609.98, "e": 4611.732, "t": "Eu estava com tanto medo."}, {"s": 4613.984, "e": 4617.321, "t": "Medo de que seria mais\numa coisa que eu amaria"}, {"s": 4617.321, "e": 4620.449, "t": "e que simplesmente\nseria tirada de mim."}, {"s": 4626.747, "e": 4629.542, "t": "Mas esse é o risco\nque corremos ao amar."}, {"s": 4633.212, "e": 4636.173, "t": "Quem é você? Quem é você?"}, {"s": 4637.258, "e": 4640.344, "t": "Acho bom estarmos indo\ncom oito meses."}, {"s": 4641.053, "e": 4644.64, "t": "Só é ruim que as crianças\nnão podem conhecer o bebê logo."}, {"s": 4644.64, "e": 4647.226, "t": "Essa é a única parte difícil."}, {"s": 4648.519, "e": 4650.271, "t": "Todo mundo tá aqui?"}, {"s": 4651.147, "e": 4653.399, "t": "Abraço coletivo."}, {"s": 4653.399, "e": 4655.276, "t": "- Coletivo coletivo.\n- Abraço coletivo."}, {"s": 4657.611, "e": 4658.904, "t": "[Vem aqui!]"}, {"s": 4660.156, "e": 4661.407, "t": "Eu te amo."}, {"s": 4662.616, "e": 4663.617, "t": "Tchau."}, {"s": 4663.617, "e": 4664.452, "t": "Tchau."}, {"s": 4667.913, "e": 4669.081, "t": "Ok. Acho que é uma boa decisão."}, {"s": 4669.081, "e": 4670.082, "t": "Me sinto bem."}, {"s": 4671.125, "e": 4672.042, "t": "Mas não estou dilatando."}, {"s": 4672.042, "e": 4673.753, "t": "Não vou ficar assim por oito dias."}, {"s": 4673.753, "e": 4674.92, "t": "Com certeza."}, {"s": 4676.756, "e": 4678.591, "t": "Você deu tudo de si."}, {"s": 4678.591, "e": 4680.217, "t": "Só quero que o bebê fique bem."}, {"s": 4680.217, "e": 4681.051, "t": "Com certeza."}, {"s": 4681.969, "e": 4683.471, "t": "Ok. Obrigada."}, {"s": 4685.055, "e": 4686.223, "t": "Ok. Tchau."}, {"s": 4687.683, "e": 4689.81, "t": "Ele quer fazer uma cesárea."}, {"s": 4689.81, "e": 4691.02, "t": "Tirar o bebê, o bebê tá sofrendo."}, {"s": 4692.229, "e": 4694.315, "t": "Tirar o bebê, o bebê tá sofrendo."}, {"s": 4727.264, "e": 4728.516, "t": "- Nossa.\n- 22."}, {"s": 4728.516, "e": 4731.06, "t": "- É uma menina.\n- Oh!"}, {"s": 4737.691, "e": 4739.36, "t": "- Ela tá chorando?\n- O que foi isso?"}, {"s": 4739.36, "e": 4740.528, "t": "Bebezinha."}, {"s": 4741.529, "e": 4742.404, "t": "Mas ela está bem."}, {"s": 4748.285, "e": 4751.831, "t": "Os exames voltaram e parece que"}, {"s": 4751.831, "e": 4754.416, "t": "a infecção está se espalhando."}, {"s": 4754.416, "e": 4755.96, "t": "Eles não sabem o que está causando."}, {"s": 4758.337, "e": 4760.005, "t": "Só quero sair desse hospital"}, {"s": 4761.924, "e": 4765.928, "t": "e quero que a nossa\nbebezinha fique saudável"}, {"s": 4765.928, "e": 4768.764, "t": "e quero poder dormir\nno mesmo quarto que ela."}, {"s": 4776.146, "e": 4777.022, "t": "O que foi?"}, {"s": 4777.481, "e": 4778.732, "t": "Quero ir pra casa."}, {"s": 4795.875, "e": 4796.709, "t": "Ok."}, {"s": 4816.103, "e": 4818.188, "t": "Estamos indo pra casa."}, {"s": 4819.481, "e": 4822.234, "t": "Vou pra esse lado. Oi Mãe."}, {"s": 4822.234, "e": 4825.321, "t": "Oi meus fofos,"}, {"s": 4825.321, "e": 4826.488, "t": "como vocês estão?"}, {"s": 4827.781, "e": 4829.992, "t": "Estou vendo uma Khusi ali."}, {"s": 4829.992, "e": 4834.288, "t": "Oi Khusi. Khusi,\nquer ver a Ruby Sunshine?"}, {"s": 4834.705, "e": 4836.04, "t": "Essa é a Ruby."}, {"s": 4836.916, "e": 4837.917, "t": "[Irmãzinha.]"}, {"s": 4838.208, "e": 4839.627, "t": "[Sua irmãzinha.]"}, {"s": 4841.128, "e": 4843.881, "t": "O nome do meio da Ruby é Sunshine."}, {"s": 4845.007, "e": 4848.469, "t": "É uma forma simples de homenagear Ravi,"}, {"s": 4849.219, "e": 4853.223, "t": "cujo nome significava\nluz do sol, raio de sol."}, {"s": 4854.266, "e": 4854.934, "t": "Olha."}, {"s": 4875.371, "e": 4876.413, "t": "Olá."}, {"s": 4878.999, "e": 4881.21, "t": "Diz oi, aw."}, {"s": 4887.841, "e": 4889.551, "t": "Que bom te ver."}, {"s": 4889.551, "e": 4892.012, "t": "Você está tão crescida."}, {"s": 4902.064, "e": 4903.232, "t": "Nisha Gharti."}, {"s": 4919.498, "e": 4921.166, "t": "Você guardou suas\nfotos e tudo mais?"}, {"s": 4921.166, "e": 4922.626, "t": "Tudo."}, {"s": 4930.509, "e": 4932.678, "t": "Como vai, tio! É."}, {"s": 4934.513, "e": 4935.848, "t": "Oi tia, oi, olá."}, {"s": 4939.351, "e": 4940.477, "t": "Oi olá."}, {"s": 4951.155, "e": 4955.868, "t": "Meu Deus. Meu Deus do céu."}, {"s": 4955.868, "e": 4958.078, "t": "[Obrigado.]"}, {"s": 4958.078, "e": 4960.789, "t": "Namaste! [A filha mais nova.]"}, {"s": 4960.789, "e": 4963.083, "t": "[Ali está ela.]"}, {"s": 4964.418, "e": 4965.252, "t": "[Obrigado.]"}, {"s": 4966.795, "e": 4968.422, "t": "Khusi!"}, {"s": 4970.049, "e": 4971.258, "t": "Diz

69, "t": "Este es Himal y este es Karma."}, {"s": 590.34, "e": 593.259, "t": "[Este es tu hermano mayor.]"}, {"s": 593.635, "e": 596.554, "t": "[Here’s your big brother.]"}, {"s": 598.223, "e": 601.059, "t": "Quizás lo lleve y le dé un baño. ¿Vale?"}, {"s": 608.817, "e": 610.318, "t": "[Pequeñito.]"}, {"s": 610.485, "e": 611.778, "t": "[¿Tienes frío?]"}, {"s": 627.419, "e": 630.213, "t": "Ya veremos, iremos paso a paso."}, {"s": 631.923, "e": 635.552, "t": "Oh, déjame intentar ponerle\nalgo en el pelo también"}, {"s": 635.552, "e": 638.346, "t": "para quitarle este chicle."}, {"s": 640.765, "e": 641.891, "t": "[Vamos, pequeñito.]"}, {"s": 644.644, "e": 647.147, "t": "- Probablemente todavía se\nsienten mal del estómago."}, {"s": 653.862, "e": 656.114, "t": "[¿Quieres agua?]"}, {"s": 668.96, "e": 670.837, "t": "[o asustado]"}, {"s": 670.837, "e": 672.756, "t": "[o necesites ir al baño]"}, {"s": 672.756, "e": 674.34, "t": "[solo pedid a vuestras hermanas mayores.]"}, {"s": 713.171, "e": 716.925, "t": "Tenía 18 años y me tomé un año sabático."}, {"s": 720.303, "e": 724.849, "t": "Cuando todos los demás estudiantes\nse marcharon, decidí quedarme."}, {"s": 726.81, "e": 731.064, "t": "Y empecé a trabajar en\nun proyecto para refugiados nepalíes."}, {"s": 731.064, "e": 732.023, "t": "- Nueve."}, {"s": 732.023, "e": 733.274, "t": "¿Podemos llegar a 10?"}, {"s": 733.274, "e": 734.526, "t": "Sí. Sí, ¿10?"}, {"s": 734.526, "e": 737.654, "t": "Espera, espera, espera,\nespera. Déjame, ¿Me das un jabón rojo?"}, {"s": 737.654, "e": 742.534, "t": "Ahí fue donde\nconocí a Tope. Era el jefe de operaciones."}, {"s": 742.534, "e": 745.286, "t": "Da igual, explícaselo a la\njunta, es imprescindible."}, {"s": 745.286, "e": 748.665, "t": "Vale, este es Tope. Hola."}, {"s": 748.665, "e": 749.833, "t": "Yo también estoy trabajando.\nNo hay problema."}, {"s": 751.167, "e": 753.419, "t": "She’s working with me two years."}, {"s": 754.921, "e": 756.923, "t": "cuidando de niños huérfanos."}, {"s": 758.508, "e": 760.51, "t": "¿Quién tiene el champú?"}, {"s": 763.012, "e": 764.597, "t": "Yo también soy huérfano."}, {"s": 769.185, "e": 770.77, "t": "Conozco esa vida."}, {"s": 772.063, "e": 773.147, "t": "Lo que es pasar hambre,\nlo que es pasar frío,"}, {"s": 774.858, "e": 776.86, "t": "Lo que es pasar frío."}, {"s": 778.528, "e": 780.822, "t": "y lo que son los tiempos difíciles."}, {"s": 782.49, "e": 785.994, "t": "Estos niños, cuánto\namor reciben de Maggie."}, {"s": 787.287, "e": 789.581, "t": "Después de eso, confío totalmente en ella."}, {"s": 789.581, "e": 791.583, "t": "- Vale, solo ponle la etiqueta arriba."}, {"s": 791.583, "e": 793.793, "t": "Ahora es una locura,\nno puedo creer que esté así."}, {"s": 793.793, "e": 795.003, "t": "¿Sí? Parece"}, {"s": 795.003, "e": 797.088, "t": "que se va a extender. - Por ejemplo,"}, {"s": 797.088, "e": 798.423, "t": "pasados dos o tres años,"}, {"s": 798.423, "e": 802.26, "t": "van a añadir mucho más por aquí."}, {"s": 804.554, "e": 806.639, "t": "Nepal\nera uno de los países más pobres"}, {"s": 806.639, "e": 807.64, "t": "del mundo"}, {"s": 808.6, "e": 812.061, "t": "y se estaba recuperando de una\nguerra civil que duró una década"}, {"s": 812.061, "e": 816.232, "t": "que dejó a un millón de\nniños huérfanos a su paso."}, {"s": 824.449, "e": 828.828, "t": "Nos dimos cuenta\nde que lo que algunos niños necesitaban era la oportunidad de ir"}, {"s": 828.828, "e": 830.622, "t": "al colegio en un buen entorno."}, {"s": 830.622, "e": 831.873, "t": "Namaste."}, {"s": 831.873, "e": 834.083, "t": "Namaste."}, {"s": 836.252, "e": 840.006, "t": "Otros niños, en\nrealidad, necesitaban una intervención más intensa,"}, {"s": 840.006, "e": 844.594, "t": "lo cual era un hogar, una familia\ny un lugar seguro donde vivir."}, {"s": 854.187, "e": 857.523, "t": "comedor que acabamos de construir."}, {"s": 878.67, "e": 879.504, "t": "Vale."}, {"s": 880.755, "e": 882.507, "t": "[¿Cómo te llamas?]"}, {"s": 887.762, "e": 890.181, "t": "¿Maggie?"}, {"s": 890.765, "e": 893.893, "t": "En ese momento,\ntenía solo unos siete años."}, {"s": 897.313, "e": 899.065, "t": "Mi madre murió primero."}, {"s": 900.024, "e": 902.151, "t": "Tenía cáncer de ovario."}, {"s": 905.071, "e": 907.031, "t": "Más o menos seis o siete meses,"}, {"s": 907.949, "e": 909.617, "t": "mi padre también falleció."}, {"s": 918.835, "e": 920.878, "t": "- Hola Nisha.\n- Hola."}, {"s": 920.878, "e": 921.921, "t": "¿Cómo estás?"}, {"s": 921.921, "e": 924.048, "t": "♪ Rainbow Nisha ♪"}, {"s": 924.048, "e": 926.968, "t": "♪ Rainbow Nisha ♪"}, {"s": 926.968, "e": 929.512, "t": "♪ Ve a donde quieras ir ♪"}, {"s": 929.512, "e": 932.473, "t": "♪ Y haz lo que quieras hacer ♪"}, {"s": 932.473, "e": 935.601, "t": "♪ El cielo es ♪"}, {"s": 935.601, "e": 936.686, "t": "¡Saluda!"}, {"s": 936.686, "e": 937.52, "t": "¡Hola!"}, {"s": 937.52, "e": 939.355, "t": "¡Hoy es el primer día de colegio!"}, {"s": 939.355, "e": 941.107, "t": "- Hola.\n- Hoy es el"}, {"s": 941.107, "e": 943.568, "t": "primer día de colegio."}, {"s": 943.568, "e": 944.527, "t": "Cuando\nllegué aquí por primera vez"}, {"s": 944.527, "e": 947.321, "t": "solo había en la planta baja,\nuna familia pequeña."}, {"s": 948.781, "e": 952.869, "t": "No tenía ni idea de lo que\nestaba pasando ni de dónde estaba."}, {"s": 952.869, "e": 955.913, "t": "Lo único que sabía era\nque aquí estaba a salvo."}, {"s": 955.913, "e": 957.457, "t": "Sentí el amor."}, {"s": 961.377, "e": 963.421, "t": "Y como venían más niños,"}, {"s": 963.421, "e": 966.174, "t": "nuestra casa también empezó a ampliarse."}, {"s": 967.467, "e": 970.636, "t": "Hicimos una segunda\nplanta y luego una tercera"}, {"s": 970.636, "e": 972.18, "t": "y luego a la cuarta planta."}, {"s": 976.1, "e": 978.394, "t": "Todo pasó muy rápido."}, {"s": 980.063, "e": 981.314, "t": "Volví del colegio"}, {"s": 981.314, "e": 984.108, "t": "y Maggie dice:\n\"Este es tu nuevo hermano.\""}, {"s": 984.484, "e": 986.861, "t": "- Hola Krishna."}, {"s": 986.861, "e": 987.695, "t": "Después de Nisha,"}, {"s": 987.695, "e": 990.406, "t": "yo fui el siguiente niño\nque se mudó a la casa."}, {"s": 990.406, "e": 991.824, "t": "[You’re going to school today?]"}, {"s": 996.496, "e": 998.539, "t": "¿Krishna, Krishna?"}, {"s": 998.873, "e": 999.916, "t": "Hola Maggie."}, {"s": 1001.292, "e": 1003.878, "t": "Krishna."}, {"s": 1004.921, "e": 1006.38, "t": "Tenía tres o cuatro años"}, {"s": 1006.38, "e": 1008.257, "t": "cuando perdí a mi padre."}, {"s": 1008.257, "e": 1010.927, "t": "Mi madre, una madre sin estudios,"}, {"s": 1012.261, "e": 1016.349, "t": "que vive en una sociedad\ndonde la gente te juzga,"}, {"s": 1016.349, "e": 1018.226, "t": "le costaba mucho cuidar"}, {"s": 1018.267, "e": 1021.062, "t": "de mi hermana pequeña y\nde mí, así que nos dejó."}, {"s": 1021.687, "e": 1023.314, "t": "nos dejó."}, {"s": 1025.525, "e": 1029.195, "t": "Krishna había pasado por tanto."}, {"s": 1031.322, "e": 1035.243, "t": "Él y su hermana, Sabitha,\nhabían sido separados."}, {"s": 1037.745, "e": 1042.583, "t": "Le llevó un tiempo encontrar\nrealmente su lugar en la familia"}, {"s": 1043.584, "e": 1048.589, "t": "y no creo que lo sintiera hasta\nque encontramos a su hermana."}, {"s": 1073.489, "e": 1077.827, "t": "♪ Cumpleaños feliz ♪"}, {"s": 1077.827, "e": 1080.58, "t": "♪ Cumpleaños feliz ♪"}, {"s": 1080.58, "e": 1083.583, "t": "Cuando pensaba en mi infancia"}, {"s": 1083.791, "e": 1085.459, "t": "Déjame poner mi ojo ahí."}, {"s": 1085.459, "e": 1087.336, "t": "Sabía que toda la alegría"}, {"s": 1087.336, "e": 1090.548, "t": "y todos los recuerdos\nme habían hecho quien era."}, {"s": 1090.548, "e": 1093.801, "t": "Sí,\nha llamado Papá Noel y ha dicho:"}, {"s": 1094.635, "e": 1096.47, "t": "\"Iros pronto a la cama.\""}, {"s": 1096.47, "e": 1100.433, "t": "Porque tenemos muchos\nregalos que envolver."}, {"s": 1100.641, "e": 1102.643, "t": "Sabía lo que era sentirse segura"}, {"s": 1102.643, "e": 1105.438, "t": "y que te arropen por la noche."}, {"s": 1105.438, "e": 1106.856, "t": "Cuando vienes de ahí,"}, {"s": 1106.856, "e": 1110.276, "t": "no te das cuenta del privilegio que es."}, {"s": 1111.736, "e": 1114.238, "t": "Mis padres, eran un poco fuera de lo común"}, {"s": 1114.238, "e": 1116.157, "t": "en algunas de las cosas que hacían."}, {"s": 1116.157, "e": 1119.243, "t": "No teníamos televisión.\nQuerían que estuviéramos fuera."}, {"s": 1119.243, "e": 1121.913, "t": "Corríamos descalzos."}, {"s": 1125.041, "e": 1126.584, "t": "Creo que lo que no tenían"}, {"s": 1126.584, "e": 1130.213, "t": "en dinero, lo compensaban con un sentido"}, {"s": 1130.213, "e": 1132.256, "t": "de unión y diversión."}, {"s": 1132.882, "e": 1134.175, "t": "y jugar."}, {"s": 1136.636, "e": 1140.097, "t": "- [Padre/Madre] Se acabó\nel espectáculo."}, {"s": 1143.768, "e": 1147.563, "t": "Así que lo\núnico que se me ocurrió fue recrear algo"}, {"s": 1147.563, "e": 1152.401, "t": "de esos hilos comunes de\nla infancia que me fue dada."}, {"s": 1161.16, "e": 1162.703, "t": "- ¿Maggie?"}, {"s": 1163.621, "e": 1165.081, "t": "[Ponte la chaqueta]"}, {"s": 1165.081, "e": 1166.499, "t": "¡Maggie!"}, {"s": 1175.007, "e": 1176.717, "t": "Al principio pensé: «Oh, voy a montar esto"}, {"s": 1176.717, "e": 1180.68, "t": "y voy a volver a la universidad\ny llevarlo como un trabajo extra»."}, {"s": 1183.307, "e": 1187.353, "t": "No pretendía ser madre ni adoptar niños."}, {"s": 1187.353, "e": 1190.273, "t": "Estaba intentando crear un hogar seguro."}, {"s": 1195.736, "e": 1198.197, "t": "Pero me enamoré completamente de ellos."}, {"s": 1202.451, "e": 1206.08, "t": "Y me di cuenta\nde que quería vivir allí todo el tiempo."}, {"s": 1206.08, "e": 1210.584, "t": "Hola a todos, es mi última\nnoche en casa en Mendham"}, {"s": 1210.584, "e": 1215.548, "t": "en Estados Unidos y probablemente\nlo estará durante mucho tiempo."}, {"s": 1215.84, "e": 1219.093, "t": "Estoy ansiosa por volver y ver a los niños."}, {"s": 1219.093, "e": 1223.639, "t": "Namaste. Namaste."}, {"s": 1223.639, "e": 1227.226, "t": "Cuídate. Me voy a coger mi pequeño vuelo."}, {"s": 1227.226, "e": 1229.353, "t": "My little very,\nvery long flight."}, {"s": 1240.364, "e": 1241.198, "t": "Oye."}, {"s": 1243.117, "e": 1244.535, "t": "Hola a todos."}, {"s": 1244.535, "e": 1245.87, "t": "Hola."}, {"s": 1245.87, "e": 1247.246, "t": "Feliz sábado."}, {"s": 1247.246, "e": 1249.957, "t": "Navin Tiwari está aquí."}, {"s": 1250.374, "e": 1253.044, "t": "Un día los niños bajaron"}, {"s": 1254.17, "e": 1257.465, "t": "y dijeron: «Lo hemos hablado todos"}, {"s": 1257.465, "e": 1260.634, "t": "y hemos decidido que\nqueremos llamarte mamá»."}, {"s": 1260.634, "e": 1264.722, "t": "- M-O-T-H-E-R, madre.\n- M-O-T-H-E-R, madre."}, {"s": 1264.722, "e": 1266.182, "t": "- M-O-T-H-E-R, madre."}, {"s": 1266.182, "e": 1268.768, "t": "[Mother means “Mammu”]"}, {"s": 1269.602, "e": 1274.398, "t": "- B-R-O-T-H-E-R, hermano.\n- B-R-O-T-H-E-R, hermano."}, {"s": 1275.691, "e": 1279.236, "t": "- S-I-S-T-E-R, hermana.\n- S-I-S-T-E-R, hermana."}, {"s": 1279.236, "e": 1281.53, "t": "- Hermana ?"}, {"s": 1291.832, "e": 1295.127, "t": "Muy bien, otra vez. Guau, Krishna."}, {"s": 1297.213, "e": 1299.382, "t": "En la etapa\ninicial, cuando no había cuidadores"}, {"s": 1299.382, "e": 1302.301, "t": "y Maggie era la que\nse encargaba de todo."}, {"s": 1303.761, "e": 1305.221, "t": "Ella lo hacía todo y más"}, {"s": 1305.221, "e": 1308.599, "t": "lo que una madre haría por un hijo."}, {"s": 1318.442, "e": 1319.819, "t": "Sabiendo lo que sé ahora"}, {"s": 1319.819, "e": 1322.446, "t": ", debería haber sido mucho más complicado."}, {"s": 1323.906, "e": 1326.2, "t": "Es mucho más complicado."}, {"s": 1362.194, "e": 1364.989, "t": "Como era una forastera,"}, {"s": 1364.989, "e": 1367.658, "t": "me tomaba muy en serio"}, {"s": 1369.994, "e": 1374.415, "t": "cómo hacer justicia a la\nvida que ellos no tendrán"}, {"s": 1375.416, "e": 1379.753, "t": "y lo que han perdido en\ncuanto a su familia biológica?"}, {"s": 1386.552, "e": 1389.138, "t": "¿Cómo mantengo su sentido de identidad"}, {"s": 1389.138, "e": 1391.849, "t": "y mantener viva esa conexión?"}, {"s": 1399.815, "e": 1404.403, "t": "No puedo borrar ninguno de sus\ntraumas ni lo que han perdido."}, {"s": 1406.697, "e": 1408.782, "t": "Tampoco puedo estar al 100 %"}, {"s": 1409.658, "e": 1412.578, "t": "de lo que se van a perder."}, {"s": 1413.579, "e": 1416.582, "t": "Pero esto es lo que podemos hacer."}, {"s": 1416.582, "e": 1418.417, "t": "Podemos hacer que las\nvacaciones sean especiales."}, {"s": 1419.668, "e": 1421.587, "t": "Podemos recordar sus cumpleaños"}, {"s": 1421.587, "e": 1423.964, "t": "y asegurarnos de que\ntengan una fiesta estupenda."}, {"s": 1426.091, "e": 1427.635, "t": " ¡Haaaaa!"}, {"s": 1430.721, "e": 1432.097, "t": "Podemos asegurarnos de que puedan volver"}, {"s": 1432.097, "e": 1435.559, "t": "a sus pueblos siempre que sea posible."}, {"s": 1435.559, "e": 1437.728, "t": "Llevar las tradiciones a nuestro hogar"}, {"s": 1437.728, "e": 1439.772, "t": "que ellos habrían tenido."}, {"s": 1446.32, "e": 1449.156, "t": "Y luego crear nuestros\npropios recuerdos familiares."}, {"s": 1487.152, "e": 1488.862, "t": "Hola me llamo Krishna.\nVivo en Kopila Valley Home."}, {"s": 1488.946, "e": 1490.948, "t": "Hola me llamo Krishna.\nVivo en Kopila Valley Home."}, {"s": 1504.003, "e": 1506.589, "t": "Y\ncon el tiempo, esta pequeña idea"}, {"s": 1506.589, "e": 1508.924, "t": "que nació del amor"}, {"s": 1510.884, "e": 1512.052, "t": "creció hasta ser un hogar"}, {"s": 1514.305, "e": 1515.848, "t": "con seis cuidadores y 50 niños."}, {"s": 1517.099, "e": 1518.225, "t": "y 50 niños."}, {"s": 1523.606, "e": 1525.024, "t": "Uno, dos, tres."}, {"s": 1525.024, "e": 1526.859, "t": "- ¡Equipo Kopila!"}, {"s": 1568.692, "e": 1572.78, "t": "Me\nhan llamado a la puerta principal"}, {"s": 1572.78, "e": 1575.616, "t": "y vi a una mujer con"}, {"s": 1575.616, "e": 1577.034, "t": "una especie de fardo."}, {"s": 1585.542, "e": 1589.046, "t": "Nunca había visto a un bebé tan pequeño."}, {"s": 1589.046, "e": 1592.591, "t": "Solo pesaba entre un kilo\ny medio y un kilo y medio."}, {"s": 1600.683, "e": 1604.019, "t": "Y me puse en modo de\nemergencia: «¿Está vivo?"}, {"s": 1604.019, "e": 1605.562, "t": "¿Está muerto? ¿Adónde va?"}, {"s": 1605.562, "e": 1607.356, "t": "¿A dónde lo llevo?"}, {"s": 1613.612, "e": 1615.781, "t": "La recuperación de la\ndesnutrición no es como, oh,"}, {"s": 1615.781, "e": 1616.99, "t": "simplemente darles de\ncomer y ya están bien."}, {"s": 1616.99, "e": 1619.326, "t": "Es muy complicado."}, {"s": 1620.786, "e": 1623.831, "t": "Las primeras tres semanas fueron de\ncuidados las veinticuatro horas del día."}, {"s": 1623.831, "e": 1626.208, "t": "Lo trasladamos de un hospital a otro"}, {"s": 1626.208, "e": 1627.751, "t": "porque no tenían incubadora."}, {"s": 1627.751, "e": 1629.503, "t": "No tenían oxígeno."}, {"s": 1645.144, "e": 1647.521, "t": "Recuerdo que en esos momentos de traslado,"}, {"s": 1647.521, "e": 1651.233, "t": "pensaba: «No va a sobrevivir»."}, {"s": 1655.946, "e": 1658.198, "t": "No conocía a nadie en Katmandú."}, {"s": 1658.198, "e": 1659.7, "t": "Estaba completamente solo."}, {"s": 1661.201, "e": 1663.871, "t": "Y fue entonces cuando\nvolvió a ponerse serio."}, {"s": 1669.293, "e": 1670.711, "t": "Estaba entrando y saliendo\ndel estado de conciencia."}, {"s": 1670.711, "e": 1674.006, "t": "Tuvieron que reanimarlo,\ntuvieron que ponerle oxígeno,"}, {"s": 1674.006, "e": 1677.009, "t": "y ni siquiera pude entrar a verlo."}, {"s": 1683.098, "e": 1684.516, "t": "Los bebés no sobrevivían."}, {"s": 1684.516, "e": 1688.854, "t": "Es como si estuvieran\nsacando cadáveres de la UCI."}, {"s": 1690.439, "e": 1692.691, "t": "Así que me aterrorizaba dejarlo salir"}, {"s": 1692.691, "e": 1695.36, "t": "de mi vista ni un solo segundo."}, {"s": 1702.367, "e": 1705.412, "t": "Di hola a todos."}, {"s": 1706.497, "e": 1708.415, "t": "Sí. Tienes unos ojos\nbonitos. Unos ojos grandes."}, {"s": 1708.415, "e": 1710.167, "t": "Lo está haciendo muy bien."}, {"s": 1715.631, "e": 1717.841, "t": "¿Os vais a casa hoy?"}, {"s": 1717.841, "e": 1719.802, "t": "No, tenemos que quedarnos aquí."}, {"s": 1719.802, "e": 1723.68, "t": "Vale, ¿cuántos días?"}, {"s": 1723.68, "e": 1725.974, "t": "No lo sé, ya hemos salido de la UCI,"}, {"s": 1725.974, "e": 1729.061, "t": "así que hace mucho que\nno lo tengo en brazos."}, {"s": 1730.354, "e": 1732.105, "t": "Gracias. Menciona su nombre, por favor."}, {"s": 1732.105, "e": 1734.817, "t": "Se llama Ravi. Ravi."}, {"s": 1734.817, "e": 1738.946, "t": "Ravi en realidad significa,\nestá relacionado con el sol."}, {"s": 1738.946, "e": 1741.49, "t": "Sí, cariño. 328\n00:29:10,749 --> 00:29:12,835\nbebé."}, {"s": 1754.711, "e": 1757.464, "t": "Sí. [risita]"}, {"s": 1785.117, "e": 1789.162, "t": "♪ Brilla,\nbrilla, estrellita ♪"}, {"s": 1789.162, "e": 1793.709, "t": "♪ Me pregunto qué serás ♪"}, {"s": 1793.709, "e": 1797.087, "t": "Toda la casa se derritió\npor él. Vale."}, {"s": 1797.462, "e": 1799.882, "t": "[Nothing will happen to, don’t worry.]"}, {"s": 1801.133, "e": 1805.721, "t": "Como\nadolescentes angustiados que no paran de reírse y jugar al cucú-tras."}, {"s": 1807.472, "e": 1810.309, "t": "Nunca pensé\nque podría amar a otro ser humano"}, {"s": 1810.309, "e": 1812.394, "t": "hasta que conocí a Ravi."}, {"s": 1816.899, "e": 1819.985, "t": "Solía venir a mi habitación\ny meterse en mi cama"}, {"s": 1819.985, "e": 1821.987, "t": "y yo me despertaba."}, {"s": 1821.987, "e": 1823.488, "t": "Hola Ravi. [ Niño\ndetrás de la cámara ] ¿Ravi?"}, {"s": 1824.865, "e": 1829.745, "t": "Simplemente unía\na toda la familia."}, {"s": 1829.745, "e": 1831.788, "t": "¡Vamos, Ravi! ¡Tú puedes!"}, {"s": 1831.788, "e": 1834.958, "t": "Cree en ti mismo."}, {"s": 1834.958, "e": 1836.585, "t": "Todo\nse convirtió en un gran problema"}, {"s": 1836.585, "e": 1839.671, "t": "porque sabíamos de dónde venía."}, {"s": 1840.631, "e": 1842.049, "t": "Ravi, a-ma-ma-ma."}, {"s": 1843.884, "e": 1846.678, "t": "Sí. ¿Puedes decir mamá?"}, {"s": 1846.97, "e": 1848.347, "t": "Mamá. Ay."}, {"s": 1849.431, "e": 1850.974, "t": "Mamá."}, {"s": 1850.974, "e": 1852.517, "t": "Patata."}, {"s": 1852.517, "e": 1854.394, "t": "A-tato."}, {"s": 1855.479, "e": 1856.939, "t": "Patata."}, {"s": 1856.939, "e": 1857.981, "t": "A-tato."}, {"s": 1866.323, "e": 1868.158, "t": "- ¡Bien!\n- ¡Bien, Ravi!"}, {"s": 1868.158, "e": 1871.745, "t": "♪ Cumpleaños feliz ♪"}, {"s": 1871.745, "e": 1875.457, "t": "♪ Feliz cumpleaños, querido Ravi ♪"}, {"s": 1876.917, "e": 1879.503, "t": "El Humanitario del Año de este año"}, {"s": 1879.503, "e": 1881.004, "t": "Estoy sorprendida."}, {"s": 1881.004, "e": 1883.382, "t": "Acabo de llegar de Nepal,\ncomo te puedes imaginar."}, {"s": 1883.382, "e": 1884.383, "t": "Es justo lo contrario."}, {"s": 1884.383, "e": 1886.218, "t": "Es justo lo contrario."}, {"s": 1886.218, "e": 1891.223, "t": "Quiero entregar el premio de\n100 000 dólares a Maggie Doyne."}, {"s": 1893.433, "e": 1895.936, "t": "Cada céntimo de estos 100 000 dólares"}, {"s": 1897.27, "e": 1899.648, "t": "a la vida de los niños en Nepal."}, {"s": 1902.401, "e": 1904.569, "t": "Como madre, como directora ejecutiva,"}, {"s": 1904.569, "e": 1907.28, "t": "y como líder, acababa de llegar a"}, {"s": 1907.28, "e": 1909.449, "t": "la mujer que quería ser.\nEs un honor presentar"}, {"s": 1909.449, "e": 1913.704, "t": "el Premio Forbes a la Excelencia\nen Educación a Maggie Doyne."}, {"s": 1914.538, "e": 1917.708, "t": "Realmente creo en la necesidad\nque hay en nuestro mundo"}, {"s": 1917.708, "e": 1921.67, "t": "de ampliar nuestra definición\nde lo que es una familia."}, {"s": 1921.67, "e": 1923.13, "t": "Solo\nhubo dos ovaciones de pie"}, {"s": 1923.13, "e": 1926.967, "t": "en todo el día, una para Warren\nBuffet y otra para Maggie Doyne."}, {"s": 1929.594, "e": 1931.805, "t": "y yo pensaba: «¿Qué estoy haciendo aquí?»."}, {"s": 1931.805, "e": 1933.682, "t": "Hola hola."}, {"s": 1933.682, "e": 1935.767, "t": "Qué maravilla que ahora le vaya tan bien."}, {"s": 1935.767, "e": 1938.687, "t": "Está perfectamente\nbien y se ha recuperado."}, {"s": 1938.687, "e": 1940.689, "t": "Pero tú tienes 28 años. Papá."}, {"s": 1940.689, "e": 1942.941, "t": "Tienes la responsabilidad\nde más de 50 niños"}, {"s": 1942.941, "e": 1944.651, "t": "y un bebé."}, {"s": 1944.651, "e": 1946.653, "t": "¿Nunca te comparas a ti mismo a veces"}, {"s": 1946.653, "e": 1948.655, "t": "con otros jóvenes de 28 años?"}, {"s": 1949.698, "e": 1950.699, "t": "Todo el tiempo."}, {"s": 1950.699, "e": 1953.869, "t": "Miras a tus amigos"}, {"s": 1953.869, "e": 1956.788, "t": "y tener, ya sabes, ese estilo de vida."}, {"s": 1958.373, "e": 1960.25, "t": "O sea, imagina lo que\nmi perfil de citas online"}, {"s": 1960.25, "e": 1962.878, "t": ", mi Tinder."}, {"s": 1962.878, "e": 1966.798, "t": "51 niños, ¿quién quiere salir conmigo?"}, {"s": 1966.798, "e": 1971.386, "t": "♪ Nos queremos como una\nhermana o un hermano ♪"}, {"s": 1971.386, "e": 1974.389, "t": "♪ Porque somos una familia ♪"}, {"s": 1974.389, "e": 1975.474, "t": "Señoras y señores,"}, {"s": 1975.474, "e": 1977.893, "t": "el Héroe del Año 2015 de la CNN"}, {"s": 1979.728, "e": 1981.521, "t": "es Maggie Doyne."}, {"s": 1996.578, "e": 2000.832, "t": "Me siento increíblemente\nhonrada de aceptar este premio"}, {"s": 2000.832, "e": 2005.003, "t": "en nombre de todos mis pequeños\nhéroes de Kopila, en Nepal."}, {"s": 2005.003, "e": 2008.715, "t": "De ellos saco toda mi inspiración."}, {"s": 2008.715, "e": 2011.343, "t": "También estoy muy agradecida\na mi cofundador, Tope,"}, {"s": 2011.343, "e": 2013.678, "t": "que está aquí conmigo esta noche."}, {"s": 2013.678, "e": 2017.724, "t": "No podemos perder de vista la\ntarea que tenemos entre manos."}, {"s": 2019.518, "e": 2022.229, "t": "[Si una Maggie puede\nayudar a todos estos niños]"}, {"s": 2022.229, "e": 2025.607, "t": "[Imagina a cuántos niños ayudarás.]"}, {"s": 2026.733, "e": 2028.151, "t": "Un día todos estos niños tendrán educación"}, {"s": 2028.819, "e": 2031.279, "t": "Mi cofundadora en el escenario\nsignifica que estoy ahí."}, {"s": 2033.24, "e": 2035.325, "t": "Fue muy doloroso para nuestra familia."}, {"s": 2035.325, "e": 2037.577, "t": "esta zona cambiará."}, {"s": 2088.545, "e": 2091.631, "t": "Ravi\nse ha despertado de la siesta,"}, {"s": 2093.55, "e": 2096.72, "t": "se lo dejé a una de las tías."}, {"s": 2098.68, "e": 2103.143, "t": "y luego ella lo metió en el parque\ninfantil con todos los niños."}, {"s": 2104.019, "e": 2108.648, "t": "Uno de los niños lo cogió y lo\nsacó fuera del parque infantil."}, {"s": 2111.276, "e": 2116.281, "t": "Diez minutos después, oí unos\ngritos y Padam vino corriendo."}, {"s": 2116.74, "e": 2120.368, "t": "Supe por la mirada de\nhorror en el rostro de Padam,"}, {"s": 2120.368, "e": 2122.537, "t": "alguien estaba muerto o muriendo."}, {"s": 2128.21, "e": 2129.836, "t": "Simplemente estaba empapado."}, {"s": 2130.754, "e": 2134.841, "t": "Lo cogí y empecé inmediatamente\ncon la reanimación cardiopulmonar."}, {"s": 2141.932, "e": 2142.849, "t": "Estaba flácido"}, {"s": 2144.017, "e": 2145.685, "t": "y no se recuperaba."}, {"s": 2152.484, "e": 2155.278, "t": "Es una forma horrible de morir,"}, {"s": 2155.278, "e": 2157.364, "t": "ahogándose en un pozo séptico."}, {"s": 2178.969, "e": 2183.974, "t": "Lo siguiente que recuerdo\nes que me llevaban a casa"}, {"s": 2184.224, "e": 2188.27, "t": "y que todos los niños estaban\nen la puerta gritando y llorando."}, {"s": 2192.983, "e": 2197.988, "t": "No paraba de decir: «Seguimos siendo\nuna familia. Seguimos siendo una familia»."}, {"s": 2199.99, "e": 2201.992, "t": "Empecé a perder la cabeza."}, {"s": 2208.79, "e": 2211.668, "t": "¿Por qué te despiertas de la\nsiesta justo en ese momento?"}, {"s": 2211.668, "e": 2214.796, "t": "Estaba inquieto. ¿Por qué no lo\ndejé simplemente sobre mi pecho?"}, {"s": 2214.796, "e": 2217.048, "t": "¿Por qué lo dejó para\nir a calentar el molino?"}, {"s": 2217.048, "e": 2218.967, "t": "¿Por qué nadie más miró\na su alrededor para verlo?"}, {"s": 2218.967, "e": 2220.844, "t": "¿Dónde estaban todas\nlas demás tías y tíos?"}, {"s": 2220.844, "e": 2222.429, "t": "¿Por qué se dejó la puerta abierta?"}, {"s": 2222.429, "e": 2224.014, "t": "¿Por qué los chicos lo sacaron del avión?"}, {"s": 2224.014, "e": 2227.517, "t": "¿Por qué sentí...? ¿Por qué fue ella allí?"}, {"s": 2234.065, "e": 2235.817, "t": "Una y otra y otra vez"}, {"s": 2235.817, "e": 2237.944, "t": "y lo haré todos los días hasta que muera."}, {"s": 2248.496, "e": 2250.749, "t": "- Fue muy doloroso para nuestra familia."}, {"s": 2254.461, "e": 2256.463, "t": "No sé qué castigo nos da Dios. No lo sé."}, {"s": 2259.799, "e": 2260.633, "t": "Muy mal."}, {"s": 2264.095, "e": 2265.43, "t": "Toda la familia está triste."}, {"s": 2266.89, "e": 2268.141, "t": "Todos los niños lloran."}, {"s": 2269.142, "e": 2270.477, "t": "Nuestra felicidad, se fue toda."}, {"s": 2288.328, "e": 2291.414, "t": "La madre y la hermana\nde Maggie vinieron aquí."}, {"s": 2294.084, "e": 2297.17, "t": "Están muy preocupadas por su vida."}, {"s": 2301.883, "e": 2304.886, "t": "y todos le dijimos:\n\"Maggie, vete con tu madre.\""}, {"s": 2354.477, "e": 2355.77, "t": "- En ese momento,"}, {"s": 2356.229, "e": 2358.523, "t": "toda la familia estaba destrozada."}, {"s": 2362.235, "e": 2363.653, "t": "So it didn’t hurt."}, {"s": 2364.279, "e": 2366.281, "t": "No los recordaba mucho"}, {"s": 2366.573, "e": 2368.158, "t": "Así que no me dolió."}, {"s": 2368.283, "e": 2370.201, "t": "Pero cuando perdí a Ravi"}, {"s": 2370.201, "e": 2371.202, "t": "Ravi, sonríe."}, {"s": 2371.202, "e": 2374.914, "t": "Lo había visto desde\nque llegó por primera vez."}, {"s": 2375.123, "e": 2376.708, "t": "- Todo un bribón.\n- Lo criamos"}, {"s": 2376.708, "e": 2378.126, "t": "Nunca pensé que jamás\npodría querer así a alguien."}, {"s": 2378.126, "e": 2380.044, "t": "Lo pasé muy mal."}, {"s": 2381.254, "e": 2382.755, "t": "Nunca pensé que jamás,"}, {"s": 2382.755, "e": 2386.009, "t": "pudiera querer así a alguien."}, {"s": 2405.653, "e": 2407.739, "t": "Cuando alguien muere"}, {"s": 2407.739, "e": 2410.2, "t": "y estás en el mismo lugar,"}, {"s": 2411.826, "e": 2415.497, "t": "te va a volver\nuna y otra vez."}, {"s": 2423.004, "e": 2425.882, "t": "Fue muy duro para nosotros"}, {"s": 2425.882, "e": 2429.385, "t": "porque cada vez que nos sentábamos\ndonde Ravi se ahogó y,"}, {"s": 2429.385, "e": 2430.845, "t": "ya sabes, los recuerdos volvían"}, {"s": 2431.971, "e": 2433.598, "t": "ya sabes, los recuerdos\nvolvían de golpe"}, {"s": 2433.598, "e": 2435.642, "t": "de nosotros abrazándole y..."}, {"s": 2452.534, "e": 2453.576, "t": "Oye."}, {"s": 2456.162, "e": 2457.664, "t": "Me acabo de despertar."}, {"s": 2459.207, "e": 2461.125, "t": "Simplemente asustada de todo."}, {"s": 2463.169, "e": 2466.005, "t": "Tengo miedo de que les\npase algo a los niños."}, {"s": 2474.138, "e": 2477.058, "t": "Sé que cuando me fui, vi el miedo"}, {"s": 2478.685, "e": 2480.228, "t": "en los ojos de mis hijos."}, {"s": 2482.73, "e": 2484.023, "t": "Hola mamá."}, {"s": 2484.023, "e": 2486.359, "t": "Hola mamá. Os echo de menos a todos."}, {"s": 2489.32, "e": 2490.238, "t": "Te quiero."}, {"s": 2494.242, "e": 2498.037, "t": "He visto a personas que\nhan sufrido tragedias"}, {"s": 2498.037, "e": 2500.164, "t": "y nunca se han recuperado."}, {"s": 2501.874, "e": 2504.127, "t": "Sigo diciendo que no\nquiero ser esa persona."}, {"s": 2504.127, "e": 2506.421, "t": "No quiero ser esa persona."}, {"s": 2510.425, "e": 2513.386, "t": "Muchos niños dicen eso"}, {"s": 2514.429, "e": 2517.14, "t": "lo peor de perder a un hermano"}, {"s": 2518.641, "e": 2521.06, "t": "no fue solo perder a su hermano."}, {"s": 2524.063, "e": 2526.983, "t": "Era perder a su padre o a su madre."}, {"s": 2531.738, "e": 2533.865, "t": "Les dije que volvería."}, {"s": 2535.575, "e": 2538.453, "t": "Quiero demostrarles que\nseguimos siendo una familia."}, {"s": 2548.504, "e": 2551.799, "t": "Mi trabajo ahora mismo es\nsimplemente seguir con vida."}, {"s": 2556.763, "e": 2557.597, "t": "Un minuto, un momento,"}, {"s": 2560.183, "e": 2561.559, "t": "Un momento."}, {"s": 2563.895, "e": 2565.48, "t": "paso a paso."}, {"s": 2576.866, "e": 2578.743, "t": "Empezaba levantándome"}, {"s": 2578.743, "e": 2581.329, "t": "y bajaría a preparar té."}, {"s": 2581.329, "e": 2582.497, "t": "Eso era mi acto de valentía,"}, {"s": 2582.497, "e": 2585.625, "t": "porque no podía levantarme de la cama."}, {"s": 2585.625, "e": 2588.67, "t": "Y entonces pensé: «Voy a volver\na la tienda de comestibles»"}, {"s": 2588.878, "e": 2590.672, "t": "o voy a hacer esto que Ravi"}, {"s": 2590.672, "e": 2592.256, "t": "y yo solíamos hacer juntos."}, {"s": 2594.717, "e": 2597.762, "t": "Y luego eso me llevó a Los Ángeles."}, {"s": 2600.181, "e": 2602.517, "t": "Después de ganar el premio CNN Heroes,"}, {"s": 2602.517, "e": 2606.02, "t": "imparten esta formación sobre\ndesarrollo sin ánimo de lucro."}, {"s": 2606.896, "e": 2608.981, "t": "Ravi había estado viajando conmigo,"}, {"s": 2609.774, "e": 2613.486, "t": "así que lo tenía todo reservado\npara mí y el bebé."}, {"s": 2619.701, "e": 2620.868, "t": "Te quiero, mamá."}, {"s": 2620.868, "e": 2622.328, "t": "Hablo contigo mañana.\nYo también te quiero."}, {"s": 2623.621, "e": 2624.163, "t": "adiós."}, {"s": 2624.706, "e": 2625.873, "t": "Adiós."}, {"s": 2629.877, "e": 2633.089, "t": "Y fue entonces cuando conocí a Jeremy."}, {"s": 2645.101, "e": 2645.935, "t": "Qué bueno."}, {"s": 2650.398, "e": 2651.691, "t": "No estaba en un lugar,"}, {"s": 2651.691, "e": 2654.527, "t": "sobre todo teniendo en\ncuenta lo que estaba pasando,"}, {"s": 2654.527, "e": 2657.655, "t": "es que, simplemente, no lo veíamos así."}, {"s": 2660.074, "e": 2663.327, "t": "Hicimos este plan para ir al desierto"}, {"s": 2664.37, "e": 2666.372, "t": "y esa noche no podía dormir."}, {"s": 2666.372, "e": 2669.083, "t": "Todavía tenía TEPT"}, {"s": 2669.959, "e": 2672.42, "t": "y él simplemente vino y me abrazó"}, {"s": 2672.42, "e": 2673.796, "t": "y me dijo: «¿Quieres que te abrace?"}, {"s": 2673.796, "e": 2675.214, "t": "¿hasta que te quedas dormida?"}, {"s": 2705.453, "e": 2706.621, "t": "Me sentí como una onza"}, {"s": 2707.497, "e": 2709.373, "t": "una parte de mí volviendo."}, {"s": 2710.166, "e": 2711.667, "t": "poco a poco a poco."}, {"s": 2717.006, "e": 2718.633, "t": "¿Qué día es hoy, Goma?"}, {"s": 2718.633, "e": 2719.467, "t": "¡Viernes!"}, {"s": 2720.802, "e": 2721.928, "t": "Sí, estoy haciendo progresos."}, {"s": 2721.928, "e": 2726.307, "t": "Me despierto feliz y luego\nviene toda esta mierda."}, {"s": 2726.307, "e": 2730.019, "t": "y luego vuelves atrás,\njusto al punto de partida."}, {"s": 2730.019, "e": 2732.313, "t": "¿Me estás grabando\nmientras grabo un vídeo?"}, {"s": 2732.313, "e": 2734.607, "t": "Un nivel más. Te estoy entrevistando."}, {"s": 2734.607, "e": 2735.566, "t": "Te estoy entrevistando."}, {"s": 2735.566, "e": 2737.235, "t": "Puedo encargarme de todo con Ravi."}, {"s": 2737.235, "e": 2739.195, "t": "Es que no puedo\nmanejarlo sin él, ya sabes."}, {"s": 2744.283, "e": 2746.786, "t": "Hola mamá. ¡Nisha!"}, {"s": 2746.786, "e": 2748.704, "t": "Hola mamá. Hola Maya."}, {"s": 2750.665, "e": 2752.667, "t": "Lo sé. Enhorabuena."}, {"s": 2752.667, "e": 2754.961, "t": "Estoy deseando ver todas vuestras notas."}, {"s": 2763.678, "e": 2765.429, "t": "Hola mamá. Te echo de menos."}, {"s": 2765.429, "e": 2766.931, "t": "- Cuídate y sé fuerte, Maggie."}, {"s": 2766.931, "e": 2769.1, "t": "Necesito que seas fuerte ahora."}, {"s": 2769.1, "e": 2771.769, "t": "Te prometo que estoy\nmucho mejor. Te lo prometo."}, {"s": 2772.854, "e": 2773.521, "t": "Lo prometo."}, {"s": 2774.355, "e": 2776.357, "t": "Entiendo que todo está llegando"}, {"s": 2776.357, "e": 2778.276, "t": "sobre tus hombros,\npero voy a volver pronto"}, {"s": 2778.276, "e": 2780.403, "t": "y volveremos a estar juntos en esto."}, {"s": 2780.403, "e": 2784.031, "t": "Vamos a estar codo con codo haciendo\ntodo esto juntos. ¿De acuerdo?"}, {"s": 2785.283, "e": 2787.243, "t": "Este es\nel peor momento de mi vida."}, {"s": 2787.952, "e": 2789.161, "t": "Sé que ha sido estresante."}, {"s": 2789.161, "e": 2792.123, "t": "Sé que ha sido duro. Volveré el domingo."}, {"s": 2792.29, "e": 2793.666, "t": "Eso es en tres días."}, {"s": 2793.958, "e": 2795.668, "t": "Bueno, incluso los nepalíes,\ncomo, maridos y mujeres"}, {"s": 2795.668, "e": 2797.67, "t": "no se muestran cariñosos en público. Sí."}, {"s": 2797.67, "e": 2799.297, "t": "Ni podrás distinguir\nquién está casado."}, {"s": 2799.297, "e": 2800.673, "t": "Es muy diferente."}, {"s": 2802.884, "e": 2803.843, "t": "¿Cuánto tiempo hace"}, {"s": 2804.802, "e": 2806.095, "t": "que no los ves en persona?"}, {"s": 2807.179, "e": 2808.097, "t": "¿Dos meses?"}, {"s": 2809.974, "e": 2811.267, "t": "- Sí."}, {"s": 2818.733, "e": 2821.777, "t": "La verdad es que me\nderrumbaría si perdiera"}, {"s": 2822.486, "e": 2824.447, "t": "a cualquiera de mis hijos."}, {"s": 2825.406, "e": 2827.366, "t": "Hay una gran parte de mí"}, {"s": 2827.366, "e": 2830.244, "t": "siento como si los hubiera abandonado"}, {"s": 2830.244, "e": 2833.039, "t": "y solo quiero que sepan\nque estoy agradecido"}, {"s": 2833.039, "e": 2835.374, "t": "por cada pequeño detalle y parte de ellos."}, {"s": 2845.927, "e": 2848.846, "t": "Querido\nNamraj, hemos estado muy unidos"}, {"s": 2848.846, "e": 2850.264, "t": "desde el día en que llegaste."}, {"s": 2850.264, "e": 2852.35, "t": "Naciste el día de mi cumpleaños"}, {"s": 2852.35, "e": 2853.392, "t": "y fuiste el mejor regalo de cumpleaños."}, {"s": 2853.392, "e": 2855.311, "t": "Te conocí cuando estabas\nen la barriga de tu mamá"}, {"s": 2855.311, "e": 2856.145, "t": "y tus padres se mudaron de vuelta."}, {"s": 2856.145, "e": 2858.814, "t": "Querido pequeño Bishal,\nsiempre eres tan valiente."}, {"s": 2858.814, "e": 2863.361, "t": "Querida Pabitra, me encanta\nver tu bondad y sensibilidad."}, {"s": 2863.361, "e": 2865.446, "t": "Asmita, tu dulzura es demasiado."}, {"s": 2865.446, "e": 2866.53, "t": "Me encanta tu sonrisa."}, {"s": 2866.53, "e": 2868.908, "t": "Querida Khajuri, desde el\nmomento en que te vi... gracias."}, {"s": 2868.908, "e": 2870.284, "t": "Gracias. Gracias."}, {"s": 2870.284, "e": 2873.204, "t": "Maya significa «amor» en nepalí y tú..."}, {"s": 2873.204, "e": 2874.83, "t": "Querida Sabita,\ny tú eres una"}, {"s": 2874.83, "e": 2878.96, "t": "Querida Shanti,\ntienes los ojos más bonitos..."}, {"s": 2878.96, "e": 2882.129, "t": "Querida Bindu,\nEstoy deseando verte..."}, {"s": 2882.129, "e": 2884.715, "t": "¿Puedes cantar más?\nTienes la voz más bonita."}, {"s": 2884.715, "e": 2887.134, "t": "Querida Ganga. Querido Hari."}, {"s": 2887.343, "e": 2889.679, "t": "Les dije\nque volvería y quiero volver"}, {"s": 2889.679, "e": 2893.057, "t": "y quiero\npoder estar ahí para ellos."}, {"s": 2893.057, "e": 2894.141, "t": "No sé qué es-"}, {"s": 2894.141, "e": 2897.061, "t": "Sé que lo\nestán pasando tan mal como yo."}, {"s": 2897.061, "e": 2898.813, "t": "Eres\nelegante, eres inteligente."}, {"s": 2898.813, "e": 2900.189, "t": "¿Tienes idea\nde lo orgullosa que estoy de ti?"}, {"s": 2900.189, "e": 2903.192, "t": "Viniste a mí cuando..."}, {"s": 2903.192, "e": 2906.07, "t": "Por mucho que lo\nintentara... y demostrarles que voy a estar bien,"}, {"s": 2906.07, "e": 2907.113, "t": "que vamos a estar bien,"}, {"s": 2907.113, "e": 2908.739, "t": "que\ntodos vamos a superar esto."}, {"s": 2908.739, "e": 2912.159, "t": "Querida hija...\nviniste a mí con esos ojos grandes y brillantes."}, {"s": 2912.159, "e": 2915.997, "t": "Goma, esto es un...\nquerida... Creo que simplemente tengo miedo."}, {"s": 2915.997, "e": 2917.039, "t": "Querido Krishna,"}, {"s": 2917.039, "e": 2919.125, "t": "tu\nvínculo con tu hermanita"}, {"s": 2919.125, "e": 2920.251, "t": "y la\nforma en que siempre la cuidas"}, {"s": 2920.251, "e": 2922.211, "t": "a ella\nes lo más bonito del mundo."}, {"s": 2922.211, "e": 2924.964, "t": "Querida Nisha, mi amor, mi alegría,"}, {"s": 2924.964, "e": 2927.675, "t": "mi corazón, mi alegría."}, {"s": 2932.013, "e": 2934.39, "t": "Quiero demostrarles que somos..."}, {"s": 2995.785, "e": 2997.369, "t": "Hola. Jeremy."}, {"s": 2997.369, "e": 2999.08, "t": "- Namaste.\n- ¿Has venido conduciendo solo?"}, {"s": 2999.08, "e": 2999.663, "t": "Sí. Lo hice."}, {"s": 2999.663, "e": 3000.748, "t": "¿De verdad?"}, {"s": 3000.748, "e": 3001.916, "t": "¿Cómo te va?"}, {"s": 3022.52, "e": 3025.106, "t": "- Te he echado mucho de menos."}, {"s": 3032.905, "e": 3035.116, "t": "Hola hola, chicos."}, {"s": 3035.116, "e": 3036.867, "t": "Os he echado mucho de menos."}, {"s": 3048.587, "e": 3050.422, "t": "Este es Jeremy. [Multitud] ¡Hola!"}, {"s": 3055.845, "e": 3057.346, "t": "Gracias. [Multitud] ¡Guau!"}, {"s": 3058.722, "e": 3062.685, "t": " ♪\nBienvenidos, la la la la la la ♪"}, {"s": 3062.685, "e": 3067.69, "t": "♪ Bienvenida muy cálida, la la la la la ♪"}, {"s": 3067.69, "e": 3073.404, "t": "♪ Te damos la bienvenida a Kopila, la la la ♪"}, {"s": 3074.155, "e": 3077.366, "t": "Estoy tan, tan,\ntan contenta de estar en casa."}, {"s": 3077.366, "e": 3079.66, "t": "Os he echado mucho de\nmenos a todos. Es una locura."}, {"s": 3079.66, "e": 3083.497, "t": "He pensado en vosotros todos los días."}, {"s": 3083.497, "e": 3086.542, "t": "Y siento no haber estado\naquí durante un tiempo,"}, {"s": 3086.542, "e": 3088.878, "t": "pero estoy muy feliz de haber vuelto."}, {"s": 3088.878, "e": 3092.423, "t": "Podemos hablar más en grupos más\npequeños cuando deje de llorar."}, {"s": 3095.926, "e": 3097.261, "t": "Te he echado de menos."}, {"s": 3099.346, "e": 3101.765, "t": "- Yo también te eché de menos.\n- Fotos."}, {"s": 3101.765, "e": 3103.058, "t": "¿Esta es tu habitación?"}, {"s": 3103.058, "e": 3105.519, "t": "Sí. ¿Quién está aquí?"}, {"s": 3105.519, "e": 3108.939, "t": "Yo, Maya, Anjali y Khajura."}, {"s": 3108.939, "e": 3110.9, "t": "Cuatro. Mira, mamá."}, {"s": 3110.9, "e": 3115.446, "t": "Lo sé, estamos Nisha y yo… y Ravi. Sí."}, {"s": 3116.488, "e": 3119.325, "t": "¿Dónde está tu... sigues en azul?"}, {"s": 3119.325, "e": 3121.41, "t": "Todavía está muy reciente."}, {"s": 3123.829, "e": 3126.707, "t": "Todavía pienso en mi cabeza\nque sigue aquí."}, {"s": 3128.459, "e": 3130.127, "t": "Solo han pasado tres meses."}, {"s": 3130.127, "e": 3132.004, "t": "¡Bienvenidos al piso de Maggie!"}, {"s": 3134.798, "e": 3136.717, "t": "Sigue siendo su hermano pequeño."}, {"s": 3136.717, "e": 3139.303, "t": "Bienvenidos de nuevo. Oh, me encanta esto."}, {"s": 3139.303, "e": 3141.639, "t": "Esto es tan bonito. Oh."}, {"s": 3143.224, "e": 3146.81, "t": "Es precioso, bienvenida a casa."}, {"s": 3146.81, "e": 3149.063, "t": "Mira las estrellas que has hecho."}, {"s": 3149.939, "e": 3151.607, "t": "Dios mío. Te echamos mucho de menos."}, {"s": 3151.607, "e": 3153.776, "t": "Bienvenida a casa, mamá."}, {"s": 3153.776, "e": 3156.57, "t": "Y te cambiamos las mantas."}, {"s": 3156.57, "e": 3157.571, "t": "Oh, me encanta."}, {"s": 3157.571, "e": 3159.615, "t": "Oh, ¿por qué no hacemos una\nfiesta de pijamas esta noche?"}, {"s": 3159.615, "e": 3162.076, "t": "Sí"}, {"s": 3162.076, "e": 3164.453, "t": "Gracias por prepararme la habitación."}, {"s": 3164.453, "e": 3167.164, "t": "¡Dios mío! Quiero leer todas las cartas."}, {"s": 3172.294, "e": 3173.212, "t": "¿Mamá?"}, {"s": 3173.212, "e": 3174.296, "t": "¿Sí, cariño?"}, {"s": 3175.547, "e": 3177.508, "t": "Muy bien, buenas noches. - Buenas noches."}, {"s": 3177.508, "e": 3178.801, "t": "[Os quiero."}, {"s": 3178.801, "e": 3181.595, "t": "- Te quiero.\n- Vale volveré."}, {"s": 3183.847, "e": 3186.35, "t": "Son todos tan monos."}, {"s": 3224.972, "e": 3225.889, "t": "Buenos días, ¿qué tal has dormido?"}, {"s": 3227.224, "e": 3228.892, "t": "Buenos días, ¿cómo has dormido?"}, {"s": 3241.488, "e": 3244.158, "t": " ♪ Ella\nha sido mi reina desde que teníamos 16 años ♪"}, {"s": 3244.158, "e": 3247.286, "t": "♪ Queremos lo mismo,\nsoñamos los mismos sueños ♪"}, {"s": 3247.286, "e": 3250.289, "t": "♪ All right ♪"}, {"s": 3250.289, "e": 3253.584, "t": "♪ All right ♪"}, {"s": 3253.584, "e": 3256.92, "t": "♪ Lo sé, lo sé ♪"}, {"s": 3256.92, "e": 3260.549, "t": "♪ Lo sé con certeza ♪"}, {"s": 3260.549, "e": 3263.719, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3263.719, "e": 3266.68, "t": "♪ Todo el mundo quiere\nrobarle el corazón ♪"}, {"s": 3266.68, "e": 3269.683, "t": "♪ Couple billion in the whole wide world ♪"}, {"s": 3269.683, "e": 3272.686, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3272.686, "e": 3275.898, "t": "♪ Everybody wanna steal my girl ♪"}, {"s": 3275.898, "e": 3279.109, "t": "♪ Todo el mundo quiere\nrobarle el corazón ♪"}, {"s": 3279.109, "e": 3282.154, "t": "♪ Un par de miles de\nmillones en todo el mundo ♪"}, {"s": 3282.154, "e": 3285.908, "t": "♪ Find another one,\n'cause she belongs to me ♪"}, {"s": 3285.908, "e": 3289.161, "t": "♪ Lo sé, lo sé ♪"}, {"s": 3289.161, "e": 3292.164, "t": "♪ I know for sure ♪"}, {"s": 3292.164, "e": 3294.291, "t": "♪ Everybody wanna ♪ ♪ Everybody wanna ♪"}, {"s": 3294.291, "e": 3296.001, "t": "♪ robarme a mi chica ♪"}, {"s": 3296.001, "e": 3299.129, "t": "♪ Todo el mundo quiere\nrobarle el corazón ♪"}, {"s": 3299.129, "e": 3301.84, "t": "♪ Unos cuantos miles de\nmillones en todo el mundo ♪"}, {"s": 3312.684, "e": 3315.687, "t": "Sigo teniendo\ndesencadenantes todos los días."}, {"s": 3316.855, "e": 3318.774, "t": "Me aterroriza que algo les pase"}, {"s": 3318.774, "e": 3319.983, "t": "a uno de esos niños."}, {"s": 3322.277, "e": 3324.53, "t": "Creo que es la naturaleza de ser padre."}, {"s": 3326.615, "e": 3327.783, "t": "Tienes un corazón físico"}, {"s": 3327.783, "e": 3329.952, "t": "que vive fuera de tu cuerpo."}, {"s": 3335.791, "e": 3337.751, "t": "Y luego lo haces una y otra y otra vez."}, {"s": 3339.878, "e": 3341.672, "t": "Ahora los tengo a todos."}, {"s": 3344.633, "e": 3347.094, "t": "Cualquier cosa puede\npasar en cualquier momento."}, {"s": 3350.931, "e": 3353.142, "t": "¿Eliges vivir tu vida pensando"}, {"s": 3353.142, "e": 3355.269, "t": "que tus hijos van a morir?"}, {"s": 3356.27, "e": 3358.856, "t": "No puedes. No puedes vivir con miedo."}, {"s": 3362.317, "e": 3366.738, "t": "Los niños merecen una madre que sea\ndivertida y pueda bailar con ellos."}, {"s": 3370.659, "e": 3373.162, "t": "Quiero ser\nla mejor madre posible para los niños."}, {"s": 3376.457, "e": 3377.875, "t": "- ¿Estás preocupada por él?"}, {"s": 3378.375, "e": 3381.753, "t": "Sobre él como a 12 metros\nen el árbol, ¿no?"}, {"s": 3385.174, "e": 3387.092, "t": "Todavía nos queda un trecho"}, {"s": 3390.179, "e": 3392.181, "t": "La gran prueba será,"}, {"s": 3392.181, "e": 3395.184, "t": "¿seréis capaces de\nvaleros por vosotros mismos?"}, {"s": 3404.693, "e": 3406.069, "t": "Conseguí una beca"}, {"s": 3406.069, "e": 3410.741, "t": "para estudiar en un\ninstituto de los Países Bajos."}, {"s": 3412.117, "e": 3414.953, "t": "Recuerdo que me resultó muy difícil porque"}, {"s": 3415.954, "e": 3417.206, "t": "La muerte de Ravi en Nepal"}, {"s": 3417.206, "e": 3420.334, "t": "y luego tuve que ir a\nlos Países Bajos justo después."}, {"s": 3424.88, "e": 3428.634, "t": "Nisha fue añadida a un...\n¿Qué era, como un chat de Facebook?"}, {"s": 3428.634, "e": 3430.052, "t": "Sí"}, {"s": 3430.052, "e": 3432.679, "t": "¿Y de dónde eran todos los niños?"}, {"s": 3432.679, "e": 3434.89, "t": "Grecia, Siria, Pakistán"}, {"s": 3434.89, "e": 3437.851, "t": "Afganistán, India, Bielorrusia,"}, {"s": 3438.393, "e": 3441.522, "t": "y Ucrania, América."}, {"s": 3443.148, "e": 3444.608, "t": "¿Algo más que te preocupe?"}, {"s": 3444.608, "e": 3448.654, "t": "- No, es que no sé cómo lo voy a hacer."}, {"s": 3449.112, "e": 3451.24, "t": "Ya has pasado por tantas cosas, así que"}, {"s": 3452.074, "e": 3453.116, "t": "el cambio es difícil."}, {"s": 3453.617, "e": 3455.244, "t": "Va a ser difícil. Puedes contar con ello."}, {"s": 3455.244, "e": 3457.829, "t": "Pero también serás capaz\nde superar cualquier cosa."}, {"s": 3459.164, "e": 3460.499, "t": "Piensa en lo genial que es que consigas"}, {"s": 3460.499, "e": 3462.042, "t": "vivir en Europa durante un tiempo."}, {"s": 3465.629, "e": 3467.172, "t": "Sí."}, {"s": 3475.305, "e": 3477.099, "t": "Cuarenta y cinco minutos"}, {"s": 3477.099, "e": 3478.308, "t": "¿Qué?"}, {"s": 3478.308, "e": 3482.187, "t": "hasta que conozca"}, {"s": 3482.187, "e": 3484.731, "t": "no sé, 15 niños, oh."}, {"s": 3486.817, "e": 3488.61, "t": "¿Cómo te sientes?"}, {"s": 3488.61, "e": 3491.154, "t": "- Te lo dije, voy a vomitar."}, {"s": 3493.407, "e": 3494.533, "t": "¡Esto es genial!"}, {"s": 3494.533, "e": 3496.243, "t": "Sí.\nEs emocionante."}, {"s": 3496.243, "e": 3499.496, "t": "Sí verdad? Es un poco\nemocional para mí."}, {"s": 3499.496, "e": 3501.582, "t": "Pero estaré bien."}, {"s": 3504.96, "e": 3506.92, "t": "Voy a meter esto aquí."}, {"s": 3519.433, "e": 3520.684, "t": "Vale."}, {"s": 3521.768, "e": 3522.728, "t": "¿Vas a ir?"}, {"s": 3524.146, "e": 3524.98, "t": "Sí."}, {"s": 3526.815, "e": 3528.15, "t": "Adiós."}, {"s": 3528.15, "e": 3529.484, "t": "Te echaré de menos."}, {"s": 3532.738, "e": 3533.989, "t": "Estoy muy orgullosa de ti."}, {"s": 3533.989, "e": 3536.533, "t": "Ay. Gracias, mamá."}, {"s": 3540.579, "e": 3542.205, "t": "Estoy muy orgullosa de ti."}, {"s": 3542.205, "e": 3543.457, "t": "He tenido mucha suerte."}, {"s": 3544.291, "e": 3545.125, "t": "Sí."}, {"s": 3548.086, "e": 3549.463, "t": "Estás siendo muy valiente. No, estoy bien."}, {"s": 3549.463, "e": 3550.547, "t": "Es que estoy tan feliz."}, {"s": 3550.547, "e": 3552.299, "t": "Me alegro mucho por ti."}, {"s": 3553.133, "e": 3554.551, "t": "Lo vas a hacer muy bien. ¿Vale?"}, {"s": 3555.344, "e": 3555.969, "t": "Lo harás genial. ¿Vale?"}, {"s": 3557.763, "e": 3559.264, "t": "Estoy muy orgullosa de ti."}, {"s": 3562.1, "e": 3563.977, "t": "Te quiero, te quiero, te quiero."}, {"s": 3563.977, "e": 3565.854, "t": "Te quiero, te quiero,\nte quiero, te quiero."}, {"s": 3565.854, "e": 3567.23, "t": "Trabaja duro. ¿Vale? Sí."}, {"s": 3567.23, "e": 3568.982, "t": "Si necesitas algo, envíame un mensaje."}, {"s": 3568.982, "e": 3570.984, "t": "Sí. Lo que sea. ¿Vale?"}, {"s": 3570.984, "e": 3572.527, "t": "Mm. Mm."}, {"s": 3595.342, "e": 3596.176, "t": "Vale."}, {"s": 3604.184, "e": 3605.727, "t": "¿Qué pasa? ¿Estás bien?"}, {"s": 3605.727, "e": 3607.354, "t": "Hoy echo de menos a Nisha y"}, {"s": 3608.397, "e": 3611.316, "t": "no se siente bien sin él."}, {"s": 3611.733, "e": 3613.902, "t": "Simplemente echo de menos\ntenerlo en el asiento trasero"}, {"s": 3613.902, "e": 3615.612, "t": "y echo de menos tenerlo cerca."}, {"s": 3615.612, "e": 3618.281, "t": "Lo echo de menos en el\ncochecito y echo de menos tenerlo"}, {"s": 3618.281, "e": 3619.95, "t": "la bolsa de pañales y"}, {"s": 3622.244, "e": 3623.537, "t": "¿me cantas una nana para dormir?"}, {"s": 3623.537, "e": 3625.747, "t": "Hoy tengo malos pensamientos."}, {"s": 3628.583, "e": 3630.085, "t": "¿Me oyes?"}, {"s": 3630.085, "e": 3631.002, "t": "Maggie Mm-hmm."}, {"s": 3633.922, "e": 3636.174, "t": "La luna nueva. El\nque está más cerca es Marte"}, {"s": 3636.174, "e": 3638.552, "t": "porque es bastante,"}, {"s": 3638.552, "e": 3640.262, "t": "un poco más rojo?"}, {"s": 3640.262, "e": 3642.597, "t": "Sabes, para mí poder..."}, {"s": 3645.851, "e": 3647.728, "t": "- Buenos días.\n- Buenos días."}, {"s": 3652.733, "e": 3654.317, "t": "¿Has echado de menos a tus hermanos?"}, {"s": 3660.031, "e": 3661.366, "t": "Es verdad. Vale."}, {"s": 3662.325, "e": 3663.16, "t": "Te queda un largo camino por recorrer."}, {"s": 3663.16, "e": 3664.411, "t": "Tienes que tomártelo con calma."}, {"s": 3666.246, "e": 3668.54, "t": "- Jeremy, ¿cuándo te vas a casar?"}, {"s": 3668.54, "e": 3671.042, "t": "- Maggie.\n- ¿Cuándo debería?"}, {"s": 3671.042, "e": 3672.419, "t": "- Esta noche."}, {"s": 3672.419, "e": 3674.129, "t": "- Sí, hoy. Hoy, sí."}, {"s": 3674.129, "e": 3674.963, "t": "- No tengo,"}, {"s": 3674.963, "e": 3676.047, "t": "no llevo un anillo ni nada."}, {"s": 3676.047, "e": 3677.674, "t": "- Solo compra un anillo en el mercado."}, {"s": 3677.674, "e": 3679.134, "t": "- No, no.\n- Solo trae una"}, {"s": 3679.134, "e": 3682.22, "t": "rosa de plástico y di: \"Sí\""}, {"s": 3682.22, "e": 3683.764, "t": "y bailarán."}, {"s": 3685.098, "e": 3686.808, "t": "- ¿Crees que a todos les parecería bien?"}, {"s": 3686.808, "e": 3687.726, "t": "- Sí.\n- Sí, sí-"}, {"s": 3687.726, "e": 3690.687, "t": "- Todos estarían contentos."}, {"s": 3720.842, "e": 3722.469, "t": "Hola a todos."}, {"s": 3722.469, "e": 3724.095, "t": "Hola"}, {"s": 3726.264, "e": 3727.557, "t": "Hola."}, {"s": 3727.557, "e": 3729.476, "t": "Hola. ¿Nos oís bien?"}, {"s": 3729.476, "e": 3730.852, "t": "Sí."}, {"s": 3731.478, "e": 3733.73, "t": "Pues tenemos noticias."}, {"s": 3733.73, "e": 3735.857, "t": "Jeremy me pidió que me casara con él,"}, {"s": 3735.857, "e": 3738.527, "t": "así que nos vamos a casar en Nepal."}, {"s": 3753.542, "e": 3756.086, "t": "Desayunemos primero y\nluego vamos a nuestra habitación."}, {"s": 3774.521, "e": 3777.232, "t": "He estado aquí contigo 10 años,"}, {"s": 3777.232, "e": 3779.818, "t": "más años de los que he pasado"}, {"s": 3779.818, "e": 3782.863, "t": "con mi familia biológica."}, {"s": 3782.863, "e": 3786.491, "t": "¿Sientes que es\ncomo un nuevo capítulo?"}, {"s": 3787.367, "e": 3789.077, "t": "Es un nuevo capítulo para mí."}, {"s": 3790.37, "e": 3792.873, "t": "He crecido de niño a joven adulto"}, {"s": 3795.083, "e": 3798.92, "t": "y ahora es el momento de ser más yo mismo"}, {"s": 3799.754, "e": 3801.882, "t": "y menos dependiente de los demás."}, {"s": 3810.557, "e": 3811.474, "t": "- Buen trabajo."}, {"s": 3812.475, "e": 3814.436, "t": "Me sentía muy triste"}, {"s": 3815.437, "e": 3818.023, "t": "y me di cuenta de\nlo importante que es la familia."}, {"s": 3829.91, "e": 3836.333, "t": "¡Krishna, Krishna!"}, {"s": 3836.333, "e": 3838.293, "t": "Krishna,"}, {"s": 3838.293, "e": 3839.586, "t": "cada recuerdo"}, {"s": 3839.586, "e": 3842.422, "t": "que tengo aquí te incluye a ti."}, {"s": 3842.422, "e": 3844.132, "t": "Desde los primeros, primeros días"}, {"s": 3844.132, "e": 3847.552, "t": "cuando eras muy, muy pequeño."}, {"s": 3847.552, "e": 3849.387, "t": "No va a ser lo mismo sin ti."}, {"s": 3849.387, "e": 3852.432, "t": "Lo voy a odiar cuando me\ndespierto y no estés aquí."}, {"s": 3853.141, "e": 3855.56, "t": "Todos juntos hemos construido este hogar."}, {"s": 3855.936, "e": 3858.772, "t": "Subimos cada ladrillo y\nestablecimos todas las reglas"}, {"s": 3858.772, "e": 3861.232, "t": "y decidimos cómo queríamos\nser como familia."}, {"s": 3861.232, "e": 3862.776, "t": "Así que solo quiero daros las gracias."}, {"s": 3863.401, "e": 3866.112, "t": "Voy a echar de menos cada momento."}, {"s": 3867.238, "e": 3868.156, "t": "Te quiero."}, {"s": 3880.752, "e": 3883.922, "t": "Para mí son las personas\nlas que hacen la familia."}, {"s": 3890.637, "e": 3893.682, "t": "No hace falta que haya\nun vínculo de sangre"}, {"s": 3894.933, "e": 3896.601, "t": "para crear un vínculo."}, {"s": 3898.269, "e": 3901.523, "t": "Tan fuerte como la que nosotros, los\nchicos de Kopila, hemos construido juntos."}, {"s": 3905.944, "e": 3907.737, "t": "[Me mudo.]"}, {"s": 3907.737, "e": 3909.364, "t": "[Avanzando.]"}, {"s": 3943.481, "e": 3944.441, "t": "Ay."}, {"s": 3947.694, "e": 3949.404, "t": "Mira, si cuentas las\nmanchas de su espalda,"}, {"s": 3949.404, "e": 3951.573, "t": "sabrás cuántos años tienen."}, {"s": 3953.908, "e": 3956.411, "t": "Habíamos esperado tanto tiempo."}, {"s": 3956.411, "e": 3959.998, "t": "No habíamos acogido a ningún niño\nnuevo durante ese periodo de duelo"}, {"s": 3960.665, "e": 3961.875, "t": "casi un año."}, {"s": 3966.963, "e": 3968.965, "t": "Pero pensaba mucho en los otros niños"}, {"s": 3968.965, "e": 3971.885, "t": "y cómo les iría con otro bebé,"}, {"s": 3971.885, "e": 3975.972, "t": "asegurándose de que no se sintiera"}, {"s": 3989.069, "e": 3993.239, "t": "Tope ha recibido\nuna llamada sobre un caso de emergencia"}, {"s": 3993.239, "e": 3995.033, "t": "del gobierno local."}, {"s": 4003.083, "e": 4006.669, "t": "El mejor lugar donde puede estar un niño"}, {"s": 4006.669, "e": 4009.464, "t": "es en su comunidad con su familia."}, {"s": 4011.091, "e": 4014.094, "t": "Pero en caso de que un\nniño no esté a salvo,"}, {"s": 4014.094, "e": 4016.179, "t": "que un niño no tenga un lugar,\nningún sitio adonde ir,"}, {"s": 4016.179, "e": 4019.516, "t": "nadie que cuide de él,\nnecesitamos una opción,"}, {"s": 4019.516, "e": 4021.726, "t": "y tenemos que tomar esas\ndecisiones realmente difíciles,"}, {"s": 4021.726, "e": 4023.853, "t": "y lo hacemos con el apoyo\nde trabajadores sociales,"}, {"s": 4023.853, "e": 4026.981, "t": "con consejeros, con líderes comunitarios."}, {"s": 4026.981, "e": 4030.068, "t": "Y no es una decisión\nque tomemos a la ligera."}, {"s": 4035.031, "e": 4036.866, "t": "Habríamos hecho mil cosas más"}, {"s": 4036.866, "e": 4039.953, "t": "antes de que ese niño entre en el hogar"}, {"s": 4039.953, "e": 4043.665, "t": "y, sin embargo, en el 2 % de\nlos casos tenemos que intervenir."}, {"s": 4043.665, "e": 4045.792, "t": "Y este es el\núltimo recurso. Sin acceso a la ciudad, sin acceso al agua"}, {"s": 4045.792, "e": 4047.794, "t": "Lejos de la ciudad, sin acceso al agua."}, {"s": 4047.794, "e": 4049.504, "t": "Ni siquiera hay un\nhospital al que ir andando"}, {"s": 4049.504, "e": 4051.506, "t": "ni una escuela, ni nada."}, {"s": 4057.011, "e": 4057.971, "t": "Esta\nes la casa, en medio de la nada."}, {"s": 4059.722, "e": 4061.307, "t": "en medio de la nada."}, {"s": 4062.976, "e": 4064.269, "t": "[Ahí está la casa, señor.]"}, {"s": 4064.269, "e": 4065.562, "t": "[¿Esa?]"}, {"s": 4071.901, "e": 4073.361, "t": "[¿Saben los niños lo\nque le pasó a su madre?]"}, {"s": 4074.696, "e": 4077.24, "t": "[No. Los niños no lo saben.\nEstaban durmiendo.]"}, {"s": 4079.367, "e": 4081.286, "t": "[No había nadie más aquí por la noche.]"}, {"s": 4081.286, "e": 4083.413, "t": "[Solo la madre y las dos niñas.]"}, {"s": 4093.339, "e": 4096.926, "t": "¡Cucú! ¡Kushi!"}, {"s": 4096.926, "e": 4098.511, "t": "¡Kushi! ¡Mamá!"}, {"s": 4100.221, "e": 4102.14, "t": "¡Cucú!"}, {"s": 4109.981, "e": 4112.65, "t": "[Iremos en el coche, ¿vale?]"}, {"s": 4142.18, "e": 4146.893, "t": "Di hola. Es una niña."}, {"s": 4148.102, "e": 4149.562, "t": "¿Adivina cómo se llama?"}, {"s": 4149.896, "e": 4151.522, "t": "Khusi. ¡Guau!"}, {"s": 4151.856, "e": 4153.524, "t": "- Khusi.\n- Khusi."}, {"s": 4154.734, "e": 4156.611, "t": "That's Khusbu [Smells Good]."}, {"s": 4156.611, "e": 4158.696, "t": "- Khusbu.\n- Khusbu"}, {"s": 4159.197, "e": 4160.698, "t": "Es muy importante que tomemos todas"}, {"s": 4160.698, "e": 4164.244, "t": "las cosas pequeñas de la casa otra vez,"}, {"s": 4164.244, "e": 4165.787, "t": "todas las cosas que se podían llevar,"}, {"s": 4165.787, "e": 4166.996, "t": "que pudiera meterse en la boca"}, {"s": 4166.996, "e": 4171.376, "t": "y en los próximos días,\nnecesitamos la ayuda de todos, ¿vale?"}, {"s": 4180.593, "e": 4182.262, "t": "El\nnombre de Khusi significa «feliz»."}, {"s": 4182.971, "e": 4185.265, "t": "Literalmente volvió a traer\neso a nuestro hogar en un momento"}, {"s": 4185.265, "e": 4187.85, "t": "en la que pensábamos que\nnunca seríamos capaces de amar"}, {"s": 4187.85, "e": 4190.853, "t": "un bebé como lo quisimos a él."}, {"s": 4194.19, "e": 4196.609, "t": "Recuerdo\nhaberles dicho a los niños: «Seguimos siendo una familia,"}, {"s": 4196.609, "e": 4198.027, "t": "seguimos siendo una familia,\nseguimos siendo una familia»."}, {"s": 4198.027, "e": 4200.738, "t": "Y creo que traer a Khusi y a Khusbu"}, {"s": 4200.738, "e": 4204.2, "t": "y demostrarles que\npodíamos seguir adelante,"}, {"s": 4205.618, "e": 4209.122, "t": "eso nos hizo creer que\npodemos volver a hacerlo."}, {"s": 4210.999, "e": 4213.459, "t": "Vamos a renovar por completo el\nvestuario del centro de mujeres."}, {"s": 4269.974, "e": 4271.642, "t": "[- ¿Qué es?]"}, {"s": 4271.642, "e": 4274.228, "t": "Experimento ¿Ya has\nterminado tu experimento?"}, {"s": 4274.562, "e": 4276.439, "t": "¿Todavía necesitas esas cerillas o..."}, {"s": 4278.066, "e": 4280.735, "t": "Santosh, en serio,\nno prendas fuego a nada."}, {"s": 4281.444, "e": 4284.155, "t": "Un abrazo para todos."}, {"s": 4285.573, "e": 4289.66, "t": "Estaba pasando\npor mi propio dolor y vergüenza internos"}, {"s": 4289.66, "e": 4291.537, "t": "y sintiéndome como una fracasada."}, {"s": 4292.038, "e": 4293.414, "t": "Os quiero, chicos."}, {"s": 4293.414, "e": 4295.5, "t": "Te queremos. Yo también os quiero."}, {"s": 4295.5, "e": 4297.585, "t": "Volveré muy pronto."}, {"s": 4297.585, "e": 4300.63, "t": "Mientras pienso: «Vale,\nvamos a volver de alguna manera"}, {"s": 4300.63, "e": 4302.048, "t": "a este antiguo tú"}, {"s": 4303.216, "e": 4304.509, "t": ", que sigue siendo el director general"}, {"s": 4304.509, "e": 4306.511, "t": "de una importante organización."}, {"s": 4308.888, "e": 4313.101, "t": "Gestionamos una gran escuela\ncomunitaria, un centro de mujeres,"}, {"s": 4313.101, "e": 4315.061, "t": "un hogar seguro para niñas."}, {"s": 4315.061, "e": 4318.189, "t": "Éramos un equipo de 125 personas."}, {"s": 4318.189, "e": 4321.859, "t": "Todos dependían totalmente de mí"}, {"s": 4321.859, "e": 4323.027, "t": "y mi capacidad de salir"}, {"s": 4323.027, "e": 4326.322, "t": "y recaudar fondos para\nmantener a nuestra familia."}, {"s": 4331.369, "e": 4335.373, "t": "No sabía si podría\nvolver a levantarme y hablar."}, {"s": 4344.632, "e": 4347.385, "t": "Buenos días a todos. Esta sala\nes realmente extraordinaria."}, {"s": 4347.385, "e": 4349.178, "t": "MLK dio un discurso aquí,"}, {"s": 4349.178, "e": 4352.723, "t": "al igual que Hillary\nClinton y hoy Maggie Doyne."}, {"s": 4359.981, "e": 4362.9, "t": "Esta es la primera charla\nque doy en bastante tiempo."}, {"s": 4365.153, "e": 4368.322, "t": "El amor es, el amor es algo hermoso"}, {"s": 4369.073, "e": 4371.909, "t": "y es lo que tenemos que conservar"}, {"s": 4371.909, "e": 4373.786, "t": "y lo único que jamás,"}, {"s": 4373.786, "e": 4376.247, "t": "en un millón de años,\nsanará el mundo con el estado"}, {"s": 4376.247, "e": 4377.582, "t": "en el que estamos."}, {"s": 4380.918, "e": 4382.336, "t": "- ¿Y?"}, {"s": 4393.014, "e": 4394.056, "t": "¿Quieres verlo?"}, {"s": 4394.432, "e": 4395.975, "t": "- ¿Qué dice?"}, {"s": 4398.186, "e": 4399.645, "t": "- Estoy embarazada."}, {"s": 4400.438, "e": 4401.981, "t": "- Dice..."}, {"s": 4404.484, "e": 4405.443, "t": "Dios mío."}, {"s": 4411.115, "e": 4412.825, "t": "Sinceramente, me mientes.\nSé que me mientes."}, {"s": 4412.825, "e": 4414.118, "t": "Maggie, perdona."}, {"s": 4414.285, "e": 4415.912, "t": "- No miento.\n- ¿Te pellizco?"}, {"s": 4415.912, "e": 4417.872, "t": "¿Me estás mintiendo? Me estás mintiendo."}, {"s": 4417.872, "e": 4419.207, "t": "No me mientes, Maggie."}, {"s": 4419.207, "e": 4420.5, "t": "¿Sobre qué quieres que jure?"}, {"s": 4420.5, "e": 4421.542, "t": "Estoy de cuatro meses."}, {"s": 4426.589, "e": 4428.925, "t": "¿Crees que podría dar a luz en Surkhet?"}, {"s": 4428.925, "e": 4430.593, "t": "o que debería volver a Estados Unidos?"}, {"s": 4430.593, "e": 4432.428, "t": "- Si tienes ese bebé en EE.UU.,"}, {"s": 4432.428, "e": 4434.305, "t": ", entonces estarás más a salvo."}, {"s": 4434.555, "e": 4436.724, "t": "Aquí, a mucha gente le gusta esto."}, {"s": 4442.897, "e": 4446.984, "t": "Pero, en la ONG, ¿tu papel\nserá el mismo o diferente?"}, {"s": 4451.239, "e": 4452.99, "t": "¡Oye!"}, {"s": 4453.407, "e": 4455.952, "t": "Hola Gongo, hola, Nev."}, {"s": 4456.994, "e": 4459.121, "t": "Oh, ¿mira ese diente?"}, {"s": 4459.121, "e": 4461.374, "t": "¿Te ha salido un diente nuevo? Déjame ver."}, {"s": 4462.833, "e": 4465.044, "t": "¿Puedo verlo?"}, {"s": 4465.044, "e": 4465.878, "t": "Hola ay. Lo quiero."}, {"s": 4467.338, "e": 4468.422, "t": "Quiero."}, {"s": 4468.422, "e": 4469.84, "t": "¿Qué estás haciendo?"}, {"s": 4469.84, "e": 4472.301, "t": "Mis futuros hijos biológicos"}, {"s": 4472.301, "e": 4473.761, "t": "para que crezcan con todos vosotros."}, {"s": 4474.971, "e": 4477.598, "t": "Van a ser los niños más\nafortunados del mundo."}, {"s": 4477.598, "e": 4480.434, "t": "¿Cuántos niños tienen la suerte de\nllegar a una familia como la nuestra?"}, {"s": 4480.434, "e": 4484.105, "t": "que tiene todos estos hermanos y hermanas?"}, {"s": 4485.481, "e": 4486.899, "t": "¿Todo ese amor?"}, {"s": 4505.209, "e": 4505.751, "t": "Un día"}, {"s": 4505.751, "e": 4507.086, "t": "Un día nuestra madre, muy amable,\ndivertida y con buen sentido"}, {"s": 4507.086, "e": 4507.962, "t": "She didn’t even have to tell us"}, {"s": 4507.962, "e": 4509.922, "t": "She didn’t even have to tell us"}, {"s": 4510.298, "e": 4512.466, "t": "Lo presentó como un amigo."}, {"s": 4512.466, "e": 4513.843, "t": "Resultó ser su amante."}, {"s": 4515.761, "e": 4517.346, "t": "Ni siquiera tuvo que decírnoslo"}, {"s": 4517.346, "e": 4520.099, "t": "porque sus sentimientos\neran muy evidentes."}, {"s": 4520.099, "e": 4521.809, "t": "No sabe cómo ocultarlos."}, {"s": 4521.809, "e": 4523.769, "t": "Eso es lo que más me gusta de ella."}, {"s": 4524.729, "e": 4526.23, "t": "Dame un abrazo. ¡Vamos!"}, {"s": 4543.623, "e": 4545.458, "t": "¿Lista? Prueba."}, {"s": 4555.968, "e": 4558.888, "t": "- Vamos,  Khusi."}, {"s": 4558.888, "e": 4562.725, "t": "Khusi, Khusi, Khusi,\nKhus, tú puedes. Vamos."}, {"s": 4562.725, "e": 4564.185, "t": "Tú puedes. Mira."}, {"s": 4591.837, "e": 4595.007, "t": "Conocía la maternidad en esta dimensión,"}, {"s": 4602.014, "e": 4604.642, "t": "pero nunca había vivido un parto."}, {"s": 4609.98, "e": 4611.732, "t": "Estaba tan asustada."}, {"s": 4613.984, "e": 4617.321, "t": "Miedo a que fuera solo una cosa más"}, {"s": 4617.321, "e": 4620.449, "t": "que querría y que simplemente\nme quitarían."}, {"s": 4626.747, "e": 4629.542, "t": "Pero ese es también el\nriesgo que corremos al amar."}, {"s": 4633.212, "e": 4636.173, "t": "¿Quién eres? ¿Quién eres?"}, {"s": 4637.258, "e": 4640.344, "t": "Creo que es bueno que nos\nvayamos a los ocho meses."}, {"s": 4641.053, "e": 4644.64, "t": "Es una pena que los niños no\npuedan conocer al bebé enseguida."}, {"s": 4644.64, "e": 4647.226, "t": "Esa es la única parte difícil."}, {"s": 4648.519, "e": 4650.271, "t": "¿Estáis todos aquí?"}, {"s": 4651.147, "e": 4653.399, "t": "- Abrazo de grupo."}, {"s": 4653.399, "e": 4655.276, "t": "Abrazo de grupo. Abrazo de grupo."}, {"s": 4657.611, "e": 4658.904, "t": "[¡Ven aquí!]"}, {"s": 4660.156, "e": 4661.407, "t": "Te quiero."}, {"s": 4662.616, "e": 4663.617, "t": "Adiós."}, {"s": 4663.617, "e": 4664.452, "t": "Adiós."}, {"s": 4667.913, "e": 4669.081, "t": "- Vale. Creo que es una buena decisión."}, {"s": 4669.081, "e": 4670.082, "t": "Me siento bien."}, {"s": 4671.125, "e": 4672.042, "t": "Pero no estoy dilatando."}, {"s": 4672.042, "e": 4673.753, "t": "No voy a estar con esto ocho días."}, {"s": 4673.753, "e": 4674.92, "t": "No, claro que no."}, {"s": 4676.756, "e": 4678.591, "t": "Le diste todo."}, {"s": 4678.591, "e": 4680.217, "t": "Solo quiero que el bebé esté bien."}, {"s": 4680.217, "e": 4681.051, "t": "Totalmente."}, {"s": 4681.969, "e": 4683.471, "t": "Vale. Gracias."}, {"s": 4685.055, "e": 4686.223, "t": "Vale. Adiós."}, {"s": 4687.683, "e": 4689.81, "t": "Quiere hacerme una cesárea."}, {"s": 4689.81, "e": 4691.02, "t": "Sacad al bebé, el bebé está sufriendo."}, {"s": 4692.229, "e": 4694.315, "t": "Sacad al bebé, el bebé está sufriendo."}, {"s": 4727.264, "e": 4728.516, "t": "Vaya. 22."}, {"s": 4728.516, "e": 4731.06, "t": "Es una niña. ¡Oh!"}, {"s": 4737.691, "e": 4739.36, "t": "- ¿Está llorando?\n- ¿Qué ha sido eso?"}, {"s": 4739.36, "e": 4740.528, "t": "Pequeñita."}, {"s": 4741.529, "e": 4742.404, "t": "Pero es buena."}, {"s": 4748.285, "e": 4751.831, "t": "Han llegado los resultados y parece que"}, {"s": 4751.831, "e": 4754.416, "t": "la infección se está propagando."}, {"s": 4754.416, "e": 4755.96, "t": "No sé qué lo está causando."}, {"s": 4758.337, "e": 4760.005, "t": "Solo quiero salir de este hospital"}, {"s": 4761.924, "e": 4765.928, "t": "y quiero que nuestra pequeña esté sana"}, {"s": 4765.928, "e": 4768.764, "t": "y yo queremos poder dormir en\nla misma habitación que ella."}, {"s": 4776.146, "e": 4777.022, "t": "- ¿Qué pasa?"}, {"s": 4777.481, "e": 4778.732, "t": "Nos vamos a casa."}, {"s": 4795.875, "e": 4796.709, "t": "Vale."}, {"s": 4816.103, "e": 4818.188, "t": "Nos vamos a casa."}, {"s": 4819.481, "e": 4822.234, "t": "Yo voy por ahí. - Hola mamá."}, {"s": 4822.234, "e": 4825.321, "t": "Hola mis pequeños,"}, {"s": 4825.321, "e": 4826.488, "t": "¿cómo estáis?"}, {"s": 4827.781, "e": 4829.992, "t": "Veo a una pequeña Khusi."}, {"s": 4829.992, "e": 4834.288, "t": "Hola Khusi. Khusi,\n¿quieres ver a Ruby Sunshine?"}, {"s": 4834.705, "e": 4836.04, "t": "Esa es Ruby."}, {"s": 4836.916, "e": 4837.917, "t": "[Hermanita.]"}, {"s": 4838.208, "e": 4839.627, "t": "[Tu hermanita.]"}, {"s": 4841.128, "e": 4843.881, "t": "El segundo nombre de Ruby es Sunshine."}, {"s": 4845.007, "e": 4848.469, "t": "Es solo una forma\nsencilla de honrar a Ravi,"}, {"s": 4849.219, "e": 4853.223, "t": "cuyo nombre significaba luz del sol."}, {"s": 4854.266, "e": 4854.934, "t": "Mira."}, {"s": 4875.371, "e": 4876.413, "t": "Hola."}, {"s": 4878.999, "e": 4881.21, "t": "Saluda, ay."}, {"s": 4887.841, "e": 4889.551, "t": "Qué bueno verte."}, {"s": 4889.551, "e": 4892.012, "t": "Pareces tan mayor."}, {"s": 4902.064, "e": 4903.232, "t": "- Nisha Darby."}, {"s": 4919.498, "e": 4921.166, "t": "- ¿Has guardado tus fotos y todo?"}, {"s": 4921.166, "e": 4922.626, "t": "Todo."}, {"s": 4930.509, "e": 4932.678, "t": "¡Cómo estás, tío! - Sí."}, {"s": 4934.513, "e": 4935.848, "t": "Hola tía, hola, hola."}, {"s": 4939.351, "e": 4940.477, "t": "Hola hola."}, {"s": 4951.155, "e": 4955.868, "t": "- Dios mío. No me lo puedo creer."}, {"s": 4955.868, "e": 4958.078, "t": "[Gracias.]"}, {"s": 4958.078, "e": 4960.789, "t": "¡Namaste! [La hija más pequeña.]"}, {"s": 4960.789, "e": 4963.083, "t": "[Ahí está.]"}, {"s": 4964.418, "e": 4965.252, "t": "[Gracias.]"}, {"s": 4966.795, "e": 4968.422, "t": "¡Khusi!"}, {"s": 4970.049, "e": 4971.258, "t": "Saluda, oh."}, {"s": 4974.428, "e": 4975.846, "t": "Es enorme."}, {"s": 4987.191, "e": 4989.234, "t": "Recuerdo que estaba muy preocupada"}, {"s": 4989.234, "e": 4992.321, "t": "Ay. Que no la querría tanto."}, {"s": 4992.321, "e": 4994.156, "t": "Jeremy, ¿dónde estás?"}, {"s": 4995.532, "e": 4997.076, "t": "¿Cómo podría hacer que se sintiera igual?"}, {"s": 4997.076, "e": 5000.454, "t": "¿o habría celos o sentimientos extraños?"}, {"s": 5002.831, "e": 5003.665, "t": "Y entonces"}, {"s": 5005.459, "e": 5007.461, "t": "igual que con cualquier otro niño,"}, {"s": 5009.546, "e": 5011.799, "t": "encaja perfectamente en el panorama."}, {"s": 5011.882, "e": 5012.674, "t": "[Una...]"}, {"s": 5012.674, "e": 5013.383, "t": "[Dos...]"}, {"s": 5013.383, "e": 5014.009, "t": "[Tres...]"}, {"s": 5014.009, "e": 5015.052, "t": "[Cuatro...]"}, {"s": 5015.052, "e": 5016.136, "t": "[¡Cinco hermanas mayores!]"}, {"s": 5016.136, "e": 5017.721, "t": "[¿Y cuántos hermanos?]"}, {"s": 5026.647, "e": 5028.565, "t": "Que Ruby y Khusi estén aquí"}, {"s": 5028.565, "e": 5030.901, "t": "ha ayudado a tantos niños a recuperarse."}, {"s": 5032.194, "e": 5033.57, "t": "Hola Khus."}, {"s": 5034.53, "e": 5035.823, "t": "Me llevó un tiempo,"}, {"s": 5035.823, "e": 5040.035, "t": "pero fue entonces cuando realmente me\ndi cuenta de que podía seguir adelante."}, {"s": 5040.661, "e": 5042.079, "t": "Puedo volver a amar."}, {"s": 5074.153, "e": 5077.322, "t": "Ese es el dolor de ser humano."}, {"s": 5077.322, "e": 5079.908, "t": "Tienes que pasar por cosas difíciles"}, {"s": 5079.908, "e": 5083.162, "t": "y tienes que tomar una decisión."}, {"s": 5083.162, "e": 5087.749, "t": "Tienes que elegir el amor de nuevo.\nTienes que elegir la alegría de nuevo."}, {"s": 5089.334, "e": 5090.21, "t": "Lo he visto. He visto lo que hace el amor."}, {"s": 5091.461, "e": 5093.839, "t": "Lo he visto. He visto lo que hace el amor."}, {"s": 5095.257, "e": 5097.968, "t": "Es el hilo que nos conecta a todos."}, {"s": 5103.515, "e": 5106.518, "t": "Y yo he decidido hacer todo lo que pueda"}, {"s": 5106.518, "e": 5109.062, "t": "con esta única y preciosa vida"}, {"s": 5109.062, "e": 5111.064, "t": "para dejar este lugar un poco mejor"}, {"s": 5111.064, "e": 5112.983, "t": "para la próxima generación."}, {"s": 5116.737, "e": 5120.032, "t": "si hay algo que me\nemociona más"}, {"s": 5120.032, "e": 5121.575, "t": "de cara al futuro, es que consigamos"}, {"s": 5121.575, "e": 5124.077, "t": "vea a nuestros pequeños Krishnas de 5 años"}, {"s": 5124.077, "e": 5127.664, "t": "y los Nishas salgan al mundo y florezcan."}, {"s": 5130.209, "e": 5135.255, "t": "[I’m good,\nsister. I fly out on Sunday.]"}, {"s": 5136.089, "e": 5141.929, "t": "[Trabaja duro y solicita plazas\nen universidades como yo.]"}, {"s": 5141.929, "e": 5146.892, "t": "[¿Nos enviarás iPhones a\ntodos cuando llegues a América?]"}, {"s": 5150.479, "e": 5153.565, "t": "- A veces me digo a mí\nmismo que he superado"}, {"s": 5153.565, "e": 5155.567, "t": "cuatro o cinco generaciones."}, {"s": 5156.693, "e": 5161.49, "t": "Eso es lo que me ha costado\nllegar a donde estoy."}, {"s": 5161.49, "e": 5163.367, "t": "Cinco generaciones para llegar hasta aquí."}, {"s": 5165.619, "e": 5167.496, "t": "La primera

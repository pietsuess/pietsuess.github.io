let player;
let isPaused = true;
let currentTopIdx = -1;
let currentBottomIdx = -1;

const topCues = VTT_CUES.filter(c => c.p === '10%');
const bottomCues = VTT_CUES.filter(c => c.p === '90%');

function findCue(cues, time) {
  for (let i = cues.length - 1; i >= 0; i--) {
    if (time >= cues[i].s && time <= cues[i].e) return i;
  }
  return -1;
}

function updateSubtitles(time) {
  const tIdx = findCue(topCues, time);
  if (tIdx !== currentTopIdx) {
    currentTopIdx = tIdx;
    document.getElementById('top-text').textContent = tIdx >= 0 ? topCues[tIdx].t : '';
  }
  const bIdx = findCue(bottomCues, time);
  if (bIdx !== currentBottomIdx) {
    currentBottomIdx = bIdx;
    document.getElementById('bottom-text').textContent = bIdx >= 0 ? bottomCues[bIdx].t : '';
    const total = VTT_CUES.length;
    // Find overall cue index for display
    if (bIdx >= 0) {
      const allIdx = VTT_CUES.findIndex(c => c.s === bottomCues[bIdx].s && c.t === bottomCues[bIdx].t);
      document.getElementById('cue-info').textContent = allIdx >= 0 ? `Cue ${allIdx + 1} of ${total}` : '';
    } else if (tIdx >= 0) {
      const allIdx = VTT_CUES.findIndex(c => c.s === topCues[tIdx].s && c.t === topCues[tIdx].t);
      document.getElementById('cue-info').textContent = allIdx >= 0 ? `Cue ${allIdx + 1} of ${total}` : '';
    } else {
      document.getElementById('cue-info').textContent = '';
    }
  }
}

function updateTimecode(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  document.getElementById('timecode').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

function initVimeoPlayer() {
  player = new Vimeo.Player('vimeo-player', {
    url: 'https://vimeo.com/' + CONFIG.vimeoVideoId + '/' + CONFIG.vimeoHash,
    width: 960,
    responsive: true,
  });

  player.on('timeupdate', data => {
    updateSubtitles(data.seconds);
    updateTimecode(data.seconds);
  });

  player.on('play', () => {
    isPaused = false;
    document.getElementById('stop-btn').textContent = 'STOP';
    document.getElementById('stop-btn').className = 'playing';
  });

  player.on('pause', () => {
    isPaused = true;
    document.getElementById('stop-btn').textContent = 'PLAY';
    document.getElementById('stop-btn').className = 'paused';
  });
}

document.getElementById('stop-btn').addEventListener('click', () => {
  if (isPaused) {
    player.play();
  } else {
    player.pause();
  }
});

document.getElementById('prev-cue-btn').addEventListener('click', () => {
  player.getCurrentTime().then(time => {
    // Find previous cue in all cues
    let prev = -1;
    for (let i = VTT_CUES.length - 1; i >= 0; i--) {
      if (VTT_CUES[i].s < time - 0.5) { prev = i; break; }
    }
    if (prev >= 0) {
      player.setCurrentTime(VTT_CUES[prev].s);
      updateTimecode(VTT_CUES[prev].s);
    }
  });
});

document.getElementById('next-cue-btn').addEventListener('click', () => {
  player.getCurrentTime().then(time => {
    let next = -1;
    for (let i = 0; i < VTT_CUES.length; i++) {
      if (VTT_CUES[i].s > time + 0.5) { next = i; break; }
    }
    if (next >= 0) {
      player.setCurrentTime(VTT_CUES[next].s);
      updateTimecode(VTT_CUES[next].s);
    }
  });
});

initVimeoPlayer();
</script>

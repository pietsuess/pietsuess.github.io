7.615,"t":"Je t'interviewe."},{"s":47.615,"e":49.284,"t":"Je gère tout avec Ravi."},{"s":49.284,"e":51.244,"t":"Je gère juste pas\nsans lui, genre."},{"s":56.331,"e":58.834,"t":"- Salut maman.\n- Nisha!"},{"s":58.834,"e":60.753,"t":"- Salut maman.\n- Salut Maya."},{"s":62.713,"e":64.715,"t":"Je sais. Félicitations."},{"s":64.715,"e":67.01,"t":"J'ai hâte de voir\ntous vos bulletins."},{"s":75.726,"e":77.477,"t":"- Salut maman.\n- Tu me manques."},{"s":77.477,"e":78.979,"t":"Sois en bonne santé et forte, Maggie."},{"s":78.979,"e":81.148,"t":"J'ai besoin que tu sois forte maintenant."},{"s":81.148,"e":83.818,"t":"Je promets je vais\ntellement mieux."},{"s":84.903,"e":85.57,"t":"Je te le promets."},{"s":86.403,"e":88.405,"t":"Je comprends que tout retombe"},{"s":88.405,"e":90.325,"t":"sur tes épaules,\nmais je vais bientôt revenir"},{"s":90.325,"e":92.452,"t":"et on sera de nouveau\nensemble là-dedans."},{"s":92.452,"e":96.079,"t":"On va être côte à côte et faire\ntout ça ensemble. D'accord ?"},{"s":97.331,"e":99.291,"t":"C'est le pire moment de ma vie."},{"s":100.001,"e":101.209,"t":"Je sais que c'est stressant."},{"s":101.209,"e":104.171,"t":"Je sais que c'est dur.\nJe reviens dimanche."},{"s":104.338,"e":105.715,"t":"C'est dans trois jours."},{"s":106.006,"e":107.717,"t":"Même les Népalais\nmaris et femmes"},{"s":107.717,"e":109.718,"t":"montrent pas d'affection\nen public."},{"s":109.718,"e":111.345,"t":"Tu ne pourras même pas\ndeviner qui est marié."},{"s":111.345,"e":112.722,"t":"C'est très différent."},{"s":114.932,"e":115.892,"t":"Ça fait combien de temps"},{"s":116.851,"e":118.144,"t":"que tu ne les as pas vus en personne ?"},{"s":119.227,"e":120.146,"t":"Deux mois ?"},{"s":122.023,"e":123.316,"t":"Oui."},{"s":130.782,"e":133.825,"t":"La vérité c'est que je\nserais effondrée si je perdais"},{"s":134.534,"e":136.496,"t":"l'un de mes enfants."},{"s":137.454,"e":139.414,"t":"Il y a une grande part de moi"},{"s":139.414,"e":142.293,"t":"j'ai l'impression de les avoir abandonnés"},{"s":142.293,"e":145.088,"t":"et je veux juste qu'ils\nsachent que je suis reconnaissante"},{"s":145.088,"e":147.423,"t":"pour chaque petit morceau\net chaque part d'eux."},{"s":157.976,"e":160.894,"t":"Cher Namraj, nous avons été inséparables"},{"s":160.894,"e":162.313,"t":"depuis le jour de ton arrivée."},{"s":162.313,"e":164.398,"t":"Tu es né le jour de mon anniversaire"},{"s":164.398,"e":165.441,"t":"et tu étais le plus beau cadeau."},{"s":165.441,"e":167.36,"t":"Je t'ai connu quand tu étais\ndans le ventre de ta maman"},{"s":167.36,"e":168.193,"t":"et tes parents sont repartis."},{"s":168.193,"e":170.863,"t":"Cher petit Bishal,\ntu es toujours si courageux."},{"s":170.863,"e":175.409,"t":"Chère Pabitra, j'adore voir ta\ngentillesse et ta sensibilité."},{"s":175.409,"e":177.494,"t":"Asmita, ta douceur est incroyable."},{"s":177.494,"e":178.579,"t":"J'adore ton sourire."},{"s":178.579,"e":180.956,"t":"Chère Kojari, dès que je t'ai vue — merci."},{"s":180.956,"e":182.332,"t":"Merci. Merci."},{"s":182.332,"e":185.253,"t":"Maya signifie amour en népalais et toi —"},{"s":185.253,"e":186.878,"t":"sont un des plus grands\namours de ma vie."},{"s":186.878,"e":191.008,"t":"Chère Shanti, tu as les plus beaux yeux —"},{"s":191.008,"e":194.177,"t":"chère Kalpana, j'ai hâte\nde te revoir bientôt -"},{"s":194.177,"e":196.764,"t":"Peux-tu chanter encore.\nTu as la plus belle voix."},{"s":196.764,"e":199.182,"t":"Cher Ganga. Cher Hari."},{"s":199.392,"e":201.727,"t":"Je leur ai dit que je\nreviendrais et je veux revenir"},{"s":201.727,"e":205.106,"t":"et je veux pouvoir\nêtre là pour eux."},{"s":205.106,"e":206.189,"t":"Je ne sais pas ce que c'est —"},{"s":206.189,"e":209.11,"t":"Je sais qu'ils luttent autant que moi."},{"s":209.11,"e":210.861,"t":"Tu es élégante, tu es intelligente."},{"s":210.861,"e":212.238,"t":"Est-ce que tu as la moindre idée\nde combien je suis fière de toi —"},{"s":212.238,"e":215.24,"t":"Tu es venue à moi quand tu étais."},{"s":215.24,"e":218.119,"t":"Malgré mes efforts -\net leur prouver que ça ira,"},{"s":218.119,"e":219.162,"t":"que tout ira bien pour nous,"},{"s":219.162,"e":220.787,"t":"qu'on va tous s'en sortir."},{"s":220.787,"e":224.207,"t":"Chère - fille - tu es venue\navec ces grands yeux brillants."},{"s":224.207,"e":228.046,"t":"Goma, c'est un — chère — je\ncrois que j'ai juste peur."},{"s":228.046,"e":229.088,"t":"Cher Krishna,"},{"s":229.088,"e":231.173,"t":"ton lien avec ta petite sœur"},{"s":231.173,"e":232.3,"t":"et la façon dont tu veilles toujours"},{"s":232.3,"e":234.26,"t":"sur elle est la chose la plus adorable."},{"s":234.26,"e":237.012,"t":"Cher Nisha, mon amour, mon rire,"},{"s":237.012,"e":239.724,"t":"mon cœur, ma joie."},{"s":244.061,"e":246.438,"t":"Je veux leur montrer\nqu'on est encore une famille."}],"hindi":[{"s":17.501,"e":18.669,"t":"मुझे लगा जैसे"},{"s":19.546,"e":21.421,"t":"मेरा एक हिस्सा वापस आ रहा है।"},{"s":22.215,"e":23.715,"t":"धीरे-धीरे-धीरे।"},{"s":29.054,"e":30.682,"t":"आज कौन सा दिन है, गोमा?"},{"s":30.682,"e":31.515,"t":"शुक्रवार!"},{"s":32.851,"e":33.976,"t":"हाँ मैं प्रगति करती हूँ।"},{"s":33.976,"e":38.356,"t":"मैं खुश होकर उठती हूँ\nऔर फिर ये सारी बकवास।"},{"s":38.356,"e":42.068,"t":"और फिर सीधे वापस, जैसे ठीक\nवहीं जहाँ से शुरू किया था।"},{"s":42.068,"e":44.361,"t":"तुम मेरा वीडियो बना रहे हो\nजो मैं वीडियो बना रही हूँ?"},{"s":44.361,"e":46.655,"t":"- अगला स्तर।\n- मैं आपका इंटरव्यू ले रही हूँ।"},{"s":46.655,"e":47.615,"t":"मैं आपका इंटरव्यू ले रही हूँ।"},{"s":47.615,"e":49.284,"t":"मैं रवि के साथ सब कुछ संभाल सकती हूँ।"},{"s":49.284,"e":51.244,"t":"मैं उसके बिना बस संभाल नहीं सकती, जैसे।"},{"s":56.331,"e":58.834,"t":"- हाय, माँ।\n- निशा!"},{"s":58.834,"e":60.753,"t":"- हाय, माँ।\n- हाय, माया।"},{"s":62.713,"e":64.715,"t":"मुझे पता है। बधाई हो।"},{"s":64.715,"e":67.01,"t":"मैं आपके सभी रिपोर्ट कार्ड\nदेखने का इंतज़ार नहीं कर सकती।"},{"s":75.726,"e":77.477,"t":"- हाय,\n- माँ। मुझे तुम्हारी याद आ रही है।"},{"s":77.477,"e":78.979,"t":"स्वस्थ और मज़ब  momento\nin cui ti ho vista... grazie."},{"s":180.956,"e":182.332,"t":"Grazie. Grazie."},{"s":182.332,"e":185.253,"t":"Maya significa amore in nepalese e tu..."},{"s":185.253,"e":186.878,"t":"Cara Sabita,\ne tu sei una"},{"s":186.878,"e":191.008,"t":"Cara\nShanti, hai gli occhi più belli..."},{"s":191.008,"e":194.177,"t":"cara Bindu,\nNon vedo l'ora di vederti -"},{"s":194.177,"e":196.764,"t":"Puoi cantare ancora?\nHai la voce più bella."},{"s":196.764,"e":199.182,"t":"Cara Ganga. Caro Hari."},{"s":199.392,"e":201.727,"t":"Ho detto\nloro che sarei tornata e voglio tornare"},{"s":201.727,"e":205.106,"t":"e\nvoglio poter essere lì per loro."},{"s":205.106,"e":206.189,"t":"Io so che"},{"s":206.189,"e":209.11,"t":"So\nche stanno faticando tanto quanto me."},{"s":209.11,"e":210.861,"t":"Sei elegante, sei intelligente."},{"s":210.861,"e":212.238,"t":"Hai idea\ndi quanto io sia orgogliosa di te..."},{"s":212.238,"e":215.24,"t":"Sei venuto da me quando eri..."},{"s":215.24,"e":218.119,"t":"Per quanto ci\nprovassi... e dimostrare loro che starò bene,"},{"s":218.119,"e":219.162,"t":"che staremo bene,"},{"s":219.162,"e":220.787,"t":"che ce la faremo tutti."},{"s":220.787,"e":224.207,"t":"Cara\nfiglia... sei venuta da me con quei grandi occhi luminosi."},{"s":224.207,"e":228.046,"t":"Goma, questa\nè una... cara... Penso di avere solo paura."},{"s":228.046,"e":229.088,"t":"Caro Krishna,"},{"s":229.088,"e":231.173,"t":"il\ntuo legame con la tua sorellina"},{"s":231.173,"e":232.3,"t":"e il\nmodo in cui ti prendi sempre cura"},{"s":232.3,"e":234.26,"t":"verso di\nlei è la cosa più dolce che ci sia."},{"s":234.26,"e":237.012,"t":"Cara Nisha, amore mio, mia risata,"},{"s":237.012,"e":239.724,"t":"il mio cuore, la mia gioia."},{"s":244.061,"e":246.438,"t":"Voglio dimostrare loro che siamo ancora una famiglia"}],"portuguese":[{"s":17.501,"e":18.669,"t":"Eu senti como se"},{"s":19.546,"e":21.421,"t":"um pedacinho de mim voltasse."},{"s":22.215,"e":23.715,"t":"Pouco a pouco a pouco."},{ let currentLang = 'english';
let currentCueIndex = -1;
let isPaused = true;
let nameEntered = false;
let player = null;
let corrections = {}; // { lang: { cueIndex: { original, correction, timecode } } }
let correctionCount = 0;

// Load saved corrections from localStorage
try {
  const saved = localStorage.getItem('bmats_corrections');
  if (saved) {
    const parsed = JSON.parse(saved);
    corrections = parsed.corrections || {};
    correctionCount = 0;
    for (const lang in corrections) {
      correctionCount += Object.keys(corrections[lang]).length;
    }
    if (parsed.reviewerName) {
      document.getElementById('reviewer-name').value = parsed.reviewerName;
    }
  }
} catch(e) {}

// ============================================================
// PASSWORD GATE
// ============================================================
const passwordMap = {};
CONFIG.languages.forEach(l => { passwordMap[l.password.toLowerCase()] = l.key; });

function tryLogin() {
  const name = document.getElementById('reviewer-name').value.trim();
  const input = document.getElementById('password-input').value.trim().toLowerCase();

  if (!name) {
    document.getElementById('pw-error').textContent = 'Please enter your name.';
    return;
  }

  const langKey = passwordMap[input];
  if (!langKey) {
    document.getElementById('pw-error').textContent = 'Incorrect password. Please try again.';
    return;
  }

  currentLang = langKey;
  nameEntered = true;
  document.getElementById('password-gate').style.display = 'none';
  document.getElementById('app').classList.add('visible');

  localStorage.setItem('bmats_corrections', JSON.stringify({
    corrections: corrections,
    reviewerName: name
  }));
  initApp();
}

document.getElementById('pw-submit').addEventListener('click', tryLogin);
// Auto-start in demo mode
setTimeout(function(){
  document.getElementById('password-gate').style.display='none';
  currentLang='english';
  if(typeof initApp==='function') initApp();
}, 200);
document.getElementById('password-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryLogin();
});
document.getElementById('reviewer-name').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('password-input').focus();
});

// ============================================================
// INIT APP
// ============================================================
function initApp() {
  buildLangTabs();
  initVimeoPlayer();
  updateCorrectionsBar();
}

// ============================================================
// LANGUAGE TABS
// ============================================================
function buildLangTabs() {
  const container = document.getElementById('lang-tabs');
  CONFIG.languages.forEach(lang => {
    const btn = document.createElement('button');
    btn.className = 'lang-tab' + (lang.key === currentLang ? ' active' : '');
    btn.textContent = lang.label;
    btn.dataset.lang = lang.key;
    btn.addEventListener('click', () => switchLanguage(lang.key));
    container.appendChild(btn);
  });
}

function switchLanguage(langKey) {
  if (langKey === 'vtt') {
    vttMode = true;
    currentCueIndex = -1;
    currentVttTopIdx = -1;
    currentVttBottomIdx = -1;
    document.getElementById('subtitle-text').textContent = '';
    document.getElementById('nepali-text').textContent = '';
    document.querySelectorAll('.lang-tab').forEach(tab => {
      tab.classList.toggle('active', tab.dataset.lang === 'vtt');
    });
    return;
  }
  vttMode = false;
  currentLang = langKey;
  currentCueIndex = -1; // Force re-render
  currentVttTopIdx = -1;
  currentVttBottomIdx = -1;
  document.getElementById('nepali-text').textContent = '';
  document.getElementById('subtitle-text').textContent = '';
  document.querySelectorAll('.lang-tab').forEach(tab => {
    tab.classList.toggle('active', tab.dataset.lang === langKey);
  });
  // Re-sync subtitle display and correction panel
  if (player) {
    player.getCurrentTime().then(t => {
      updateSubtitle(t);
      if (isPaused) showCorrectionPanel();
    });
  }
}

function initVimeoPlayer() {
  player = new Vimeo.Player('vimeo-player', {
    url: 'https://vimeo.com/' + CONFIG.vimeoVideoId + '/' + CONFIG.vimeoHash,
    width: 960,
    responsive: true,
  });

  player.on('timeupdate', data => {
    const t = CONFIG.demoMode ? data.seconds - (CONFIG.demoStartTime||0) : data.seconds;
    if(CONFIG.demoMode && t > 300) { player.pause(); return; }
    updateSubtitle(t);
    updateTimecode(t);
  });
  if(CONFIG.demoMode && CONFIG.demoStartTime) {
    player.ready().then(() => player.setCurrentTime(CONFIG.demoStartTime));
  }

  player.on('pause', () => {
    isPaused = true;
    document.getElementById('stop-btn').textContent = 'PLAY';
    document.getElementById('stop-btn').className = 'paused';
    showCorrectionPanel();
  });

  player.on('play', () => {
    isPaused = false;
    document.getElementById('stop-btn').textContent = 'STOP';
    document.getElementById('stop-btn').className = 'playing';
    const instr = document.getElementById('instruction-overlay');
    if (instr) instr.style.display = 'none';
    hideCorrectionPanel();
  });
}

function findCue(cues, time) {
  let lo = 0, hi = cues.length - 1;
  let result = -1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (cues[mid].s <= time) {
      if (cues[mid].e > time) return mid;
      result = mid;
      lo = mid + 1;
    } else {
      hi = mid - 1;
    }
  }
  return -1;
}

g here?\"", "p": "90%"}, {"s": 1813.662, "e": 1815.539, "t": "[ Host ] Hi hello.\n[ Chuckles ]", "p": "90%"}, {"s": 1815.539, "e": 1817.625, "t": "How wonderful that he's doing so well now.", "p": "90%"}, {"s": 1817.625, "e": 1820.544, "t": "[ Maggie ] He’s totally fine\nand recovered.", "p": "90%"}, {"s": 1820.544, "e": 1822.546, "t": "[ Host ] But you're 28.\n[ Baby ] Dada.", "p": "90%"}, {"s": 1822.546, "e": 1824.799, "t": "You have the responsibility of over\n50 children", "p": "90%"}, {"s": 1824.799, "e": 1826.509, "t": "and one baby.", "p": "90%"}, {"s": 1826.509, "e": 1828.511, "t": "Don't you ever compare yourself sometimes", "p": "90%"}, {"s": 1828.511, "e": 1830.513, "t": "with other 28 year olds?", "p": "90%"}, {"s": 1831.555, "e": 1832.556, "t": "All the time.", "p": "90%"}, {"s": 1832.556, "e": 1834.726, "t": "You look at your friends", "p": "90%"}, {"s": 1834.727, "e": 1836.646, "t": "[ Baby ] Dada.\n[ Maggie ] starting to get", "p": "90%"}, {"s": 1836.646, "e": 1840.23, "t": "married and have, you know,\nthat lifestyle.", "p": "90%"}, {"s": 1840.231, "e": 1842.107, "t": "I mean, imagine what my online\ndating profile", "p": "90%"}, {"s": 1842.107, "e": 1844.735, "t": "would look like, my Tinder. [ laughing ]", "p": "90%"}, {"s": 1844.735, "e": 1848.614, "t": "51 children, who wants to date me?\n[ chuckles ]", "p": "90%"}, {"s": 1848.614, "e": 1853.202, "t": "[ Kids ] ♪ We love each other like a\nsister or a brother ♪", "p": "90%"}, {"s": 1853.202, "e": 1856.205, "t": "♪ Because we are one family ♪", "p": "90%"}, {"s": 1856.205, "e": 1857.289, "t": "[ Announcer ] Ladies and gentlemen,", "p": "90%"}, {"s": 1857.289, "e": 1859.708, "t": "the 2015 CNN Hero of the Year", "p": "90%"}, {"s": 1861.544, "e": 1863.337, "t": "is Maggie Doyne.", "p": "90%"}, {"s": 1863.337, "e": 1867.424, "t": "[ crowd applauding and cheering ]\n[ kids applauding and cheering ]", "p": "90%"}, {"s": 1878.394, "e": 1882.648, "t": "I am so incredibly honoured to accept\nthis award", "p": "10%"}, {"s": 1882.648, "e": 1886.819, "t": "on behalf of all of my little heroes in\nNepal at Kopila.", "p": "10%"}, {"s": 1886.819, "e": 1890.531, "t": "I draw all of my inspiration from them.", "p": "90%"}, {"s": 1890.531, "e": 1893.158, "t": "I'm also so grateful to my\nco-founder, Tope,", "p": "90%"}, {"s": 1893.158, "e": 1895.494, "t": "who's with me here tonight.", "p": "90%"}, {"s": 1895.494, "e": 1899.498, "t": "We cannot lose sight of the task at hand.", "p": "90%"}, {"s": 1899.498, "e": 1903.669, "t": "[ mellow music / captain speaks indistinctly ]", "p": "10%"}, {"s": 1903.669, "e": 1907.172, "t": "[ Tope speaking in Nepali ]", "p": "10%"}, {"s": 1919.393, "e": 1924.398, "t": "[ children chattering / inspirational music ]", "p": "90%"}, {"s": 1925.608, "e": 1926.942, "t": "[ kids ] Woo! Woo-hoo!", "p": "90%"}, {"s": 1929.361, "e": 1934.366, "t": "[ inspirational music / group clamouring ]", "p": "90%"}, {"s": 1954.803, "e": 1957.723, "t": "[ digital distortion / gasp ]", "p": "90%"}, {"s": 1957.723, "e": 1962.728, "t": "[ camera thuds / birds chirping ]", "p": "90%"}, {"s": 1970.402, "e": 1973.489, "t": "[ Maggie offscreen ] Ravi woke up from\nhis nap,", "p": "90%"}, {"s": 1975.407, "e": 1978.577, "t": "I handed him off to one of the aunties.", "p": "90%"}, {"s": 1980.496, "e": 1984.959, "t": "and then she put him in the playpen with\nall the kids.", "p": "90%"}, {"s": 1985.834, "e": 1990.464, "t": "One of the kids took him and put him\noutside the play area.", "p": "90%"}, {"s": 1990.464, "e": 1993.092, "t": "[ muffled children / water sloshing ]", "p": "90%"}, {"s": 1993.092, "e": 1998.097, "t": "10 minutes later, I just heard screams and\nPadam ran up.", "p": "90%"}, {"s": 1998.555, "e": 2002.184, "t": "I knew by the look of horror on\nPadam face,", "p": "90%"}, {"s": 2002.184, "e": 2004.353, "t": "someone was dead or dying.", "p": "90%"}, {"s": 2006.855, "e": 2010.025, "t": "[ water sploshing ]", "p": "90%"}, {"s": 2010.025, "e": 2011.652, "t": "He was just all wet.", "p": "90%"}, {"s": 2012.569, "e": 2016.657, "t": "I got him and I immediately started CPR.", "p": "90%"}, {"s": 2016.657, "e": 2019.201, "t": "[ water sloshing ]", "p": "90%"}, {"s": 2019.201, "e": 2021.954, "t": "[ gasping ]", "p": "90%"}, {"s": 2023.747, "e": 2024.665, "t": "He was limp", "p": "90%"}, {"s": 2025.833, "e": 2027.501, "t": "and not coming back.", "p": "90%"}, {"s": 2031.839, "e": 2034.299, "t": "[ person wailing / water burbling ]", "p": "90%"}, {"s": 2034.299, "e": 2037.094, "t": "It's a horrible way for a person to die,", "p": "90%"}, {"s": 2037.094, "e": 2039.179, "t": "drowning in a septic pit.", "p": "90%"}, {"s": 2044.852, "e": 2047.855, "t": "[ melancholic music / person gagging ]", "p": "90%"}, {"s": 2054.194, "e": 2059.199, "t": "[ rain pattering / rain spraying ]", "p": "90%"}, {"s": 2060.868, "e": 2065.873, "t": "The next thing I remember is they were\ncarrying me home", "p": "90%"}, {"s": 2066.123, "e": 2070.127, "t": "and the kids all being at the gate\nscreaming and crying.", "p": "90%"}, {"s": 2070.127, "e": 2074.84, "t": "[ thunder rumbling / rain pattering ]", "p": "90%"}, {"s": 2074.84, "e": 2079.845, "t": "I kept saying, \"We're still a family.\nWe're still a family.\"", "p": "90%"}, {"s": 2080.387, "e": 2081.847, "t": "[ melancholic music ]", "p": "90%"}, {"s": 2081.847, "e": 2083.849, "t": "I just started to lose my mind.", "p": "90%"}, {"s": 2083.849, "e": 2086.393, "t": "[ water pattering / pensive music ]", "p": "90%"}, {"s": 2086.393, "e": 2090.647, "t": "[ water burbling and sploshing ]\n[ Maggie wails ]", "p": "90%"}, {"s": 2090.647, "e": 2093.525, "t": "Why do you wake up from the nap at that\nexact second?", "p": "90%"}, {"s": 2093.525, "e": 2096.653, "t": "He was fussy. Why didn't I just keep him\non my chest?", "p": "90%"}, {"s": 2096.653, "e": 2098.906, "t": "Why did she leave him to go heat up\nthe mill?", "p": "90%"}, {"s": 2098.906, "e": 2100.824, "t": "Why was nobody else looking around to\ , "t": "[ birds squawking ]", "p": "90%"}, {"s": 2451.049, "e": 2453.885, "t": "[ rain pattering ]", "p": "90%"}, {"s": 2458.723, "e": 2460.6, "t": "I would start by getting up", "p": "90%"}, {"s": 2460.6, "e": 2463.186, "t": "and going down, making tea.", "p": "90%"}, {"s": 2463.186, "e": 2464.354, "t": "That was like my brave thing,", "p": "90%"}, {"s": 2464.354, "e": 2467.482, "t": "'cause I couldn't get outta bed.", "p": "90%"}, {"s": 2467.482, "e": 2470.694, "t": "And then it was like I'm gonna go back to\nthe grocery store", "p": "90%"}, {"s": 2470.694, "e": 2472.487, "t": "or I'm gonna do this thing that Ravi", "p": "90%"}, {"s": 2472.487, "e": 2474.614, "t": "and I used to do together.", "p": "90%"}, {"s": 2474.614, "e": 2476.783, "t": "[ train rumbling ]", "p": "90%"}, {"s": 2476.783, "e": 2479.953, "t": "And then that ultimately led me to LA.", "p": "90%"}, {"s": 2482.164, "e": 2484.332, "t": "After we won CNN Heroes,", "p": "90%"}, {"s": 2484.332, "e": 2488.879, "t": "they do this non-profit\ndevelopment training.", "p": "90%"}, {"s": 2488.879, "e": 2491.715, "t": "Ravi had been travelling with me,", "p": "90%"}, {"s": 2491.715, "e": 2495.969, "t": "so I had everything booked for me and\nthe baby.", "p": "90%"}, {"s": 2495.969, "e": 2499.055, "t": "[ aeroplane rumbling ]", "p": "90%"}, {"s": 2501.516, "e": 2502.684, "t": "[ child on phone ] I love you mom.", "p": "90%"}, {"s": 2502.684, "e": 2506.521, "t": "I'll talk to you tomorrow. I love you\ntoo, bye.", "p": "90%"}, {"s": 2506.521, "e": 2507.689, "t": "[ child on phone ] Bye.", "p": "90%"}, {"s": 2511.693, "e": 2514.863, "t": "[ Maggie ] And that was when I met Jeremy.", "p": "90%"}, {"s": 2514.863, "e": 2518.116, "t": "[ mellow ukulele music ]", "p": "90%"}, {"s": 2520.076, "e": 2522.913, "t": "[ Maggie laughing behind camera ]", "p": "90%"}, {"s": 2526.875, "e": 2527.709, "t": "[ Maggie behind camera ] So good.", "p": "90%"}, {"s": 2530.003, "e": 2532.297, "t": "[ mellow ukulele music ]", "p": "90%"         document.getElementById('cue-info').textContent = allIdx >= 0 ? `Cue ${allIdx + 1} of ${total}` : '';
      } else if (tIdx >= 0) {
        const allIdx = VTT_CUES.findIndex(c => c.s === VTT_TOP[tIdx].s && c.t === VTT_TOP[tIdx].t);
        document.getElementById('cue-info').textContent = allIdx >= 0 ? `Cue ${allIdx + 1} of ${total}` : '';
      } else {
        document.getElementById('cue-info').textContent = '';
      }
    }
    return;
  }
  const cues = SUBTITLE_DATA[currentLang];
  if (!cues) return;
  const idx = findCue(cues, time);
  if (idx !== currentCueIndex) {
    currentCueIndex = idx;
    let text = idx >= 0 ? cues[idx].t : '';
    // Show corrected text if reviewer has saved a correction
    if (idx >= 0 && corrections[currentLang] && corrections[currentLang][idx]) {
      text = corrections[currentLang][idx].correction;
    }
    document.getElementById('subtitle-text').textContent = text;
    const total = cues.length;
    document.getElementById('cue-info').textContent = idx >= 0 ? `Cue ${idx + 1} of ${total}` : '';
  }
  // Nepali top track (only show when not viewing English)
  if (currentLang !== 'english') {
    const nIdx = findCue(NEPALI_CUES, time);
    if (nIdx !== currentNepaliIndex) {
      currentNepaliIndex = nIdx;
      const nText = nIdx >= 0 ? NEPALI_CUES[nIdx].t : '';
      document.getElementById('nepali-text').textContent = nText;
    }
  } else {
    document.getElementById('nepali-text').textContent = '';
  }
}

function updateTimecode(seconds) {
  const h = Math.floor(seconds / 3600);
  const m = Math.floor((seconds % 3600) / 60);
  const s = Math.floor(seconds % 60);
  document.getElementById('timecode').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

// ============================================================
// STOP / PLAY BUTTON
// ============================================================
document.getElementById('stop-btn').addEventListener('click', () => {
  if (!player || !nameEntered) return;
  if (isPaused) {
    player.play();
  } else {
    player.pause();
  }
});

// Spacebar toggle
document.addEventListener('keydown', e => {
  if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
    e.preventDefault();
    if (!player || !nameEntered) return;
    if (isPaused) player.play(); else player.pause();
  }
});

// Previous / Next cue
function jumpToCue(target) {
  if (!player || !nameEntered) return;
  const cues = vttMode ? VTT_CUES : SUBTITLE_DATA[currentLang];
  if (!cues || target < 0 || target >= cues.length) return;
  player.setCurrentTime(cues[target].s + (CONFIG.demoMode ? CONFIG.demoStartTime||0 : 0)).then(() => {
    currentCueIndex = target;
    let jumpText = cues[target].t;
    if (corrections[currentLang] && corrections[currentLang][target]) {
      jumpText = corrections[currentLang][target].correction;
    }
    document.getElementById('subtitle-text').textContent = jumpText;
    document.getElementById('cue-info').textContent = `Cue ${target + 1} of ${cues.length}`;
    updateTimecode(cues[target].s);
    if (isPaused) showCorrectionPanel();
  });
}

// Find nearest cue index at or before a given time
function findNearestCue(cues, time) {
  let lo = 0, hi = cues.length - 1, best = 0;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    if (cues[mid].s <= time) { best = mid; lo = mid + 1; }
    else { hi = mid - 1; }
  }
  return best;
}

document.getElementById('prev-cue-btn').addEventListener('click', () => {
  if (!player || !nameEntered) return;
  const cues = vttMode ? VTT_CUES : SUBTITLE_DATA[currentLang];
  if (!cues || !cues.length) return;
  if (currentCueIndex > 0) {
    jumpToCue(currentCueIndex - 1);
  } else {
    player.getCurrentTime().then(t => {
      const nearest = findNearestCue(cues, t);
      jumpToCue(nearest > 0 ? nearest - 1 : 0);
    });
  }
});

document.getElementById('next-cue-btn').addEventListener('click', () => {
  if (!player || !nameEntered) return;
  const cues = vttMode ? VTT_CUES : SUBTITLE_DATA[currentLang];
  if (!cues || !cues.length) return;
  if (currentCueIndex >= 0) {
    jumpToCue(Math.min(currentCueIndex + 1, cues.length - 1));
  } else {
    player.getCurrentTime().then(t => {
      const nearest = findNearestCue(cues, t);
      jumpToCue(Math.min(nearest + 1, cues.length - 1));
    });
  }
});

// ============================================================
// CORRECTION PANEL
// ============================================================
function showCorrectionPanel() {
  const panel = document.getElementById('correction-panel');
  const cues = SUBTITLE_DATA[currentLang];
  if (currentCueIndex < 0 || !cues || !cues[currentCueIndex]) {
    panel.classList.remove('visible');
    return;
  }
  const cue = cues[currentCueIndex];
  const original = cue.t;
  if (!original) { panel.classList.remove('visible'); return; }

  document.getElementById('correction-original').textContent = original;

  // Check if there's already a correction for this cue
  const existing = corrections[currentLang] && corrections[currentLang][currentCueIndex];
  document.getElementById('correction-textarea').value = existing ? existing.correction : original;

  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = '';
  panel.classList.add('visible');
}

function hideCorrectionPanel() {
  document.getElementById('correction-panel').classList.remove('visible');
}

// Close panel and resume
document.getElementById('close-panel-btn').addEventListener('click', () => {
  hideCorrectionPanel();
  if (player) player.play();
});

// Save correction
document.getElementById('save-correction-btn').addEventListener('click', saveCorrection);

function saveCorrection() {
  const cues = SUBTITLE_DATA[currentLang];
  if (currentCueIndex < 0 || !cues[currentCueIndex]) return;

  const original = cues[currentCueIndex].t;
  const corrected = document.getElementById('correction-textarea').value.trim();
  if (corrected === original) {
    document.getElementById('save-status').textContent = 'No changes detected';
    document.getElementById('save-status').className = '';
    return;
  }

  const cue = cues[currentCueIndex];
  const timecode = secsToTC(cue.s) + ' --> ' + secsToTC(cue.e);
  const langLabel = CONFIG.languages.find(l => l.key === currentLang)?.label || currentLang;
  const reviewer = document.getElementById('reviewer-name').value.trim() || 'Anonymous';

  // Store locally
  if (!corrections[currentLang]) corrections[currentLang] = {};
  corrections[currentLang][currentCueIndex] = {
    original: original,
    correction: corrected,
    timecode: timecode,
    cueNum: currentCueIndex + 1
  };
  correctionCount = 0;
  for (const lang in corrections) correctionCount += Object.keys(corrections[lang]).length;

  // Save to localStorage
  localStorage.setItem('bmats_corrections', JSON.stringify({
    corrections: corrections,
    reviewerName: reviewer
  }));

  updateCorrectionsBar();

  // Show saved immediately (localStorage is already done)
  document.getElementById('save-status').textContent = 'Saved';
  document.getElementById('save-status').className = 'success';

  // Send to Google Sheet in background
  if (CONFIG.sheetsUrl) {
    fetch(CONFIG.sheetsUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        language: langLabel,
        cueNum: currentCueIndex + 1,
        timecode: timecode,
        original: original,
        correction: corrected,
        reviewer: reviewer,
        date: new Date().toISOString().split('T')[0]
      })
    }).catch(() => {});
  }
}

// Reset - restore original subtitle text in the textarea
document.getElementById('reset-btn').addEventListener('click', () => {
  const original = document.getElementById('correction-original').textContent;
  document.getElementById('correction-textarea').value = original;
  document.getElementById('save-status').textContent = '';
  document.getElementById('save-status').className = '';
});


function secsToTC(secs) {
  const h = Math.floor(secs / 3600);
  const m = Math.floor((secs % 3600) / 60);
  const s = Math.floor(secs % 60);
  const ms = Math.round((secs % 1) * 1000);
  return String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' +
         String(s).padStart(2,'0') + ',' + String(ms).padStart(3,'0');
}

function updateCorrectionsBar() {
  const bar = document.getElementById('corrections-bar');
  if (correctionCount > 0) {
    bar.classList.add('visible');
    document.getElementById('corrections-count').textContent =
      correctionCount + ' correction' + (correctionCount !== 1 ? 's' : '') + ' saved';
  } else {
    bar.classList.remove('visible');
  }
}
</script>

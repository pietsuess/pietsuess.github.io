<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301.72 228.21">
  <style>
    .draw {
      fill: transparent;
      stroke: #fff;
      stroke-width: 1.5;
      stroke-dasharray: 800;
      stroke-dashoffset: 800;
      animation: drawIn 2s ease-out forwards, fillIn 0.6s ease-in 1.8s forwards;
    }
    .draw.p-letter { animation-delay: 0s, 1.8s; }
    .draw.s-letter { animation-delay: 0.3s, 2.1s; }
    .sq {
      fill: transparent;
      stroke: #fff;
      stroke-width: 1.5;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation:
        drawSq 0.8s ease-out forwards,
        fillIn 0.4s ease-in forwards,
        tumbleAfter 5s ease-in-out infinite;
    }
    .sq1 {
      transform-origin: 50px 176px;
      animation-delay: 1s, 1.6s, 2.8s;
    }
    .sq2 {
      transform-origin: 50px 39px;
      animation-delay: 0.7s, 1.3s, 2.8s;
    }
    .sq3 {
      transform-origin: 268px 61px;
      animation-delay: 1.2s, 1.8s, 2.8s;
    }
    .sq4 {
      transform-origin: 157px 170px;
      animation-delay: 0.9s, 1.5s, 2.8s;
    }

    @keyframes drawIn {
      to { stroke-dashoffset: 0; }
    }
    @keyframes drawSq {
      to { stroke-dashoffset: 0; }
    }
    @keyframes fillIn {
      to { fill: #fff; }
    }
    @keyframes tumbleAfter {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-5px,-3px) rotate(-25deg); }
      50%  { transform: translate(2px,-6px) rotate(10deg); }
      75%  { transform: translate(5px,3px) rotate(25deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
  </style>

  <!-- P letter — draws then fills -->

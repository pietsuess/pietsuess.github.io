  <path class="sq sq4" d="M174.11,172.73l-11.49,13.52c-2.31,2.72-6.39,3.05-9.11.74l-13.52-11.49c-2.72-2.31-3.05-6.39-.74-9.11l11.49-13.52c2.31-2.72,6.39-3.05,9.11-.74l13.52,11.49c2.72,2.31,3.05,6.39.74,9.11Z"/>

  <path class="sq sq2" d="M34.73,47.51v-17.74c0-3.57,2.89-6.46,6.46-6.46h17.74c3.57,0,6.46,2.89,6.46,6.46v17.74c0,3.57-2.89,6.46-6.46,6.46h-17.74c-3.57,0-6.46-2.89-6.46-6.46Z"/>

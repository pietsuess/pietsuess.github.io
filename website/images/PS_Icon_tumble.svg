<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 301.72 228.21">
  <style>
    .letters { fill: #fff; }
    .sq1 { fill: #fff; transform-origin: 50px 176px; animation: tumble1 5s ease-in-out infinite; }
    .sq2 { fill: #fff; transform-origin: 50px 39px; animation: tumble2 6s ease-in-out infinite; }
    .sq3 { fill: #fff; transform-origin: 268px 61px; animation: tumble3 4.5s ease-in-out infinite; }
    .sq4 { fill: #fff; transform-origin: 157px 170px; animation: tumble4 7s ease-in-out infinite; }

    @keyframes tumble1 {
      0%   { transform: translate(0,0) rotate(0deg); }
      25%  { transform: translate(-6px,-4px) rotate(-25deg); }
      50%  { transform: translate(-2px,-8px) rotate(0deg); }
      75%  { transform: translate(4px,-3px) rotate(20deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes tumble2 {
      0%   { transform: translate(0,0) rotate(0deg); }
      20%  { transform: translate(5px,-5px) rotate(25deg); }
      45%  { transform: translate(8px,2px) rotate(-10deg); }
      70%  { transform: translate(3px,6px) rotate(-25deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes tumble3 {
      0%   { transform: translate(0,0) rotate(0deg); }
      30%  { transform: translate(4px,5px) rotate(25deg); }
      55%  { transform: translate(-3px,8px) rotate(-15deg); }
      80%  { transform: translate(-6px,2px) rotate(-25deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
    @keyframes tumble4 {
      0%   { transform: translate(0,0) rotate(0deg); }
      20%  { transform: translate(-5px,4px) rotate(-20deg); }
      40%  { transform: translate(-8px,-2px) rotate(25deg); }
      60%  { transform: translate(-2px,-7px) rotate(10deg); }
      80%  { transform: translate(4px,-4px) rotate(-25deg); }
      100% { transform: translate(0,0) rotate(0deg); }
    }
  </style>

  <!-- P letter with counter -->

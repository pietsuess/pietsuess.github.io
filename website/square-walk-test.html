<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Walk Test</title>
  <style>
    body { margin: 0; background: #1a0e2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c" width="900" height="400"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const groundY = 250;
const size = 40;
const speed = 50; // pixels per second

// 4 walkers with different sizes, positions, directions
const walkers = [
  { size: 40, groundY: 150, x0: 50,  dir: 1,  dist: 0, speed: 50 },
  { size: 30, groundY: 250, x0: 850, dir: -1, dist: 0, speed: 40 },
  { size: 50, groundY: 350, x0: 100, dir: 1,  dist: 0, speed: 60 },
  { size: 35, groundY: 60,  x0: 800, dir: -1, dist: 0, speed: 45 },
];

let lastTime = null;

function animate(time) {
  if (!lastTime) lastTime = time;
  const dt = (time - lastTime) / 1000;
  lastTime = time;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (const w of walkers) {
    // Ground line
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(30, w.groundY);
    ctx.lineTo(870, w.groundY);
    ctx.stroke();

    w.dist += w.speed * dt;

    const steps = w.dist / w.size;
    const stepIdx = Math.floor(steps);
    const frac = steps - stepIdx;

    // Gravity easing
    const eased = frac < 0.5
      ? 0.5 * Math.pow(frac * 2, 0.7)
      : 1 - 0.5 * Math.pow((1 - frac) * 2, 0.7);
    const tipAngle = eased * (Math.PI / 2);

    // Pivot = leading bottom corner after stepIdx full steps
    const pivotX = w.x0 + (stepIdx + 1) * w.size * w.dir;
    const pivotY = w.groundY;

    // Wrap if off screen
    if (pivotX > 900 || pivotX < 0) {
      w.dist = 0;
      continue;
    }

    ctx.save();
    ctx.translate(pivotX, pivotY);
    if (w.dir < 0) ctx.scale(-1, 1);
    ctx.rotate(tipAngle);

    // Draw square with rounded corners
    const s = w.size;
    const r = s * 0.15;
    ctx.beginPath();
    ctx.moveTo(-s + r, -s);
    ctx.lineTo(-r, -s);
    ctx.quadraticCurveTo(0, -s, 0, -s + r);
    ctx.lineTo(0, -r);
    ctx.quadraticCurveTo(0, 0, -r, 0);
    ctx.lineTo(-s + r, 0);
    ctx.quadraticCurveTo(-s, 0, -s, -r);
    ctx.lineTo(-s, -s + r);
    ctx.quadraticCurveTo(-s, -s, -s + r, -s);
    ctx.closePath();
    ctx.fillStyle = '#fff';
    ctx.fill();

    ctx.restore();
  }

  requestAnimationFrame(animate);
}
requestAnimationFrame(animate);
</script>
</body>
</html>

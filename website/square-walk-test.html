<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Walk Test</title>
  <style>
    body { margin: 0; background: #1a0e2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c" width="800" height="300"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const size = 40;
const groundY = 200;
const startX = 100;
const totalSteps = 6;
const stepDur = 600; // ms per tip
const totalDur = totalSteps * stepDur;

// A square "walks" by pivoting on its leading bottom corner.
// Each step: rotate 90° around that corner.
// The pivot corner is at (startX + step * size, groundY) for step N.
// During rotation, the square rotates from 0 to 90° around that pivot.

function draw(time) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Ground line
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(50, groundY);
  ctx.lineTo(750, groundY);
  ctx.stroke();

  const t = (time % totalDur) / stepDur; // fractional step index
  const step = Math.floor(t);
  const frac = t - step; // 0..1 within current step

  // Ease: slight decelerate then accelerate (like gravity tipping)
  const eased = frac < 0.5
    ? 0.5 * Math.pow(frac * 2, 0.7)
    : 1 - 0.5 * Math.pow((1 - frac) * 2, 0.7);

  const angle = eased * (Math.PI / 2); // 0 to 90°

  // Pivot point: leading bottom-right corner of the square at rest
  const pivotX = startX + step * size + size;
  const pivotY = groundY;

  ctx.save();
  ctx.translate(pivotX, pivotY);
  ctx.rotate(angle);

  // Draw square: at rest, the square sits with bottom-right at origin
  // So top-left is (-size, -size), bottom-right is (0, 0)
  ctx.fillStyle = '#fff';
  ctx.fillRect(-size, -size, size, size);

  // Subtle outline
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(-size, -size, size, size);

  ctx.restore();

  // Pivot dot
  ctx.fillStyle = '#e8735a';
  ctx.beginPath();
  ctx.arc(pivotX, pivotY, 3, 0, Math.PI * 2);
  ctx.fill();

  requestAnimationFrame(draw);
}
requestAnimationFrame(draw);
</script>
</body>
</html>

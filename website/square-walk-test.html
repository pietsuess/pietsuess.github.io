<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Square Walk — PS Outline</title>
  <style>
    body { margin: 0; background: #1a0e2e; display: flex; align-items: center; justify-content: center; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c" width="900" height="700"></canvas>

<!-- Hidden SVG for path sampling -->
<svg id="pathSVG" style="position:absolute;width:0;height:0;overflow:hidden;" viewBox="0 0 301.72 228.21">
  <path id="pOuter" d="M156.79,91.23v-.32c0-24.5-18.02-38.88-45.99-38.88h-40.95c-3.57,0-6.46,2.89-6.46,6.46v97.7c0,3.57,2.89,6.46,6.46,6.46h17.74c3.57,0,6.46-2.89,6.46-6.46v-18.69c0-3.57,2.89-6.46,6.46-6.46h8.71c27.5,0,47.57-13.75,47.57-39.83Z"/>
  <path id="sPath" d="M252.45,128.21v.32c0,22.6-17.86,36.03-44.72,36.03-17.11,0-33.5-4.7-46.43-13.99-3.05-2.19-3.58-6.52-1.17-9.39l8.96-10.7c2.13-2.55,5.83-3.03,8.6-1.18,9.65,6.45,20.17,9.82,31.16,9.82,8.22,0,12.64-2.84,12.64-7.59v-.32c0-4.58-3.63-7.11-18.65-10.59-23.55-5.37-41.72-12.01-41.72-34.77v-.32c0-20.54,16.28-35.4,42.83-35.4,16.05,0,29.11,3.68,40.06,10.76,3.09,1.99,3.88,6.17,1.76,9.16l-8.07,11.4c-1.95,2.75-5.67,3.5-8.59,1.81-8.67-5.03-17.75-7.68-25.95-7.68-7.43,0-11.06,3.16-11.06,7.11v.32c0,5.06,3.79,7.27,19.12,10.75,25.44,5.53,41.25,13.75,41.25,34.45Z"/>
</svg>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Scale factor: viewBox is 301.72 x 228.21, canvas is 900 x 700
const scale = 2.8;
const offsetX = 40;
const offsetY = 80;

// Sample points along SVG paths
function samplePath(pathId, numSamples) {
  const path = document.getElementById(pathId);
  const totalLen = path.getTotalLength();
  const points = [];

  for (let i = 0; i < numSamples; i++) {
    const t = (i / numSamples) * totalLen;
    const pt = path.getPointAtLength(t);
    // Also get a point slightly ahead for tangent
    const pt2 = path.getPointAtLength(t + 0.5);
    const angle = Math.atan2(pt2.y - pt.y, pt2.x - pt.x);
    points.push({ x: pt.x, y: pt.y, angle: angle });
  }

  return { points, totalLen, numSamples };
}

// Get interpolated point at distance along sampled path
function getPointAt(sampled, dist) {
  const d = ((dist % sampled.totalLen) + sampled.totalLen) % sampled.totalLen;
  const frac = d / sampled.totalLen;
  const idx = frac * sampled.numSamples;
  const i = Math.floor(idx) % sampled.numSamples;
  const j = (i + 1) % sampled.numSamples;
  const t = idx - Math.floor(idx);

  const a = sampled.points[i];
  const b = sampled.points[j];

  // Interpolate angle carefully (handle wrapping)
  let da = b.angle - a.angle;
  if (da > Math.PI) da -= 2 * Math.PI;
  if (da < -Math.PI) da += 2 * Math.PI;

  return {
    x: a.x + (b.x - a.x) * t,
    y: a.y + (b.y - a.y) * t,
    angle: a.angle + da * t
  };
}

// Sample paths
const pSampled = samplePath('pOuter', 400);
const sSampled = samplePath('sPath', 400);

// Canvas Path2D for drawing filled letters
const letterPath = new Path2D(
  "M156.79,91.23v-.32c0-24.5-18.02-38.88-45.99-38.88h-40.95c-3.57,0-6.46,2.89-6.46,6.46v97.7c0,3.57,2.89,6.46,6.46,6.46h17.74c3.57,0,6.46-2.89,6.46-6.46v-18.69c0-3.57,2.89-6.46,6.46-6.46h8.71c27.5,0,47.57-13.75,47.57-39.83ZM126.13,92.65c0,8.69-6.64,14.38-17.54,14.38h-8.08c-3.57,0-6.46-2.89-6.46-6.46v-16.32c0-3.57,2.89-6.46,6.46-6.46h7.92c11.06,0,17.7,5.06,17.7,14.54v.32Z " +
  "M252.45,128.21v.32c0,22.6-17.86,36.03-44.72,36.03-17.11,0-33.5-4.7-46.43-13.99-3.05-2.19-3.58-6.52-1.17-9.39l8.96-10.7c2.13-2.55,5.83-3.03,8.6-1.18,9.65,6.45,20.17,9.82,31.16,9.82,8.22,0,12.64-2.84,12.64-7.59v-.32c0-4.58-3.63-7.11-18.65-10.59-23.55-5.37-41.72-12.01-41.72-34.77v-.32c0-20.54,16.28-35.4,42.83-35.4,16.05,0,29.11,3.68,40.06,10.76,3.09,1.99,3.88,6.17,1.76,9.16l-8.07,11.4c-1.95,2.75-5.67,3.5-8.59,1.81-8.67-5.03-17.75-7.68-25.95-7.68-7.43,0-11.06,3.16-11.06,7.11v.32c0,5.06,3.79,7.27,19.12,10.75,25.44,5.53,41.25,13.75,41.25,34.45Z"
);

// Walkers
const walkers = [
  { sampled: pSampled, size: 8, speed: 40, offset: 0, outward: -1 },
  { sampled: pSampled, size: 6, speed: -30, offset: 100, outward: -1 },
  { sampled: sSampled, size: 7, speed: 35, offset: 0, outward: -1 },
  { sampled: sSampled, size: 5, speed: -25, offset: 80, outward: -1 },
];

let startTime = null;

function animate(time) {
  if (!startTime) startTime = time;
  const elapsed = (time - startTime) / 1000;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(offsetX, offsetY);
  ctx.scale(scale, scale);

  // Draw letters
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fill(letterPath, 'evenodd');

  // Draw walkers
  for (const w of walkers) {
    const dist = w.speed * elapsed + w.offset;
    const absDist = Math.abs(dist);
    const totalLen = w.sampled.totalLen;
    const loopDist = ((absDist % totalLen) + totalLen) % totalLen;

    const steps = loopDist / w.size;
    const stepIdx = Math.floor(steps);
    const frac = steps - stepIdx;

    // Gravity easing
    const eased = frac < 0.5
      ? 0.5 * Math.pow(frac * 2, 0.7)
      : 1 - 0.5 * Math.pow((1 - frac) * 2, 0.7);
    const tipAngle = eased * (Math.PI / 2);

    // Pivot point on the path
    const pivotDist = (stepIdx + 1) * w.size;
    const signedPivotDist = w.speed > 0 ? pivotDist : totalLen - pivotDist;
    const pivot = getPointAt(w.sampled, signedPivotDist + w.offset);

    // Ground angle at pivot
    const groundAngle = w.speed > 0 ? pivot.angle : pivot.angle + Math.PI;

    ctx.save();
    ctx.translate(pivot.x, pivot.y);

    // Align with ground tangent, outward normal is perpendicular
    // Rotate so that "up" for the square is outward from the letter
    ctx.rotate(groundAngle);

    // Tip the square
    ctx.rotate(tipAngle);

    // Draw square: sits on the ground extending outward (upward in local coords)
    // Bottom-right corner at origin, body goes left and up
    const s = w.size;
    const r = s * 0.15;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(-s + r, -s);
    ctx.lineTo(-r, -s);
    ctx.quadraticCurveTo(0, -s, 0, -s + r);
    ctx.lineTo(0, -r);
    ctx.quadraticCurveTo(0, 0, -r, 0);
    ctx.lineTo(-s + r, 0);
    ctx.quadraticCurveTo(-s, 0, -s, -r);
    ctx.lineTo(-s, -s + r);
    ctx.quadraticCurveTo(-s, -s, -s + r, -s);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  ctx.restore();
  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Animation Test</title>
  <style>
    body { margin: 0; background: #1a0e2e; color: #fff; font-family: system-ui; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; gap: 60px; }
    h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 3px; opacity: 0.5; margin: 0; }
    .preview { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .sizes { display: flex; gap: 40px; align-items: flex-end; }
    .size-label { font-size: 11px; opacity: 0.4; text-align: center; margin-top: 8px; }
    img { display: block; }
  </style>
</head>
<body>
  <div class="preview">
    <h2>Tumble — Squares rotate 25 deg and drift</h2>
    <div class="sizes">
      <div>
        <img src="images/PS_Icon_tumble.svg" style="height:40px;">
        <div class="size-label">40px (header)</div>
      </div>
      <div>
        <img src="images/PS_Icon_tumble.svg" style="height:80px;">
        <div class="size-label">80px</div>
      </div>
      <div>
        <img src="images/PS_Icon_tumble.svg" style="height:160px;">
        <div class="size-label">160px</div>
      </div>
    </div>
  </div>

  <div class="preview">
    <h2>Unveil — Stroke draws in, fills, then squares tumble</h2>
    <div class="sizes">
      <div>
        <img src="images/PS_Icon_unveil.svg" style="height:40px;">
        <div class="size-label">40px (header)</div>
      </div>
      <div>
        <img src="images/PS_Icon_unveil.svg" style="height:80px;">
        <div class="size-label">80px</div>
      </div>
      <div>
        <img src="images/PS_Icon_unveil.svg" style="height:160px;">
        <div class="size-label">160px</div>
      </div>
    </div>
  </div>

  <p style="opacity:0.3;font-size:12px;">Reload page to replay unveil animation</p>
</body>
</html>

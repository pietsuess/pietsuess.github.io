<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Piet Suess</title>
  <link rel="icon" href="images/PS_Icon.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&family=Urbanist:wght@400;700&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0; padding: 0;
      background: #FAFFA5; color: #222;
      font-family: 'Poppins', sans-serif;
      font-size: 15px; line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    a { text-decoration: none; color: inherit; }

    /* Header */
    .site-header {
      display: flex; align-items: center; justify-content: space-between;
      max-width: 1400px; margin: 0 auto;
      padding: 0.1vw 4vw;
    }
    .site-logo img { height: 50px; display: block; }

    .site-nav { display: flex; gap: 28px; align-items: center; }
    .site-nav a {
      font-size: 16px; font-weight: 400;
      position: relative; padding: 1.6px 0;
    }
    .site-nav a::after {
      content: ''; position: absolute; bottom: 0; left: 0;
      width: 0; height: 1px; background: currentColor;
      transition: width 0.25s ease;
    }
    .site-nav a:hover::after { width: 100%; }

    .site-social { display: flex; gap: 15px; align-items: center; }
    .site-social a {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 50%;
      box-shadow: 0 0 0 2px currentColor inset;
      transition: opacity 0.2s;
    }
    .site-social a:hover { opacity: 0.6; }
    .site-social svg { width: 18px; height: 18px; fill: currentColor; }

    /* Hamburger (mobile) */
    .hamburger {
      display: none; flex-direction: column; justify-content: center;
      gap: 5px; cursor: pointer; background: none; border: none;
      padding: 6px; z-index: 110;
    }
    .hamburger span {
      display: block; width: 24px; height: 2px; background: #1a1a1a;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-nav-overlay {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(250, 255, 165, 0.97);
      z-index: 105; flex-direction: column;
      align-items: center; justify-content: center; gap: 30px;
    }
    .mobile-nav-overlay.open { display: flex; }
    .mobile-nav-overlay a { font-size: 22px; font-weight: 400; }

    /* Hero */
    .hero {
      text-align: center;
      padding: clamp(40px, 8vh, 80px) 0 clamp(20px, 4vh, 40px);
    }
    .hero h1 {
      font-family: 'Urbanist', sans-serif;
      font-size: clamp(28px, 4vw, 48px);
      font-weight: 400; letter-spacing: -0.5px; color: #111;
      margin: 0 0 8px;
    }
    .hero p {
      font-size: clamp(13px, 1.6vw, 16px);
      color: #888; letter-spacing: 0.5px;
      margin: 0;
    }

    /* Choices */
    .choices {
      display: flex; align-items: center; justify-content: center;
      gap: clamp(24px, 5vw, 60px);
      padding: clamp(20px, 4vh, 40px) 0 clamp(60px, 10vh, 120px);
    }

    .choice {
      display: flex; flex-direction: column; align-items: center;
      text-decoration: none; cursor: pointer;
      transition: transform 0.25s ease;
    }
    .choice:hover { transform: scale(1.03); }

    .flat-icon {
      width: clamp(120px, 18vw, 200px); height: auto;
      transition: opacity 0.25s;
    }
    .choice:hover .flat-icon { opacity: 0.6; }

    .arcade-img {
      width: auto; height: auto;
      zoom: 3;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      transition: filter 0.25s;
    }
    .choice:hover .arcade-img {
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.15));
    }

    .choice-label {
      margin-top: clamp(10px, 1.5vh, 16px);
      font-size: clamp(11px, 1.4vw, 14px);
      letter-spacing: 2px; color: #aaa;
      transition: color 0.25s;
    }
    .choice:hover .choice-label { color: #555; }

    /* Footer */
    .site-footer {
      background: #1a1a1a; padding: 40px 4vw;
    }
    .footer-inner {
      display: flex; align-items: center; justify-content: center; gap: 20px;
    }
    .footer-inner a { display: flex; align-items: center; justify-content: center; }
    .footer-inner svg {
      width: 20px; height: 20px;
      fill: #fff; transition: opacity 0.2s;
    }
    .footer-inner a:hover svg { opacity: 0.6; }

    /* Entrance animation */
    @keyframes entranceFadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .entrance { opacity: 0; animation: entranceFadeUp 0.5s ease forwards; }
    .entrance-d1 { animation-delay: 0.1s; }
    .entrance-d2 { animation-delay: 0.3s; }
    .entrance-d3 { animation-delay: 0.5s; }

    /* Mobile */
    @media (max-width: 768px) {
      .site-nav, .site-social { display: none; }
      .hamburger { display: flex; margin-left: auto; }
      .site-logo img { height: 36px; }
      .site-header { padding: 12px 20px; }
      .choices { flex-direction: column; gap: 32px; }
    }
  </style>
</head>

<script>
  // Hamburger menu
  const hamburger = document.querySelector('.hamburger');
  const overlay = document.querySelector('.mobile-nav-overlay');
  if (hamburger) {
    hamburger.addEventListener('click', () => {
      hamburger.classList.toggle('open');
      overlay.classList.toggle('open');
    });
    overlay.querySelectorAll('a').forEach(a => {
      a.addEventListener('click', () => {
        hamburger.classList.remove('open');
        overlay.classList.remove('open');
      });
    });
  }
</script>

<!DOCTYPE html>
<html lang="en-CA">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SSICOL Logo Animations</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Urbanist:wght@300;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg: #FAF5A5; --text: #1a1a1a; --rule: #d4d09a; --muted: #6b6840; }
  html { font-size: 18px; scroll-behavior: smooth; }
  body { background: var(--bg); color: var(--text); font-family: 'Poppins', sans-serif; }

  .page-title {
    font-family: 'Urbanist', sans-serif; font-weight: 900;
    font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: -0.02em;
    padding: 3rem 4rem 1rem; color: var(--text);
  }
  .page-sub {
    font-size: 0.8rem; color: var(--muted); padding: 0 4rem 3rem;
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  .example {
    border-top: 1px solid var(--rule);
    padding: 4rem;
  }
  .example-label {
    font-family: 'Poppins', sans-serif;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2.5rem;
  }
  .logo-wrap {
    width: 70%; max-width: 800px; margin: 0 auto;
  }
  .logo-wrap svg {
    width: 100%; display: block;
  }
  .logo-wrap svg path {
    fill: none; stroke: #1a1a1a; stroke-width: 1.2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  @media (max-width: 820px) {
    .page-title, .page-sub, .example { padding-left: 1.5rem; padding-right: 1.5rem; }
    .logo-wrap { width: 90%; }
  }
</style>
</head>

<div style="height: 4rem;"></div>

<script>
// ── Shared: split paths into n segments ──
function setupSegments(container, n) {
  const allEls = [];
  [...container.querySelectorAll('svg path')].forEach((path) => {
    const len = path.getTotalLength();
    const e = len / n;
    const els = [path];
    for (let i = 0; i < n - 1; i++) {
      const c = path.cloneNode(true);
      path.parentNode.appendChild(c);
      els.push(c);
    }
    els.forEach((el, i) => {
      const offStart = i % 2 === 0 ? -i * e : -(i + 1) * e;
      const offEnd   = i % 2 === 0 ? -i * e : -i * e;
      el.style.strokeDasharray = `0 ${len}`;
      el.style.strokeDashoffset = offStart;
      allEls.push({ el, len, e, offStart, offEnd });
    });
  });
  return allEls;
}

// ══════════════════════════════════════════════
// EXAMPLE 1: 16-point cycling (same as landing)
// ══════════════════════════════════════════════
{
  const els = setupSegments(document.getElementById('ex1'), 16);
  const dur = 6000, pause = 4000, easing = 'cubic-bezier(0.25, 0, 0.65, 0.85)';

  function drawIn() {
    return Promise.all(els.map(({ el, len, e, offStart, offEnd }) =>
      el.animate([
        { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
        { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
      ], { duration: dur, easing, fill: 'forwards' }).finished
    ));
  }
  function drawOut() {
    return Promise.all(els.map(({ el, len, e, offStart, offEnd }) =>
      el.animate([
        { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
        { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
      ], { duration: dur, easing, fill: 'forwards' }).finished
    ));
  }
  async function cycle() {
    while (true) {
      await drawIn();
      await new Promise(r => setTimeout(r, pause));
      await drawOut();
      await new Promise(r => setTimeout(r, 800));
    }
  }
  cycle();
}

// ══════════════════════════════════════════════
// EXAMPLE 2: Sequential segments, left to right
// ══════════════════════════════════════════════
{
  const n = 16;
  const allSegs = []; // flat list across all letters, in path order
  [...document.querySelectorAll('#ex2 svg path')].forEach((path) => {
    const len = path.getTotalLength();
    const e = len / n;
    const els = [path];
    for (let i = 0; i < n - 1; i++) {
      const c = path.cloneNode(true);
      path.parentNode.appendChild(c);
      els.push(c);
    }
    els.forEach((el, i) => {
      el.style.strokeDasharray = `0 ${len}`;
      el.style.strokeDashoffset = -i * e;
      el.style.opacity = 0;
      allSegs.push({ el, len, e, segIndex: i });
    });
  });

  const totalSegs = allSegs.length; // 6 letters x 16 = 96
  const segDur = 120;  // ms per segment appearance
  const holdDur = 4000;
  const fadeDur = 300;

  async function showSequential() {
    // Show segments one by one, left to right
    for (let s = 0; s < totalSegs; s++) {
      const { el, len, e, segIndex } = allSegs[s];
      el.style.strokeDasharray = `${e} ${len - e}`;
      el.style.strokeDashoffset = -segIndex * e;
      el.animate([{ opacity: 0 }, { opacity: 1 }], { duration: fadeDur, fill: 'forwards' });
      await new Promise(r => setTimeout(r, segDur));
    }
  }

  async function hideSequential() {
    // Hide segments one by one, left to right
    for (let s = 0; s < totalSegs; s++) {
      const { el } = allSegs[s];
      el.animate([{ opacity: 1 }, { opacity: 0 }], { duration: fadeDur, fill: 'forwards' });
      await new Promise(r => setTimeout(r, segDur));
    }
  }

  async function cycle2() {
    while (true) {
      await showSequential();
      await new Promise(r => setTimeout(r, holdDur));
      await hideSequential();
      await new Promise(r => setTimeout(r, 800));
    }
  }
  cycle2();
}
</script>

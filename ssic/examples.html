<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    font-size: clamp(1.5rem, 4vw, 2.5rem); letter-spacing: -0.02em;
    padding: 3rem 4rem 1rem; color: var(--text);

    font-size: 0.8rem; color: var(--muted); padding: 0 4rem 3rem;
    letter-spacing: 0.1em; text-transform: uppercase;

    border-top: 1px solid var(--rule);
    padding: 4rem;
  }
  .example-label {
    font-family: 'Poppins', sans-serif;
    font-size: 0.65rem; font-weight: 600;
    letter-spacing: 0.3em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 2.5rem;
  }
  .logo-wrap {
    width: 70%; max-width: 800px; margin: 0 auto;
  }
  .logo-wrap svg { width: 100%; display: block; }
  .stroke-logo path {
    fill: none; stroke: #1a1a1a; stroke-width: 1.2;
    stroke-linecap: round; stroke-linejoin: round;
  }

  @media (max-width: 820px) {
    .page-title, .page-sub, .example { padding-left: 1.5rem; padding-right: 1.5rem; }
    .logo-wrap { width: 90%; }
  }

// ── Build original ──
const wrap = document.getElementById('a1');
const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
svg.setAttribute('viewBox', '0 0 1000 353.77');
STROKE_PATHS.forEach(d => {
  const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  p.setAttribute('d', d);
  svg.appendChild(p);
});
wrap.appendChild(svg);

const n = 16, dur = 6000, HOLD = 4000;
const EASE = 'cubic-bezier(0.25, 0, 0.65, 0.85)';
const allEls = [];

[...svg.querySelectorAll('path')].forEach(path => {
  const len = path.getTotalLength();
  const e = len / n;
  const els = [path];
  for (let i = 0; i < n - 1; i++) {
    const c = path.cloneNode(true);
    path.parentNode.appendChild(c);
    els.push(c);
  }
  els.forEach((el, i) => {
    const offStart = i % 2 === 0 ? -i * e : -(i + 1) * e;
    const offEnd   = i % 2 === 0 ? -i * e : -i * e;
    el.style.strokeDasharray = `0 ${len}`;
    el.style.strokeDashoffset = offStart;
    allEls.push({ el, len, e, offStart, offEnd });
  });
});

async function cycle() {
  while (true) {
    await Promise.all(allEls.map(({ el, len, e, offStart, offEnd }) =>
      el.animate([
        { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
        { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
      ], { duration: dur, easing: EASE, fill: 'forwards' }).finished));
    await new Promise(r => setTimeout(r, HOLD));
    await Promise.all(allEls.map(({ el, len, e, offStart, offEnd }) =>
      el.animate([
        { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
        { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
      ], { duration: dur, easing: EASE, fill: 'forwards' }).finished));
    await new Promise(r => setTimeout(r, 800));
  }
}
cycle();

// ── Build alternate (geometric sans) ──
{
  const wrap2 = document.getElementById('a2');
  const svg2 = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg2.setAttribute('viewBox', '0 0 1000 350');
  GEO_PATHS.forEach(d => {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    p.setAttribute('d', d);
    svg2.appendChild(p);
  });
  wrap2.appendChild(svg2);

  const n2 = 16, dur2 = 6000;
  const allEls2 = [];
  [...svg2.querySelectorAll('path')].forEach(path => {
    const len = path.getTotalLength();
    const e = len / n2;
    const els = [path];
    for (let i = 0; i < n2 - 1; i++) {
      const c = path.cloneNode(true);
      path.parentNode.appendChild(c);
      els.push(c);
    }
    els.forEach((el, i) => {
      const offStart = i % 2 === 0 ? -i * e : -(i + 1) * e;
      const offEnd   = i % 2 === 0 ? -i * e : -i * e;
      el.style.strokeDasharray = `0 ${len}`;
      el.style.strokeDashoffset = offStart;
      allEls2.push({ el, len, e, offStart, offEnd });
    });
  });

  async function cycle2() {
    while (true) {
      await Promise.all(allEls2.map(({ el, len, e, offStart, offEnd }) =>
        el.animate([
          { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
          { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
        ], { duration: dur2, easing: EASE, fill: 'forwards' }).finished));
      await new Promise(r => setTimeout(r, HOLD));
      await Promise.all(allEls2.map(({ el, len, e, offStart, offEnd }) =>
        el.animate([
          { strokeDasharray: `${e} ${len - e}`, strokeDashoffset: offEnd },
          { strokeDasharray: `0 ${len}`, strokeDashoffset: offStart },
        ], { duration: dur2, easing: EASE, fill: 'forwards' }).finished));
      await new Promise(r => setTimeout(r, 800));
    }
  }
  cycle2();
}

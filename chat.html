<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Book / Studio Chat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; color: #eee; font-family: -apple-system, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  #setup { display: flex; align-items: center; justify-content: center; height: 100vh; gap: 30px; }
  #setup button { font-size: 2em; padding: 30px 60px; border: none; border-radius: 16px; cursor: pointer; font-weight: bold; transition: transform 0.15s; }
  #setup button:hover { transform: scale(1.05); }
  #btn-book { background: #e94560; color: white; }
  #btn-studio { background: #0f3460; color: white; }
  #btn-other { background: #533483; color: white; }
  #other-input { display: none; margin-top: 20px; text-align: center; }
  #other-input input { padding: 14px 20px; border-radius: 10px; border: none; font-size: 1.3em; background: #16213e; color: #eee; outline: none; text-align: center; width: 220px; }
  #other-input input::placeholder { color: #555; }
  #other-input button { padding: 14px 28px; border-radius: 10px; border: none; background: #533483; color: white; font-size: 1.1em; font-weight: bold; cursor: pointer; margin-left: 10px; }
  #chat { display: none; flex-direction: column; height: 100vh; }
  #header { padding: 12px 20px; background: #16213e; font-size: 1.2em; font-weight: bold; text-align: center; }
  #status { font-size: 0.7em; font-weight: normal; opacity: 0.6; margin-left: 10px; }
  #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
  .msg { padding: 10px 16px; border-radius: 12px; max-width: 70%; word-wrap: break-word; }
  .msg.mine { background: #e94560; align-self: flex-end; }
  .msg.theirs { background: #0f3460; align-self: flex-start; }
  .msg .name { font-size: 0.75em; opacity: 0.7; margin-bottom: 4px; }
  .msg .text { font-size: 1.1em; line-height: 1.4; }
  .msg img { max-width: 100%; border-radius: 8px; margin-top: 6px; cursor: pointer; }
  #input-bar { display: flex; padding: 12px; background: #16213e; gap: 10px; align-items: center; }
  #input-bar input[type="text"] { flex: 1; padding: 14px; border-radius: 10px; border: none; font-size: 1.1em; background: #1a1a2e; color: #eee; outline: none; }
  #input-bar input[type="text"]::placeholder { color: #555; }
  #input-bar button { padding: 14px 28px; border-radius: 10px; border: none; background: #e94560; color: white; font-size: 1.1em; font-weight: bold; cursor: pointer; flex-shrink: 0; }
  #input-bar button:hover { background: #d63851; }
  #img-btn { padding: 14px 18px !important; background: #0f3460 !important; font-size: 1.3em !important; }
  #img-btn:hover { background: #1a4a80 !important; }
  .drop-overlay { display: none; position: fixed; inset: 0; background: rgba(233,69,96,0.3); border: 4px dashed #e94560; z-index: 100; align-items: center; justify-content: center; font-size: 2em; font-weight: bold; pointer-events: none; }
  .drop-overlay.active { display: flex; }
  #preview { display: none; padding: 8px 12px; background: #16213e; border-top: 1px solid #333; }
  #preview img { max-height: 120px; border-radius: 8px; }
  #preview .remove { color: #e94560; cursor: pointer; margin-left: 10px; font-size: 1.2em; vertical-align: top; }
  .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; align-items: center; justify-content: center; cursor: pointer; }
  .lightbox.active { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 90vh; border-radius: 8px; }
</style>
</head>
<body>
<div id="setup">
  <div style="display:flex;gap:30px;flex-wrap:wrap;justify-content:center;align-items:center;">
    <button id="btn-book" onclick="join('Book')">Book</button>
    <button id="btn-studio" onclick="join('Studio')">Studio</button>
    <button id="btn-other" onclick="showOtherInput()">Other</button>
  </div>
  <div id="other-input">
    <input id="other-name" placeholder="Your name..." maxlength="20">
    <button onclick="joinOther()">Join</button>
  </div>
</div>
<div id="chat">
  <div id="header">Chat <span id="status">connecting...</span></div>
  <div id="messages"></div>
  <div class="drop-overlay" id="drop-overlay">Drop image here</div>
  <div id="preview"></div>
  <div id="input-bar">
    <button id="img-btn" onclick="document.getElementById('file-input').click()">&#128247;</button>
    <input type="file" id="file-input" accept="image/*" style="display:none" onchange="handleFile(this.files[0])">
    <input type="text" id="msg" placeholder="Type a message..." autocomplete="off">
    <button onclick="send()">Send</button>
  </div>
</div>
<div class="lightbox" id="lightbox" onclick="this.classList.remove('active')">
  <img id="lightbox-img">
</div>
<script>
const TOPIC = 'piet-book-studio-chat-7x9k';
const STORAGE_KEY = 'chat-messages';
const NAME_KEY = 'chat-name';
let name = '';
let seen = new Set();
let pendingImage = null;
let allMessages = [];

function loadMessages() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) {
      allMessages = JSON.parse(stored);
      allMessages.forEach(m => {
        seen.add(m.id);
        addMessage(m.name, m.text, m.image, m.name === name, true);
      });
      const container = document.getElementById('messages');
      container.scrollTop = container.scrollHeight;
    }
  } catch(e) {}
}

function saveMessages() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(allMessages));
  } catch(e) {}
}

function storeMessage(msg) {
  allMessages.push(msg);
  saveMessages();
}

function showOtherInput() {
  document.getElementById('other-input').style.display = 'block';
  document.getElementById('other-name').focus();
}

function joinOther() {
  const n = document.getElementById('other-name').value.trim();
  if (!n) return;
  join(n);
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('other-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.stopPropagation(); joinOther(); }
  });
  // Auto-rejoin if name was saved
  const saved = localStorage.getItem(NAME_KEY);
  if (saved) join(saved);
});

function join(n) {
  name = n;
  localStorage.setItem(NAME_KEY, n);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('chat').style.display = 'flex';
  document.getElementById('header').innerHTML = 'Chat - ' + name + ' <span id="status">connecting...</span>';
  document.getElementById('msg').focus();
  loadMessages();
  listen();
}

function listen() {
  const es = new EventSource('https://ntfy.sh/' + TOPIC + '/sse?since=all');
  es.onopen = () => {
    document.getElementById('status').textContent = 'connected';
  };
  es.addEventListener('message', e => {
    try {
      const data = JSON.parse(e.data);
      if (data.event !== 'message') return;
      // Try parsing message body as JSON (text messages)
      let msg = null;
      try { msg = JSON.parse(data.message); } catch(e) {}
      // Handle image attachments (sent via ntfy file upload)
      if (data.attachment && data.attachment.url) {
        const id = data.title || data.id;
        const parts = (data.message || '').split('\n');
        const sender = parts[0] || 'Unknown';
        const text = parts.slice(1).join('\n') || '';
        if (seen.has(id)) return;
        seen.add(id);
        const stored = { id, name: sender, text, image: data.attachment.url };
        storeMessage(stored);
        addMessage(sender, text, data.attachment.url, sender === name);
        return;
      }
      if (!msg || !msg.id) return;
      if (seen.has(msg.id)) return;
      seen.add(msg.id);
      storeMessage(msg);
      addMessage(msg.name, msg.text, msg.image, msg.name === name);
    } catch(err) {}
  });
  es.onerror = () => {
    document.getElementById('status').textContent = 'reconnecting...';
  };
}

function send() {
  const input = document.getElementById('msg');
  const text = input.value.trim();
  if (!text && !pendingImage) return;
  const id = Date.now() + '-' + Math.random().toString(36).slice(2,8);

  if (pendingImage) {
    // Always upload images as ntfy attachment (message body has 4KB limit)
    const blob = dataURLtoBlob(pendingImage);
    clearPreview();
    fetch('https://ntfy.sh/' + TOPIC, {
      method: 'PUT',
      headers: {
        'Filename': 'image.jpg',
        'Title': id,
        'X-Message': name + '\n' + (text || '')
      },
      body: blob
    });
    input.value = '';
    input.focus();
    return;
  }

  // Text-only message
  const msg = { name, text, id };
  fetch('https://ntfy.sh/' + TOPIC, {
    method: 'POST',
    body: JSON.stringify(msg)
  });
  input.value = '';
  input.focus();
}

function dataURLtoBlob(dataURL) {
  const parts = dataURL.split(',');
  const mime = parts[0].match(/:(.*?);/)[1];
  const binary = atob(parts[1]);
  const arr = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) arr[i] = binary.charCodeAt(i);
  return new Blob([arr], { type: mime });
}

function addMessage(sender, text, image, mine, skipScroll) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg ' + (mine ? 'mine' : 'theirs');
  let html = '<div class="name">' + sender + '</div>';
  if (text) {
    const safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += '<div class="text">' + safe + '</div>';
  }
  if (image) {
    html += '<img src="' + image + '" onclick="openLightbox(this.src)">';
  }
  div.innerHTML = html;
  container.appendChild(div);
  if (!skipScroll) container.scrollTop = container.scrollHeight;
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('active');
}

function resizeImage(file, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      const MAX = 800;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else { w = Math.round(w * MAX / h); h = MAX; }
      }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.6));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function handleFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  resizeImage(file, dataUrl => {
    pendingImage = dataUrl;
    showPreview(dataUrl);
  });
}

function showPreview(src) {
  const p = document.getElementById('preview');
  p.style.display = 'block';
  p.innerHTML = '<img src="' + src + '"><span class="remove" onclick="clearPreview()">&#10005;</span>';
}

function clearPreview() {
  pendingImage = null;
  const p = document.getElementById('preview');
  p.style.display = 'none';
  p.innerHTML = '';
  document.getElementById('file-input').value = '';
}

// Drag and drop
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('active'); });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) document.getElementById('drop-overlay').classList.remove('active'); });
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').classList.remove('active');
  if (!name) return;
  const file = e.dataTransfer.files[0];
  if (file) handleFile(file);
});

// Paste images
document.addEventListener('paste', e => {
  if (!name) return;
  const items = e.clipboardData.items;
  for (let i = 0; i < items.length; i++) {
    if (items[i].type.startsWith('image/')) {
      e.preventDefault();
      handleFile(items[i].getAsFile());
      return;
    }
  }
});

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') send();
});
</script>
</body>
</html>

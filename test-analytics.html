<!DOCTYPE html>
<html><body style="background:#111;color:#0f0;font-family:monospace;padding:40px">
<h2>Analytics Test</h2>
<button onclick="testPost()" style="font-size:20px;padding:10px 20px;cursor:pointer">SEND TEST EVENT</button>
<pre id="log"></pre>
<script>
var URL = 'https://script.google.com/macros/s/AKfycbxQcS_M7eZe3ob69qbxaH3QDUUqDQGvec6BKDN94wildC5p3LGTSwytm_2ZyutpznB4/exec';
function log(msg){ document.getElementById('log').textContent += msg + '\n'; }

function testPost(){
  log('Sending test analytics POST via sendBeacon...');
  var ok = navigator.sendBeacon(URL, JSON.stringify({
    game:'TEST', session:'test123', event:'test_event', zone:'TEST',
    score:999, fuel:100, timePlayed:10, deaths:0,
    ip:'1.2.3.4', city:'TestCity', region:'TestRegion', country:'TestCountry', isOwner:false
  }));
  log('sendBeacon returned: ' + ok);
  log('Check your Google Sheet for a new row.');
  log('');
  log('Now testing GET (leaderboard fetch)...');
  fetch(URL + '?game=NAVIGATOR')
    .then(function(r){ return r.text(); })
    .then(function(t){ log('GET response: ' + t); })
    .catch(function(e){ log('GET error: ' + e); });
}
</script>
</body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unveil Dot Animations</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2C76E3; }
  .section { position: relative; width: 100%; height: 100vh; display: flex; justify-content: center; align-items: center; flex-direction: column; }
  .label { color: rgba(255,255,255,0.3); font-family: system-ui, sans-serif; font-size: 14px; letter-spacing: 2px; text-transform: uppercase; position: absolute; bottom: 30px; }
  canvas { display: block; }
</style>
</head>
<body>

<div class="section"><canvas id="c1"></canvas><div class="label">0 → 50 → 0</div></div>
<div class="section"><canvas id="c2"></canvas><div class="label">0 → 70 → 0</div></div>
<div class="section"><canvas id="c3"></canvas><div class="label">0 → 70 → 0 · slow</div></div>
<div class="section"><canvas id="c4"></canvas><div class="label">0 → 70 → 0 · radial</div></div>
<div class="section"><canvas id="c5"></canvas><div class="label">0 → 70 → 0 · random</div></div>
<div class="section"><canvas id="c6"></canvas><div class="label">0 → 50 → 0 · bottom to top</div></div>

<script>
const dots = [
  {x:411.75,y:45.75},{x:381.25,y:15.25},{x:381.25,y:-15.25},
  {x:381.25,y:-45.75},{x:381.25,y:-76.25},{x:381.25,y:-106.75},
  {x:320.25,y:-106.75},{x:320.25,y:-45.75},{x:320.25,y:-15.25},
  {x:320.25,y:15.25},{x:320.25,y:45.75},{x:198.25,y:-15.25},
  {x:228.75,y:-15.25},{x:259.25,y:-15.25},{x:259.25,y:-45.75},
  {x:228.75,y:-76.25},{x:198.25,y:-76.25},{x:167.75,y:-45.75},
  {x:167.75,y:-15.25},{x:167.75,y:15.25},{x:198.25,y:45.75},
  {x:228.75,y:45.75},{x:106.75,y:-76.25},{x:106.75,y:-45.75},
  {x:106.75,y:-15.25},{x:91.5,y:15.25},{x:61,y:45.75},
  {x:30.5,y:15.25},{x:15.25,y:-15.25},{x:15.25,y:-45.75},
  {x:15.25,y:-76.25},{x:-45.75,y:45.75},{x:-45.75,y:15.25},
  {x:-45.75,y:-15.25},{x:-45.75,y:-45.75},{x:-76.25,y:-76.25},
  {x:-106.75,y:-76.25},{x:-137.25,y:-45.75},{x:-137.25,y:-15.25},
  {x:-137.25,y:15.25},{x:-137.25,y:45.75},{x:-198.25,y:-76.25},
  {x:-198.25,y:-45.75},{x:-198.25,y:-15.25},{x:-198.25,y:15.25},
  {x:-228.75,y:45.75},{x:-259.25,y:45.75},{x:-289.75,y:15.25},
  {x:-289.75,y:-15.25},{x:-289.75,y:-45.75},{x:-289.75,y:-76.25}
];

const minX = Math.min(...dots.map(d => d.x));
const maxX = Math.max(...dots.map(d => d.x));
const minY = Math.min(...dots.map(d => d.y));
const maxY = Math.max(...dots.map(d => d.y));
const logoW = maxX - minX;
const logoH = maxY - minY;
const cxLogo = (minX + maxX) / 2;
const cyLogo = (minY + maxY) / 2;

// Pre-compute random offsets for variation 5
const randomOffsets = dots.map(() => Math.random());

function setupCanvas(canvas) {
  const section = canvas.parentElement;
  const resize = () => {
    canvas.width = section.clientWidth;
    canvas.height = section.clientHeight;
  };
  window.addEventListener('resize', resize);
  resize();
  return canvas.getContext('2d');
}

function getScale(canvas) {
  const fitSize = Math.min(canvas.width, canvas.height) * 0.6;
  return fitSize / Math.max(logoW, logoH);
}

// Variation 1: Original (0→50→0)
const ctx1 = setupCanvas(document.getElementById('c1'));
// Variation 2: 0→70→0
const ctx2 = setupCanvas(document.getElementById('c2'));
// Variation 3: 0→70→0 slow
const ctx3 = setupCanvas(document.getElementById('c3'));
// Variation 4: 0→70→0 radial (center out)
const ctx4 = setupCanvas(document.getElementById('c4'));
// Variation 5: 0→70→0 random stagger
const ctx5 = setupCanvas(document.getElementById('c5'));
// Variation 6: 0→50→0 bottom to top
const ctx6 = setupCanvas(document.getElementById('c6'));

function drawVariation(ctx, canvas, time, config) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  const scale = getScale(canvas);
  const offsetX = canvas.width / 2;
  const offsetY = canvas.height / 2;

  const { maxSize, growDur, dotGrow, shrinkDelay, shrinkDur, dotShrink, getOffset } = config;
  const loopLen = shrinkDelay + shrinkDur;
  const t = (time * 0.001) % loopLen;

  ctx.fillStyle = '#ffffff';

  for (let i = 0; i < dots.length; i++) {
    const d = dots[i];
    const px = (d.x - cxLogo) * scale + offsetX;
    const py = (d.y - cyLogo) * scale + offsetY;
    const maxR = (maxSize / 2) * scale;
    const minR = (1 / 2) * scale;

    const offset = getOffset(d, i);

    const growDelayT = offset * (growDur - dotGrow);
    const growProgress = Math.max(0, Math.min(1, (t - growDelayT) / dotGrow));
    const growEased = 1 - Math.pow(1 - growProgress, 3);

    const shrinkStart = shrinkDelay + offset * (shrinkDur - dotShrink);
    const shrinkProgress = Math.max(0, Math.min(1, (t - shrinkStart) / dotShrink));
    const shrinkEased = Math.pow(shrinkProgress, 3);

    const r = minR + (maxR - minR) * growEased - (maxR - minR) * shrinkEased;

    if (r > 0.5) {
      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// Left-to-right offset
function ltrOffset(d) { return (d.x - minX) / logoW; }

// Radial offset (center out)
const maxDist = Math.sqrt((logoW/2)**2 + (logoH/2)**2);
function radialOffset(d) {
  const dx = d.x - cxLogo;
  const dy = d.y - cyLogo;
  return Math.sqrt(dx*dx + dy*dy) / maxDist;
}

// Random offset
function randomOffset(d, i) { return randomOffsets[i]; }

// Bottom to top offset (maxY is bottom, minY is top in AE coords)
function btOffset(d) { return (maxY - d.y) / logoH; }

function animate(time) {
  requestAnimationFrame(animate);

  const c1 = document.getElementById('c1');
  const c2 = document.getElementById('c2');
  const c3 = document.getElementById('c3');
  const c4 = document.getElementById('c4');
  const c5 = document.getElementById('c5');

  // 1: Original 0→50→0
  drawVariation(ctx1, c1, time, {
    maxSize: 50, growDur: 3.5, dotGrow: 1.0,
    shrinkDelay: 2.2, shrinkDur: 3.5, dotShrink: 1.0,
    getOffset: ltrOffset
  });

  // 2: 0→70→0
  drawVariation(ctx2, c2, time, {
    maxSize: 70, growDur: 3.5, dotGrow: 1.0,
    shrinkDelay: 2.2, shrinkDur: 3.5, dotShrink: 1.0,
    getOffset: ltrOffset
  });

  // 3: 0→70→0 slow
  drawVariation(ctx3, c3, time, {
    maxSize: 70, growDur: 5.0, dotGrow: 1.5,
    shrinkDelay: 3.5, shrinkDur: 5.0, dotShrink: 1.5,
    getOffset: ltrOffset
  });

  // 4: 0→70→0 radial
  drawVariation(ctx4, c4, time, {
    maxSize: 70, growDur: 3.5, dotGrow: 1.0,
    shrinkDelay: 2.2, shrinkDur: 3.5, dotShrink: 1.0,
    getOffset: radialOffset
  });

  // 5: 0→70→0 random
  drawVariation(ctx5, c5, time, {
    maxSize: 70, growDur: 3.5, dotGrow: 1.0,
    shrinkDelay: 2.2, shrinkDur: 3.5, dotShrink: 1.0,
    getOffset: randomOffset
  });

  // 6: 0→50→0 bottom to top, gradual overlap
  const c6 = document.getElementById('c6');
  drawVariation(ctx6, c6, time, {
    maxSize: 50, growDur: 5.0, dotGrow: 3.0,
    shrinkDelay: 3.0, shrinkDur: 5.0, dotShrink: 3.0,
    getOffset: btOffset
  });
}

requestAnimationFrame(animate);
</script>
</body>
</html>

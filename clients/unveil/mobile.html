<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Unveil — Mobile</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #2C76E3; overflow: hidden; touch-action: none; }
  canvas { display: block; width: 100vw; height: 100vh; }
  .hint { position: fixed; top: 30px; left: 0; width: 100%; text-align: center; font-family: system-ui, sans-serif; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: rgba(255,255,255,0.3); z-index: 2; pointer-events: none; }
</style>
</head>
<body>
<div class="hint">Tap anywhere</div>
<canvas id="c"></canvas>
<script>
(function() {
  const dots = [
    {x:411.75,y:45.75},{x:381.25,y:15.25},{x:381.25,y:-15.25},
    {x:381.25,y:-45.75},{x:381.25,y:-76.25},{x:381.25,y:-106.75},
    {x:320.25,y:-106.75},{x:320.25,y:-45.75},{x:320.25,y:-15.25},
    {x:320.25,y:15.25},{x:320.25,y:45.75},{x:198.25,y:-15.25},
    {x:228.75,y:-15.25},{x:259.25,y:-15.25},{x:259.25,y:-45.75},
    {x:228.75,y:-76.25},{x:198.25,y:-76.25},{x:167.75,y:-45.75},
    {x:167.75,y:-15.25},{x:167.75,y:15.25},{x:198.25,y:45.75},
    {x:228.75,y:45.75},{x:106.75,y:-76.25},{x:106.75,y:-45.75},
    {x:106.75,y:-15.25},{x:91.5,y:15.25},{x:61,y:45.75},
    {x:30.5,y:15.25},{x:15.25,y:-15.25},{x:15.25,y:-45.75},
    {x:15.25,y:-76.25},{x:-45.75,y:45.75},{x:-45.75,y:15.25},
    {x:-45.75,y:-15.25},{x:-45.75,y:-45.75},{x:-76.25,y:-76.25},
    {x:-106.75,y:-76.25},{x:-137.25,y:-45.75},{x:-137.25,y:-15.25},
    {x:-137.25,y:15.25},{x:-137.25,y:45.75},{x:-198.25,y:-76.25},
    {x:-198.25,y:-45.75},{x:-198.25,y:-15.25},{x:-198.25,y:15.25},
    {x:-228.75,y:45.75},{x:-259.25,y:45.75},{x:-289.75,y:15.25},
    {x:-289.75,y:-15.25},{x:-289.75,y:-45.75},{x:-289.75,y:-76.25}
  ];

  const minX = Math.min(...dots.map(d => d.x));
  const maxX = Math.max(...dots.map(d => d.x));
  const minY = Math.min(...dots.map(d => d.y));
  const maxY = Math.max(...dots.map(d => d.y));
  const logoW = maxX - minX;
  const logoH = maxY - minY;
  const cxLogo = (minX + maxX) / 2;
  const cyLogo = (minY + maxY) / 2;

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // Each tap spawns a logo animation centered at the tap point
  const spawns = [];
  const loopLen = (2.0 + 2.5 * 0.95 + 1.2 + 0.2) / 2;

  function randomOrigin() {
    const angle = Math.random() * Math.PI * 2;
    const r = 0.3 + Math.random() * 0.7;
    return { ox: Math.cos(angle) * r, oy: Math.sin(angle) * r };
  }

  document.addEventListener('touchstart', (e) => {
    e.preventDefault();
    for (let i = 0; i < e.changedTouches.length; i++) {
      const t = e.changedTouches[i];
      spawns.push({ x: t.clientX, y: t.clientY, time: performance.now(), ...randomOrigin() });
    }
  }, { passive: false });

  document.addEventListener('mousedown', (e) => {
    spawns.push({ x: e.clientX, y: e.clientY, time: performance.now(), ...randomOrigin() });
  });

  function animate(time) {
    requestAnimationFrame(animate);
    const dpr = window.devicePixelRatio || 1;
    const w = window.innerWidth, h = window.innerHeight;
    if (canvas.width !== w * dpr || canvas.height !== h * dpr) {
      canvas.width = w * dpr;
      canvas.height = h * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    ctx.clearRect(0, 0, w, h);

    // Remove finished spawns
    for (let s = spawns.length - 1; s >= 0; s--) {
      if ((time - spawns[s].time) * 0.001 > loopLen + 1) spawns.splice(s, 1);
    }

    const fitSize = Math.min(w, h) * 0.55;
    const scale = fitSize / Math.max(logoW, logoH);
    const maxSize = 50;
    const maxR = (maxSize / 2) * scale;

    ctx.fillStyle = '#ffffff';

    for (let s = 0; s < spawns.length; s++) {
      const spawn = spawns[s];
      const elapsed = (time - spawn.time) * 0.001;
      const centerX = spawn.x;
      const centerY = spawn.y;

      // Random origin point within the logo bounds
      const originPx = (spawn.ox * logoW / 2) * scale + centerX;
      const originPy = (spawn.oy * logoH / 2) * scale + centerY;

      // Compute screen positions relative to random origin
      let maxDist = 0;
      const sdots = [];
      for (let i = 0; i < dots.length; i++) {
        const d = dots[i];
        const px = (d.x - cxLogo) * scale + centerX;
        const py = (d.y - cyLogo) * scale + centerY;
        const dx = (px - originPx) * 0.4;
        const dy = (py - originPy) * 1.8;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist > maxDist) maxDist = dist;
        sdots.push({ px, py, dist });
      }

      for (let i = 0; i < sdots.length; i++) {
        const sd = sdots[i];
        const pressNorm = maxDist > 0 ? sd.dist / maxDist : 0;

        const growDur = 1.25, dotGrow = 0.6;
        const shrinkDelay = 1.0, shrinkDur = 1.25, dotShrink = 0.6;
        const pt = Math.min(elapsed, loopLen);

        const pressGrowDelay = pressNorm * growDur * 0.95;
        const pressGrowProg = Math.max(0, Math.min(1, (pt - pressGrowDelay) / dotGrow));
        const pressGrowEased = 1 - Math.pow(1 - pressGrowProg, 3);

        const pressShrinkStart = shrinkDelay + pressNorm * shrinkDur * 0.95;
        const pressShrinkProg = Math.max(0, Math.min(1, (pt - pressShrinkStart) / dotShrink));
        const pressShrinkEased = Math.pow(pressShrinkProg, 3);

        const r = maxR * pressGrowEased - maxR * pressShrinkEased;

        if (r > 0.5) {
          ctx.beginPath();
          ctx.arc(sd.px, sd.py, r, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  }
  requestAnimationFrame(animate);
})();
</script>
</body>
</html>
